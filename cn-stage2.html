<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VCT CN 2026 Stage 2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0f0a0b; color: #f0f0f0; font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; }

      /* ── HEADER ─────────────────────────────── */
      .site-header { display: flex; align-items: center; gap: 20px; padding: 0 32px; height: 56px; background: rgba(15,10,11,0.9); border-bottom: 1px solid rgba(255,255,255,0.06); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
      .home-link { font-size: 15px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.55); text-decoration: none; transition: color 0.15s; }
      .home-link:hover { color: #fff; }
      .back-link { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.4); text-decoration: none; transition: color 0.15s;  }
      .site-header .home-link::after { content: " /"; margin-left: 4px; color: rgba(255,255,255,.18); font-weight: 400; }
      .back-link:hover { color: rgba(255,255,255,0.8); }

      /* ── EYEBROW ─────────────────────────────── */
      .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: #e84057; margin-bottom: 8px; }

      /* ── PAGE SHELL ─────────────────────────── */
      .league-shell { max-width: 1280px; margin: 0 auto; padding: 0 40px 80px; }
      @media (max-width: 600px) { .league-shell { padding: 0 16px 60px; } }

      /* ── STAGE HERO ─────────────────────────── */
      .stage-hero { display: grid; grid-template-columns: minmax(0,1fr) minmax(240px,360px); gap: 28px; align-items: end; padding: 48px 0 52px; animation: rise-in 520ms ease both; }
      @media (max-width: 680px) { .stage-hero { grid-template-columns: 1fr; } }
      .stage-hero h1 { font-size: clamp(36px, 6vw, 68px); font-weight: 900; line-height: 1; color: #fff; margin-bottom: 14px; }
      .stage-hero p.intro { font-size: 14px; color: rgba(255,255,255,0.45); font-weight: 500; line-height: 1.7; max-width: 540px; }
      .stage-summary { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 10px; }
      .stage-summary div { min-height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; background: rgba(255,255,255,0.03); animation: pop-in 520ms ease both; }
      .stage-summary div:nth-child(2) { animation-delay: 80ms; }
      .stage-summary div:nth-child(3) { animation-delay: 160ms; }
      .stage-summary strong { color: #fff; font-size: 42px; line-height: 1; font-weight: 900; }
      .stage-summary span { margin-top: 8px; color: rgba(255,255,255,0.4); font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; }

      /* ── SECTION HEADING ────────────────────── */
      .section-heading { display: flex; align-items: flex-end; justify-content: space-between; gap: 18px; margin-bottom: 18px; }
      .section-heading h2 { font-size: clamp(20px, 3vw, 28px); font-weight: 900; color: #fff; line-height: 1.1; }

      /* ── PLAYOFF LINK ───────────────────────── */
      .playoff-link { flex-shrink: 0; min-height: 40px; display: inline-flex; align-items: center; justify-content: center; padding: 0 18px; border: 1px solid rgba(232,64,87,0.4); border-radius: 8px; color: #e84057; background: rgba(232,64,87,0.07); font-size: 14px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; text-decoration: none; transition: background 0.15s, border-color 0.15s; }
      .playoff-link:hover { background: rgba(232,64,87,0.14); border-color: rgba(232,64,87,0.7); }
      .playin-link { flex-shrink: 0; min-height: 40px; display: inline-flex; align-items: center; justify-content: center; padding: 0 18px; border: 1px solid rgba(232,64,87,0.25); border-radius: 8px; color: rgba(232,64,87,.7); background: rgba(232,64,87,0.04); font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; text-decoration: none; transition: background 0.15s, border-color 0.15s; }
      .playin-link:hover { background: rgba(232,64,87,0.10); border-color: rgba(232,64,87,0.5); }

      /* ── GROUP ASSIGN ───────────────────────── */
      .group-assign-section { padding: 40px 0 0; }
      .group-assign-section .section-heading { margin-bottom: 20px; }
      .group-assign-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      @media (max-width: 600px) { .group-assign-grid { grid-template-columns: 1fr; } }
      .group-assign-card { background: rgba(255,255,255,0.03); border: 1.5px solid rgba(255,255,255,0.09); border-radius: 14px; padding: 18px; }
      .group-assign-card h3 { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin: 0 0 14px; }
      .group-slots { display: flex; flex-direction: column; gap: 8px; }
      .group-slot { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 10px; background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.07); min-height: 52px; transition: background 0.15s; }
      .group-slot.has-team { border-color: rgba(232,64,87,0.35); background: rgba(232,64,87,0.06); }
      .group-slot .slot-logo { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
      .group-slot .slot-logo img { width: 44px; height: 44px; object-fit: contain; }
      .group-slot .slot-name { font-size: 13px; font-weight: 700; flex: 1; color: rgba(255,255,255,0.85); }
      .group-slot.empty .slot-name { opacity: 0.35; font-weight: 500; }
      .group-slot .slot-rank { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.25); margin-left: auto; }
      body:not(.view-only) .group-slot { cursor: pointer; }
      body:not(.view-only) .group-slot:hover { background: rgba(232,64,87,0.1); border-color: rgba(232,64,87,0.5); }
      body:not(.view-only) .group-slot.has-team:hover { background: rgba(232,64,87,0.16); }

      /* ── WEEK TABS ──────────────────────────── */
      .week-section { margin: 48px 0; animation: rise-in 560ms ease both; }
      .week-tabs > input { position: absolute; opacity: 0; pointer-events: none; }
      .week-tab-list { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px; padding: 8px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; }
      .week-tab-list label { min-height: 46px; display: grid; place-items: center; border-radius: 7px; background: transparent; border: 1px solid transparent; font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.4); cursor: pointer; transition: color 0.14s, background 0.14s, border-color 0.14s; }
      .week-tab-list label:hover { color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.1); }
      #week-1:checked ~ .week-tab-list label[for="week-1"],
      #week-2:checked ~ .week-tab-list label[for="week-2"],
      #week-3:checked ~ .week-tab-list label[for="week-3"],
      #week-4:checked ~ .week-tab-list label[for="week-4"] { color: #fff; background: rgba(232,64,87,0.12); border-color: rgba(232,64,87,0.35); }
      .week-panels { margin-top: 12px; }
      .week-panel { display: none; overflow: hidden; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; }
      #week-1:checked ~ .week-panels .week-panel-1,
      #week-2:checked ~ .week-panels .week-panel-2,
      #week-3:checked ~ .week-panels .week-panel-3,
      #week-4:checked ~ .week-panels .week-panel-4 { display: block; animation: panel-in 360ms ease both; }
      @keyframes panel-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
      .week-meta { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.06); }
      .week-meta strong { font-size: 24px; font-weight: 900; color: #fff; }
      .week-meta span { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.4); }

      /* ── MATCH CARD ─────────────────────────── */
      .match-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 1px; background: rgba(255,255,255,0.06); }
      @media (max-width: 600px) { .match-grid { grid-template-columns: 1fr; } }
      .match-card { position: relative; min-height: 140px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px; padding: 22px 16px 18px; background: #0f0a0b; cursor: pointer; transition: background 0.18s; overflow: hidden; }
      .match-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #e84057, rgba(232,64,87,0.3)); transform: translateX(-100%); transition: transform 320ms ease; }
      .match-card:hover { background: #180a0d; }
      .match-card:hover::before { transform: translateX(0); }
      .match-card > span { position: absolute; top: 10px; left: 14px; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: rgba(255,255,255,0.3); }
      .match-card strong { position: relative; z-index: 1; min-width: 0; display: inline-flex; align-items: center; justify-content: center; color: #fff; font-weight: 900; }
      .match-card strong span { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; }
      .match-card strong .match-team-mini-logo { position: static; width: 56px; height: 56px; overflow: visible; clip: auto; white-space: normal; }
      .match-team-mini-logo { width: 56px; height: 56px; display: block; flex: 0 0 auto; object-fit: contain; }
      .match-card em { position: relative; z-index: 1; min-width: 52px; min-height: 38px; display: inline-flex; align-items: center; justify-content: center; border-radius: 7px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.85); font-size: 16px; font-style: normal; font-weight: 900; transition: transform 0.18s; }
      .match-card:hover em { transform: scale(1.06); }
      .match-card.upcoming em { color: rgba(255,255,255,0.5); background: rgba(232,64,87,0.08); border-color: rgba(232,64,87,0.25); animation: vs-pulse 1.8s ease-in-out infinite; }
      @keyframes vs-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
      @keyframes rise-in { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
      @keyframes pop-in { from { opacity: 0; transform: scale(0.94); } to { opacity: 1; transform: none; } }
      @keyframes row-in { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: none; } }

      .match-card-edit-btn {
        display: none; position: absolute; top: 6px; right: 6px;
        background: rgba(232,64,87,0.18); border: 1px solid rgba(232,64,87,0.4);
        color: #e84057; border-radius: 6px; padding: 3px 7px;
        font-size: 11px; font-weight: 700; cursor: pointer; line-height: 1.4; z-index: 2;
      }
      body:not(.view-only) .match-card-edit-btn { display: block; }
      body:not(.view-only) .match-card-edit-btn:hover { background: rgba(232,64,87,0.35); }
      .match-card.no-teams { opacity: 0.55; }
      .match-card.no-teams strong { font-style: italic; opacity: 0.6; }
      body:not(.view-only) .match-card.no-teams { opacity: 1; cursor: default; }

      /* ── 시딩전 배지 ──────────────────────────── */
      .seeding-badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; background: rgba(232,64,87,0.18); color: #e84057; border: 1px solid rgba(232,64,87,0.35); margin: 12px 24px; }

      /* ── STANDINGS ──────────────────────────── */
      .standings-section { margin-top: 16px; animation: rise-in 680ms ease 120ms both; }
      .standings-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 20px; }
      @media (max-width: 680px) { .standings-grid { grid-template-columns: 1fr; } }
      .standings-card { overflow: hidden; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; background: rgba(255,255,255,0.02); }
      .standings-title { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 18px 20px; background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.06); }
      .standings-title h3 { font-size: 20px; font-weight: 900; color: #fff; }
      .standings-title span { min-height: 26px; display: inline-flex; align-items: center; padding: 0 10px; border-radius: 999px; background: rgba(232,64,87,0.1); border: 1px solid rgba(232,64,87,0.25); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #e84057; white-space: nowrap; }
      .standings-table { width: 100%; }
      .standings-row { position: relative; display: grid; grid-template-columns: minmax(220px,1fr) 64px 64px 96px 80px; align-items: stretch; min-height: 88px; border-top: 1px solid rgba(255,255,255,0.05); color: rgba(255,255,255,0.85); }
      .standings-row::before { position: absolute; top: 0; bottom: 0; left: 0; width: 4px; content: ''; background: rgba(255,255,255,0.06); }
      .standings-row.advance::before { background: rgba(232,64,87,0.45); }
      .standings-row.out::before { background: rgba(255,255,255,0.06); }
      .standings-row.clinched { background: rgba(61,220,132,0.06); }
      .standings-row.clinched::before { background: #3ddc84; animation: advance-pulse 2.4s ease-in-out infinite; }
      @keyframes advance-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }
      .standings-row.eliminated { background: rgba(239,74,94,0.06); }
      .standings-row.eliminated::before { background: #ef4a5e; }
      .standings-row:not(.standings-head) { animation: row-in 420ms ease both; }
      .standings-head { min-height: 48px; background: rgba(255,255,255,0.025); color: rgba(255,255,255,0.3); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
      .standings-head::before { display: none; }
      .standings-row > span, .team-cell { display: flex; align-items: center; border-left: 1px solid rgba(255,255,255,0.05); }
      .standings-row > span { justify-content: center; padding: 0 8px; font-size: 16px; font-weight: 700; text-align: center; }
      .standings-head > span { font-size: 11px; }
      .standings-row > span:first-child { justify-content: flex-start; }
      .team-cell { gap: 12px; min-width: 0; padding: 14px 16px; border-left: 0; }
      .rank-badge { width: 26px; height: 26px; display: flex; flex: 0 0 auto; align-items: center; justify-content: center; border-radius: 999px; background: rgba(255,255,255,0.08); font-size: 13px; font-weight: 900; color: rgba(255,255,255,0.7); }
      .stage-team-logo { width: 50px; height: 50px; display: flex; flex: 0 0 auto; align-items: center; justify-content: center; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 7px; overflow: hidden; }
      .stage-team-logo img { width: 36px; height: 36px; object-fit: contain; display: block; }
      .team-cell strong, .team-cell span { display: block; }
      .team-cell strong { font-size: 14px; font-weight: 700; color: #fff; line-height: 1.3; word-break: break-word; }
      .team-cell span { margin-top: 3px; font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.35); }
      .delta { width: 100%; text-align: center; }
      .delta.plus { color: #3ddc84; }
      .delta.minus { color: #ff6b6b; }

      /* ── 팀 선택 모달 ─────────────────────────────────── */
      .ts-modal { position: fixed; inset: 0; z-index: 9800; display: flex; align-items: center; justify-content: center; }
      .ts-modal[hidden] { display: none !important; }
      .ts-backdrop { position: absolute; inset: 0; background: rgba(5,5,5,0.65); backdrop-filter: blur(6px); }
      .ts-panel { position: relative; z-index: 1; width: min(540px, calc(100vw - 24px)); max-height: 90vh; overflow-y: auto; background: #1a0508; border: 1.5px solid rgba(232,64,87,0.25); border-radius: 18px; padding: 24px; animation: loginPanelIn 0.2s ease; }
      @keyframes loginPanelIn { from { opacity: 0; transform: translateY(16px) scale(0.97); } to { opacity: 1; transform: none; } }
      .ts-panel h2 { font-size: 18px; font-weight: 900; margin: 0 0 4px; color: #fff; }
      .ts-panel p { font-size: 13px; opacity: 0.5; margin: 0 0 18px; color: #fff; }
      .ts-team-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 18px; }
      @media (max-width: 400px) { .ts-team-grid { grid-template-columns: repeat(2, 1fr); } }
      .ts-team-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 12px 8px; border-radius: 10px; background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.09); color: #fff; font-family: inherit; cursor: pointer; transition: all 0.14s; font-size: 11px; font-weight: 700; line-height: 1.2; text-align: center; }
      .ts-team-btn img { width: 32px; height: 32px; object-fit: contain; }
      .ts-team-btn .ts-team-code { font-size: 13px; font-weight: 900; }
      .ts-team-btn:hover { background: rgba(232,64,87,0.1); border-color: rgba(232,64,87,0.5); }
      .ts-team-btn.selected-a { background: rgba(232,64,87,0.2); border-color: #e84057; box-shadow: 0 0 0 2px rgba(232,64,87,0.25); }
      .ts-team-btn.selected-b { background: rgba(255,180,0,0.15); border-color: #ffb400; box-shadow: 0 0 0 2px rgba(255,180,0,0.2); }
      .ts-team-btn.in-other-group { opacity: 0.22; pointer-events: none; }
      .ts-match-step { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; }
      .ts-step-badge { padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; }
      .ts-step-badge.step-a { background: rgba(232,64,87,0.2); color: #e84057; }
      .ts-step-badge.step-b { background: rgba(255,180,0,0.15); color: #ffb400; }
      .ts-date-row { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; }
      .ts-date-row label { font-size: 12px; opacity: 0.6; white-space: nowrap; }
      .ts-date-input { flex: 1; background: rgba(255,255,255,0.07); border: 1.5px solid rgba(255,255,255,0.15); color: #fff; border-radius: 8px; padding: 7px 10px; font-size: 13px; font-family: inherit; }
      .ts-date-input:focus { outline: none; border-color: #e84057; }
      .ts-actions { display: flex; gap: 10px; justify-content: flex-end; }
      .ts-btn { padding: 9px 20px; border-radius: 8px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; border: none; }
      .ts-btn-cancel { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); }
      .ts-btn-cancel:hover { background: rgba(255,255,255,0.14); }
      .ts-btn-save { background: #e84057; color: #fff; }
      .ts-btn-save:hover { background: #f05070; }
      .ts-btn-save:disabled { opacity: 0.35; cursor: not-allowed; }
      .ts-btn-clear { background: rgba(255,80,80,0.12); color: #ff6b6b; border: 1px solid rgba(255,80,80,0.25); }
      .ts-btn-clear:hover { background: rgba(255,80,80,0.24); }
.site-header .auth-header-btn { margin-left: auto !important; }
  </style>
  </head>
  <body class="league-page stage-page cn-page">
    <header class="site-header">
      <a class="home-link" href="./index.html">VCT Archive</a>
      <a class="back-link" href="./cn.html">CN</a>
    </header>

    <main class="league-shell stage-shell">
      <section class="stage-hero" aria-labelledby="stage-title">
        <div>
          <p class="eyebrow">VCT CN 2026</p>
          <h1 id="stage-title">Stage 2 순위</h1>
          <p class="intro">
            Alpha와 Omega 두 그룹의 순위를 정리한 페이지입니다. 3주차 그룹 스테이지 후
            시딩전을 거쳐 상위 8팀이 단판 토너먼트 플레이오프에 진출합니다.
          </p>
        </div>
        <div class="stage-summary" aria-label="Stage 2 진행 방식">
          <div><strong>2</strong><span>그룹</span></div>
          <div><strong>12</strong><span>팀</span></div>
          <div><strong>8</strong><span>진출</span></div>
        </div>
      </section>

      <section class="group-assign-section" aria-labelledby="group-assign-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Group Assignment</p>
            <h2 id="group-assign-title">그룹 팀 배정</h2>
          </div>
        </div>
        <div class="group-assign-grid">
          <div class="group-assign-card">
            <h3>알파조 (α) — 상위 4팀 진출</h3>
            <div class="group-slots" id="alpha-slots"></div>
          </div>
          <div class="group-assign-card">
            <h3>오메가조 (ω) — 상위 4팀 진출</h3>
            <div class="group-slots" id="omega-slots"></div>
          </div>
        </div>
      </section>

      <section class="week-section" aria-labelledby="weeks-title" id="fixtures-section">
        <div class="section-heading">
          <div>
            <p class="eyebrow">경기 목록</p>
            <h2 id="weeks-title">주차별 경기</h2>
          </div>
          <a class="playin-link" href="./cn-stage2-playin.html">Play-In</a>
          <a class="playoff-link" href="./cn-stage2-playoffs.html">PlayOff 대진표</a>
        </div>

        <div class="week-tabs">
          <input type="radio" name="week" id="week-1" checked />
          <input type="radio" name="week" id="week-2" />
          <input type="radio" name="week" id="week-3" />
          <input type="radio" name="week" id="week-4" />
          <div class="week-tab-list" aria-label="주차 선택">
            <label for="week-1">1주차</label>
            <label for="week-2">2주차</label>
            <label for="week-3">3주차</label>
            <label for="week-4">시딩전</label>
          </div>
          <div class="week-panels" id="week-panels"></div>
        </div>
      </section>

      <section class="standings-section" id="standings-section" aria-labelledby="standings-title">
        <div class="section-heading">
          <p class="eyebrow">순위</p>
          <h2 id="standings-title">그룹 스테이지 순위</h2>
        </div>
        <div class="standings-grid" id="standings-grid"></div>
      </section>
    </main>

    <div class="ts-modal" id="ts-modal" hidden>
      <div class="ts-backdrop" id="ts-backdrop"></div>
      <div class="ts-panel" role="dialog" aria-modal="true" aria-labelledby="ts-title">
        <h2 id="ts-title">팀 선택</h2>
        <p id="ts-subtitle"></p>
        <div id="ts-match-step-indicator"></div>
        <div id="ts-date-row-container"></div>
        <div class="ts-team-grid" id="ts-team-grid"></div>
        <div class="ts-actions" id="ts-actions"></div>
      </div>
    </div>

    <script src="./storage.js"></script>
    <script>
    window.storageReady.then(function () {

      const TEAMS = [
        "All Gamers", "JD Mall JDG Esports", "TYLOO", "Wuxi Titan Esports Club",
        "Guangzhou Huadu Bilibili Gaming", "FunPlus Phoenix", "Xi Lai Gaming", "EDward Gaming",
        "Dragon Ranger Gaming", "Trace Esports", "Nova Esports", "Wolves Esports",
      ];

      const teamCodes = {
        "All Gamers":                     "AG",
        "JD Mall JDG Esports":            "JDG",
        "TYLOO":                          "TYL",
        "Wuxi Titan Esports Club":        "TEC",
        "Guangzhou Huadu Bilibili Gaming":"BLG",
        "FunPlus Phoenix":                "FPX",
        "Xi Lai Gaming":                  "XLG",
        "EDward Gaming":                  "EDG",
        "Dragon Ranger Gaming":           "DRG",
        "Trace Esports":                  "TE",
        "Nova Esports":                   "NOVA",
        "Wolves Esports":                 "WOL",
      };

      const teamLogos = {
        "All Gamers":                     "https://i.namu.wiki/i/5BvCRCBmH7L2vf7IUVxTUodUxcGjFG9Wj8gTfQfCX39lZBmZe65aXGnliVal-TvqE0EWzvnNk9uZpYka-Bkd9w.webp",
        "JD Mall JDG Esports":            "https://i.namu.wiki/i/YyWlT49EP4lbp3xXGQr4QdzyrHYb3xwHo50oXrrAPOE7T6hXJsSJ5GNGWsB65RT1N5Ceh1lVwzhmE9HgoaV3yw.svg",
        "TYLOO":                          "https://i.namu.wiki/i/ygjpeHG-y9CYpiLp-E8wiEsNDU6j9aRNcwVvPJsOlvcSV1Ey_NCmMAjMarHe3bhjm6EDK-qgXl_hEmhQdz__ag.svg",
        "Wuxi Titan Esports Club":        "https://i.namu.wiki/i/doa0qMFjVzCAMO6yZ8963XeNJ2DjQnSjeEnZd7pKsk5op7S5E6QMrKcn_GI4qcWgiJHMto_F-NVn8ilAKjWiSA.svg",
        "Guangzhou Huadu Bilibili Gaming":"https://dpm.lol/esport/teams/BLG.webp",
        "FunPlus Phoenix":                "https://i.namu.wiki/i/bo6KwtrXNzYIi3crhMLbn0G6As6Nw3e0mgwRiNgkv5jbmvZtzNxxM3PSfrJ92ybcZf-yqy2ma6Iwk0Hg5rFkCQ.svg",
        "Xi Lai Gaming":                  "https://i.namu.wiki/i/Yywbu40Korgue4azcIZrrlnlCSyI6vdM7imxW_Qt7dA8JzhkIbIJuIeAMVuG-KOms30fAAwz12iuyETD7pCGvw.svg",
        "EDward Gaming":                  "https://upload.wikimedia.org/wikipedia/commons/3/33/Edward_Gaming_logo.png",
        "Dragon Ranger Gaming":           "https://i.namu.wiki/i/HNgARAhXqj-GU-MTPU1tZaTG0jf2ISAgOpYMeSIhQwRwgI-Du73w4kLJAUchM3u6aCGWjingU6ggytTqSFhOug.webp",
        "Trace Esports":                  "https://i.namu.wiki/i/V8Ky2dcxylZ84RGcXeFbPG0x8txS6o3tpxLskoeAJWZkUiGIEFqCnRZHZ7kKwUi5i_sGg_oiHHXhJ-DfsPgWaA.svg",
        "Nova Esports":                   "https://i.namu.wiki/i/-6DEz5g9-cso0kotRlGjxhZfBRLtMzq1OExUW-jyDO_FAR3bVmFwXD9z1UxT7_3U7YkiqwBgGY1E11qs9R6eyA.webp",
        "Wolves Esports":                 "https://i.namu.wiki/i/X-eGL_hqaHsoGwmlAnlpWND0IL9ubVJBNJOBIm0tm365e5mMyXSh15rMbGd_zaedawHbF9Rr4rNPjVgb2X650g.webp",
      };

      const GROUPS_KEY = "stage2_cn_groups";

      // w=1,2,3: group stage; w=4: 시딩전 (separate key)
      const MATCH_COUNTS = [12, 12, 6, 4];
      const WEEK_LABELS  = ["1주차", "2주차", "3주차", "시딩전"];
      const WEEK_DATES   = ["07.16 - 07.17", "07.23 - 07.24", "07.30 - 07.31", "08.06 - 08.07"];

      const matchKey = (w, m) => w === 4
        ? `stage2_cn_seeding_m${m}`
        : `stage2_cn_w${w}_m${m}`;

      function loadGroups() {
        try { const raw = localStorage.getItem(GROUPS_KEY); if (raw) return JSON.parse(raw); } catch {}
        return { alpha: Array(6).fill(""), omega: Array(6).fill("") };
      }
      function saveGroups(groups) { localStorage.setItem(GROUPS_KEY, JSON.stringify(groups)); }

      function loadMatch(w, m) {
        try { const raw = localStorage.getItem(matchKey(w, m)); if (raw) return JSON.parse(raw); } catch {}
        return { teamA: "", teamB: "", date: "" };
      }
      function saveMatch(w, m, data) { localStorage.setItem(matchKey(w, m), JSON.stringify(data)); }

      function getStoredMatchScore(date, teamA, teamB) {
        if (!teamA || !teamB) return "VS";
        try {
          const stored = JSON.parse(localStorage.getItem(`result:${date}|${teamA}|${teamB}`) || "{}");
          const sa = String(stored.scoreA ?? "").trim();
          const sb = String(stored.scoreB ?? "").trim();
          if (sa && sb && sa !== "-" && sb !== "-") return `${sa} : ${sb}`;
        } catch {}
        return "VS";
      }

      function logoHtml(teamName, size) {
        const src = teamLogos[teamName];
        if (!src) return "";
        const style = size ? ` style="width:${size}px;height:${size}px;object-fit:contain;"` : "";
        return `<img src="${src}" alt="${teamName}"${style} />`;
      }

      const isAdmin = () => typeof window.vctIsAdmin === "function" && window.vctIsAdmin();

      /* ── 그룹 슬롯 렌더링 ──────────────────────────────── */
      function renderGroupSlots() {
        const groups = loadGroups();
        ["alpha", "omega"].forEach((grp) => {
          const container = document.getElementById(grp + "-slots");
          if (!container) return;
          container.innerHTML = "";
          for (let i = 0; i < 6; i++) {
            const team = groups[grp][i] || "";
            const slot = document.createElement("div");
            slot.className = "group-slot" + (team ? " has-team" : " empty");
            slot.innerHTML = `
              <div class="slot-logo">${team ? logoHtml(team, 44) : ""}</div>
              <span class="slot-name">${team || "팀 선택"}</span>
              <span class="slot-rank">${i + 1}번 슬롯</span>
            `;
            if (isAdmin()) slot.addEventListener("click", () => openGroupSlotPicker(grp, i));
            container.appendChild(slot);
          }
        });
      }

      /* ── 주차별 경기 렌더링 ─────────────────────────────── */
      function renderWeekPanels() {
        const container = document.getElementById("week-panels");
        if (!container) return;
        container.innerHTML = "";
        for (let w = 1; w <= 4; w++) {
          const count = MATCH_COUNTS[w - 1];
          const label = WEEK_LABELS[w - 1];
          const isSeeding = w === 4;

          const panel = document.createElement("div");
          panel.className = `week-panel week-panel-${w}`;

          const meta = document.createElement("div");
          meta.className = "week-meta";
          meta.innerHTML = `<strong>${label}</strong><span>2026. ${WEEK_DATES[w - 1]}</span>`;
          panel.appendChild(meta);

          if (isSeeding) {
            const badge = document.createElement("div");
            badge.innerHTML = '<span class="seeding-badge">시딩전 — 플레이오프 시드 결정전</span>';
            panel.appendChild(badge);
          }

          const grid = document.createElement("div");
          grid.className = "match-grid";
          for (let m = 0; m < count; m++) {
            const md = loadMatch(w, m);
            const { teamA, teamB, date } = md;
            const score = getStoredMatchScore(date || matchKey(w, m), teamA, teamB);
            const hasTeams = teamA && teamB;
            const card = document.createElement("article");
            card.className = "match-card" + (hasTeams ? "" : " no-teams");

            const editBtn = document.createElement("button");
            editBtn.className = "match-card-edit-btn";
            editBtn.textContent = "✎ 편집";
            editBtn.addEventListener("click", (e) => { e.stopPropagation(); openMatchPicker(w, m); });

            const dateSpan = document.createElement("span");
            dateSpan.textContent = date || `${label} M${m + 1}`;

            const teamAEl = document.createElement("strong");
            if (teamA) {
              teamAEl.innerHTML = `<img class="match-team-mini-logo" src="${teamLogos[teamA] || ""}" alt="" /><span>${teamA}</span>`;
              teamAEl.setAttribute("aria-label", teamA);
            } else { teamAEl.textContent = "미정"; }

            const scoreEl = document.createElement("em");
            scoreEl.textContent = score;

            const teamBEl = document.createElement("strong");
            if (teamB) {
              teamBEl.innerHTML = `<img class="match-team-mini-logo" src="${teamLogos[teamB] || ""}" alt="" /><span>${teamB}</span>`;
              teamBEl.setAttribute("aria-label", teamB);
            } else { teamBEl.textContent = "미정"; }

            card.appendChild(editBtn);
            card.appendChild(dateSpan);
            card.appendChild(teamAEl);
            card.appendChild(scoreEl);
            card.appendChild(teamBEl);

            if (hasTeams) {
              card.setAttribute("role", "link");
              card.setAttribute("tabindex", "0");
              card.addEventListener("click", () => {
                const params = new URLSearchParams({ date: date || matchKey(w, m), teamA, teamB, score, from: "stage2" });
                window.location.href = `./cn-match-dark.html?${params.toString()}`;
              });
              card.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); card.click(); } });
            }
            grid.appendChild(card);
          }
          panel.appendChild(grid);
          container.appendChild(panel);
        }
      }

      /* ── 순위표 렌더링 ──────────────────────────────────── */
      function collectGroupFixtures() {
        // 시딩전(w=4)은 순위에 포함하지 않음
        const fixtures = [];
        for (let w = 1; w <= 3; w++) {
          for (let m = 0; m < MATCH_COUNTS[w - 1]; m++) {
            const md = loadMatch(w, m);
            if (!md.teamA || !md.teamB) continue;
            const key = md.date || matchKey(w, m);
            const score = getStoredMatchScore(key, md.teamA, md.teamB);
            fixtures.push({ date: key, teamA: md.teamA, teamB: md.teamB, score });
          }
        }
        return fixtures;
      }

      function parseScore(score) {
        const p = (score || "").match(/(\d+)\s*:\s*(\d+)/);
        if (!p) return null;
        return { a: Number(p[1]), b: Number(p[2]) };
      }

      function getSavedSetRounds(dateKey, teamA, teamB) {
        try {
          const fk = `${dateKey}|${teamA}|${teamB}`;
          let a = 0, b = 0;
          for (let i = 0; i < 5; i++) {
            const saved = JSON.parse(localStorage.getItem(`stats:${fk}:${i}`) || "{}");
            const aScore = Number(saved.aScore);
            const bScore = Number(saved.bScore);
            if (Number.isFinite(aScore) && Number.isFinite(bScore)) { a += aScore; b += bScore; }
          }
          return { a, b };
        } catch { return { a: 0, b: 0 }; }
      }

      function rankGroup(teams, fixtures) {
        const stats = new Map(teams.filter(Boolean).map((t) => [t, { team: t, wins: 0, losses: 0, mapsWon: 0, mapsLost: 0, roundsWon: 0, roundsLost: 0 }]));
        const teamSet = new Set(teams.filter(Boolean));
        fixtures.filter((f) => teamSet.has(f.teamA) && teamSet.has(f.teamB)).forEach((f) => {
          const p = parseScore(f.score);
          if (!p) return;
          const a = stats.get(f.teamA), b = stats.get(f.teamB);
          if (!a || !b) return;
          a.mapsWon += p.a; a.mapsLost += p.b;
          b.mapsWon += p.b; b.mapsLost += p.a;
          if (p.a > p.b) { a.wins++; b.losses++; } else if (p.b > p.a) { b.wins++; a.losses++; }
          const rounds = getSavedSetRounds(f.date, f.teamA, f.teamB);
          a.roundsWon += rounds.a; a.roundsLost += rounds.b;
          b.roundsWon += rounds.b; b.roundsLost += rounds.a;
        });
        return [...stats.values()].sort((a, b) =>
          b.wins - a.wins || a.losses - b.losses ||
          (b.mapsWon - b.mapsLost) - (a.mapsWon - a.mapsLost) ||
          (b.roundsWon - b.roundsLost) - (a.roundsWon - a.roundsLost)
        );
      }

      function renderStandings() {
        const grid = document.getElementById("standings-grid");
        if (!grid) return;
        const groups = loadGroups();
        const fixtures = collectGroupFixtures();
        ["alpha", "omega"].forEach((grp) => {
          const teams = groups[grp].filter(Boolean);
          const label = grp === "alpha" ? "알파조 (α)" : "오메가조 (ω)";
          let card = grid.querySelector(`[data-grp="${grp}"]`);
          if (!card) { card = document.createElement("article"); card.className = "standings-card"; card.dataset.grp = grp; grid.appendChild(card); }
          if (teams.length === 0) {
            card.innerHTML = `
              <div class="standings-title"><h3>${label}</h3><span>팀 배정 대기 중</span></div>
              <div class="standings-table" role="table">
                <div class="standings-row standings-head" role="row">
                  <span>팀</span><span>승패</span><span>맵</span><span>라운드</span><span>득실</span>
                </div>
                <div class="standings-row" style="opacity:.45;padding:16px;font-size:13px;">그룹 팀을 배정하면 순위가 표시됩니다.</div>
              </div>`;
            return;
          }
          const ranked = rankGroup(teams, fixtures);
          const rows = ranked.map((s, i) => {
            const diff = s.mapsWon - s.mapsLost;
            return `
              <div class="standings-row ${i < 4 ? "advance" : "out"}" role="row">
                <div class="team-cell">
                  <div class="rank-badge">${i + 1}</div>
                  <div class="stage-team-logo">${logoHtml(s.team)}</div>
                  <div><strong>${s.team}</strong><span>중국</span></div>
                </div>
                <span>${s.wins} - ${s.losses}</span>
                <span>${s.mapsWon} / ${s.mapsLost}</span>
                <span>${s.roundsWon} / ${s.roundsLost}</span>
                <span class="delta ${diff >= 0 ? "plus" : "minus"}">${diff > 0 ? "+" : ""}${diff}</span>
              </div>`;
          }).join("");
          card.innerHTML = `
            <div class="standings-title"><h3>${label}</h3><span>상위 4팀 진출</span></div>
            <div class="standings-table" role="table">
              <div class="standings-row standings-head" role="row">
                <span>팀</span><span>승패</span><span>맵</span><span>라운드</span><span>득실</span>
              </div>
              ${rows}
            </div>`;
        });
      }

      /* ── 팀 선택 모달 ───────────────────────────────────── */
      let _modalMode = null, _modalCtx = null;
      function openModal() { document.getElementById("ts-modal").hidden = false; }
      function closeModal() { document.getElementById("ts-modal").hidden = true; _modalMode = null; _modalCtx = null; }

      function openGroupSlotPicker(grp, idx) {
        _modalMode = "group"; _modalCtx = { grp, idx };
        const groups = loadGroups();
        const used = new Set([...groups.alpha, ...groups.omega].filter(Boolean));
        const current = groups[grp][idx];
        document.getElementById("ts-title").textContent = `팀 배정 — ${grp === "alpha" ? "알파조" : "오메가조"} ${idx + 1}번 슬롯`;
        document.getElementById("ts-subtitle").textContent = "팀을 클릭해서 배정하세요.";
        document.getElementById("ts-match-step-indicator").innerHTML = "";
        document.getElementById("ts-date-row-container").innerHTML = "";
        const grid = document.getElementById("ts-team-grid");
        grid.innerHTML = TEAMS.map((t) => {
          const isUsed = used.has(t) && t !== current;
          return `<button class="ts-team-btn${t === current ? " selected-a" : ""}${isUsed ? " in-other-group" : ""}" data-team="${t}">
            ${teamLogos[t] ? `<img src="${teamLogos[t]}" alt="${t}" />` : ""}
            <span class="ts-team-code">${teamCodes[t] || t.slice(0,3)}</span>
            <span>${t}</span>
          </button>`;
        }).join("");
        grid.querySelectorAll(".ts-team-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            const groups = loadGroups();
            groups[_modalCtx.grp][_modalCtx.idx] = btn.dataset.team;
            saveGroups(groups); closeModal();
            renderGroupSlots(); renderWeekPanels(); renderStandings();
          });
        });
        document.getElementById("ts-actions").innerHTML = `
          <button class="ts-btn ts-btn-clear" id="ts-clear-btn">비우기</button>
          <button class="ts-btn ts-btn-cancel" id="ts-cancel-btn">취소</button>`;
        document.getElementById("ts-cancel-btn").addEventListener("click", closeModal);
        document.getElementById("ts-clear-btn").addEventListener("click", () => {
          const groups = loadGroups(); groups[_modalCtx.grp][_modalCtx.idx] = "";
          saveGroups(groups); closeModal();
          renderGroupSlots(); renderWeekPanels(); renderStandings();
        });
        openModal();
      }

      function openMatchPicker(w, m) {
        _modalMode = "match"; _modalCtx = { w, m, selectedA: "", selectedB: "" };
        const md = loadMatch(w, m);
        _modalCtx.selectedA = md.teamA || ""; _modalCtx.selectedB = md.teamB || "";
        let currentDate = md.date || "";
        const label = WEEK_LABELS[w - 1];
        document.getElementById("ts-title").textContent = `경기 설정 — ${label} · Match ${m + 1}`;
        document.getElementById("ts-subtitle").textContent = "두 팀을 선택하고 날짜를 입력하세요.";
        document.getElementById("ts-match-step-indicator").innerHTML = `
          <div class="ts-match-step">
            <span class="ts-step-badge step-a">팀 A</span>
            <span id="ts-selected-a" style="font-size:13px;font-weight:700;">${_modalCtx.selectedA || "미선택"}</span>
            <span style="margin:0 6px;opacity:.4;">vs</span>
            <span class="ts-step-badge step-b">팀 B</span>
            <span id="ts-selected-b" style="font-size:13px;font-weight:700;">${_modalCtx.selectedB || "미선택"}</span>
          </div>`;
        document.getElementById("ts-date-row-container").innerHTML = `
          <div class="ts-date-row">
            <label for="ts-date-input">날짜</label>
            <input class="ts-date-input" id="ts-date-input" type="text" placeholder="예: 07.16" value="${currentDate}" />
          </div>`;
        function refreshGrid() {
          const grid = document.getElementById("ts-team-grid");
          grid.innerHTML = TEAMS.map((t) => {
            let cls = "ts-team-btn";
            if (t === _modalCtx.selectedA) cls += " selected-a";
            else if (t === _modalCtx.selectedB) cls += " selected-b";
            return `<button class="${cls}" data-team="${t}">
              ${teamLogos[t] ? `<img src="${teamLogos[t]}" alt="${t}" />` : ""}
              <span class="ts-team-code">${teamCodes[t] || t.slice(0,3)}</span>
              <span>${t}</span>
            </button>`;
          }).join("");
          grid.querySelectorAll(".ts-team-btn").forEach((btn) => {
            btn.addEventListener("click", () => {
              const t = btn.dataset.team;
              if (t === _modalCtx.selectedA) _modalCtx.selectedA = "";
              else if (t === _modalCtx.selectedB) _modalCtx.selectedB = "";
              else if (!_modalCtx.selectedA) _modalCtx.selectedA = t;
              else if (!_modalCtx.selectedB) _modalCtx.selectedB = t;
              else _modalCtx.selectedB = t;
              document.getElementById("ts-selected-a").textContent = _modalCtx.selectedA || "미선택";
              document.getElementById("ts-selected-b").textContent = _modalCtx.selectedB || "미선택";
              const saveBtn = document.getElementById("ts-save-btn");
              if (saveBtn) saveBtn.disabled = !(_modalCtx.selectedA && _modalCtx.selectedB);
              refreshGrid();
            });
          });
        }
        refreshGrid();
        document.getElementById("ts-actions").innerHTML = `
          <button class="ts-btn ts-btn-clear" id="ts-clear-btn">초기화</button>
          <button class="ts-btn ts-btn-cancel" id="ts-cancel-btn">취소</button>
          <button class="ts-btn ts-btn-save" id="ts-save-btn" ${_modalCtx.selectedA && _modalCtx.selectedB ? "" : "disabled"}>저장</button>`;
        document.getElementById("ts-cancel-btn").addEventListener("click", closeModal);
        document.getElementById("ts-clear-btn").addEventListener("click", () => {
          saveMatch(_modalCtx.w, _modalCtx.m, { teamA: "", teamB: "", date: "" });
          closeModal(); renderWeekPanels(); renderStandings();
        });
        document.getElementById("ts-save-btn").addEventListener("click", () => {
          const date = document.getElementById("ts-date-input")?.value.trim() || "";
          saveMatch(_modalCtx.w, _modalCtx.m, { teamA: _modalCtx.selectedA, teamB: _modalCtx.selectedB, date });
          closeModal(); renderWeekPanels(); renderStandings();
        });
        openModal();
      }

      document.getElementById("ts-backdrop").addEventListener("click", closeModal);
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && !document.getElementById("ts-modal").hidden) closeModal();
      });

      renderGroupSlots();
      renderWeekPanels();
      renderStandings();
    });
