<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>발락대 경기 상세</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="./storage.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f4f6fb;
      min-height: 100vh;
      font-family: 'Barlow', sans-serif;
      color: #2a2a3e;
    }

    /* ── NAV ── */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      height: 56px; background: #fff;
      display: flex; align-items: center; padding: 0 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .nav-home {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 14px; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(42,42,62,0.4); text-decoration: none;
    }
    .nav-home::after { content: " /"; margin: 0 10px; color: rgba(42,42,62,0.2); font-weight: 400; }
    .nav-back {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 14px; letter-spacing: 0.1em;
      text-transform: uppercase; color: #ff6b95; text-decoration: none;
    }
    .nav-right { margin-left: auto; }

    .page-wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: 24px 20px 72px;
      display: flex; flex-direction: column; gap: 16px;
    }

    /* ── 이미지 위 오버레이 공통 ── */
    .img-overlay-wrap {
      position: relative;
      width: 100%;
      border-radius: 20px;
      overflow: hidden;
    }
    .img-overlay-wrap img.bg-img {
      width: 100%; display: block;
    }
    /* 오버레이 요소는 절대 위치, 이미지 위에 표시 */
    .ov {
      position: absolute;
      display: flex; align-items: center; justify-content: center;
    }

    /* ══ SCORE1 오버레이 요소 ══ */

    /* 팀 A 로고 (왼쪽 외곽) */
    #ov-logo-a {
      left: 4%; top: 3%;
      width: 12%; height: 16%;
    }
    /* 팀 B 로고 (오른쪽 외곽) */
    #ov-logo-b {
      left: 84%; top: 3%;
      width: 12%; height: 16%;
    }
    .team-logo-ov {
      width: 100%; height: 100%;
      object-fit: contain; display: block;
    }
    .team-logo-placeholder {
      width: 100%; height: 100%;
      border-radius: 12px;
      background: rgba(255,255,255,0.45);
      border: 2px dashed rgba(42,42,62,0.15);
    }

    /* 팀 A 이름 (로고 오른쪽 → VS 카드 방향으로 모음) */
    #ov-name-a {
      left: 17%; top: 3%;
      width: 21%; height: 18%;
      justify-content: flex-start;
    }
    /* 팀 B 이름 (로고 왼쪽 → VS 카드 방향으로 모음) */
    #ov-name-b {
      left: 62%; top: 3%;
      width: 21%; height: 18%;
      justify-content: flex-end;
    }
    .team-name-ov {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(16px, 2.6vw, 28px);
      font-weight: 900; letter-spacing: 0.06em; text-transform: uppercase;
      color: #2a2a3e;
    }

    /* 날짜 (VS 카드 아래) */
    #ov-date {
      left: 38%; top: 11.5%;
      width: 24%; height: 6%;
    }
    .date-label {
      font-size: clamp(10px, 1vw, 13px); font-weight: 600;
      color: rgba(42,42,62,0.4); letter-spacing: 0.05em;
    }

    /* 스코어 바 — 큰 숫자 (이미지에 : 이미 있으므로 좌우 분리) */
    #ov-score-a {
      left: 34%; top: 22%;
      width: 12%; height: 12%;
      justify-content: flex-end;
    }
    #ov-score-b {
      left: 54%; top: 22%;
      width: 12%; height: 12%;
      justify-content: flex-start;
    }
    .score-display {
      display: flex; align-items: center; gap: 4px;
    }
    .score-big {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(28px, 5vw, 56px); font-weight: 900; line-height: 1;
      min-width: 36px; text-align: center;
    }
    .score-big.a   { color: #e84e78; }
    .score-big.b   { color: #0daa96; }
    .score-big.dim { color: rgba(42,42,62,0.18); }
    .score-sep {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(20px, 3vw, 36px); font-weight: 300;
      color: rgba(42,42,62,0.25); margin: 0 4px 3px;
    }

    /* 맵 결과 도트 — 팀 A */
    #ov-dots-a {
      left: 7%; top: 22%;
      width: 28%; height: 12%;
      justify-content: flex-start;
      gap: 1%;
    }
    /* 맵 결과 도트 — 팀 B */
    #ov-dots-b {
      left: 65%; top: 22%;
      width: 28%; height: 12%;
      justify-content: flex-end;
      gap: 1%;
    }
    .map-dot {
      width: clamp(24px, 3.2vw, 38px);
      height: clamp(24px, 3.2vw, 38px);
      border-radius: 9px;
      border: 2px solid rgba(0,0,0,0.1);
      background: rgba(255,255,255,0.5);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(14px, 2vw, 20px); font-weight: 700;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .map-dot:hover { transform: scale(1.1); }
    .map-dot.win-a  { background: rgba(255,107,149,0.22); border-color: rgba(255,107,149,0.5); color: #e84e78; }
    .map-dot.lose-a { background: rgba(45,212,192,0.18); border-color: rgba(45,212,192,0.4); color: #0daa96; }
    .map-dot.win-b  { background: rgba(45,212,192,0.22); border-color: rgba(45,212,192,0.5); color: #0daa96; }
    .map-dot.lose-b { background: rgba(255,107,149,0.18); border-color: rgba(255,107,149,0.4); color: #e84e78; }

    /* 3맵 그리드 */
    #ov-maps {
      left: 16%; top: 58%;
      width: 68%; height: 36%;
      align-items: stretch;
      gap: 2%;
    }
    .map-cell {
      flex: 1;
      display: flex; flex-direction: column;
      border-radius: 14px; overflow: hidden;
      border: 1.5px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(2px);
      cursor: pointer;
    }
    .map-top {
      padding: 5px 4px 4px; text-align: center;
      background: rgba(255,107,149,0.12);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .map-num {
      font-size: clamp(8px, 1vw, 11px); font-weight: 800;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: #e84e78;
    }
    .map-img-wrap {
      flex: 1; overflow: hidden; background: #e8e8ec;
      min-height: 0;
    }
    .map-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .map-name-bar {
      padding: 5px 4px; text-align: center;
      background: rgba(255,255,255,0.5);
      border-top: 1px solid rgba(0,0,0,0.06);
    }
    .map-name-txt {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(9px, 1.1vw, 14px); font-weight: 800;
      letter-spacing: 0.1em; text-transform: uppercase; color: #2a2a3e;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a class="nav-home" href="./index.html">VCT Archive</a>
    <a class="nav-back" id="nav-back" href="./ballakdae-scrim.html">공식 스크림</a>
    <div class="nav-right" id="auth-area"></div>
  </header>

  <div class="page-wrap">

    <!-- ① SCORE1 UI 위에 오버레이 -->
    <div class="img-overlay-wrap">
      <img class="bg-img" src="./images/balakdae_score1.png" alt="" />

      <!-- 팀 A 로고 -->
      <div class="ov" id="ov-logo-a">
        <img class="team-logo-ov" id="logo-img-a" src="" alt="" onerror="this.style.display='none'" />
        <div class="team-logo-placeholder" id="logo-ph-a"></div>
      </div>

      <!-- 팀 B 로고 -->
      <div class="ov" id="ov-logo-b">
        <img class="team-logo-ov" id="logo-img-b" src="" alt="" onerror="this.style.display='none'" />
        <div class="team-logo-placeholder" id="logo-ph-b"></div>
      </div>

      <!-- 팀 A 이름 -->
      <div class="ov" id="ov-name-a">
        <span class="team-name-ov sb-name-a">–</span>
      </div>

      <!-- 팀 B 이름 -->
      <div class="ov" id="ov-name-b">
        <span class="team-name-ov sb-name-b">–</span>
      </div>

      <!-- 날짜 -->
      <div class="ov" id="ov-date">
        <span class="date-label" id="match-date"></span>
      </div>

      <!-- 시리즈 스코어 (: 는 이미지에 있으므로 좌우 분리) -->
      <div class="ov" id="ov-score-a">
        <span class="score-big dim" id="score-a">-</span>
      </div>
      <div class="ov" id="ov-score-b">
        <span class="score-big dim" id="score-b">-</span>
      </div>

      <!-- 맵 결과 도트 A -->
      <div class="ov" id="ov-dots-a">
        <div class="map-dot" id="dot-a-0"></div>
        <div class="map-dot" id="dot-a-1"></div>
        <div class="map-dot" id="dot-a-2"></div>
      </div>

      <!-- 맵 결과 도트 B -->
      <div class="ov" id="ov-dots-b">
        <div class="map-dot" id="dot-b-0"></div>
        <div class="map-dot" id="dot-b-1"></div>
        <div class="map-dot" id="dot-b-2"></div>
      </div>

      <!-- 3맵 그리드 -->
      <div class="ov" id="ov-maps">
        <div class="map-cell" data-map="0">
          <div class="map-top"><div class="map-num">MAP 1</div></div>
          <div class="map-img-wrap"><img id="map-img-0" src="" alt="" /></div>
          <div class="map-name-bar"><span class="map-name-txt" id="map-name-0">–</span></div>
        </div>
        <div class="map-cell" data-map="1">
          <div class="map-top"><div class="map-num">MAP 2</div></div>
          <div class="map-img-wrap"><img id="map-img-1" src="" alt="" /></div>
          <div class="map-name-bar"><span class="map-name-txt" id="map-name-1">–</span></div>
        </div>
        <div class="map-cell" data-map="2">
          <div class="map-top"><div class="map-num">MAP 3</div></div>
          <div class="map-img-wrap"><img id="map-img-2" src="" alt="" /></div>
          <div class="map-name-bar"><span class="map-name-txt" id="map-name-2">–</span></div>
        </div>
      </div>

    </div><!-- /score1 wrap -->

    <!-- ② SCORE2 (임시 이미지) -->
    <div class="img-overlay-wrap">
      <img class="bg-img" src="./images/balakdae_score2.png" alt="" />
    </div>

  </div>

  <script src="./auth.js" defer></script>
  <script>
    var _p        = new URLSearchParams(location.search);
    var TEAM_A    = decodeURIComponent(_p.get('teamA') || '슬롯1');
    var TEAM_B    = decodeURIComponent(_p.get('teamB') || '슬롯2');
    var MATCH_DATE= _p.get('date') || '';
    var MATCH_FROM= _p.get('from') || 'scrim';
    var MATCH_ID  = _p.get('match') || '';

    document.getElementById('nav-back').href        = './ballakdae-scrim.html';
    document.getElementById('nav-back').textContent = '공식 스크림';

    document.querySelectorAll('.sb-name-a').forEach(el => el.textContent = TEAM_A);
    document.querySelectorAll('.sb-name-b').forEach(el => el.textContent = TEAM_B);
    if (MATCH_DATE) document.getElementById('match-date').textContent = MATCH_DATE;

    // 맵 이름 데이터 (localStorage 저장 예정)
    var mapNames = ['–', '–', '–'];
    mapNames.forEach(function(name, i) {
      var el = document.getElementById('map-name-' + i);
      if (el) el.textContent = name;
    });

    function isAdmin() { return typeof window.vctIsAdmin === 'function' && window.vctIsAdmin(); }

    // 로고: 이미지 로드 성공 시 placeholder 숨김
    function setTeamLogo(side, src) {
      var img = document.getElementById('logo-img-' + side);
      var ph  = document.getElementById('logo-ph-' + side);
      if (!src) return;
      img.onload  = function() { ph.style.display = 'none'; img.style.display = 'block'; };
      img.onerror = function() { img.style.display = 'none'; ph.style.display = 'block'; };
      img.style.display = 'none';
      img.src = src;
    }
    // 팀 이름 → 로고 경로 규칙 (teams/ 폴더, SVG 우선)
    function teamLogoSrc(name) {
      if (!name) return '';
      return './assets/teams/' + encodeURIComponent(name) + '.svg';
    }
    setTeamLogo('a', teamLogoSrc(TEAM_A));
    setTeamLogo('b', teamLogoSrc(TEAM_B));
  </script>
</body>
</html>
