<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>발락대 경기 상세</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="./storage.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f4f6fb;
      min-height: 100vh;
      font-family: 'Barlow', sans-serif;
      color: #2a2a3e;
    }

    /* ── NAV ── */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      height: 56px; background: #fff;
      display: flex; align-items: center; padding: 0 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .nav-home {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 14px; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(42,42,62,0.4); text-decoration: none;
    }
    .nav-home::after { content: " /"; margin: 0 10px; color: rgba(42,42,62,0.2); font-weight: 400; }
    .nav-back {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 14px; letter-spacing: 0.1em;
      text-transform: uppercase; color: #ff6b95; text-decoration: none;
    }
    .nav-right { margin-left: auto; }

    .page-wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: 24px 20px 72px;
      display: flex; flex-direction: column; gap: 16px;
    }

    /* ── 이미지 위 오버레이 공통 ── */
    .img-overlay-wrap {
      position: relative;
      width: 100%;
      border-radius: 20px;
      overflow: hidden;
    }
    .img-overlay-wrap img.bg-img {
      width: 100%; display: block;
    }
    .ov {
      position: absolute;
      display: flex; align-items: center; justify-content: center;
    }

    /* ══ SCORE1 오버레이 요소 ══ */
    #ov-logo-a {
      left: 4%; top: 3%;
      width: 12%; height: 16%;
    }
    #ov-logo-b {
      left: 84%; top: 3%;
      width: 12%; height: 16%;
    }
    .team-logo-ov {
      width: 100%; height: 100%;
      object-fit: contain; display: block;
    }
    .team-logo-placeholder {
      width: 100%; height: 100%;
      border-radius: 12px;
      background: rgba(255,255,255,0.45);
      border: 2px dashed rgba(42,42,62,0.15);
    }
    #ov-name-a {
      left: 17%; top: 3%;
      width: 21%; height: 18%;
      justify-content: flex-start;
    }
    #ov-name-b {
      left: 62%; top: 3%;
      width: 21%; height: 18%;
      justify-content: flex-end;
    }
    .team-name-ov {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(16px, 2.6vw, 28px);
      font-weight: 900; letter-spacing: 0.06em; text-transform: uppercase;
      color: #2a2a3e;
    }
    #ov-date {
      left: 38%; top: 11.5%;
      width: 24%; height: 6%;
    }
    .date-label {
      font-size: clamp(10px, 1vw, 13px); font-weight: 600;
      color: rgba(42,42,62,0.4); letter-spacing: 0.05em;
    }
    #ov-score-a {
      left: 34%; top: 22%;
      width: 12%; height: 12%;
      justify-content: flex-end;
    }
    #ov-score-b {
      left: 54%; top: 22%;
      width: 12%; height: 12%;
      justify-content: flex-start;
    }
    .score-big {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(28px, 5vw, 56px); font-weight: 900; line-height: 1;
      min-width: 36px; text-align: center;
    }
    .score-big.a   { color: #e84e78; }
    .score-big.b   { color: #0daa96; }
    .score-big.dim { color: rgba(42,42,62,0.18); }
    #ov-dots-a {
      left: 7%; top: 22%;
      width: 28%; height: 12%;
      justify-content: flex-start; gap: 1%;
    }
    #ov-dots-b {
      left: 65%; top: 22%;
      width: 28%; height: 12%;
      justify-content: flex-end; gap: 1%;
    }
    .map-dot {
      width: clamp(24px, 3.2vw, 38px); height: clamp(24px, 3.2vw, 38px);
      border-radius: 9px; border: 2px solid rgba(0,0,0,0.1);
      background: rgba(255,255,255,0.5); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(14px, 2vw, 20px); font-weight: 700;
      transition: all 0.15s; flex-shrink: 0;
    }
    .map-dot:hover { transform: scale(1.1); }
    .map-dot.win-a  { background: rgba(255,107,149,0.22); border-color: rgba(255,107,149,0.5); color: #e84e78; }
    .map-dot.lose-a { background: rgba(45,212,192,0.18); border-color: rgba(45,212,192,0.4); color: #0daa96; }
    .map-dot.win-b  { background: rgba(45,212,192,0.22); border-color: rgba(45,212,192,0.5); color: #0daa96; }
    .map-dot.lose-b { background: rgba(255,107,149,0.18); border-color: rgba(255,107,149,0.4); color: #e84e78; }

    /* 3맵 그리드 */
    #ov-maps {
      left: 16%; top: 58.65%;
      width: 68%; height: 36%;
      align-items: stretch; gap: 2%;
    }
    .map-cell {
      flex: 1; display: flex; flex-direction: column;
      border-radius: 14px; overflow: hidden;
      border: 1.5px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(2px); cursor: pointer;
    }
    .map-top {
      padding: 5px 4px 4px; text-align: center;
      background: rgba(255,107,149,0.12);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .map-num {
      font-size: clamp(8px, 1vw, 11px); font-weight: 800;
      letter-spacing: 0.14em; text-transform: uppercase; color: #e84e78;
    }
    .map-img-wrap { flex: 1; overflow: hidden; background: #e8e8ec; min-height: 0; }
    .map-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .map-name-bar {
      padding: 5px 4px; text-align: center;
      background: rgba(255,255,255,0.5);
      border-top: 1px solid rgba(0,0,0,0.06);
    }
    .map-name-txt {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(9px, 1.1vw, 14px); font-weight: 800;
      letter-spacing: 0.1em; text-transform: uppercase; color: #2a2a3e;
    }

    /* ══ SCORE2 오버레이 요소 ══ */

    /* 팀 A 헤더 박스 (왼쪽, 분홍) */
    .s2-hdr-a {
      left: 1.3%; top: 2.9%;
      width: 30.6%; height: 16.6%;
      flex-direction: column; gap: 4%;
    }
    /* 맵 썸네일 */
    .s2-hdr-map {
      left: 37%; top: 2%;
      width: 10%; height: 17%;
      flex-direction: column;
    }
    .s2-map-thumb {
      width: 100%; height: 85%;
      object-fit: cover; border-radius: 6px;
      display: block;
    }
    .s2-map-thumb-ph {
      width: 100%; height: 85%;
      background: rgba(255,255,255,0.5);
      border-radius: 6px;
    }
    /* 스코어 표시 (썸네일 아래 필 영역) */
    .s2-hdr-pill {
      left: 34.5%; top: 19.5%;
      width: 17%; height: 5%;
      gap: 8%;
    }
    .s2-map-score {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(12px, 2vw, 22px); font-weight: 900; line-height: 1;
      cursor: pointer;
    }
    .s2-map-score.a { color: #e84e78; }
    .s2-map-score.b { color: #0daa96; }
    .s2-map-score-sep {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(10px, 1.5vw, 18px); font-weight: 300;
      color: rgba(42,42,62,0.3);
    }
    /* 팀 B 헤더 박스 (오른쪽, 민트) */
    .s2-hdr-b {
      left: 67.7%; top: 2.9%;
      width: 30.6%; height: 16.6%;
      flex-direction: column; gap: 4%;
    }
    .s2-team-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(10px, 1.6vw, 18px); font-weight: 900;
      letter-spacing: 0.05em; text-transform: uppercase;
      color: #2a2a3e; text-align: center;
    }
    .s2-map-name-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(7px, 0.9vw, 10px); font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(42,42,62,0.45); margin-top: 2%;
    }

    /* 라운드 트래커 영역 */
    .s2-rt-area {
      left: 1%; top: 22.9%;
      width: 98%; height: 11.7%;
      align-items: stretch; flex-direction: column;
      overflow: hidden;
    }

    /* 선수 패널 A (왼쪽) */
    .s2-panel-a {
      left: 1.3%; top: 36%;
      width: 46.5%; height: 59%;
      flex-direction: column; align-items: stretch;
      overflow: hidden;
    }
    /* 선수 패널 B (오른쪽) */
    .s2-panel-b {
      left: 50.5%; top: 36%;
      width: 47.5%; height: 59%;
      flex-direction: column; align-items: stretch;
      overflow: hidden;
    }

    /* 선수 패널 공통 */
    .s2-panel-head {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(7px, 0.8vw, 9px); font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0 8px; height: 13%;
      display: flex; align-items: center;
      flex-shrink: 0;
    }
    .s2-panel-head.a { color: #e84e78; justify-content: flex-start; }
    .s2-panel-head.b { color: #0daa96; justify-content: flex-end; }

    /* 선수 행 */
    .s2-player-row {
      flex: 1; display: flex; align-items: center;
      min-height: 0; overflow: hidden;
      border-top: 1px solid rgba(0,0,0,0.04);
      cursor: pointer;
    }
    .s2-player-row:hover { background: rgba(255,255,255,0.3); }

    /* 요원 초상화 */
    .s2-agent-wrap {
      width: 13%; height: 100%;
      flex-shrink: 0; overflow: hidden;
      background: rgba(255,255,255,0.3);
    }
    .s2-agent-img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: top center; display: block;
    }
    .s2-agent-ph {
      width: 100%; height: 100%;
      background: rgba(200,200,220,0.35);
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; color: rgba(42,42,62,0.3);
    }

    /* 선수 이름 */
    .s2-p-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(9px, 1.4vw, 15px); font-weight: 700;
      letter-spacing: 0.03em; color: #2a2a3e;
      flex: 1; padding: 0 5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .s2-p-name.r { text-align: right; }

    /* KDA */
    .s2-kda-btn {
      background: none; border: none; cursor: pointer; padding: 2px 5px;
      flex-shrink: 0;
    }
    .s2-kda {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(8px, 1.3vw, 14px); font-weight: 700;
      color: rgba(42,42,62,0.55); white-space: nowrap;
    }
    .s2-kda .kv { color: #e84e78; font-weight: 900; }
    .s2-kda .sep { color: rgba(42,42,62,0.25); }

    /* ACS */
    .s2-acs {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(7px, 1vw, 11px); font-weight: 600;
      color: rgba(42,42,62,0.35); padding: 0 3px; flex-shrink: 0;
    }

    /* ── 라운드 트래커 CSS ── */
    .s2-rt-inner {
      width: 100%; height: 100%;
      display: flex; align-items: stretch;
      overflow: hidden;
    }
    .s2-rt-left {
      display: flex; flex-direction: column;
      width: 7%; flex-shrink: 0;
      border-right: 1px solid rgba(0,0,0,0.06);
    }
    .s2-rt-left-spacer { height: 33%; flex-shrink: 0; }
    .s2-rt-team-row {
      flex: 1; display: flex; align-items: center;
      padding: 0 4px; gap: 3px; min-height: 0;
    }
    .s2-rt-accent {
      width: 3px; height: 70%; border-radius: 2px; flex-shrink: 0;
    }
    .s2-rt-logo {
      width: clamp(10px, 1.5vw, 18px); height: clamp(10px, 1.5vw, 18px);
      object-fit: contain; flex-shrink: 0;
    }
    .s2-rt-tname {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(6px, 0.8vw, 9px); font-weight: 700;
      letter-spacing: 0.05em; color: rgba(42,42,62,0.6);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      text-transform: uppercase;
    }
    .s2-rt-grid-wrap {
      flex: 1; overflow-x: auto; overflow-y: hidden;
    }
    .s2-rt-grid { display: flex; height: 100%; }
    .s2-rt-block { display: flex; flex-direction: column; flex-shrink: 0; }
    .s2-rt-row {
      display: flex; align-items: center; gap: 2px; padding: 0 3px;
    }
    .s2-rt-row.num-row  { height: 30%; padding-top: 3px; }
    .s2-rt-row.cell-row { height: 35%; }
    .s2-rt-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(5px, 0.65vw, 7px); font-weight: 600;
      color: rgba(42,42,62,0.35); letter-spacing: 0.05em;
      width: clamp(10px, 1.8vw, 18px); text-align: center; flex-shrink: 0;
    }
    .s2-rt-sep { width: 1px; height: 80%; background: rgba(0,0,0,0.12); flex-shrink: 0; }
    .s2-rt-sep-num { width: 1px; flex-shrink: 0; }
    .s2-rt-cell {
      width: clamp(10px, 1.8vw, 18px); height: clamp(10px, 1.8vw, 18px);
      border-radius: 3px; flex-shrink: 0;
      background: rgba(255,255,255,0.5);
      border: 1px solid rgba(0,0,0,0.08);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.1s;
    }
    .s2-rt-cell:hover { background: rgba(255,255,255,0.8); }
    .s2-rt-cell.win-atk { background: rgba(232,78,120,0.3); border-color: rgba(232,78,120,0.5); }
    .s2-rt-cell.win-def { background: rgba(13,170,150,0.3); border-color: rgba(13,170,150,0.5); }
    .s2-rt-cell img { width: 70%; height: 70%; object-fit: contain; display: block; }

    /* ── 라운드 픽커 모달 ── */
    .round-picker {
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
    }
    .round-picker-panel {
      background: #fff; border-radius: 14px;
      padding: 18px 22px 16px;
      min-width: 320px; max-width: 90vw;
      box-shadow: 0 12px 48px rgba(0,0,0,0.22);
    }
    .round-picker-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .round-picker-head strong { font-size: 15px; font-weight: 900; color: #2a2a3e; }
    .round-picker-head-actions { display: flex; gap: 6px; }
    .rp-clear-btn, .rp-close-btn {
      border: 1px solid rgba(42,42,62,0.15); border-radius: 5px;
      padding: 4px 10px; background: transparent;
      font-size: 12px; cursor: pointer; color: #2a2a3e;
    }
    .rp-clear-btn:hover, .rp-close-btn:hover { background: rgba(42,42,62,0.06); }
    .round-picker-body { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .rp-team-section {}
    .rp-team-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
      color: rgba(42,42,62,0.5); margin-bottom: 8px; text-transform: uppercase;
    }
    .rp-icons { display: flex; flex-direction: column; gap: 5px; }
    .rp-icon-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border-radius: 6px;
      border: 1px solid rgba(42,42,62,0.12);
      background: transparent; cursor: pointer;
      font-size: 12px; color: #2a2a3e; text-align: left;
    }
    .rp-icon-btn:hover { background: rgba(42,42,62,0.05); }
    .rp-icon-btn.selected { background: rgba(42,42,62,0.09); border-color: rgba(42,42,62,0.28); }
    .rp-icon-btn img { width: 20px; height: 20px; object-fit: contain; }

    /* ── KDA 편집 팝업 ── */
    .kda-popup {
      position: fixed; inset: 0; z-index: 9100;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
    }
    .kda-popup-panel {
      background: #fff; border-radius: 14px;
      padding: 20px 24px 16px;
      min-width: 280px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.22);
    }
    .kda-popup-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px; font-weight: 900; color: #2a2a3e;
      margin-bottom: 14px; letter-spacing: 0.06em;
    }
    .kda-popup-fields { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
    .kda-popup-field { display: flex; align-items: center; gap: 10px; }
    .kda-popup-label {
      font-size: 11px; font-weight: 700; color: rgba(42,42,62,0.5);
      width: 32px; text-align: right; flex-shrink: 0;
    }
    .kda-popup-input {
      flex: 1; border: 1.5px solid rgba(42,42,62,0.15);
      border-radius: 6px; padding: 6px 10px;
      font-size: 14px; color: #2a2a3e; outline: none;
    }
    .kda-popup-input:focus { border-color: #ff6b95; }
    .kda-popup-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-save, .btn-cancel, .btn-clear {
      padding: 7px 16px; border-radius: 7px; font-size: 13px;
      font-weight: 700; cursor: pointer; border: none;
    }
    .btn-save { background: #ff6b95; color: #fff; }
    .btn-save:hover { background: #e84e78; }
    .btn-cancel { background: transparent; color: rgba(42,42,62,0.5);
      border: 1px solid rgba(42,42,62,0.15); }
    .btn-clear { background: transparent; color: rgba(42,42,62,0.4);
      border: 1px solid rgba(42,42,62,0.12); }

    /* ── 스코어 편집 팝업 ── */
    .score-editor-popup {
      position: fixed; inset: 0; z-index: 9100;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
    }
    .score-editor-panel {
      background: #fff; border-radius: 14px;
      padding: 20px 24px 16px;
      min-width: 240px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.22);
    }
    .score-editor-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px; font-weight: 900; color: #2a2a3e;
      margin-bottom: 14px;
    }
    .score-editor-input {
      width: 100%; border: 1.5px solid rgba(42,42,62,0.15);
      border-radius: 6px; padding: 8px 12px;
      font-size: 22px; font-weight: 900; color: #2a2a3e;
      text-align: center; outline: none; margin-bottom: 12px;
    }
    .score-editor-input:focus { border-color: #ff6b95; }

    /* ── 지도 픽커 팝업 ── */
    .map-picker-popup {
      position: fixed; inset: 0; z-index: 9100;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
    }
    .map-picker-panel {
      background: #fff; border-radius: 14px;
      padding: 20px 24px 16px; min-width: 320px; max-width: 90vw;
      box-shadow: 0 12px 48px rgba(0,0,0,0.22);
    }
    .map-picker-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px; font-weight: 900; color: #2a2a3e; margin-bottom: 14px;
    }
    .map-picker-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
      margin-bottom: 14px;
    }
    .map-picker-btn {
      padding: 6px 4px; border-radius: 7px;
      border: 1.5px solid rgba(42,42,62,0.12);
      background: transparent; cursor: pointer;
      font-size: 11px; font-weight: 700; color: #2a2a3e;
      text-align: center;
    }
    .map-picker-btn:hover { background: rgba(255,107,149,0.08); border-color: rgba(255,107,149,0.3); }

    /* ── score2 맵 썸네일 / 이름 ── */
    .ov-s2-map-img {
      left: 37%; top: 3%; width: 26%; height: 17%;
      overflow: hidden; border-radius: 10px;
    }
    .ov-s2-map-img img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .ov-s2-map-name {
      left: 38%; top: 20%; width: 24%; height: 4.5%;
      display: flex; align-items: center; justify-content: center;
    }
    .ov-s2-map-name span {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(10px, 1.4vw, 20px); font-weight: 900;

  // ── URL 파라미터 ──────────────────────────────────────────────
  var _p        = new URLSearchParams(location.search);

  var MATCH_DATE= _p.get('date') || '';
  var MATCH_FROM= _p.get('from') || 'scrim';
  var MATCH_ID  = _p.get('match') || '';

  var MATCH_KEY = ['ballakdae', MATCH_FROM, MATCH_ID || (MATCH_DATE + '|' + TEAM_A + '|' + TEAM_B)].filter(Boolean).join('|');

  // 팀 이름 채우기

    img.onerror = function() { img.style.display = 'none'; ph.style.display = 'block'; };
    img.style.display = 'none';
    img.src = src;
  }
  function teamLogoSrc(name) {
    if (!name) return '';
    return './assets/teams/' + encodeURIComponent(name) + '.svg';
  }
  setTeamLogo('a', teamLogoSrc(TEAM_A));
  setTeamLogo('b', teamLogoSrc(TEAM_B));

  // ── 라운드 트래커 상수 ────────────────────────────────────────
  var ROUND_ICONS = {

  var DEF_TYPES = ["def_defuse", "def_timeout", "def_kill"];

  function roundIsAttacking(side, roundIdx, firstAttacker) {
    if (!firstAttacker) return null;
    var n = roundIdx + 1;
    var faAtks;
    if (n <= 12)       faAtks = true;
    else if (n <= 24)  faAtks = false;
    else { var ot = n - 24; faAtks = (ot % 2 === 1); }
    return faAtks ? (firstAttacker === side) : (firstAttacker !== side);
  }

    요루:"https://i.namu.wiki/i/O8_5nw3EgYWhLraoQ5qj2ooaTQGqhTNhVou0an9A2A4o5Uy7SSr3O8C7nwmub1jzssrRziii5qcwjq8-ACZwkA.webp",
    웨이레이:"https://i.namu.wiki/i/Kj83E8_P6KTeg8NR0oXc5HiK9bo8_nnHymVoTvrwv8XgUhKrQH8Mf-mCAOaOYBYYbY3NtxbOtnU4rioCjjIafg.webp",
    제트:"https://i.namu.wiki/i/_ScoZkw_dp5eGn66y8GXGqzGRHAUQiZD-AEGqpt0FQTpO3sLAdALfP37rzLppNRUFUK505MkSXf31Es-p2hE0g.webp",
    체임버:"https://i.namu.wiki/i/kH9bgltG2hlwvNGUr64utZLO7V03cYI0itwIpVwR0H3GLeQ0v1lWeSgZr3QnLzJLaq5OChM9jZ20vSEO-UXysA.webp",
    케이오:"https://valorantinfo.com/images/kr/kayo_valorant_icon_3589.webp",
    클로브:"https://i.namu.wiki/i/l-OTVsdNYqe6PE3GsUHe4gzw7YbMcLtX831Y7ofn0Ta5gyMdFNqFJp8VVSsoqocBJMit8HFGz_If4e8cnQZbnw.webp",
    킬조이:"https://media.valorant-api.com/agents/1e58de9c-4950-5125-93e9-a0aee9f98746/displayicon.png",
    테호:"https://i.namu.wiki/i/DczhNjwRqUiOwhoL-DPhCm9EzpbQU3JkqmZzbwz3DF_nkuyFNtbB4sxAaY_bFm3D0h8ZuMre85zAwX7C50UVgA.webp",
    페이드:"https://media.valorant-api.com/agents/dade69b4-4f5a-8528-247b-219e5a1facd6/displayicon.png",
    피닉스:"https://valorantinfo.com/images/kr/phoenix_valorant_icon_3596.webp",
    하버:"https://i.namu.wiki/i/qxmGsWVdbBLpysuGibvT8l4dwJLFI4RTIanYEaVg-laKEt3sDGw5Crc5S-mm7qtI83iQg9SNntbThMcaJ1VTdA.webp",
  };
  var agentList = Object.keys(agentImages);

  // ── 맵 이미지 ────────────────────────────────────────────────
  var MAP_IMAGES = {
    "어센트":   "images/maps/ascent.jpg",
    "바인드":   "images/maps/bind.jpg",
    "브리즈":   "images/maps/breeze.jpg",
    "아이스박스":"images/maps/icebox.jpg",
    "해븐":     "images/maps/haven.jpg",
    "스플릿":   "images/maps/split.jpg",
    "프랙처":   "images/maps/fracture.jpg",
    "펄":       "images/maps/pearl.jpg",
    "로터스":   "images/maps/lotus.jpg",
    "선셋":     "images/maps/sunset.jpg",
    "어비스":   "images/maps/abyss.jpg",
  };
  var MAP_LIST = Object.keys(MAP_IMAGES);

  // ── 맵 데이터 (3맵 고정) ─────────────────────────────────────
  function blankPlayer(side) {
    return { side: side, name: '-', agent: '', k: '-', d: '-', a: '-', acs: '-' };
  }
  function blankMapData(idx) {
    return {
      idx: idx,
      mapName: '',
      rtState: { rounds: [], firstAttacker: null, stats: { aScore: '-', bScore: '-' } },
      players: [0,1,2,3,4].map(function() { return blankPlayer('a'); })
             .concat([0,1,2,3,4].map(function() { return blankPlayer('b'); })),
    };
  }
  var maps = [blankMapData(0), blankMapData(1), blankMapData(2)];

  // ── localStorage 키 ──────────────────────────────────────────
  function rKey(i)  { return 'bld_rounds:'  + MATCH_KEY + ':' + i; }
  function pKey(i)  { return 'bld_players:' + MATCH_KEY + ':' + i; }
  function scKey(i) { return 'bld_score:'   + MATCH_KEY + ':' + i; }
  function mnKey()  { return 'bld_mapnames:' + MATCH_KEY; }

  function saveRound(i) {
    try { localStorage.setItem(rKey(i), JSON.stringify(maps[i].rtState.rounds || [])); } catch(e) {}
  }
  function loadRound(i) {
    try {
      var r = localStorage.getItem(rKey(i));
      if (r) maps[i].rtState.rounds = JSON.parse(r);
    } catch(e) {}
  }
  function saveScore(i) {
    try {
      localStorage.setItem(scKey(i), JSON.stringify({
        a: maps[i].rtState.stats.aScore,
        b: maps[i].rtState.stats.bScore,
      }));
    } catch(e) {}
  }
  function loadScore(i) {
    try {
      var r = localStorage.getItem(scKey(i));
      if (!r) return;
      var d = JSON.parse(r);
      maps[i].rtState.stats.aScore = d.a != null ? d.a : '-';
      maps[i].rtState.stats.bScore = d.b != null ? d.b : '-';
    } catch(e) {}
  }
  function savePlayers(i) {
    try {
      var d = {};
      maps[i].players.forEach(function(p, pi) { d[pi] = p; });
      localStorage.setItem(pKey(i), JSON.stringify(d));
    } catch(e) {}
  }
  function loadPlayers(i) {
    try {
      var r = localStorage.getItem(pKey(i));
      if (!r) return;
      var d = JSON.parse(r);
      Object.keys(d).forEach(function(pi) {
        var idx = parseInt(pi);
        if (maps[i].players[idx]) Object.assign(maps[i].players[idx], d[pi]);
      });
    } catch(e) {}
  }
  function saveMapNames() {
    try {
      var ns = maps.map(function(m) { return m.mapName || ''; });
      localStorage.setItem(mnKey(), JSON.stringify(ns));
    } catch(e) {}
  }
  function loadMapNames() {
    try {
      var r = localStorage.getItem(mnKey());
      if (!r) return;
      var ns = JSON.parse(r);
      if (Array.isArray(ns)) ns.forEach(function(n, i) { if (maps[i]) maps[i].mapName = n || ''; });
    } catch(e) {}
  }

  // ── 초기 로드 ────────────────────────────────────────────────
  loadMapNames();
  for (var _i = 0; _i < 3; _i++) {
    loadRound(_i); loadScore(_i); loadPlayers(_i);
  }

  // ── 맵 그리드(score1) 이름/이미지 표시 ──────────────────────
  function applyMapGridCells() {
    for (var i = 0; i < 3; i++) {
      var nm = maps[i].mapName;
      var el = document.getElementById('map-name-' + i);
      if (el) el.textContent = nm || '–';
      var img = document.getElementById('map-img-' + i);
      if (img) { if (nm && MAP_IMAGES[nm]) { img.src = MAP_IMAGES[nm]; img.style.display = 'block'; } else img.style.display = 'none'; }
    }
  }

  // ── 맵 선택 팝업 ─────────────────────────────────────────────
  function openMapPicker(mapIdx) {
    if (!isAdmin()) return;
    var popup = document.createElement('div');
    popup.className = 'map-picker-popup';
    popup.innerHTML = '<div class="map-picker-panel">'
      + '<div class="map-picker-title">MAP ' + (mapIdx + 1) + ' 선택</div>'
      + '<div class="map-picker-grid">'
      + MAP_LIST.map(function(m) {
          return '<button class="map-picker-btn" data-map="' + m + '">' + m + '</button>';
        }).join('')
      + '</div>'
      + '<div class="kda-popup-actions"><button class="btn-clear" id="mpk-clear">초기화</button><button class="btn-cancel" id="mpk-cancel">취소</button></div>'
      + '</div>';
    document.body.appendChild(popup);
    popup.addEventListener('click', function(e) {
      if (e.target === popup || e.target.id === 'mpk-cancel') { popup.remove(); return; }
      if (e.target.id === 'mpk-clear') {
        maps[mapIdx].mapName = '';
        saveMapNames();
        applyMapGridCells();
        renderAll();
        popup.remove(); return;
      }
      var btn = e.target.closest('[data-map]');
      if (btn) {
        maps[mapIdx].mapName = btn.dataset.map;
        saveMapNames();
        applyMapGridCells();
        renderAll();
        popup.remove();
      }
    });
  }

  // ── 맵 스코어 편집 ───────────────────────────────────────────
  function openMapScoreEditor(mapIdx, side) {
    if (!isAdmin()) return;
    var cur = side === 'a' ? maps[mapIdx].rtState.stats.aScore : maps[mapIdx].rtState.stats.bScore;
    var popup = document.createElement('div');
    popup.className = 'score-editor-popup';
    popup.innerHTML = '<div class="score-editor-panel">'
      + '<div class="score-editor-title">MAP ' + (mapIdx + 1) + ' — ' + (side === 'a' ? TEAM_A : TEAM_B) + ' 스코어</div>'
      + '<input class="score-editor-input" id="se-input" type="text" value="' + (cur === '-' ? '' : cur) + '" />'
      + '<div class="kda-popup-actions"><button class="btn-cancel" id="se-cancel">취소</button><button class="btn-save" id="se-save">저장</button></div>'
      + '</div>';
    document.body.appendChild(popup);
    document.getElementById('se-input').focus();
    document.getElementById('se-cancel').onclick = function() { popup.remove(); };
    document.getElementById('se-save').onclick = function() {
      var v = document.getElementById('se-input').value.trim() || '-';
      if (side === 'a') maps[mapIdx].rtState.stats.aScore = v;
      else              maps[mapIdx].rtState.stats.bScore = v;
      saveScore(mapIdx);
      renderAll();
      popup.remove();
    };
    popup.addEventListener('click', function(e) { if (e.target === popup) popup.remove(); });
  }

  // ── 라운드 트래커 렌더링 ─────────────────────────────────────
  function renderRoundTracker(mapIdx) {
    var wrap = document.getElementById('s2-rt-' + mapIdx);
    if (!wrap) return;
    var m = maps[mapIdx];
    var state = m.rtState;
    var rounds = state.rounds || [];
    var aScore = parseInt(state.stats.aScore) || 0;
    var bScore = parseInt(state.stats.bScore) || 0;
    var total  = Math.max(24, aScore + bScore);

    var logoA = './assets/teams/' + encodeURIComponent(TEAM_A) + '.svg';
    var logoB = './assets/teams/' + encodeURIComponent(TEAM_B) + '.svg';

    var leftHtml = '<div class="s2-rt-left">'
      + '<div class="s2-rt-left-spacer"></div>'
      + '<div class="s2-rt-team-row"><div class="s2-rt-accent" style="background:#e84e78"></div>'
      + '<img class="s2-rt-logo" src="' + logoA + '" onerror="this.style.display=\'none\'" />'
      + '<span class="s2-rt-tname">' + TEAM_A + '</span></div>'
      + '<div class="s2-rt-team-row"><div class="s2-rt-accent" style="background:#0daa96"></div>'
      + '<img class="s2-rt-logo" src="' + logoB + '" onerror="this.style.display=\'none\'" />'
      + '<span class="s2-rt-tname">' + TEAM_B + '</span></div>'
      + '</div>';

    var numBlocks = Math.ceil(total / 24);
    var blocksHtml = '';
    for (var b = 0; b < numBlocks; b++) {
      var start = b * 24;
      var end   = Math.min(start + 24, total);
      var numCells = '', cellsA = '', cellsB = '';
      for (var ri = start; ri < end; ri++) {
        if ((ri - start) === 12) {
          numCells += '<div class="s2-rt-sep-num"></div>';
          cellsA   += '<div class="s2-rt-sep"></div>';
          cellsB   += '<div class="s2-rt-sep"></div>';
        }
        numCells += '<div class="s2-rt-num">' + String(ri + 1).padStart(2,'0') + '</div>';
        var r = rounds[ri] || {};
        var isAtk = ATK_TYPES.indexOf(r.type) !== -1;
        var winCls = r.winner ? (isAtk ? ' win-atk' : ' win-def') : '';
        var clsA = r.winner === 'a' ? winCls : '';
        var clsB = r.winner === 'b' ? winCls : '';
        var iconA = (r.winner === 'a' && r.type) ? '<img src="' + ROUND_ICONS[r.type] + '" alt="" />' : '';
        var iconB = (r.winner === 'b' && r.type) ? '<img src="' + ROUND_ICONS[r.type] + '" alt="" />' : '';
        cellsA += '<div class="s2-rt-cell' + clsA + '" data-mi="' + mapIdx + '" data-ri="' + ri + '" data-si="a">' + iconA + '</div>';
        cellsB += '<div class="s2-rt-cell' + clsB + '" data-mi="' + mapIdx + '" data-ri="' + ri + '" data-si="b">' + iconB + '</div>';
      }
      blocksHtml += '<div class="s2-rt-grid-wrap"><div class="s2-rt-grid"><div class="s2-rt-block">'
        + '<div class="s2-rt-row num-row">' + numCells + '</div>'
        + '<div class="s2-rt-row cell-row">' + cellsA + '</div>'
        + '<div class="s2-rt-row cell-row">' + cellsB + '</div>'
        + '</div></div></div>';
    }
    wrap.innerHTML = '<div class="s2-rt-inner">' + leftHtml + blocksHtml + '</div>';

    wrap.querySelectorAll('.s2-rt-cell').forEach(function(cell) {
      cell.addEventListener('click', function() {
        if (!isAdmin()) return;
        openRoundPicker(mapIdx, parseInt(cell.dataset.ri));
      });
    });
  }

  // ── 라운드 픽커 모달 ─────────────────────────────────────────
  function openRoundPicker(mapIdx, roundIdx) {
    document.querySelector('.round-picker') && document.querySelector('.round-picker').remove();
    var m = maps[mapIdx];
    var state = m.rtState;
    var fa = state.firstAttacker || null;
    var aAtks = roundIsAttacking('a', roundIdx, fa);
    var r = (state.rounds || [])[roundIdx] || {};

    var aTypes = fa ? (aAtks ? ATK_TYPES : DEF_TYPES) : ATK_TYPES.concat(DEF_TYPES);
    var bTypes = fa ? (aAtks ? DEF_TYPES : ATK_TYPES) : ATK_TYPES.concat(DEF_TYPES);

    function iconGroup(winner, types, label) {
      return '<div class="rp-team-section"><div class="rp-team-label">' + label + '</div><div class="rp-icons">'
        + types.map(function(t) {
            var sel = (r.winner === winner && r.type === t) ? ' selected' : '';
            return '<button class="rp-icon-btn' + sel + '" data-w="' + winner + '" data-t="' + t + '">'
              + '<img src="' + ROUND_ICONS[t] + '" alt="" />' + ROUND_ICON_LABELS[t] + '</button>';
          }).join('')
        + '</div></div>';
    }
    var aLabel = TEAM_A + (fa ? (aAtks ? ' (공격)' : ' (수비)') : '');
    var bLabel = TEAM_B + (fa ? (aAtks ? ' (수비)' : ' (공격)') : '');

    var picker = document.createElement('div');
    picker.className = 'round-picker';
    picker.innerHTML = '<div class="round-picker-panel">'
      + '<div class="round-picker-head"><strong>라운드 ' + (roundIdx + 1) + '</strong>'
      + '<div class="round-picker-head-actions">'
      + (r.winner ? '<button class="rp-clear-btn" data-rp-clear>초기화</button>' : '')
      + '<button class="rp-close-btn" data-rp-close>닫기</button></div></div>'
      + '<div class="round-picker-body">' + iconGroup('a', aTypes, aLabel) + iconGroup('b', bTypes, bLabel) + '</div>'
      + '</div>';
    document.body.appendChild(picker);

    picker.addEventListener('click', function(e) {
      if (e.target === picker || e.target.closest('[data-rp-close]')) { picker.remove(); return; }
      if (e.target.closest('[data-rp-clear]')) {
        if (!state.rounds) state.rounds = [];
        state.rounds[roundIdx] = { winner: null, type: null };
        saveRound(mapIdx); renderRoundTracker(mapIdx); picker.remove(); return;
      }
      var btn = e.target.closest('[data-w]');
      if (btn) {
        if (!state.rounds) state.rounds = [];
        state.rounds[roundIdx] = { winner: btn.dataset.w, type: btn.dataset.t };
        saveRound(mapIdx); renderRoundTracker(mapIdx); picker.remove();
      }
    });
  }

  // ── 선수 패널 렌더링 ─────────────────────────────────────────
  function renderPlayers(mapIdx) {
    var m = maps[mapIdx];
    var sideA = m.players.filter(function(p) { return p.side === 'a'; });
    var sideB = m.players.filter(function(p) { return p.side === 'b'; });

    function makeRow(p, globalIdx, side) {
      var agSrc = agentImages[p.agent] || '';
      var agHtml = agSrc
        ? '<div class="s2-agent-wrap"><img class="s2-agent-img" src="' + agSrc + '" alt="" /></div>'
        : '<div class="s2-agent-wrap"><div class="s2-agent-ph" onclick="openAgentPick(' + mapIdx + ',' + globalIdx + ')">?</div></div>';
      var kStr = p.k !== '-' ? p.k : '-';
      var dStr = p.d !== '-' ? p.d : '-';
      var aStr = p.a !== '-' ? p.a : '-';
      var kdaHtml = '<button class="s2-kda-btn" onclick="openKdaEditor(' + mapIdx + ',' + globalIdx + ')">'
        + '<span class="s2-kda"><span class="kv">' + kStr + '</span><span class="sep">/</span>' + dStr + '<span class="sep">/</span>' + aStr + '</span>'
        + '</button>';
      var nameHtml = '<span class="s2-p-name' + (side === 'b' ? ' r' : '') + '" onclick="openNameEditor(' + mapIdx + ',' + globalIdx + ')">' + (p.name || '-') + '</span>';
      if (side === 'a') {
        return '<div class="s2-player-row">' + agHtml + nameHtml + kdaHtml + '</div>';
      } else {
        return '<div class="s2-player-row">' + kdaHtml + nameHtml + agHtml + '</div>';
      }
    }

    var paEl = document.getElementById('s2-pa-' + mapIdx);
    var pbEl = document.getElementById('s2-pb-' + mapIdx);
    if (!paEl || !pbEl) return;

    var headA = '<div class="s2-panel-head a">' + TEAM_A + ' · K / D / A</div>';
    var headB = '<div class="s2-panel-head b">K / D / A · ' + TEAM_B + '</div>';

    var rowsA = sideA.map(function(p, si) {
      var gi = m.players.indexOf(p);
      return makeRow(p, gi, 'a');
    }).join('');
    var rowsB = sideB.map(function(p, si) {
      var gi = m.players.indexOf(p);
      return makeRow(p, gi, 'b');
    }).join('');

    paEl.innerHTML = headA + rowsA;
    pbEl.innerHTML = headB + rowsB;
  }

  // ── 스코어 헤더 갱신 ─────────────────────────────────────────
  function renderMapHeader(mapIdx) {
    var m = maps[mapIdx];
    var sa = document.getElementById('s2-score-a-' + mapIdx);
    var sb = document.getElementById('s2-score-b-' + mapIdx);
    if (sa) sa.textContent = m.rtState.stats.aScore || '-';
    if (sb) sb.textContent = m.rtState.stats.bScore || '-';

    var mname = document.getElementById('s2-mname-' + mapIdx);
    if (mname) mname.textContent = m.mapName || ('MAP ' + (mapIdx + 1));
    var mimg = document.getElementById('s2-mimg-' + mapIdx);
    var mph  = document.getElementById('s2-mph-' + mapIdx);
    if (mimg && mph) {
      if (m.mapName && MAP_IMAGES[m.mapName]) {
        mimg.src = MAP_IMAGES[m.mapName];
        mimg.style.display = 'block';
        mph.style.display = 'none';
      } else {
        mimg.style.display = 'none';
        mph.style.display = 'block';
      }
    }
  }

  function renderAll() {
    applyMapGridCells();
    for (var i = 0; i < 3; i++) {
      renderMapHeader(i);
      renderRoundTracker(i);
      renderPlayers(i);
    }
  }
  renderAll();

  // ── KDA 편집 팝업 ────────────────────────────────────────────
  function openKdaEditor(mapIdx, playerIdx) {
    if (!isAdmin()) return;
    var p = maps[mapIdx].players[playerIdx];
    var popup = document.createElement('div');
    popup.className = 'kda-popup';
    popup.innerHTML = '<div class="kda-popup-panel">'
      + '<div class="kda-popup-title">' + (p.name || '선수') + ' KDA 수정</div>'
      + '<div class="kda-popup-fields">'
      + '<div class="kda-popup-field"><span class="kda-popup-label">이름</span><input class="kda-popup-input" id="kf-name" value="' + (p.name === '-' ? '' : (p.name || '')) + '" /></div>'
      + '<div class="kda-popup-field"><span class="kda-popup-label">K</span><input class="kda-popup-input" id="kf-k" type="number" value="' + (p.k === '-' ? '' : (p.k || '')) + '" /></div>'
      + '<div class="kda-popup-field"><span class="kda-popup-label">D</span><input class="kda-popup-input" id="kf-d" type="number" value="' + (p.d === '-' ? '' : (p.d || '')) + '" /></div>'
      + '<div class="kda-popup-field"><span class="kda-popup-label">A</span><input class="kda-popup-input" id="kf-a" type="number" value="' + (p.a === '-' ? '' : (p.a || '')) + '" /></div>'
      + '<div class="kda-popup-field"><span class="kda-popup-label">요원</span><input class="kda-popup-input" id="kf-agent" list="kf-agent-list" value="' + (p.agent || '') + '" />'
      + '<datalist id="kf-agent-list">' + agentList.map(function(ag) { return '<option value="' + ag + '">'; }).join('') + '</datalist>'
      + '</div></div>'
      + '<div class="kda-popup-actions">'
      + '<button class="btn-clear" id="kf-clear">초기화</button>'
      + '<button class="btn-cancel" id="kf-cancel">취소</button>'
      + '<button class="btn-save" id="kf-save">저장</button>'
      + '</div></div>';
    document.body.appendChild(popup);
    document.getElementById('kf-name').focus();
    document.getElementById('kf-cancel').onclick = function() { popup.remove(); };
    document.getElementById('kf-clear').onclick = function() {
      p.name = '-'; p.k = '-'; p.d = '-'; p.a = '-'; p.agent = '';
      savePlayers(mapIdx); renderPlayers(mapIdx); popup.remove();
    };
    document.getElementById('kf-save').onclick = function() {
      var nm = document.getElementById('kf-name').value.trim();
      var k  = document.getElementById('kf-k').value.trim();
      var d  = document.getElementById('kf-d').value.trim();
      var a  = document.getElementById('kf-a').value.trim();
      var ag = document.getElementById('kf-agent').value.trim();
      p.name  = nm  || '-';
      p.k     = k   || '-';
      p.d     = d   || '-';
      p.a     = a   || '-';
      p.agent = ag  || '';
      savePlayers(mapIdx); renderPlayers(mapIdx); popup.remove();
    };
    popup.addEventListener('click', function(e) { if (e.target === popup) popup.remove(); });
  }

  // openNameEditor → KDA 팝업과 동일
  function openNameEditor(mapIdx, playerIdx) { openKdaEditor(mapIdx, playerIdx); }
  function openAgentPick(mapIdx, playerIdx) { openKdaEditor(mapIdx, playerIdx); }

  </script>
</body>
</html>
