<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>발락대 경기 상세</title>
  <script src="./storage.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f4f6fb;
      min-height: 100vh;
      font-family: sans-serif;
    }
    .site-header {
      position: sticky; top: 0; z-index: 100;
      height: 56px;
      background: #fff;
      display: flex; align-items: center; padding: 0 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .nav-home {
      font-weight: 700; font-size: 14px; letter-spacing: 0.1em;
      text-transform: uppercase; color: rgba(42,42,62,0.4);
      text-decoration: none;
    }
    .nav-home::after { content: " /"; margin: 0 10px; color: rgba(42,42,62,0.2); }
    .nav-back {
      font-weight: 700; font-size: 14px; letter-spacing: 0.1em;
      text-transform: uppercase; color: #ff6b95;
      text-decoration: none;
    }
    .nav-right { margin-left: auto; }

    .page-wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 28px 20px 72px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .page-wrap img {
      width: 100%;
      border-radius: 20px;
      display: block;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="nav-home" href="./index.html">VCT Archive</a>
    <a class="nav-back" id="nav-back" href="./ballakdae-scrim.html">공식 스크림</a>
    <div class="nav-right" id="auth-area"></div>
  </header>

  <div class="page-wrap">
    <img src="./images/balakdae_score1.png" alt="경기 스코어" />
    <img src="./images/balakdae_score2.png" alt="맵 상세" />
  </div>

  <script src="./auth.js" defer></script>
  <script>
    var _p = new URLSearchParams(location.search);
    var MATCH_FROM = _p.get('from') || 'scrim';
    var _fromMap = { scrim: { href: './ballakdae-scrim.html', label: '공식 스크림' } };
    var _fromInfo = _fromMap[MATCH_FROM] || _fromMap.scrim;
    document.getElementById('nav-back').href        = _fromInfo.href;
    document.getElementById('nav-back').textContent = _fromInfo.label;
  </script>
</body>
</html>
