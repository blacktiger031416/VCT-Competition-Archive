<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>발락대 경기 상세</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="./storage.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f4f6fb;
      min-height: 100vh;
      font-family: 'Barlow', sans-serif;
      color: #2a2a3e;
    }

    /* ── NAV ── */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      height: 56px; background: #fff;
      display: flex; align-items: center; padding: 0 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .nav-home {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 14px; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(42,42,62,0.4); text-decoration: none;
    }
    .nav-home::after { content: " /"; margin: 0 10px; color: rgba(42,42,62,0.2); font-weight: 400; }
    .nav-back {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 14px; letter-spacing: 0.1em;
      text-transform: uppercase; color: #ff6b95; text-decoration: none;
    }
    .nav-right { margin-left: auto; }

    .page-wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: 24px 20px 72px;
      display: flex; flex-direction: column; gap: 16px;
    }

    /* ── 이미지 위 오버레이 공통 ── */
    .img-overlay-wrap {
      position: relative;
      width: 100%;
      border-radius: 20px;
      overflow: hidden;
    }
    .img-overlay-wrap img.bg-img {
      width: 100%; display: block;
    }
    .ov {
      position: absolute;
      display: flex; align-items: center; justify-content: center;
    }

    /* ══ SCORE1 오버레이 요소 ══ */
    #ov-logo-a {
      left: 4%; top: 3%;
      width: 12%; height: 16%;
    }
    #ov-logo-b {
      left: 84%; top: 3%;
      width: 12%; height: 16%;
    }
    .team-logo-ov {
      width: 100%; height: 100%;
      object-fit: contain; display: block;
    }
    .team-logo-placeholder {
      width: 100%; height: 100%;
      border-radius: 12px;
      background: rgba(255,255,255,0.45);
      border: 2px dashed rgba(42,42,62,0.15);
    }
    #ov-name-a {
      left: 17%; top: 3%;
      width: 21%; height: 18%;
      justify-content: flex-start;
    }
    #ov-name-b {
      left: 62%; top: 3%;
      width: 21%; height: 18%;
      justify-content: flex-end;
    }
    .team-name-ov {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(16px, 2.6vw, 28px);
      font-weight: 900; letter-spacing: 0.06em; text-transform: uppercase;
      color: #2a2a3e;
    }
    #ov-date {
      left: 38%; top: 11.5%;
      width: 24%; height: 6%;
    }
    .date-label {
      font-size: clamp(10px, 1vw, 13px); font-weight: 600;
      color: rgba(42,42,62,0.4); letter-spacing: 0.05em;
    }
    #ov-score-a {
      left: 34%; top: 22%;
      width: 12%; height: 12%;
      justify-content: flex-end;
    }
    #ov-score-b {
      left: 54%; top: 22%;
      width: 12%; height: 12%;
      justify-content: flex-start;
    }
    .score-big {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(28px, 5vw, 56px); font-weight: 900; line-height: 1;
      min-width: 36px; text-align: center;
    }
    .score-big.a   { color: #e84e78; }
    .score-big.b   { color: #0daa96; }
    .score-big.dim { color: rgba(42,42,62,0.18); }
    #ov-dots-a {
      left: 7%; top: 22%;
      width: 28%; height: 12%;
      justify-content: flex-start; gap: 1%;
    }
    #ov-dots-b {
      left: 65%; top: 22%;
      width: 28%; height: 12%;
      justify-content: flex-end; gap: 1%;
    }
    .map-dot {
      width: clamp(24px, 3.2vw, 38px); height: clamp(24px, 3.2vw, 38px);
      border-radius: 9px; border: 2px solid rgba(0,0,0,0.1);
      background: rgba(255,255,255,0.5); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(14px, 2vw, 20px); font-weight: 700;
      transition: all 0.15s; flex-shrink: 0;
    }
    .map-dot:hover { transform: scale(1.1); }
    .map-dot.win-a  { background: rgba(255,107,149,0.22); border-color: rgba(255,107,149,0.5); color: #e84e78; }
    .map-dot.lose-a { background: rgba(45,212,192,0.18); border-color: rgba(45,212,192,0.4); color: #0daa96; }
    .map-dot.win-b  { background: rgba(45,212,192,0.22); border-color: rgba(45,212,192,0.5); color: #0daa96; }
    .map-dot.lose-b { background: rgba(255,107,149,0.18); border-color: rgba(255,107,149,0.4); color: #e84e78; }

    /* 3맵 그리드 */
    #ov-maps {
      left: 16%; top: 58.65%;
      width: 68%; height: 36%;
      align-items: stretch; gap: 2%;
    }
    .map-cell {
      flex: 1; display: flex; flex-direction: column;
      border-radius: 14px; overflow: hidden;
      border: 1.5px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(2px); cursor: pointer;
    }
    .map-top {
      padding: 5px 4px 4px; text-align: center;
      background: rgba(255,107,149,0.12);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .map-num {
      font-size: clamp(8px, 1vw, 11px); font-weight: 800;
      letter-spacing: 0.14em; text-transform: uppercase; color: #e84e78;
    }
    .map-img-wrap { flex: 1; overflow: hidden; background: #e8e8ec; min-height: 0; }
    .map-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .map-name-bar {
      padding: 5px 4px; text-align: center;
      background: rgba(255,255,255,0.5);
      border-top: 1px solid rgba(0,0,0,0.06);
    }
    .map-name-txt {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(9px, 1.1vw, 14px); font-weight: 800;
      letter-spacing: 0.1em; text-transform: uppercase; color: #2a2a3e;
    }

    /* ══ MAP CARD (champions style) ══ */
    .map-card {
      background: #0a0800;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 4px;
      margin-bottom: 0;
      overflow: hidden;
      max-width: 100%;
    }

    .map-scoreboard {
      position: relative;
      width: 100%;
      overflow: hidden;
      height: 160px;
      background: linear-gradient(135deg, #0c1522 0%, #111a28 50%, #0c1522 100%);
    }
    .scoreboard-img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center 42%; display: block;
    }
    .scoreboard-overlay { position: absolute; inset: 0; }

    .sb-team-block {
      position: absolute; top: 42%;
      display: flex; align-items: center; gap: 6px;
    }
    .sb-team-block-l { left: 24%; transform: translate(-100%, -50%); gap: 18px; }
    .sb-team-block-r { left: 76%; transform: translateY(-50%); gap: 28px; }
    .sb-team-logo { width: clamp(48px,7vw,80px); height: clamp(48px,7vw,80px); object-fit: contain; filter: drop-shadow(0 1px 4px rgba(0,0,0,0.8)); margin-right: 4px; }
    .sb-team-logo.sb-team-logo-white { filter: brightness(0) invert(1) drop-shadow(0 1px 4px rgba(0,0,0,0.8)); }
    .sb-team-name-l, .sb-team-name-r {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(14px,3vw,22px); font-weight: 900;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: #fff; text-shadow: 0 1px 6px rgba(0,0,0,0.8);
    }
    .sb-center {
      position: absolute; top: 42%; left: 50%;
      transform: translate(-50%,-50%);
      width: 150px; height: 94px;
      border: 1px solid rgba(255,255,255,0.28);
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.6), inset 0 0 12px rgba(0,0,0,0.4);
    }
    .sb-map-img { width: 100%; height: 100%; object-fit: cover; object-position: center 30%; display: block; }
    .sb-map-name {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 4px 0;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase; color: rgba(255,255,255,0.85); text-align: center;
    }
    .sb-score-diamond-l, .sb-score-diamond-r {
      position: absolute; top: 42%;
      font-family: Impact, 'Russo One', sans-serif;
      font-size: clamp(34px,6vw,64px); font-weight: 400;
      letter-spacing: 0.02em; text-shadow: 0 1px 10px rgba(0,0,0,0.95); line-height: 1;
    }
    .sb-score-diamond-l { left: 29%; transform: translate(-50%,-50%); color: #fff; }
    .sb-score-diamond-r { left: 71%; transform: translate(-50%,-50%); color: rgba(255,255,255,0.4); }
    .sb-score-diamond-l.lose { color: rgba(255,255,255,0.4); }
    .sb-score-diamond-r.win  { color: #fff; }
    .sb-diamonds {
      position: absolute; top: calc(78% - 14px);
      display: flex; gap: 10px; align-items: center; transform: translateY(-50%);
    }
    .sb-diamonds-l { left: 28.5%; transform: translate(calc(-50% + 10px),-50%); }
    .sb-diamonds-r { left: 70%;   transform: translate(calc(-50% + 3px), -50%); }
    .sb-diamond {
      width: 13px; height: 13px;
      border: 1.5px solid rgba(255,255,255,0.55);
      transform: rotate(45deg); cursor: pointer; background: transparent;
      transition: background 0.12s, border-color 0.12s; flex-shrink: 0;
    }
    .sb-diamond:hover { border-color: rgba(255,255,255,0.9); }
    .sb-diamond.filled { background: rgba(255,255,255,0.88); border-color: #fff; }

    /* ROUND TRACKER */
    .rt-wrap {
      display: flex; align-items: stretch;
      background: #0c1116;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      overflow: hidden;
    }
    .rt-left { flex-shrink: 0; border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
    .rt-left-spacer { height: 22px; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .rt-team-row { display: flex; align-items: center; gap: 7px; padding: 0 12px 0 14px; height: 34px; position: relative; }
    .rt-team-row + .rt-team-row { border-top: 1px solid rgba(255,255,255,0.07); }
    .rt-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
    .rt-logo { width: 18px; height: 18px; object-fit: contain; flex-shrink: 0; }
    .rt-logo-white { filter: brightness(0) invert(1); }
    .rt-team-name { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #fff; min-width: 26px; }
    .rt-grid-wrap { flex: 1; overflow-x: auto; }
    .rt-grid { display: flex; flex-direction: column; min-width: max-content; }
    .rt-block { display: flex; flex-direction: column; }
    .rt-block + .rt-block { border-top: 1px solid rgba(255,255,255,0.07); margin-top: 2px; }
    .rt-row { display: flex; align-items: center; gap: 3px; padding: 0 6px; }
    .rt-row.num-row  { height: 20px; padding-top: 4px; }
    .rt-row.cell-row { height: 34px; padding-bottom: 3px; }
    .rt-row.cell-row + .rt-row.cell-row { padding-top: 0; padding-bottom: 6px; }
    .rt-num { width: 28px; flex-shrink: 0; text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.04em; color: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; }
    .rt-cell { width: 28px; height: 26px; flex-shrink: 0; background: #1a2030; border: 1px solid rgba(255,255,255,0.35); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.1s; }
    .rt-cell:hover { background: rgba(255,255,255,0.12); }
    .rt-cell.win-atk { background: rgba(208,53,53,0.35); }
    .rt-cell.win-def { background: rgba(0,196,176,0.35); }
    .rt-cell img { width: 14px; height: 14px; object-fit: contain; display: block; }
    .rt-sep     { width: 6px; flex-shrink: 0; }
    .rt-sep-num { width: 6px; flex-shrink: 0; }

    /* ROUND PICKER MODAL */
    .round-picker {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 2000; display: grid; place-items: center;
    }
    .round-picker-panel {
      background: #fff; border-radius: 10px;
      min-width: 280px; max-width: 460px; width: 90vw;
      overflow: hidden; box-shadow: 0 14px 48px rgba(0,0,0,0.5);
    }
    .round-picker-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid rgba(7,17,17,0.12); }
    .round-picker-head strong { font-size: 16px; font-weight: 900; color: #111; }
    .round-picker-head-actions { display: flex; gap: 8px; }
    .rp-clear-btn, .rp-close-btn { padding: 4px 10px; border: 1px solid rgba(7,17,17,0.22); border-radius: 5px; background: transparent; font-size: 13px; cursor: pointer; transition: background 120ms; }
    .rp-clear-btn:hover, .rp-close-btn:hover { background: rgba(7,17,17,0.07); }
    .round-picker-body { display: grid; grid-template-columns: 1fr 1fr; }
    .rp-team-section { padding: 12px; border-right: 1px solid rgba(7,17,17,0.1); }
    .rp-team-section:last-child { border-right: 0; }
    .rp-team-label { font-size: 12px; font-weight: 700; margin-bottom: 8px; color: rgba(7,17,17,0.6); }
    .rp-icons { display: flex; flex-direction: column; gap: 3px; }
    .rp-icon-btn { display: flex; align-items: center; gap: 8px; padding: 5px 7px; border: 1.5px solid transparent; border-radius: 6px; background: transparent; cursor: pointer; transition: background 110ms, border-color 110ms; width: 100%; text-align: left; font-size: 11px; color: rgba(7,17,17,0.7); }
    .rp-icon-btn:hover { background: rgba(7,17,17,0.06); }
    .rp-icon-btn.selected { background: rgba(7,17,17,0.09); border-color: rgba(7,17,17,0.28); }
    .rp-icon-btn img { width: 22px; height: 22px; object-fit: contain; flex-shrink: 0; }

    /* PLAYER TABLE */
    .player-table { width: 100%; border-collapse: separate; border-spacing: 0 4px; padding: 4px 6px 6px; }
    .player-table colgroup col:nth-child(1) { width: 96px; }
    .player-table colgroup col:nth-child(2) { width: 50px; }
    .player-table colgroup col:nth-child(3) { width: auto; }
    .player-table colgroup col:nth-child(4) { width: 1px; }
    .player-table colgroup col:nth-child(5) { width: auto; }
    .player-table colgroup col:nth-child(6) { width: 52px; }
    .player-table colgroup col:nth-child(7) { width: 96px; }
    .player-cell { border: 1px solid rgba(255,255,255,0.35); padding: 0 !important; vertical-align: top; }
    .pc-inner { display: flex; align-items: center; width: 100%; height: 54px; box-sizing: border-box; overflow: hidden; }
    .pc-agent { width: 54px; height: 54px; flex-shrink: 0; overflow: hidden; }
    .pc-agent .agent-portrait { width: 54px; height: 54px; object-fit: cover; object-position: top center; display: block; border: none; }
    .pc-text { display: flex; align-items: center; gap: 10px; padding: 0 14px; flex: 1; }
    .player-cell-l .pc-stats { margin-left: auto; }
    .player-cell-r .pc-name { margin-left: auto; }
    .pc-stats { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .pc-acs { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.6); letter-spacing: 0.01em; white-space: nowrap; }
    .player-cell-r .agent-portrait { transform: scaleX(-1); }
    .player-cell-r .agent-portrait.agent-no-flip { transform: scaleX(1); }
    .player-table thead th { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.28); padding: 6px 8px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .player-table thead th.col-kda-l { text-align: right; }
    .player-table thead th.col-kda-r { text-align: left; }
    .player-table thead th.col-name-l { text-align: left; padding-left: 10px; }
    .player-table thead th.col-name-r { text-align: right; padding-right: 10px; }
    .player-table thead th.col-div { background: transparent; }
    .player-table tbody tr { height: 56px; transition: background 0.1s; }
    .player-table tbody tr:hover .player-cell { background: rgba(255,255,255,0.04) !important; }
    .player-table tbody td { padding: 7px 8px; vertical-align: middle; }
    .cell-skills { text-align: center; padding: 0 !important; vertical-align: top; }
    .skill-stack { display: flex; flex-direction: row; width: 84px; height: 56px; border: 1px solid rgba(255,255,255,0.35); overflow: hidden; margin: 0 auto; }
    .skill-box { flex: 1; background: #1a2030; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; overflow: hidden; padding: 3px 2px 11px; gap: 3px; }
    .skill-box img { width: 100%; max-height: 36px; object-fit: contain; display: block; flex-shrink: 0; }
    .skill-charges { display: flex; gap: 2px; flex-shrink: 0; }
    .skill-charge { width: 7px; height: 2.5px; background: rgba(255,255,255,0.75); }
    .chamber-q-charges { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; width: calc(4 * 3px + 3 * 2px); margin: 0 auto; flex-shrink: 0; }
    .chamber-q-charges .skill-charge { width: 3px; }
    .chamber-skill-box { justify-content: flex-end !important; padding-bottom: 11px !important; }
    .astra-skills-row { flex: 1; display: flex; flex-direction: row; min-height: 0; }
    .astra-gage-row { display: flex; flex-direction: row; justify-content: center; align-items: center; gap: 3px; padding: 2px 3px 3px; margin-bottom: 8px; flex-shrink: 0; background: #1a2030; }
    .astra-gage-row img { width: 9px; height: 9px; object-fit: contain; display: block; }
    .astra-skills-row .skill-box { justify-content: flex-start; padding-top: 5px; padding-bottom: 3px; }
    .reyna-eq { flex: 2; display: flex; flex-direction: column; background: #1a2030; overflow: hidden; }
    .reyna-eq-imgs { flex: 1; min-height: 0; display: flex; flex-direction: row; align-items: stretch; }
    .reyna-eq-imgs .skill-box { border-right: none; justify-content: flex-end; padding-bottom: 5px; }
    .reyna-shared-charges { display: flex; gap: 2px; padding: 2px 3px 3px; margin-bottom: 8px; flex-shrink: 0; }
    .reyna-shared-charge { flex: 1; height: 2.5px; background: rgba(255,255,255,0.75); }
    .cell-ult { padding: 0 !important; vertical-align: top; }
    .cell-ult-l { padding-right: 4px !important; }
    .cell-ult-r { padding-left: 4px !important; }
    .ult-box { width: 48px; height: 56px; background: #1a2030; border: 1px solid rgba(255,255,255,0.35); margin: 0; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .ult-ring-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .ult-icon-img { position: relative; z-index: 1; width: 38%; height: 38%; object-fit: contain; display: block; flex-shrink: 0; }
    .agent-portrait { width: 54px; height: 54px; object-fit: cover; object-position: top center; display: block; border: none; max-width: 100%; max-height: 100%; }
    .agent-placeholder { width: 48px; min-height: 42px; background: #1a2030; border-right: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 10px; color: rgba(255,255,255,0.3); flex-shrink: 0; }
    .cell-name-l { text-align: left; padding-left: 10px !important; }
    .cell-name-r { text-align: right; padding-right: 10px !important; }
    .player-name { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: 0.03em; color: #fff; }
    .cell-kda-l { text-align: right; }
    .cell-kda-r { text-align: left; }
    .kda-display { display: inline-flex; align-items: baseline; gap: 2px; font-family: 'Barlow Condensed', sans-serif; }
    .kda-k { font-size: 20px; font-weight: 900; color: #fff; }
    .kda-sep { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.3); }
    .kda-d { font-size: 20px; font-weight: 900; color: #fff; }
    .kda-a { font-size: 20px; font-weight: 900; color: #fff; }
    .cell-div { background: transparent; width: 1px; padding: 0 !important; }
    .kda-btn { background: none; border: none; cursor: pointer; color: inherit; padding: 2px 4px; border-radius: 3px; transition: background 0.1s; display: inline-flex; }
    .kda-btn:hover { background: rgba(255,255,255,0.08); }

    /* KDA POPUP */
    .kda-popup { position: fixed; inset: 0; z-index: 999; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); }
    .kda-popup-panel { background: #1a2535; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; padding: 20px 24px; min-width: 240px; }
    .kda-popup-panel h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 14px; }
    .kda-popup-panel .kda-inputs { display: flex; align-items: center; gap: 8px; }

  var TEAM_A_LOGO = teamLogoSrc(TEAM_A);
  var TEAM_B_LOGO = teamLogoSrc(TEAM_B);

  function setTeamLogo(side, src) {
    var img = document.getElementById('logo-img-' + side);

    if (!src) return;
    img.onload  = function() { ph.style.display = 'none'; img.style.display = 'block'; };

  function roundIsAttacking(side, roundIdx, firstAttacker) {
    if (!firstAttacker) return null;
    var n = roundIdx + 1;
    var faAtks;
    if (n <= 12)       faAtks = true;
    else if (n <= 24)  faAtks = false;
    else { var ot = n - 24; faAtks = (ot % 2 === 1); }
    return faAtks ? (firstAttacker === side) : (firstAttacker !== side);

  // ── 맵 선택 팝업 (score1 그리드) ─────────────────────────────
  function openMapPicker(mapIdx) {
    if (!isAdmin()) return;
    var popup = document.createElement('div');
    popup.style.cssText = 'position:fixed;inset:0;z-index:9100;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;';
    popup.innerHTML = '<div style="background:#fff;border-radius:14px;padding:20px 24px 16px;min-width:320px;max-width:90vw;box-shadow:0 12px 48px rgba(0,0,0,0.22);">'
      + '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:14px;font-weight:900;color:#2a2a3e;margin-bottom:14px;">MAP ' + (mapIdx + 1) + ' 선택</div>'
      + '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;">'
      + MAP_LIST.map(function(m) {
          return '<button style="padding:6px 4px;border-radius:7px;border:1.5px solid rgba(42,42,62,0.12);background:transparent;cursor:pointer;font-size:11px;font-weight:700;color:#2a2a3e;" data-map="' + m + '">' + m + '</button>';
        }).join('')
      + '</div>'
      + '<div style="display:flex;gap:8px;justify-content:flex-end;">'
      + '<button id="mpk-cancel" style="padding:7px 16px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid rgba(42,42,62,0.15);background:transparent;color:rgba(42,42,62,0.5);">취소</button>'
      + '</div></div>';
    document.body.appendChild(popup);
    popup.addEventListener('click', function(e) {
      if (e.target === popup || e.target.id === 'mpk-cancel') { popup.remove(); return; }
      var btn = e.target.closest('[data-map]');
      if (btn) {
        var nm = btn.dataset.map;
        var mnEl = document.getElementById('map-name-' + mapIdx);
        var miEl = document.getElementById('map-img-'  + mapIdx);
        if (mnEl) mnEl.textContent = nm;
        if (miEl && MAP_IMAGES[nm]) { miEl.src = MAP_IMAGES[nm]; miEl.style.display = 'block'; }
        // 맵 카드 스코어보드 이미지도 업데이트
        var sbImg  = document.getElementById('m' + (mapIdx+1) + '-sb-map-img');
        var sbName = document.getElementById('m' + (mapIdx+1) + '-sb-map-name');
        if (sbImg  && MAP_IMAGES[nm]) sbImg.src = MAP_IMAGES[nm];
        if (sbName) sbName.textContent = nm;
        popup.remove();
      }
    });
  }

  function hexRgb(hex) {
    var h = hex.replace("#","");
    return parseInt(h.slice(0,2),16)+","+parseInt(h.slice(2,4),16)+","+parseInt(h.slice(4,6),16);
  }

  function agentCell(agent, side) {
    var placeholder = (side === "b") ? "images/Agent_right.webp" : "images/Agent.webp";
    if (!agent) return '<img class="agent-portrait agent-no-flip" src="'+placeholder+'" alt="요원" />';
    var src = agentImages[agent];
    if (src) return '<img class="agent-portrait" src="'+src+'" alt="'+agent+'" />';
    return '<img class="agent-portrait agent-no-flip" src="'+placeholder+'" alt="'+agent+'" />';
  }

  function kdaHtml(p, mapIdx, playerIdx) {
    var k = p.k, d = p.d, a = p.a;
    if (p.kda != null && p.kda !== "") {
      var parts = String(p.kda).split("/");
      k = parts[0] !== undefined ? parts[0] : 0;
      d = parts[1] !== undefined ? parts[1] : 0;
      a = parts[2] !== undefined ? parts[2] : 0;
    }
    return '<button class="kda-btn" onclick="openKda('+mapIdx+','+playerIdx+')" title="KDA 수정">'
      + '<span class="kda-display"><span class="kda-k">'+k+'</span><span class="kda-sep">/</span>'
      + '<span class="kda-d">'+d+'</span><span class="kda-sep">/</span><span class="kda-a">'+a+'</span></span>'
      + '</button>';
  }

  function makeSkillStack(p) {
    var s = p.skills || [];
    var agentData = AGENT_DATA[p.agent];

    if (agentData && agentData.layout === 'astra') {
      function astraImg(i) { var sk=s[i]; if(!sk) return ''; var src=typeof sk==='string'?sk:sk.src; return src?'<img src="'+src+'" alt="" />':''; }
      var gageImg = agentData.gageImg || '';
      var gages = gageImg ? Array(5).fill('<img src="'+gageImg+'" alt="" />').join('') : '';
      return '<div class="skill-stack" style="flex-direction:column;background:#1a2030"><div class="astra-skills-row"><div class="skill-box">'+astraImg(0)+'</div><div class="skill-box">'+astraImg(1)+'</div><div class="skill-box">'+astraImg(2)+'</div></div><div class="astra-gage-row">'+gages+'</div></div>';
    }

    if (agentData && agentData.layout === 'chamber') {
      function chamberBox(i) {
        var sk=s[i]; if(!sk) return '<div class="skill-box chamber-skill-box"></div>';
        var src=typeof sk==='string'?sk:sk.src; var charges=typeof sk==='object'?(sk.charges||0):0;
        var img=src?'<img src="'+src+'" alt="" />':''; var bars='';
        if(charges===1) bars='<div style="display:flex;justify-content:center;align-items:center;flex-shrink:0;width:100%;height:7px"><div class="skill-charge" style="width:8px"></div></div>';
        else if(charges>1) bars='<div class="chamber-q-charges">'+'<div class="skill-charge"></div>'.repeat(charges)+'</div>';
        return '<div class="skill-box chamber-skill-box">'+img+bars+'</div>';
      }
      return '<div class="skill-stack">'+chamberBox(0)+chamberBox(1)+chamberBox(2)+'</div>';
    }

    if (agentData && agentData.layout === 'reyna') {
      function skillImg(i) { var sk=s[i]; if(!sk) return ''; var src=typeof sk==='string'?sk:sk.src; return src?'<img src="'+src+'" alt="" />':''; }
      var eqCount = agentData.sharedCharges || 2;
      var sharedBars = '<div class="reyna-shared-charge"></div>'.repeat(eqCount);
      var cSkill=s[2]; var cSrc=cSkill?(typeof cSkill==='string'?cSkill:cSkill.src):''; var cCharges=cSkill&&typeof cSkill==='object'?(cSkill.charges||0):0;

  function seededRand(seed) {
    var h = 0;
    for (var i = 0; i < seed.length; i++) h = (Math.imul(31, h) + seed.charCodeAt(i)) | 0;
    return (h >>> 0) / 0xFFFFFFFF;
  }

  function makeUltRingSvg(charges, filled) {
    var cx=24,cy=28,r=18,sw=4.2,gapDeg=9;
    var segDeg=(360/charges)-gapDeg;
    var filledCol='rgba(255,255,255,0.88)', emptyCol='rgba(255,255,255,0.16)';
    function pt(angleDeg){ var rad=(angleDeg-90)*Math.PI/180; return [(cx+r*Math.cos(rad)).toFixed(2),(cy+r*Math.sin(rad)).toFixed(2)]; }
    var paths='';
    for(var i=0;i<charges;i++){
      var startDeg=(360/charges)*i+gapDeg/2, endDeg=startDeg+segDeg;
      var p1=pt(startDeg), p2=pt(endDeg), largeArc=segDeg>180?1:0;
      var col=i<filled?filledCol:emptyCol;
      paths+='<path d="M'+p1[0]+','+p1[1]+' A'+r+','+r+' 0 '+largeArc+',1 '+p2[0]+','+p2[1]+'" fill="none" stroke="'+col+'" stroke-width="'+sw+'" stroke-linecap="butt"/>';
    }
    return '<svg class="ult-ring-svg" viewBox="0 0 48 56" xmlns="http://www.w3.org/2000/svg">'+paths+'</svg>';
  }

  function makeUltBox(p, mapIdx, pIdx) {

    if(p.ultFilled==null) p.ultFilled=Math.floor(seededRand(p.name+p.agent)*(charges+1));
    var ring=makeUltRingSvg(charges,p.ultFilled);
    var icon=p.ult?'<img class="ult-icon-img" src="'+p.ult+'" alt="" />':'';
    var click=(mapIdx!=null&&pIdx!=null)?'onclick="clickUlt('+mapIdx+','+pIdx+')"':'';
    return '<div class="ult-box" '+click+' style="cursor:pointer">'+ring+icon+'</div>';
  }

  function getPlayerSideKey(mapIdx, pIdx) {

    var sideA=m.players.filter(function(q){return q.side==='a';}), sideB=m.players.filter(function(q){return q.side==='b';});

  function saveFieldSync(mapIdx, pIdx, field, value) {
    var PKEY=PLAYERS_MATCH_KEY+':'+mapIdx, data={};
    try{ var raw=localStorage.getItem(PKEY); if(raw){var pp=JSON.parse(raw);if(!Array.isArray(pp))data=pp;} }catch(e){}
    var pKey=getPlayerSideKey(mapIdx,pIdx);
    if(!data[pKey])data[pKey]={};
    data[pKey][field]=value;
    try{ localStorage.setItem(PKEY,JSON.stringify(data)); }catch(e){}
    try{
      var _slot=data[pKey], _pName=(_slot&&_slot.name||'').trim();
      if(_pName&&_pName!=='-'){
        var _vk='vct_p:'+_pName, _pd={};
        try{ _pd=JSON.parse(localStorage.getItem(_vk)||'{}'); }catch(e2){}
        if(!_pd.maps)_pd.maps=[];
        var _entry=null;
        for(var _i=0;_i<_pd.maps.length;_i++){ if(_pd.maps[_i].matchKey===MATCH_KEY&&_pd.maps[_i].mapIdx===mapIdx){_entry=_pd.maps[_i];break;} }
        if(!_entry){_entry={matchKey:MATCH_KEY,mapIdx:mapIdx};_pd.maps.push(_entry);}
        _entry.league=LEAGUE; _entry.stage=MATCH_FROM;
        if(_slot.agent&&_slot.agent.trim())_entry.agent=_slot.agent.trim(); else if(_slot.agent===''||_slot.agent===null)delete _entry.agent;
        if(_slot.acs!=null&&_slot.acs!=='')_entry.acs=_slot.acs; else if(_slot.acs===null)delete _entry.acs;
        if(_slot.kda&&_slot.kda.indexOf('/')!==-1)_entry.kda=_slot.kda; else if(_slot.kda===null||_slot.kda==='')delete _entry.kda;
        var hasStats=('acs' in _entry)||('kda' in _entry);
        if(!hasStats){ _pd.maps=_pd.maps.filter(function(e){return!(e.matchKey===MATCH_KEY&&e.mapIdx===mapIdx);}); }
        localStorage.setItem(_vk,JSON.stringify(_pd));
        (function(k,v){fetch('/api/data/'+encodeURIComponent(k),{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({value:v})}).catch(function(){});}(_vk,JSON.stringify(_pd)));
      }
    }catch(e3){}
  }

  function loadPlayersSync(mapIdx) {
    try{
      var raw=localStorage.getItem(PLAYERS_MATCH_KEY+':'+mapIdx); if(!raw)return;
      var data=JSON.parse(raw); if(Array.isArray(data))return;
      var m=maps[mapIdx];
      var sideA=m.players.filter(function(p){return p.side==='a';}), sideB=m.players.filter(function(p){return p.side==='b';});
      [sideA,sideB].forEach(function(side,si){
        var sl=si===0?'a':'b';

    try{
      var state={};
      document.querySelectorAll('.sb-diamonds').forEach(function(wrap){ if(!wrap.id)return; state[wrap.id]=Array.from(wrap.querySelectorAll('.sb-diamond')).map(function(d){return d.classList.contains('filled');}); });
      localStorage.setItem('diamonds:'+MATCH_KEY,JSON.stringify(state));
    }catch(e){}
  }
  function loadDiamondState() {
    try{
      var raw=localStorage.getItem('diamonds:'+MATCH_KEY); if(!raw)return;
      var state=JSON.parse(raw);
      Object.keys(state).forEach(function(id){ var wrap=document.getElementById(id); if(!wrap)return; var ds=wrap.querySelectorAll('.sb-diamond'); state[id].forEach(function(filled,i){if(ds[i])ds[i].classList.toggle('filled',filled);}); });
    }catch(e){}
  }

  // ── openKda / openAcsEditor / openStatEditor ─────────────────
  function openKda(mapIdx, playerIdx) {
    var p=maps[mapIdx].players[playerIdx];
    var popup=document.createElement('div'); popup.className='kda-popup';
    popup.innerHTML='<div class="kda-popup-panel"><h3>'+p.name+' — K / D / A</h3><div class="kda-inputs">'
      +'<input id="inp-k" type="number" min="0" max="99" value="'+p.k+'" /><span class="kda-popup-sep">/</span>'
      +'<input id="inp-d" type="number" min="0" max="99" value="'+p.d+'" /><span class="kda-popup-sep">/</span>'
      +'<input id="inp-a" type="number" min="0" max="99" value="'+p.a+'" /></div>'
      +'<div class="kda-popup-actions"><button class="btn-clear" id="btn-kda-clear">칸 비우기</button><button class="btn-cancel" id="btn-cancel">취소</button><button class="btn-save" id="btn-save">저장</button></div></div>';
    document.body.appendChild(popup);
    document.getElementById('inp-k').focus();
    document.getElementById('btn-kda-clear').onclick=function(){ p.k='-';p.d='-';p.a='-';p.kda=null; saveFieldSync(mapIdx,playerIdx,'kda',null); renderMap(maps[mapIdx],mapIdx); popup.remove(); };
    document.getElementById('btn-cancel').onclick=function(){ popup.remove(); };
    popup.addEventListener('click',function(e){if(e.target===popup)popup.remove();});
    var _save=function(){ document.getElementById('btn-save').click(); };
    ['inp-k','inp-d','inp-a'].forEach(function(id){ var el=document.getElementById(id); if(el)el.addEventListener('keydown',function(e){if(e.key==='Enter')_save();}); });
    document.getElementById('btn-save').onclick=function(){
      p.k=parseInt(document.getElementById('inp-k').value)||0;
      p.d=parseInt(document.getElementById('inp-d').value)||0;
      p.a=parseInt(document.getElementById('inp-a').value)||0;
      p.kda=p.k+'/'+p.d+'/'+p.a;
      saveFieldSync(mapIdx,playerIdx,'kda',p.kda);
      if(p.name&&p.name!=='-')saveFieldSync(mapIdx,playerIdx,'name',p.name);
      renderMap(maps[mapIdx],mapIdx); popup.remove();
    };
  }

  function openAcsEditor(mapIdx, playerIdx) {
    var existing=document.querySelector('.kda-popup.acs-popup'); if(existing)existing.remove();
    var p=maps[mapIdx].players[playerIdx];
    var popup=document.createElement('div'); popup.className='kda-popup acs-popup';
    popup.innerHTML='<div class="kda-popup-panel"><h3>'+p.name+' — ACS</h3><div class="kda-inputs"><input id="inp-acs" type="number" min="0" max="999" value="'+(p.acs!=null?p.acs:'')+'" /></div>'
      +'<div class="kda-popup-actions"><button class="btn-clear" id="btn-acs-clear">칸 비우기</button><button class="btn-cancel" id="btn-acs-cancel">취소</button><button class="btn-save" id="btn-acs-save">저장</button></div></div>';
    document.body.appendChild(popup);
    document.getElementById('inp-acs').focus();
    document.getElementById('btn-acs-clear').onclick=function(){ p.acs=null; saveFieldSync(mapIdx,playerIdx,'acs',null); renderMap(maps[mapIdx],mapIdx); popup.remove(); };
    document.getElementById('btn-acs-cancel').onclick=function(){ popup.remove(); };
    popup.addEventListener('click',function(e){if(e.target===popup)popup.remove();});
    var _acsSave=function(){ document.getElementById('btn-acs-save').click(); };
    var _acsInp=document.getElementById('inp-acs'); if(_acsInp)_acsInp.addEventListener('keydown',function(e){if(e.key==='Enter')_acsSave();});
    document.getElementById('btn-acs-save').onclick=function(){ p.acs=parseInt(document.getElementById('inp-acs').value)||0; saveFieldSync(mapIdx,playerIdx,'acs',p.acs); if(p.name&&p.name!=='-')saveFieldSync(mapIdx,playerIdx,'name',p.name); renderMap(maps[mapIdx],mapIdx); popup.remove(); };
  }

  function openStatEditor(mapIdx, statKey, side) {
    var existing=document.querySelector('.stat-editor-popup'); if(existing)existing.remove();
    var m=maps[mapIdx]; var label,curVal;
    if(statKey==='score'){ label='스코어'; var scoreId=['m1','m2','m3'][mapIdx]; curVal=side==='a'?m.rtState.stats.aScore:m.rtState.stats.bScore; }
    else{ label=m.teamStats[statKey].label; curVal=m.teamStats[statKey][side]; }
    var teamName=side==='a'?m.teamA:m.teamB;
    var popup=document.createElement('div'); popup.className='kda-popup stat-editor-popup';
    popup.innerHTML='<div class="kda-popup-panel"><h3>'+teamName+' — '+label+'</h3><div class="kda-inputs"><input id="inp-stat" type="text" value="'+curVal+'" autofocus style="width:120px;text-align:center;font-size:20px;" /></div>'
      +'<div class="kda-popup-actions"><button class="btn-cancel" id="btn-stat-cancel">취소</button><button class="btn-save" id="btn-stat-save">저장</button></div></div>';
    document.body.appendChild(popup);
    var inp=document.getElementById('inp-stat'); inp.focus(); inp.select();
    inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();document.getElementById('btn-stat-save').click();}});
    document.getElementById('btn-stat-cancel').onclick=function(){ popup.remove(); };
    popup.addEventListener('click',function(e){if(e.target===popup)popup.remove();});
    document.getElementById('btn-stat-save').onclick=function(){
      var raw=inp.value.trim(), val=(raw===''||raw==='-')?'-':(raw.indexOf('/')!==-1?raw:(parseFloat(raw)||0));
      if(statKey==='score'){
        if(side==='a'){m.rtState.stats.aScore=val;var scoreId=['m1','m2','m3'][mapIdx];if(scoreState[scoreId]){scoreState[scoreId].l=val;applyScoreClasses(scoreId);}}
        else{m.rtState.stats.bScore=val;var scoreId=['m1','m2','m3'][mapIdx];if(scoreState[scoreId]){scoreState[scoreId].r=val;applyScoreClasses(scoreId);}}
        renderRoundTracker(m,mapIdx);
      } else { m.teamStats[statKey][side]=val; }
      renderTeamStats(m,mapIdx); saveStatsState(mapIdx); popup.remove();
    };
  }

  // ── openRosterPicker ──────────────────────────────────────────
  function openRosterPicker(mapIdx, playerIdx) {
    var existing=document.querySelector('.roster-popup'); if(existing)existing.remove();
    var m=maps[mapIdx], p=m.players[playerIdx];
    var popup=document.createElement('div'); popup.className='kda-popup roster-popup';
    popup.innerHTML='<div class="kda-popup-panel"><h3>'+(p.side==='a'?m.teamA:m.teamB)+' 선수 선택</h3>'
      +'<div style="margin-top:10px;margin-bottom:4px;"><span class="roster-manual-label">직접 입력</span>'
      +'<div style="display:flex;gap:6px;align-items:center;"><input id="roster-manual-input" type="text" placeholder="선수 닉네임" value="'+(p.name!=='-'?p.name:'')+'" style="flex:1;background:#1a2030;border:1px solid rgba(255,255,255,0.18);border-radius:4px;padding:6px 10px;color:#fff;font-family:\'Barlow Condensed\',sans-serif;font-size:14px;font-weight:700;outline:none;" />'
      +'<button id="roster-manual-confirm" style="font-family:\'Barlow Condensed\',sans-serif;font-size:13px;font-weight:700;padding:6px 14px;border-radius:4px;cursor:pointer;background:rgba(255,70,85,0.2);border:1px solid #ff4655;color:#fff;">확인</button></div></div>'
      +'<div class="kda-popup-actions"><button class="btn-clear" id="btn-roster-clear">칸 비우기</button><button class="btn-cancel" id="btn-roster-cancel">취소</button></div></div>';
    document.body.appendChild(popup);
    var input=document.getElementById('roster-manual-input');
    function applyName(name){ name=name.trim(); if(!name)return; p.name=name; saveFieldSync(mapIdx,playerIdx,'name',p.name); renderMap(m,mapIdx); popup.remove(); }
    document.getElementById('btn-roster-clear').onclick=function(){ p.name='-'; saveFieldSync(mapIdx,playerIdx,'name','-'); renderMap(m,mapIdx); popup.remove(); };
    document.getElementById('btn-roster-cancel').onclick=function(){ popup.remove(); };
    document.getElementById('roster-manual-confirm').onclick=function(){ applyName(input.value); };
    input.addEventListener('keydown',function(e){if(e.key==='Enter')applyName(input.value);});
    popup.addEventListener('click',function(e){if(e.target===popup){popup.remove();}});
  }

  // ── openAgentPicker ───────────────────────────────────────────
  function openAgentPicker(mapIdx, playerIdx) {
    var existing=document.querySelector('.agent-picker-popup'); if(existing)existing.remove();
    var m=maps[mapIdx], p=m.players[playerIdx];
    var popup=document.createElement('div'); popup.className='kda-popup agent-picker-popup';
    var btns=Object.keys(agentImages).map(function(name){
      return '<button data-agent="'+name+'" style="display:flex;flex-direction:column;align-items:center;gap:4px;background:'+(p.agent===name?'rgba(255,70,85,0.25)':'#1a2030')+';border:1px solid '+(p.agent===name?'#c9a84c':'rgba(255,255,255,0.15)')+';border-radius:6px;padding:6px 8px;cursor:pointer;width:72px;">'
        +'<img src="'+agentImages[name]+'" alt="'+name+'" style="width:44px;height:44px;object-fit:cover;border-radius:4px;" />'
        +'<span style="font-family:\'Barlow Condensed\',sans-serif;font-size:11px;font-weight:700;color:rgba(255,255,255,0.8);white-space:nowrap;">'+name+'</span></button>';
    }).join('');
    popup.innerHTML='<div class="kda-popup-panel" style="max-width:520px"><h3>'+p.name+' — 요원 선택</h3><div style="display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;">'+btns+'</div>'
      +'<div class="kda-popup-actions"><button class="btn-clear" id="btn-agent-clear">칸 비우기</button><button class="btn-cancel" id="btn-agent-cancel">취소</button></div></div>';
    document.body.appendChild(popup);
    document.getElementById('btn-agent-clear').onclick=function(){ p.agent=''; saveFieldSync(mapIdx,playerIdx,'agent',''); renderMap(maps[mapIdx],mapIdx); popup.remove(); };
    document.getElementById('btn-agent-cancel').onclick=function(){ popup.remove(); };
    popup.addEventListener('click',function(e){
      if(e.target===popup){popup.remove();return;}
      var btn=e.target.closest('[data-agent]');
      if(btn){ p.agent=btn.dataset.agent; applyAgentData(p); saveFieldSync(mapIdx,playerIdx,'agent',p.agent); if(p.name&&p.name!=='-')saveFieldSync(mapIdx,playerIdx,'name',p.name); renderMap(m,mapIdx); popup.remove(); }
    });
  }

  // ── 초기 렌더링 ───────────────────────────────────────────────
  maps.forEach(function(m){ m.players.forEach(function(p){ applyAgentData(p); }); });
  maps.forEach(function(m,i){ renderMap(m,i); });
  maps.forEach(function(m,i){ renderRoundTracker(m,i); });
  maps.forEach(function(m,i){ renderTeamStats(m,i); });

  (window.storageReady||Promise.resolve()).then(function(){
    maps.forEach(function(m,i){ loadPlayersSync(i); });
    maps.forEach(function(m,i){ loadRoundState(i); });
    maps.forEach(function(m,i){ loadStatsState(i); });
    loadDiamondState();
    maps.forEach(function(m){ m.players.forEach(function(p){ applyAgentData(p); }); });
    maps.forEach(function(m,i){ renderMap(m,i); });
    maps.forEach(function(m,i){ renderRoundTracker(m,i); });
    maps.forEach(function(m,i){ renderTeamStats(m,i); });
    applyScoreClasses('m1'); applyScoreClasses('m2'); applyScoreClasses('m3');
  });

  window.addEventListener('storage',function(e){
    if(e.key==='_playerRenameEvent'){
      maps.forEach(function(m,i){ loadPlayersSync(i); renderMap(m,i); renderTeamStats(m,i); });
    }
  });

  </script>
</body>
</html>
