<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>발락대 경기 상세</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="./storage.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f4f6fb;
      min-height: 100vh;
      font-family: 'Barlow', sans-serif;
      color: #2a2a3e;
    }

    /* ── NAV ── */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      height: 56px; background: #fff;
      display: flex; align-items: center; padding: 0 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .nav-home {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 14px; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(42,42,62,0.4); text-decoration: none;
    }
    .nav-home::after { content: " /"; margin: 0 10px; color: rgba(42,42,62,0.2); font-weight: 400; }
    .nav-back {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 14px; letter-spacing: 0.1em;
      text-transform: uppercase; color: #ff6b95; text-decoration: none;
    }
    .nav-right { margin-left: auto; }

    .page-wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: 24px 20px 72px;
      display: flex; flex-direction: column; gap: 16px;
    }

    /* ── 이미지 위 오버레이 공통 ── */
    .img-overlay-wrap {
      position: relative;
      width: 100%;
      border-radius: 20px;
      overflow: hidden;
    }
    .img-overlay-wrap img.bg-img {
      width: 100%; display: block;
    }
    /* 오버레이 요소는 절대 위치, 이미지 위에 표시 */
    .ov {
      position: absolute;
      display: flex; align-items: center; justify-content: center;
    }

    /* ══ SCORE1 오버레이 요소 ══ */

    /* 팀 A 이름 (VS 카드 왼쪽) */
    #ov-name-a {
      left: 5%; top: 3%;
      width: 33%; height: 18%;
      justify-content: flex-start;
      padding-left: 4%;
    }
    /* 팀 B 이름 (VS 카드 오른쪽) */
    #ov-name-b {
      left: 62%; top: 3%;
      width: 33%; height: 18%;
      justify-content: flex-end;
      padding-right: 4%;
    }
    .team-name-ov {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(16px, 2.6vw, 28px);
      font-weight: 900; letter-spacing: 0.06em; text-transform: uppercase;
      color: #2a2a3e;
    }

    /* 날짜 (VS 카드 아래) */
    #ov-date {
      left: 38%; top: 11.5%;
      width: 24%; height: 6%;
    }
    .date-label {
      font-size: clamp(10px, 1vw, 13px); font-weight: 600;
      color: rgba(42,42,62,0.4); letter-spacing: 0.05em;
    }

    /* 스코어 바 — 큰 숫자 (이미지에 : 이미 있으므로 좌우 분리) */
    #ov-score-a {
      left: 34%; top: 22%;
      width: 12%; height: 12%;
      justify-content: flex-end;
    }
    #ov-score-b {
      left: 54%; top: 22%;
      width: 12%; height: 12%;
      justify-content: flex-start;
    }
    .score-display {
      display: flex; align-items: center; gap: 4px;
    }
    .score-big {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(28px, 5vw, 56px); font-weight: 900; line-height: 1;
      min-width: 36px; text-align: center;
    }
    .score-big.a   { color: #e84e78; }
    .score-big.b   { color: #0daa96; }
    .score-big.dim { color: rgba(42,42,62,0.18); }
    .score-sep {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(20px, 3vw, 36px); font-weight: 300;
      color: rgba(42,42,62,0.25); margin: 0 4px 3px;
    }

    /* 맵 결과 도트 — 팀 A */
    #ov-dots-a {
      left: 7%; top: 22%;
      width: 28%; height: 12%;
      justify-content: flex-start;
      gap: 1%;
    }
    /* 맵 결과 도트 — 팀 B */
    #ov-dots-b {
      left: 65%; top: 22%;
      width: 28%; height: 12%;
      justify-content: flex-end;
      gap: 1%;
    }
    .map-dot {
      width: clamp(24px, 3.2vw, 38px);
      height: clamp(24px, 3.2vw, 38px);
      border-radius: 9px;
      border: 2px solid rgba(0,0,0,0.1);
      background: rgba(255,255,255,0.5);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(14px, 2vw, 20px); font-weight: 700;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .map-dot:hover { transform: scale(1.1); }
    .map-dot.win-a  { background: rgba(255,107,149,0.22); border-color: rgba(255,107,149,0.5); color: #e84e78; }
    .map-dot.lose-a { background: rgba(45,212,192,0.18); border-color: rgba(45,212,192,0.4); color: #0daa96; }
    .map-dot.win-b  { background: rgba(45,212,192,0.22); border-color: rgba(45,212,192,0.5); color: #0daa96; }
    .map-dot.lose-b { background: rgba(255,107,149,0.18); border-color: rgba(255,107,149,0.4); color: #e84e78; }

    /* 맵 밴픽 그리드 */
    #ov-veto {
      left: 5.5%; top: 51%;
      width: 89%; height: 43%;
      align-items: stretch;
      gap: 1.2%;
    }
    .veto-cell {
      flex: 1;
      display: flex; flex-direction: column;
      border-radius: 12px; overflow: hidden;
      border: 1.5px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(2px);
      cursor: pointer;
    }
    .veto-cell.banned { opacity: 0.6; }
    .veto-top {
      padding: 5px 4px 4px; text-align: center;
      background: rgba(255,255,255,0.5);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .veto-action {
      font-size: clamp(7px, 0.9vw, 10px); font-weight: 800;
      letter-spacing: 0.14em; text-transform: uppercase;
    }
    .veto-action.ban     { color: #e84e78; }
    .veto-action.pick    { color: #0daa96; }
    .veto-action.decider { color: #e8a020; }
    .veto-who {
      font-size: clamp(7px, 0.8vw, 9px); font-weight: 600;
      color: rgba(42,42,62,0.45); margin-top: 1px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .veto-img-wrap {
      flex: 1; overflow: hidden; background: #ddd;
      min-height: 0;
    }
    .veto-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .veto-cell.banned .veto-img-wrap img { filter: grayscale(80%) brightness(0.75); }
    .veto-name-bar {
      padding: 4px 4px; text-align: center;
      background: rgba(255,255,255,0.5);
      border-top: 1px solid rgba(0,0,0,0.06);
    }
    .veto-map-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(8px, 1vw, 12px); font-weight: 800;
      letter-spacing: 0.1em; text-transform: uppercase; color: #2a2a3e;
    }
    .veto-cell.banned .veto-map-name { color: rgba(42,42,62,0.35); }
    .veto-cell.pick-a .veto-top { background: rgba(255,107,149,0.15); }
    .veto-cell.pick-b .veto-top { background: rgba(45,212,192,0.15); }
    .veto-cell.decider-cell .veto-top { background: rgba(232,160,32,0.12); }
  </style>
</head>
<body>

  <header class="site-header">
    <a class="nav-home" href="./index.html">VCT Archive</a>
    <a class="nav-back" id="nav-back" href="./ballakdae-scrim.html">공식 스크림</a>
    <div class="nav-right" id="auth-area"></div>
  </header>

  <div class="page-wrap">

    <!-- ① SCORE1 UI 위에 오버레이 -->
    <div class="img-overlay-wrap">
      <img class="bg-img" src="./images/balakdae_score1.png" alt="" />

      <!-- 팀 A 이름 -->
      <div class="ov" id="ov-name-a">
        <span class="team-name-ov sb-name-a">–</span>
      </div>

      <!-- 팀 B 이름 -->
      <div class="ov" id="ov-name-b">
        <span class="team-name-ov sb-name-b">–</span>
      </div>

      <!-- 날짜 -->
      <div class="ov" id="ov-date">
        <span class="date-label" id="match-date"></span>
      </div>

      <!-- 시리즈 스코어 (: 는 이미지에 있으므로 좌우 분리) -->
      <div class="ov" id="ov-score-a">
        <span class="score-big dim" id="score-a">-</span>
      </div>
      <div class="ov" id="ov-score-b">
        <span class="score-big dim" id="score-b">-</span>
      </div>

      <!-- 맵 결과 도트 A -->
      <div class="ov" id="ov-dots-a">
        <div class="map-dot" id="dot-a-0"></div>
        <div class="map-dot" id="dot-a-1"></div>
        <div class="map-dot" id="dot-a-2"></div>
      </div>

      <!-- 맵 결과 도트 B -->
      <div class="ov" id="ov-dots-b">
        <div class="map-dot" id="dot-b-0"></div>
        <div class="map-dot" id="dot-b-1"></div>
        <div class="map-dot" id="dot-b-2"></div>
      </div>

      <!-- 맵 밴픽 그리드 -->
      <div class="ov" id="ov-veto">
        <div class="veto-cell banned" data-order="0">
          <div class="veto-top"><div class="veto-action ban">BAN</div><div class="veto-who" id="veto-who-0">–</div></div>
          <div class="veto-img-wrap"><img id="veto-img-0" src="" alt="" /></div>
          <div class="veto-name-bar"><span class="veto-map-name" id="veto-map-0">–</span></div>
        </div>
        <div class="veto-cell banned" data-order="1">
          <div class="veto-top"><div class="veto-action ban">BAN</div><div class="veto-who" id="veto-who-1">–</div></div>
          <div class="veto-img-wrap"><img id="veto-img-1" src="" alt="" /></div>
          <div class="veto-name-bar"><span class="veto-map-name" id="veto-map-1">–</span></div>
        </div>
        <div class="veto-cell pick-a" data-order="2">
          <div class="veto-top"><div class="veto-action pick">PICK</div><div class="veto-who" id="veto-who-2">–</div></div>
          <div class="veto-img-wrap"><img id="veto-img-2" src="" alt="" /></div>
          <div class="veto-name-bar"><span class="veto-map-name" id="veto-map-2">–</span></div>
        </div>
        <div class="veto-cell pick-b" data-order="3">
          <div class="veto-top"><div class="veto-action pick">PICK</div><div class="veto-who" id="veto-who-3">–</div></div>
          <div class="veto-img-wrap"><img id="veto-img-3" src="" alt="" /></div>
          <div class="veto-name-bar"><span class="veto-map-name" id="veto-map-3">–</span></div>
        </div>
        <div class="veto-cell banned" data-order="4">
          <div class="veto-top"><div class="veto-action ban">BAN</div><div class="veto-who" id="veto-who-4">–</div></div>
          <div class="veto-img-wrap"><img id="veto-img-4" src="" alt="" /></div>
          <div class="veto-name-bar"><span class="veto-map-name" id="veto-map-4">–</span></div>
        </div>
        <div class="veto-cell banned" data-order="5">
          <div class="veto-top"><div class="veto-action ban">BAN</div><div class="veto-who" id="veto-who-5">–</div></div>
          <div class="veto-img-wrap"><img id="veto-img-5" src="" alt="" /></div>
          <div class="veto-name-bar"><span class="veto-map-name" id="veto-map-5">–</span></div>
        </div>
        <div class="veto-cell decider-cell" data-order="6">
          <div class="veto-top"><div class="veto-action decider">DECIDER</div><div class="veto-who" id="veto-who-6">자동</div></div>
          <div class="veto-img-wrap"><img id="veto-img-6" src="" alt="" /></div>
          <div class="veto-name-bar"><span class="veto-map-name" id="veto-map-6">–</span></div>
        </div>
      </div>

    </div><!-- /score1 wrap -->

    <!-- ② SCORE2 (임시 이미지) -->
    <div class="img-overlay-wrap">
      <img class="bg-img" src="./images/balakdae_score2.png" alt="" />
    </div>

  </div>

  <script src="./auth.js" defer></script>
  <script>
    var _p        = new URLSearchParams(location.search);
    var TEAM_A    = decodeURIComponent(_p.get('teamA') || '슬롯1');
    var TEAM_B    = decodeURIComponent(_p.get('teamB') || '슬롯2');
    var MATCH_DATE= _p.get('date') || '';
    var MATCH_FROM= _p.get('from') || 'scrim';
    var MATCH_ID  = _p.get('match') || '';

    document.getElementById('nav-back').href        = './ballakdae-scrim.html';
    document.getElementById('nav-back').textContent = '공식 스크림';

    document.querySelectorAll('.sb-name-a').forEach(el => el.textContent = TEAM_A);
    document.querySelectorAll('.sb-name-b').forEach(el => el.textContent = TEAM_B);
    if (MATCH_DATE) document.getElementById('match-date').textContent = MATCH_DATE;

    var vetoWho = ['a','b','a','b','a','b',null];
    vetoWho.forEach(function(who, i) {
      var el = document.getElementById('veto-who-' + i);
      if (!el) return;
      if (who === 'a') el.textContent = TEAM_A;
      else if (who === 'b') el.textContent = TEAM_B;
    });

    function isAdmin() { return typeof window.vctIsAdmin === 'function' && window.vctIsAdmin(); }
  </script>
</body>
</html>
