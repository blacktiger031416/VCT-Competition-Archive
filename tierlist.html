<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>티어리스트 게시판 — VCT Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@400;500;600;700&family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet" />
  <script src="./auth.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0c1117; color: #fff; font-family: 'Barlow', 'Noto Sans KR', sans-serif; min-height: 100vh; }

    /* ── Site Header ── */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 16px;
      padding: 0 24px; height: 52px;
      background: rgba(10,14,22,0.92); border-bottom: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    .home-link { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:900; letter-spacing:.08em; text-transform:uppercase; color:#fff; text-decoration:none; }
    .back-link  { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:rgba(255,255,255,0.35); text-decoration:none; transition:color .15s; }
    .back-link:hover { color:rgba(255,255,255,0.75); }

    /* ── Layout ── */
    .page-wrap { max-width: 960px; margin: 0 auto; padding: 32px 24px 100px; }

    /* ── Admin only ── */
    .admin-only { display: none; }
    body:not(.view-only) .admin-only { display: flex; gap: 8px; align-items: center; }

    /* ── Buttons ── */
    .tl-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 0 16px; height: 34px; border-radius: 4px; border: 1px solid transparent;
      font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 800;
      letter-spacing: .14em; text-transform: uppercase; cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .tl-btn-ghost   { background:rgba(255,255,255,0.05); border-color:rgba(255,255,255,0.12); color:rgba(255,255,255,0.55); }
    .tl-btn-ghost:hover { background:rgba(255,255,255,0.09); color:#fff; }
    .tl-btn-primary { background:#e8432d; color:#fff; }
    .tl-btn-primary:hover { background:#d43520; }
    .tl-btn-success { background:rgba(30,210,100,0.15); border-color:rgba(61,220,132,0.3); color:#3ddc84; }
    .tl-btn-success:hover { background:rgba(30,210,100,0.25); }
    .tl-btn-danger  { background:rgba(180,30,30,0.6); border-color:rgba(220,50,50,0.3); color:#ff9090; }
    .tl-btn-danger:hover { background:rgba(200,30,30,0.85); color:#fff; }
    .tl-btn-sm {
      padding:0 10px; height:28px; border-radius:3px; border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.5);
      font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:800;
      letter-spacing:.12em; text-transform:uppercase; cursor:pointer; transition:all .15s;
    }
    .tl-btn-sm:hover { background:rgba(255,255,255,0.12); color:#fff; }
    .tl-btn-icon {
      width:28px; height:28px; padding:0; display:grid; place-items:center;
      border-radius:3px; border:1px solid rgba(255,255,255,0.1);
      background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.35);
      font-size:12px; cursor:pointer; transition:all .12s;
    }
    .tl-btn-icon:hover { background:rgba(255,255,255,0.1); color:#fff; }
    .tl-btn-icon-danger { border-color:rgba(220,50,50,0.2); background:rgba(180,30,30,0.1); color:rgba(255,100,100,0.45); }
    .tl-btn-icon-danger:hover { background:rgba(200,30,30,0.4); color:#ff9090; }

    /* ── Status badges ── */
    .status-badge {
      padding:3px 10px; border-radius:3px; border:1px solid transparent;
      font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:800; letter-spacing:.15em; text-transform:uppercase;
    }
    .status-open   { background:rgba(30,210,100,0.12); border-color:rgba(61,220,132,0.3); color:#3ddc84; }
    .status-closed { background:rgba(255,100,50,0.1);  border-color:rgba(255,100,50,0.25); color:#ff8c69; }
    .status-draft  { background:rgba(255,255,255,0.05); border-color:rgba(255,255,255,0.1); color:rgba(255,255,255,0.35); }

    /* ═══════════════════════════════════════════════
       LIST VIEW
    ═══════════════════════════════════════════════ */
    #view-list { }

    .list-hdr {
      display:flex; align-items:center; gap:14px; margin-bottom:28px;
    }
    .list-title {
      font-family:'Barlow Condensed',sans-serif; font-size:26px; font-weight:900;
      letter-spacing:.06em; text-transform:uppercase; color:#fff; flex:1;
    }

    .events-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px;
    }
    .event-card {
      border:1px solid rgba(255,255,255,0.08); border-radius:8px;
      background:rgba(255,255,255,0.02); overflow:hidden;
      display:flex; flex-direction:column; transition:border-color .15s;
    }
    .event-card:hover { border-color:rgba(255,255,255,0.14); }
    .event-card-body {
      padding:18px 18px 14px; flex:1;
    }
    .event-card-top {
      display:flex; align-items:flex-start; gap:10px; margin-bottom:10px;
    }
    .event-card-title {
      font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:800;
      letter-spacing:.04em; color:#fff; flex:1; line-height:1.3;
    }
    .event-card-meta {
      font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700;
      letter-spacing:.08em; color:rgba(255,255,255,0.3); margin-bottom:14px;
    }
    .event-card-footer {
      display:flex; align-items:center; gap:8px;
      padding:12px 18px; border-top:1px solid rgba(255,255,255,0.05);
      background:rgba(0,0,0,0.15);
    }
    .event-card-enter {
      flex:1; padding:0 18px; height:36px; border:none; border-radius:4px;
      background:#e8432d; color:#fff;
      font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:800;
      letter-spacing:.14em; text-transform:uppercase; cursor:pointer; transition:background .15s;
      text-decoration:none; display:inline-flex; align-items:center; justify-content:center;
    }
    .event-card-enter:hover { background:#d43520; }
    .event-card-enter.view-only-enter {
      background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.5);
      border:1px solid rgba(255,255,255,0.1);
    }
    .event-card-enter.view-only-enter:hover { background:rgba(255,255,255,0.1); color:#fff; }

    .no-events {
      padding:60px 24px; text-align:center;
      border:1px dashed rgba(255,255,255,0.09); border-radius:8px;
      font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700;
      letter-spacing:.08em; text-transform:uppercase; color:rgba(255,255,255,0.2);
    }

    /* ═══════════════════════════════════════════════
       DETAIL VIEW
    ═══════════════════════════════════════════════ */
    #view-detail { display:none; }

    .detail-nav {
      display:flex; align-items:center; gap:12px; margin-bottom:24px;
    }
    .detail-back {
      font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700;
      letter-spacing:.1em; text-transform:uppercase; color:rgba(255,255,255,0.35);
      cursor:pointer; text-decoration:none; transition:color .15s;
    }
    .detail-back:hover { color:rgba(255,255,255,0.75); }
    .detail-hdr {
      display:flex; align-items:center; gap:12px; margin-bottom:22px;
    }
    .detail-title {
      font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:800;
      letter-spacing:.05em; color:rgba(255,255,255,0.85); flex:1;
    }

    /* Tier rows */
    .tier-row {
      display:flex; align-items:stretch; border:1px solid rgba(255,255,255,0.07);
      border-radius:5px; margin-bottom:5px; min-height:76px; transition:box-shadow .15s;
    }
    .tier-row.drag-over { box-shadow:0 0 0 2px rgba(232,67,45,0.5); border-color:transparent; }
    .tier-label {
      width:88px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
      border-radius:4px 0 0 4px; padding:8px 6px;
    }
    .tier-label-text {
      font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:900;
      letter-spacing:.06em; text-transform:uppercase; text-align:center; line-height:1.3; word-break:break-word;
    }
    .tier-items {
      flex:1; display:flex; flex-wrap:wrap; align-items:center;
      gap:6px; padding:8px 10px; background:rgba(255,255,255,0.02);
    }
    .tier-controls {
      display:flex; flex-direction:column; justify-content:center;
      gap:3px; padding:6px 5px; background:rgba(0,0,0,0.25); border-radius:0 4px 4px 0;
    }
    .tier-ctrl-btn {
      width:26px; height:26px; border-radius:3px; border:1px solid rgba(255,255,255,0.08);
      background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.3);
      font-size:12px; cursor:pointer; display:grid; place-items:center; transition:all .12s;
    }
    .tier-ctrl-btn:hover { background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.85); }

    /* Team card */
    .team-card {
      width:70px; flex-shrink:0; display:flex; flex-direction:column; align-items:center;
      gap:4px; padding:6px 4px; border-radius:4px; border:1px solid rgba(255,255,255,0.08);
      background:rgba(255,255,255,0.04); cursor:grab; user-select:none; transition:all .12s;
    }
    .team-card:hover { background:rgba(255,255,255,0.09); border-color:rgba(255,255,255,0.18); }
    .team-card.dragging { opacity:.35; }
    .team-card img { width:42px; height:42px; object-fit:contain; }
    .team-card .tc-name {
      font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700;
      letter-spacing:.04em; text-transform:uppercase; color:rgba(255,255,255,0.55);
      text-align:center; line-height:1.2; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }

    /* Pool */
    .pool-section { margin-top:14px; }
    .pool-label {
      font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:800;
      letter-spacing:.18em; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-bottom:10px;
    }
    #pool-grid {
      display:flex; flex-wrap:wrap; gap:7px; min-height:64px; padding:10px 12px;
      border-radius:6px; border:1px dashed rgba(255,255,255,0.1);
      background:rgba(0,0,0,0.15); transition:box-shadow .15s;
    }
    #pool-grid.drag-over { box-shadow:0 0 0 2px rgba(120,180,255,0.4); border-color:transparent; }
    #pool-grid:empty::after {
      content:"모든 팀이 배치됨"; color:rgba(255,255,255,0.15); align-self:center;
      font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700;
      letter-spacing:.1em; text-transform:uppercase;
    }

    /* Submit */
    .submit-row { display:flex; align-items:center; gap:14px; margin-top:20px; }
    .tl-submit-btn {
      padding:0 32px; height:44px; border:none; border-radius:4px;
      background:#e8432d; color:#fff; font-family:'Barlow Condensed',sans-serif;
      font-size:14px; font-weight:800; letter-spacing:.18em; text-transform:uppercase;
      cursor:pointer; transition:background .15s;
    }
    .tl-submit-btn:hover { background:#d43520; }
    .tl-submit-btn:disabled { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.25); cursor:not-allowed; }
    .submit-hint { font-family:'Barlow','Noto Sans KR',sans-serif; font-size:13px; color:rgba(255,255,255,0.3); }

    /* Board */
    .board-section { padding-top:32px; border-top:1px solid rgba(255,255,255,0.07); margin-top:32px; }
    .board-hdr { display:flex; align-items:center; gap:12px; margin-bottom:18px; }
    .board-title {
      font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:900;
      letter-spacing:.06em; text-transform:uppercase; color:rgba(255,255,255,0.7);
    }
    .board-count { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:.08em; color:rgba(255,255,255,0.25); }
    .board-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; }
    .board-empty {
      padding:36px; text-align:center; font-family:'Barlow Condensed',sans-serif;
      font-size:13px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:rgba(255,255,255,0.18);
    }

    /* Board card */
    .board-card { border:1px solid rgba(255,255,255,0.07); border-radius:6px; background:rgba(255,255,255,0.02); overflow:hidden; transition:border-color .15s; }
    .board-card:hover { border-color:rgba(255,255,255,0.12); }
    .board-card-hdr { display:flex; align-items:center; gap:8px; padding:9px 12px; background:rgba(255,255,255,0.03); border-bottom:1px solid rgba(255,255,255,0.05); }
    .bc-user { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:800; letter-spacing:.06em; color:rgba(255,255,255,0.75); flex:1; }
    .bc-time { font-family:'Barlow',sans-serif; font-size:11px; color:rgba(255,255,255,0.22); }
    .bc-del { width:22px; height:22px; display:grid; place-items:center; border:1px solid rgba(220,50,50,0.2); border-radius:3px; background:rgba(180,30,30,0.1); color:rgba(255,100,100,0.45); font-size:11px; cursor:pointer; transition:all .12s; }
    .bc-del:hover { background:rgba(200,30,30,0.4); color:#ff9090; }
    .board-card-body { padding:8px 10px; }
    .mini-tier-row { display:flex; align-items:center; gap:5px; margin-bottom:3px; }
    .mini-tier-label { width:60px; flex-shrink:0; height:26px; border-radius:2px; display:flex; align-items:center; justify-content:center; font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:900; letter-spacing:.04em; text-transform:uppercase; overflow:hidden; }
    .mini-tier-teams { display:flex; flex-wrap:wrap; gap:2px; }
    .mini-logo { width:26px; height:26px; object-fit:contain; border-radius:2px; background:rgba(255,255,255,0.04); }

    /* ── Config Modal ── */
    .tl-overlay { position:fixed; inset:0; z-index:9500; display:flex; align-items:center; justify-content:center; }
    .tl-backdrop { position:absolute; inset:0; background:rgba(5,8,15,0.8); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); }
    .tl-panel {
      position:relative; z-index:1; width:min(560px,calc(100vw - 32px)); max-height:calc(100vh - 80px);
      background:#111a28; border:1px solid rgba(255,255,255,0.09); border-radius:8px;
      box-shadow:0 32px 96px rgba(0,0,0,0.7); display:flex; flex-direction:column; overflow:hidden;
      animation:panelIn .22s cubic-bezier(0.16,1,0.3,1);
    }
    @keyframes panelIn { from{opacity:0;transform:translateY(14px) scale(0.97)} to{opacity:1;transform:none} }
    .tl-panel-hdr { display:flex; align-items:center; justify-content:space-between; padding:18px 20px 16px; border-bottom:1px solid rgba(255,255,255,0.06); flex-shrink:0; }
    .tl-panel-hdr h2 { font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:900; letter-spacing:.1em; text-transform:uppercase; color:#fff; }
    .tl-panel-close { width:28px; height:28px; display:grid; place-items:center; border:1px solid rgba(255,255,255,0.08); border-radius:3px; background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.35); font-size:14px; cursor:pointer; transition:all .12s; }
    .tl-panel-close:hover { background:rgba(255,255,255,0.1); color:#fff; }
    .tl-panel-body { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:20px; }
    .tl-panel-body::-webkit-scrollbar { width:5px; }
    .tl-panel-body::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); border-radius:3px; }
    .cfg-field { display:flex; flex-direction:column; gap:8px; }
    .cfg-label { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:800; letter-spacing:.22em; text-transform:uppercase; color:rgba(255,255,255,0.35); }
    .cfg-input { height:38px; padding:0 12px; width:100%; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:4px; color:#fff; outline:none; font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:600; transition:border-color .15s; }
    .cfg-input:focus { border-color:rgba(232,67,45,0.5); }
    .cfg-count-row { display:flex; gap:8px; align-items:center; }
    .cfg-count-row .cfg-input { width:70px; }
    .cfg-tier-item { display:flex; align-items:center; gap:8px; padding:7px 10px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:4px; margin-bottom:4px; }
    .cfg-tier-color { width:30px; height:30px; border-radius:4px; border:2px solid rgba(255,255,255,0.15); cursor:pointer; flex-shrink:0; background:none; padding:0; }
    .cfg-tier-name { flex:1; height:30px; padding:0 10px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:3px; color:#fff; outline:none; font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; }
    .cfg-tier-name:focus { border-color:rgba(232,67,45,0.4); }
    .cfg-team-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(68px,1fr)); gap:6px; }
    .cfg-team-item { display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 4px; border-radius:5px; cursor:pointer; border:2px solid rgba(255,255,255,0.07); background:rgba(255,255,255,0.03); transition:all .12s; }
    .cfg-team-item:hover { background:rgba(255,255,255,0.07); }
    .cfg-team-item.sel { border-color:#e8432d; background:rgba(232,67,45,0.08); }
    .cfg-team-item img { width:38px; height:38px; object-fit:contain; }
    .cfg-team-item .ctn { font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:rgba(255,255,255,0.45); text-align:center; line-height:1.2; }
    .cfg-team-item.sel .ctn { color:rgba(255,255,255,0.8); }
    .cfg-actions { display:flex; gap:8px; flex-wrap:wrap; padding-top:2px; }

    /* Tier popover */
    .tier-popover { position:absolute; top:0; right:34px; z-index:200; display:flex; align-items:center; gap:6px; padding:6px 10px; border-radius:5px; background:#1a2436; border:1px solid rgba(255,255,255,0.12); box-shadow:0 8px 32px rgba(0,0,0,0.5); animation:panelIn .15s cubic-bezier(0.16,1,0.3,1); }
    .tier-popover input[type=color] { width:28px; height:28px; border-radius:3px; border:1px solid rgba(255,255,255,0.15); cursor:pointer; padding:1px; }
    .tier-popover input[type=text] { height:28px; padding:0 8px; width:110px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:3px; color:#fff; outline:none; font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; }
    .tier-popover button { height:28px; padding:0 8px; border-radius:3px; background:#e8432d; border:none; color:#fff; font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; }

    /* Toast */
    #tl-toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); padding:10px 20px; border-radius:5px; background:rgba(30,210,100,0.15); border:1px solid rgba(61,220,132,0.3); color:#3ddc84; font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; pointer-events:none; opacity:0; transition:opacity .25s; z-index:9999; }
    #tl-toast.show { opacity:1; }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="home-link" href="./index.html">VCT Archive</a>
    <a class="back-link" href="./index.html">← 홈</a>
  </header>

  <div class="page-wrap">
    <!-- ══ LIST VIEW ══ -->
    <div id="view-list">
      <div class="list-hdr">
        <h1 class="list-title">티어리스트 게시판</h1>
        <div class="admin-only">
          <button class="tl-btn tl-btn-primary" id="btn-new">+ 새 티어리스트 만들기</button>
        </div>
      </div>
      <div id="events-grid" class="events-grid"></div>
    </div>

    <!-- ══ DETAIL VIEW ══ -->
    <div id="view-detail">
      <div class="detail-nav">
        <a class="detail-back" id="btn-back" href="./tierlist.html">← 목록으로</a>
      </div>
      <div class="detail-hdr">
        <span class="detail-title" id="detail-title"></span>
        <span class="status-badge" id="detail-status"></span>
        <div class="admin-only" id="detail-admin-bar" style="gap:8px">

    var IS_ADMIN    = !!(USER && USER.role === "admin");

    /* ── 상태 ───────────────────────────────────────── */
    var events   = [];   // 이벤트 목록
    var curEvt   = null; // 현재 상세 이벤트
    var posts    = [];   // 현재 이벤트 게시물

    var editingId = null; // 수정 중인 이벤트 id

    /* ── URL 파싱 ───────────────────────────────────── */
    var urlId = new URLSearchParams(location.search).get("id");

    /* ── 초기화 ─────────────────────────────────────── */
    async function init() {
      if (urlId) {
        await loadDetail(urlId);
      } else {
        await loadList();
      }
      setupSSE();
    }

    /* ══ LIST VIEW ══════════════════════════════════ */
    async function loadList() {
      try {
        var r = await fetch("/api/tierlist/events");
        events = await r.json();
      } catch(e) { events = []; }
      showView("list");
      renderList();
    }

    function renderList() {
      var grid = document.getElementById("events-grid");
      if (!events.length) {
        grid.innerHTML = '<div class="no-events">아직 티어리스트가 없습니다.<br>Admin이 새 티어리스트를 만들면 여기에 표시됩니다.</div>';
        return;
      }
      grid.innerHTML = "";
      events.forEach(function(evt) {
        grid.appendChild(makeEventCard(evt));
      });
    }

    function makeEventCard(evt) {
      var card = document.createElement("div");
      card.className = "event-card";
      var sc = evt.status === "open" ? "status-open" : evt.status === "closed" ? "status-closed" : "status-draft";
      var st = evt.status === "open" ? "참여 중" : evt.status === "closed" ? "종료" : "준비 중";
      var meta = (evt.teams ? evt.teams.length : 0) + "개 팀 · " +
                 (evt.tiers ? evt.tiers.length : 0) + "개 티어 · " +
                 (evt.postCount || 0) + "개 게시물";

      var enterLabel = evt.status === "open" ? "참여하기" : "보기";
      var enterClass = evt.status === "open" ? "" : "view-only-enter";

      card.innerHTML =
        '<div class="event-card-body">' +
          '<div class="event-card-top">' +
            '<span class="event-card-title">' + escHtml(evt.title || "제목 없음") + '</span>' +
            '<span class="status-badge ' + sc + '">' + st + '</span>' +
          '</div>' +
          '<div class="event-card-meta">' + meta + '</div>' +
        '</div>' +
        '<div class="event-card-footer">' +
          '<a class="event-card-enter ' + enterClass + '" href="./tierlist.html?id=' + escHtml(evt.id) + '">' + enterLabel + '</a>' +
          (IS_ADMIN
            ? '<button class="tl-btn-icon" data-edit="' + escHtml(evt.id) + '" title="설정">⚙</button>' +
              '<button class="tl-btn-icon tl-btn-icon-danger" data-del="' + escHtml(evt.id) + '" title="삭제">✕</button>'
            : '') +
        '</div>';

      if (IS_ADMIN) {
        card.querySelector("[data-edit]").addEventListener("click", function() {
          openCfgModal(evt);
        });
        card.querySelector("[data-del]").addEventListener("click", async function() {
          if (!confirm('"' + evt.title + '" 티어리스트를 삭제하시겠습니까?\n게시물도 모두 삭제됩니다.')) return;
          await deleteEvent(evt.id);
        });
      }
      return card;
    }

    async function deleteEvent(id) {
      try {
        var r = await fetch("/api/tierlist/events/" + id, {
          method: "DELETE", headers: { "Authorization": "Bearer " + TOKEN }
        });
        var d = await r.json();
        if (d.ok) {
          events = events.filter(function(e){ return e.id !== id; });
          renderList();
          showToast("삭제됨");
        } else { alert(d.error || "삭제 실패"); }
      } catch(e) { alert("서버 오류"); }
    }

    /* ══ DETAIL VIEW ══════════════════════════════ */
    async function loadDetail(id) {
      try {
        var [evtsRes, postsRes] = await Promise.all([
          fetch("/api/tierlist/events"),
          fetch("/api/tierlist/events/" + id + "/posts"),
        ]);
        events = await evtsRes.json();
        posts  = await postsRes.json();
      } catch(e) { events = []; posts = []; }

      curEvt = events.find(function(e){ return e.id === id; }) || null;
      if (!curEvt) { location.href = "./tierlist.html"; return; }

      /* 내 기존 게시물 로드 */
      if (IS_LOGGED_IN) {
        var mine = posts.find(function(p){ return p.username === USER.username; });
        if (mine) {
          tierData = JSON.parse(JSON.stringify(mine.tierData));
        } else {
          initEmptyTierData();
        }
      } else {
        initEmptyTierData();
      }

      showView("detail");
      renderDetail();
    }

    function initEmptyTierData() {
      tierData = {};
      if (curEvt && curEvt.tiers) curEvt.tiers.forEach(function(t){ tierData[t.name] = []; });
    }

    function renderDetail() {
      if (!curEvt) return;

      /* 헤더 */
      document.getElementById("detail-title").textContent = curEvt.title || "티어리스트";
      var sb = document.getElementById("detail-status");
      var sc = curEvt.status === "open" ? "status-open" : curEvt.status === "closed" ? "status-closed" : "status-draft";
      var st = curEvt.status === "open" ? "참여 중" : curEvt.status === "closed" ? "종료" : "준비 중";
      sb.className = "status-badge " + sc; sb.textContent = st;

      /* Admin 상태 토글 버튼 */
      var tb = document.getElementById("btn-toggle-status");
      if (curEvt.status === "open") {
        tb.textContent = "마감"; tb.className = "tl-btn tl-btn-danger";
      } else {
        tb.textContent = "공개"; tb.className = "tl-btn tl-btn-success";
      }

      renderWorkspace();
      renderBoard();
    }

    function renderWorkspace() {
      var ws = document.getElementById("workspace");
      if (!curEvt || curEvt.status !== "open") { ws.style.display = "none"; return; }
      ws.style.display = "";

      /* 배치된 팀 */
      var placed = [];
      Object.values(tierData).forEach(function(arr){ placed = placed.concat(arr); });

      var tiersEl = document.getElementById("tier-rows");
      tiersEl.innerHTML = "";

      curEvt.tiers.forEach(function(tier, tIdx) {
        var row = document.createElement("div");
        row.className = "tier-row"; row.dataset.tier = tier.name;
        var tc = getTextColor(tier.color);
        var html =
          '<div class="tier-label" style="background:' + tier.color + '">' +
            '<span class="tier-label-text" style="color:' + tc + '">' + escHtml(tier.name) + '</span>' +
          '</div>' +
          '<div class="tier-items" id="ti-' + tIdx + '"></div>';
        if (IS_ADMIN) {
          html +=
            '<div class="tier-controls admin-only" style="position:relative">' +
              '<button class="tier-ctrl-btn" data-cfg="' + tIdx + '">⚙</button>' +
              '<button class="tier-ctrl-btn" data-up="'  + tIdx + '">↑</button>' +
              '<button class="tier-ctrl-btn" data-down="'+ tIdx + '">↓</button>' +
            '</div>';
        }
        row.innerHTML = html;
        tiersEl.appendChild(row);

        var itemsEl = document.getElementById("ti-" + tIdx);
        (tierData[tier.name] || []).forEach(function(t){ itemsEl.appendChild(makeTeamCard(t)); });

        row.addEventListener("dragover", function(e){ e.preventDefault(); row.classList.add("drag-over"); });
        row.addEventListener("dragleave", function(e){ if (!row.contains(e.relatedTarget)) row.classList.remove("drag-over"); });
        row.addEventListener("drop", function(e){
          e.preventDefault(); row.classList.remove("drag-over");
          var t = e.dataTransfer.getData("team"); if (!t) return;
          moveToTier(t, tier.name);
        });
      });

      if (IS_ADMIN) {
        tiersEl.querySelectorAll("[data-cfg]").forEach(function(b){ b.addEventListener("click", function(e){ e.stopPropagation(); openTierPopover(parseInt(b.dataset.cfg), b.parentElement); }); });
        tiersEl.querySelectorAll("[data-up]").forEach(function(b){ b.addEventListener("click", function(){ moveTier(parseInt(b.dataset.up), -1); }); });
        tiersEl.querySelectorAll("[data-down]").forEach(function(b){ b.addEventListener("click", function(){ moveTier(parseInt(b.dataset.down), 1); }); });
      }

      /* Pool */
      var pool = document.getElementById("pool-grid");
      pool.innerHTML = "";
      curEvt.teams.filter(function(t){ return placed.indexOf(t) === -1; })
        .forEach(function(t){ pool.appendChild(makeTeamCard(t)); });
      pool.addEventListener("dragover", function(e){ e.preventDefault(); pool.classList.add("drag-over"); });
      pool.addEventListener("dragleave", function(e){ if (!pool.contains(e.relatedTarget)) pool.classList.remove("drag-over"); });
      pool.addEventListener("drop", function(e){
        e.preventDefault(); pool.classList.remove("drag-over");
        var t = e.dataTransfer.getData("team"); if (!t) return;
        moveToPool(t);
      });

      /* Submit */
      var btn = document.getElementById("btn-submit");
      var hint = document.getElementById("submit-hint");
      if (!IS_LOGGED_IN) {
        btn.disabled = true; hint.textContent = "게시하려면 로그인이 필요합니다.";
      } else {
        btn.disabled = false;
        var mine = posts.find(function(p){ return p.username === USER.username; });
        btn.textContent = mine ? "수정 게시" : "게시하기";
        hint.textContent = "";
      }
    }

    function makeTeamCard(teamName) {
      var card = document.createElement("div");
      card.className = "team-card"; card.draggable = true; card.dataset.team = teamName;
      var logo = TEAM_LOGOS[teamName] || "";
      var code = TEAM_CODES[teamName] || teamName;
      var inv  = LOGO_INVERT[teamName] ? " style=\"filter:brightness(0) invert(1)\"" : "";
      card.innerHTML =
        (logo ? '<img src="' + logo + '" alt=""' + inv + ' onerror="this.style.display=\'none\'">' : '<div style="width:42px;height:42px"></div>') +
        '<span class="tc-name">' + escHtml(code) + '</span>';
      card.addEventListener("dragstart", function(e){ e.dataTransfer.setData("team", teamName); setTimeout(function(){ card.classList.add("dragging"); }, 0); });
      card.addEventListener("dragend", function(){ card.classList.remove("dragging"); });
      return card;
    }

    function moveToTier(teamName, tierName) {
      curEvt.tiers.forEach(function(t){ var a = tierData[t.name]||[]; var i = a.indexOf(teamName); if (i!==-1) a.splice(i,1); tierData[t.name]=a; });
      if (!tierData[tierName]) tierData[tierName] = [];
      tierData[tierName].push(teamName);
      renderWorkspace();
    }
    function moveToPool(teamName) {
      curEvt.tiers.forEach(function(t){ var a = tierData[t.name]||[]; var i = a.indexOf(teamName); if (i!==-1) a.splice(i,1); tierData[t.name]=a; });
      renderWorkspace();
    }
    function moveTier(idx, dir) {
      var t = curEvt.tiers; var tgt = idx + dir;
      if (tgt < 0 || tgt >= t.length) return;
      var tmp = t[idx]; t[idx] = t[tgt]; t[tgt] = tmp;
      saveEvent(curEvt.status, true);
    }
    function openTierPopover(tIdx, parentEl) {
      document.querySelectorAll(".tier-popover").forEach(function(p){ p.remove(); });
      var tier = curEvt.tiers[tIdx];
      var pop = document.createElement("div");
      pop.className = "tier-popover";
      pop.innerHTML = '<input type="color" value="' + tier.color + '" id="pop-color"><input type="text" value="' + escHtml(tier.name) + '" id="pop-name"><button id="pop-save">저장</button>';
      parentEl.appendChild(pop);
      pop.querySelector("#pop-save").addEventListener("click", function(){
        curEvt.tiers[tIdx].color = pop.querySelector("#pop-color").value;
        curEvt.tiers[tIdx].name  = pop.querySelector("#pop-name").value.trim() || tier.name;
        pop.remove(); saveEvent(curEvt.status, true);
      });
      setTimeout(function(){
        document.addEventListener("click", function h(e){ if (!pop.contains(e.target)){ pop.remove(); document.removeEventListener("click",h); } });
      }, 0);
    }

    document.getElementById("btn-submit").addEventListener("click", async function() {
      if (!IS_LOGGED_IN || !curEvt) return;
      var btn = document.getElementById("btn-submit");
      btn.disabled = true; btn.textContent = "게시 중...";
      try {
        var r = await fetch("/api/tierlist/events/" + curEvt.id + "/posts", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + TOKEN },
          body: JSON.stringify({ tierData: tierData }),
        });
        var d = await r.json();
        if (d.ok) {
          showToast("게시 완료!");
          var pr = await fetch("/api/tierlist/events/" + curEvt.id + "/posts");
          posts = await pr.json();
          btn.disabled = false; btn.textContent = "수정 게시";
          renderBoard();
        } else { alert(d.error||"오류"); btn.disabled=false; btn.textContent="게시하기"; }
      } catch(e) { alert("서버 오류"); btn.disabled=false; btn.textContent="게시하기"; }
    });

    document.getElementById("btn-toggle-status").addEventListener("click", async function() {
      if (!curEvt) return;
      var ns = curEvt.status === "open" ? "closed" : "open";
      curEvt.status = ns;
      try {
        await fetch("/api/tierlist/events", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + TOKEN },
          body: JSON.stringify(curEvt),
        });
        showToast(ns === "open" ? "공개됨!" : "마감됨!");
        renderDetail();
      } catch(e) { alert("서버 오류"); }
    });

    function renderBoard() {
      var section = document.getElementById("board-section");
      var grid    = document.getElementById("board-grid");
      var countEl = document.getElementById("board-count");
      if (!curEvt) { section.style.display = "none"; return; }
      section.style.display = "";
      if (!posts.length) {
        grid.innerHTML = '<div class="board-empty">아직 게시된 티어리스트가 없습니다.</div>';
        countEl.textContent = ""; return;
      }
      countEl.textContent = posts.length + "개";
      grid.innerHTML = "";
      posts.forEach(function(p){ grid.appendChild(makeBoardCard(p)); });
    }

    function makeBoardCard(post) {
      var card = document.createElement("div"); card.className = "board-card";
      var t = new Date(post.createdAt);
      var ts = t.getFullYear() + "/" + (t.getMonth()+1) + "/" + t.getDate() +
               " " + String(t.getHours()).padStart(2,"0") + ":" + String(t.getMinutes()).padStart(2,"0");
      var canDel = IS_ADMIN || (IS_LOGGED_IN && USER.username === post.username);
      var hdr =
        '<div class="board-card-hdr"><span class="bc-user">' + escHtml(post.username) + '</span>' +
        '<span class="bc-time">' + ts + '</span>' +
        (canDel ? '<button class="bc-del" data-u="' + escHtml(post.username) + '">✕</button>' : '') + '</div>';
      var body = '<div class="board-card-body">';
      curEvt.tiers.forEach(function(tier){
        var teams = (post.tierData && post.tierData[tier.name]) || [];
        var tc = getTextColor(tier.color);
        var logos = teams.map(function(t){
          var logo = TEAM_LOGOS[t] || ""; var inv = LOGO_INVERT[t] ? " style=\"filter:brightness(0) invert(1)\"" : "";
          return logo ? '<img class="mini-logo" src="' + logo + '" title="' + escHtml(t) + '"' + inv + '>' : "";
        }).join("");
        body += '<div class="mini-tier-row"><div class="mini-tier-label" style="background:' + tier.color + ';color:' + tc + '">' + escHtml(tier.name) + '</div><div class="mini-tier-teams">' + logos + '</div></div>';
      });
      body += '</div>';
      card.innerHTML = hdr + body;
      var delBtn = card.querySelector(".bc-del");
      if (delBtn) delBtn.addEventListener("click", async function(){
        var u = delBtn.dataset.u;
        if (!confirm(u + "의 게시물을 삭제하시겠습니까?")) return;
        try {
          var r = await fetch("/api/tierlist/events/" + curEvt.id + "/posts/" + encodeURIComponent(u), {
            method:"DELETE", headers:{"Authorization":"Bearer " + TOKEN}
          });
          var d = await r.json();
          if (d.ok) { posts = posts.filter(function(p){ return p.username !== u; }); renderBoard(); }
          else alert(d.error||"삭제 실패");
        } catch(e) { alert("서버 오류"); }
      });
      return card;
    }

    /* ══ CONFIG MODAL ════════════════════════════════ */
    function openCfgModal(evt) {
      editingId = evt ? evt.id : null;
      document.getElementById("cfg-modal-title").textContent = evt ? "티어리스트 수정" : "새 티어리스트";
      document.getElementById("cfg-end").style.display = evt ? "" : "none";
      var cur = evt || {
        title:"", status:"draft",
        tiers: DEFAULT_TIER_NAMES.slice(0,5).map(function(n,i){ return {name:n,color:DEFAULT_TIER_COLORS[i]}; }),
        teams:[],
      };
      document.getElementById("cfg-title").value = cur.title || "";
      document.getElementById("cfg-tier-count").value = cur.tiers.length;
      renderCfgTiers(cur.tiers);
      renderCfgTeams(cur.teams || []);
      document.getElementById("cfg-modal").style.display = "flex";
    }
    function closeCfgModal() { document.getElementById("cfg-modal").style.display = "none"; }

    function renderCfgTiers(tiers) {
      var n = Math.min(8, Math.max(2, parseInt(document.getElementById("cfg-tier-count").value)||5));
      var c = document.getElementById("cfg-tier-list"); c.innerHTML = "";
      for (var i = 0; i < n; i++) {
        var t = tiers[i] || {name:DEFAULT_TIER_NAMES[i]||("Tier "+(i+1)),color:DEFAULT_TIER_COLORS[i]||"#576574"};
        var item = document.createElement("div"); item.className = "cfg-tier-item";
        item.innerHTML = '<input type="color" class="cfg-tier-color" value="' + t.color + '"><input type="text" class="cfg-tier-name" value="' + escHtml(t.name) + '" placeholder="티어 이름">';
        c.appendChild(item);
      }
    }
    function renderCfgTeams(selected) {
      var grid = document.getElementById("cfg-team-grid"); grid.innerHTML = "";
      Object.keys(TEAM_LOGOS).forEach(function(name){
        var item = document.createElement("div");
        item.className = "cfg-team-item" + (selected.indexOf(name)!==-1?" sel":"");
        item.dataset.team = name;
        var logo = TEAM_LOGOS[name]; var code = TEAM_CODES[name]||name;
        var inv = LOGO_INVERT[name] ? " style=\"filter:brightness(0) invert(1)\"" : "";
        item.innerHTML = '<img src="' + logo + '" alt=""' + inv + '><span class="ctn">' + escHtml(code) + '</span>';
        item.addEventListener("click", function(){ item.classList.toggle("sel"); });
        grid.appendChild(item);
      });
    }
    function getCfgData() {
      var tiers = []; document.querySelectorAll(".cfg-tier-item").forEach(function(item){
        var name = item.querySelector(".cfg-tier-name").value.trim();
        var color = item.querySelector(".cfg-tier-color").value;
        if (name) tiers.push({name:name,color:color});
      });
      var teams = []; document.querySelectorAll(".cfg-team-item.sel").forEach(function(item){ teams.push(item.dataset.team); });
      return {tiers:tiers, teams:teams};
    }

    async function saveEvent(statusOverride, silent) {
      var title = (document.getElementById("cfg-title")||{}).value;
      var d = getCfgData();
      var tiers = d.tiers, teams = d.teams;

      if (silent && curEvt) {
        /* inline tier reorder/rename: patch curEvt directly */
        curEvt.tiers = curEvt.tiers; // already mutated
        await fetch("/api/tierlist/events", {
          method:"POST",
          headers:{"Content-Type":"application/json","Authorization":"Bearer "+TOKEN},
          body:JSON.stringify(curEvt)
        });
        renderDetail();
        return;
      }

      title = (title||"").trim();
      var status = statusOverride !== undefined ? statusOverride : (editingId && curEvt ? curEvt.status : "draft");

      if (!title)        { alert("제목을 입력해 주세요."); return; }
      if (!tiers.length) { alert("티어를 추가해 주세요."); return; }
      if (!teams.length) { alert("팀을 하나 이상 선택해 주세요."); return; }

      var evt = { id: editingId || null, title:title, tiers:tiers, teams:teams, status:status, createdAt: (editingId && curEvt ? curEvt.createdAt : new Date().toISOString()) };

      try {
        var r = await fetch("/api/tierlist/events", {
          method:"POST",
          headers:{"Content-Type":"application/json","Authorization":"Bearer "+TOKEN},
          body:JSON.stringify(evt)
        });
        var res = await r.json();
        if (res.ok) {
          evt.id = res.id;
          closeCfgModal();
          showToast(status==="open"?"공개됨!":status==="closed"?"마감됨!":"저장됨!");
          if (urlId) {
            /* 상세 페이지에서 수정 */
            curEvt = evt;
            renderDetail();
          } else {
            /* 목록에서 새로 만들기/수정 */
            var idx = events.findIndex(function(e){ return e.id === evt.id; });
            if (idx >= 0) events[idx] = evt; else events.unshift(evt);
            renderList();
          }
        } else { alert(res.error||"저장 실패"); }
      } catch(e) { alert("서버 오류"); }
    }

    document.getElementById("btn-new").addEventListener("click", function(){ openCfgModal(null); });
    document.getElementById("btn-edit-evt").addEventListener("click", function(){ if (curEvt) openCfgModal(curEvt); });
    document.getElementById("btn-del-evt").addEventListener("click", async function() {
      if (!curEvt) return;
      if (!confirm('"' + curEvt.title + '" 티어리스트를 삭제하시겠습니까?\n게시물도 모두 삭제됩니다.')) return;
      try {
        var r = await fetch("/api/tierlist/events/" + curEvt.id, {
          method: "DELETE", headers: { "Authorization": "Bearer " + TOKEN }
        });
        var d = await r.json();
        if (d.ok) { location.href = "./tierlist.html"; }
        else { alert(d.error || "삭제 실패"); }
      } catch(e) { alert("서버 오류"); }
    });
    document.getElementById("cfg-close-btn").addEventListener("click", closeCfgModal);
    document.getElementById("cfg-backdrop").addEventListener("click", closeCfgModal);
    document.getElementById("btn-apply-count").addEventListener("click", function(){
      var cur = []; document.querySelectorAll(".cfg-tier-item").forEach(function(item){
        cur.push({name:item.querySelector(".cfg-tier-name").value, color:item.querySelector(".cfg-tier-color").value});
      });
      renderCfgTiers(cur);
    });
    document.getElementById("cfg-save-draft").addEventListener("click", function(){ saveEvent("draft"); });
    document.getElementById("cfg-publish").addEventListener("click", function(){ saveEvent("open"); });
    document.getElementById("cfg-end").addEventListener("click", function(){ saveEvent("closed"); });

    /* ── SSE ─────────────────────────────────────── */
    function setupSSE() {
      var es = new EventSource("/api/events");
      es.onmessage = function(e) {
        try {
          var msg = JSON.parse(e.data);
          if (msg.type === "tl-event-update") {
            var idx = events.findIndex(function(ev){ return ev.id === msg.event.id; });
            if (idx >= 0) events[idx] = msg.event; else events.unshift(msg.event);
            if (urlId === msg.event.id) { curEvt = msg.event; renderDetail(); }
            else if (!urlId) renderList();
          } else if (msg.type === "tl-event-delete") {
            events = events.filter(function(ev){ return ev.id !== msg.id; });
            if (urlId === msg.id) location.href = "./tierlist.html";
            else if (!urlId) renderList();
          } else if (msg.type === "tl-post" && urlId === msg.eventId) {
            var pi = posts.findIndex(function(p){ return p.username === msg.post.username; });
            if (pi >= 0) posts[pi] = msg.post; else posts.unshift(msg.post);
            renderBoard();
          } else if (msg.type === "tl-delete" && urlId === msg.eventId) {
            posts = posts.filter(function(p){ return p.username !== msg.username; });
            renderBoard();
          }
        } catch(_) {}
      };
    }

    /* ── View switch ─────────────────────────────── */
    function showView(v) {
      document.getElementById("view-list").style.display   = v === "list"   ? "" : "none";
      document.getElementById("view-detail").style.display = v === "detail" ? "" : "none";
    }

    /* ── Toast ───────────────────────────────────── */
    var _tt = null;
    function showToast(msg) {
      var el = document.getElementById("tl-toast"); el.textContent = msg; el.classList.add("show");
      clearTimeout(_tt); _tt = setTimeout(function(){ el.classList.remove("show"); }, 2200);
    }

    /* ── Utils ───────────────────────────────────── */
    function escHtml(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
    function getTextColor(hex) {
      if (!hex||hex.length<7) return "#000";
      var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
      return ((0.299*r+0.587*g+0.114*b)/255)>0.55?"#000":"#fff";
    }

    init();
  })();
  </script>
</body>
</html>
