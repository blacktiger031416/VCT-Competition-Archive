<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VCT 기록 — 시즌 스탯</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      a { color: inherit; text-decoration: none; }

      body {
        min-height: 100vh;
        font-family: "Noto Sans KR", system-ui, sans-serif;
        color: #f0f0f0;
        background: #0a0a0c;
      }

      /* ── HEADER ─────────────────────────────── */
      .site-header {
        display: flex; align-items: center; justify-content: space-between;
        gap: 20px; padding: 0 32px; height: 56px;
        background: rgba(10,10,12,0.92);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        position: sticky; top: 0; z-index: 100;
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      }
      .home-link { font-size: 15px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.55); transition: color 0.15s; }
      .home-link:hover { color: #fff; }
      .back-link { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-left: auto; transition: color 0.15s; }
      .back-link:hover { color: rgba(255,255,255,0.8); }

      /* ── SHELL ──────────────────────────────── */
      .records-shell { max-width: 1100px; margin: 0 auto; padding: 48px 24px 80px; }

      /* ── HERO ───────────────────────────────── */
      .records-eyebrow {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase;
        color: #e8b840; margin-bottom: 8px;
      }
      .records-hero h1 {
        font-family: "Barlow Condensed", sans-serif;
        font-size: clamp(44px, 6vw, 68px); font-weight: 900;
        line-height: 1; color: #fff; letter-spacing: 0.01em; text-transform: uppercase;
        margin-bottom: 32px;
      }

      /* ── LEAGUE SELECTOR ────────────────────── */
      .league-selector { display: flex; flex-direction: column; gap: 10px; margin-bottom: 40px; }
      .selector-row { display: grid; gap: 10px; }
      .selector-row.four { grid-template-columns: repeat(4, 1fr); }
      .selector-row.three { grid-template-columns: repeat(3, 1fr); }
      .league-btn {
        --accent: #888;
        position: relative;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 10px; padding: 18px 8px 14px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, transform 0.15s;
        user-select: none;
        overflow: hidden;
      }
      .league-btn::after {
        content: ""; position: absolute; left: 0; right: 0; bottom: 0;
        height: 3px; background: var(--accent); opacity: 0;
        transition: opacity 0.15s;
      }
      .league-btn:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15); transform: translateY(-2px); }
      .league-btn.active {
        background: color-mix(in srgb, var(--accent) 12%, transparent);
        border-color: color-mix(in srgb, var(--accent) 50%, transparent);
      }
      .league-btn.active::after { opacity: 1; }
      .league-btn img { width: 48px; height: 48px; object-fit: contain; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4)); }
      .league-btn span {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 12px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase;
        color: rgba(255,255,255,0.45);
        transition: color 0.15s;
      }
      .league-btn.active span { color: var(--accent); }

      .league-btn.lb-pacific           { --accent: #01d2d7; }
      .league-btn.lb-cn                { --accent: #fb2659; }
      .league-btn.lb-americas          { --accent: #ff570c; }
      .league-btn.lb-emea              { --accent: #d4ff1f; }
      .league-btn.lb-masters-santiago  { --accent: #a07aff; }
      .league-btn.lb-masters-london    { --accent: #a07aff; }
      .league-btn.lb-champions         { --accent: #c5b174; }

      .league-btn .sub-label {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
        color: rgba(255,255,255,0.28); margin-top: -6px;
      }
      .league-btn.active .sub-label { color: var(--accent); opacity: 0.75; }

      /* ── STAGE FILTER BAR ──────────────────── */
      .stage-filter-bar {
        display: none;
        gap: 6px; flex-wrap: wrap;
        margin-bottom: 28px;
        padding: 14px 16px;
        background: rgba(255,255,255,0.025);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 6px;
      }
      .stage-filter-bar.visible { display: flex; }
      .stage-btn {
        padding: 6px 16px;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
        border: 1px solid rgba(255,255,255,0.1); border-radius: 4px;
        background: transparent; color: rgba(255,255,255,0.35);
        cursor: pointer; transition: all 0.12s;
        appearance: none; -webkit-appearance: none;
      }
      .stage-btn:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.22); }
      .stage-btn.active {
        background: rgba(255,255,255,0.07);
        border-color: rgba(255,255,255,0.25);
        color: #fff;
      }

      /* ── CONTENT AREA ───────────────────────── */
      .content-area { display: none; }
      .content-area.visible { display: block; }

      .content-header {
        display: flex; align-items: center; gap: 16px;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid rgba(255,255,255,0.07);
      }
      .content-header img { width: 36px; height: 36px; object-fit: contain; }
      .content-header h2 {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 26px; font-weight: 900; letter-spacing: 0.05em; text-transform: uppercase;
        color: #fff;
      }
      .content-header .accent-bar {
        width: 4px; height: 28px; border-radius: 2px;
        background: var(--league-accent, #888);
        flex-shrink: 0;
      }

      /* ── TEAM SELECTOR SECTION ──────────────── */
      .team-selector-section {
        margin-bottom: 28px;
      }
      .team-selector-label {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase;
        color: rgba(255,255,255,0.25);
        margin-bottom: 10px;
      }
      .team-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .team-btn {
        --tc: #888;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 6px; padding: 10px 14px 8px;
        min-width: 90px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, transform 0.12s;
        user-select: none;
        position: relative;
        overflow: hidden;
      }
      .team-btn::after {
        content: ""; position: absolute; left: 0; right: 0; bottom: 0;
        height: 2px; background: var(--tc); opacity: 0;
        transition: opacity 0.15s;
      }
      .team-btn:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15); transform: translateY(-1px); }
      .team-btn.active {
        background: color-mix(in srgb, var(--tc) 14%, transparent);
        border-color: color-mix(in srgb, var(--tc) 45%, transparent);
      }
      .team-btn.active::after { opacity: 1; }
      .team-btn img {
        width: 32px; height: 32px; object-fit: contain;
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
      }
      .team-btn span {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
        color: rgba(255,255,255,0.4); text-align: center; line-height: 1.2;
        transition: color 0.15s;
        max-width: 80px;
      }
      .team-btn.active span { color: var(--tc); }
      .team-btn.active img { filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6)); }

      /* ── COMPOSITION VIEW ───────────────────── */
      .comp-section {
        display: none;
        margin-bottom: 32px;
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 8px;
        overflow: hidden;
      }
      .comp-view-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 14px 20px;
        background: rgba(255,255,255,0.03);
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }
      .comp-team-title {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 18px; font-weight: 900; letter-spacing: 0.06em; text-transform: uppercase;
        color: #fff;
      }
      .comp-subtitle {
        font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.35); margin-left: 8px;
      }
      .comp-close-btn {
        padding: 5px 12px;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
        border: 1px solid rgba(255,255,255,0.12); border-radius: 4px;
        background: transparent; color: rgba(255,255,255,0.35);
        cursor: pointer; transition: all 0.12s;
        appearance: none; -webkit-appearance: none;
      }
      .comp-close-btn:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.25); }

      .comp-body { padding: 0; }

      .comp-stage-block {
        border-bottom: 1px solid rgba(255,255,255,0.05);
      }
      .comp-stage-block:last-child { border-bottom: none; }
      .comp-stage-title {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase;
        color: rgba(255,255,255,0.25);
        padding: 12px 20px 8px;
        background: rgba(255,255,255,0.015);
      }
      .comp-maps-list { padding: 4px 0 12px; }
      .comp-map-block {
        display: flex; align-items: flex-start; gap: 16px;
        padding: 8px 20px;
      }
      .comp-map-block + .comp-map-block {
        border-top: 1px solid rgba(255,255,255,0.04);
      }
      .comp-map-name {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 14px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase;
        color: rgba(255,255,255,0.55);
        min-width: 100px;
        padding-top: 4px;
        flex-shrink: 0;
      }
      .comp-combos { display: flex; flex-direction: column; gap: 6px; flex: 1; }
      .comp-combo-item {
        display: flex; align-items: center; gap: 8px;
      }
      .agent-chips { display: flex; flex-wrap: wrap; gap: 4px; }
      .agent-chip {
        padding: 3px 9px;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 3px;
        color: rgba(255,255,255,0.75);
        white-space: nowrap;
      }
      .combo-count {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px; font-weight: 800; letter-spacing: 0.05em;
        color: #e8b840;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .comp-empty {
        padding: 48px 20px;
        text-align: center;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 12px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
        color: rgba(255,255,255,0.18);
      }

      /* ── SUBSECTION ─────────────────────────── */
      .subsection { margin-bottom: 40px; }
      .subsection-header {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 12px;
      }
      .subsection-title {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 18px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
        color: rgba(255,255,255,0.7);
      }
      .sort-tabs { display: flex; gap: 4px; }
      .sort-tab {
        padding: 4px 11px;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
        border: 1px solid rgba(255,255,255,0.1); border-radius: 3px;
        background: transparent; color: rgba(255,255,255,0.3);
        cursor: pointer; transition: all 0.12s;
        appearance: none; -webkit-appearance: none;
      }
      .sort-tab:hover { color: rgba(255,255,255,0.65); border-color: rgba(255,255,255,0.2); }
      .sort-tab.active {
        background: rgba(232,184,64,0.12); border-color: rgba(232,184,64,0.35); color: #e8b840;
      }

      /* ── STAT TABLE ─────────────────────────── */
      .stat-table-wrap { border: 1px solid rgba(255,255,255,0.07); border-radius: 6px; overflow: hidden; }
      .stat-table { width: 100%; border-collapse: collapse; font-size: 13px; }
      .stat-table thead th {
        padding: 9px 14px;
        background: rgba(255,255,255,0.03);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
        color: rgba(255,255,255,0.25); text-align: left;
        border-bottom: 1px solid rgba(255,255,255,0.07);
        white-space: nowrap;
      }
      .stat-table thead th.num, .stat-table td.num { text-align: right; }
      .stat-table tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.1s; }
      .stat-table tbody tr:last-child { border-bottom: none; }
      .stat-table tbody tr:hover { background: rgba(255,255,255,0.025); }
      .stat-table td { padding: 10px 14px; color: rgba(255,255,255,0.7); }

      .td-rank {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.18); width: 36px;
      }
      tbody tr:nth-child(1) .td-rank { color: #e8b840; }
      tbody tr:nth-child(2) .td-rank { color: rgba(210,210,210,0.7); }
      tbody tr:nth-child(3) .td-rank { color: rgba(180,120,60,0.7); }

      .player-cell { display: flex; align-items: center; gap: 8px; }
      .player-name { font-weight: 700; color: #fff; font-size: 13px; }
      .stat-val {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 16px; font-weight: 700; color: rgba(255,255,255,0.8);
      }
      .stat-val.top { color: #e8b840; }

      /* ── EMPTY ──────────────────────────────── */
      .empty-row td {
        text-align: center; padding: 40px;
        color: rgba(255,255,255,0.18);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase;
      }

      /* ── PLACEHOLDER (선택 전) ───────────────── */
      .placeholder-msg {
        padding: 80px 24px;
        text-align: center;
        color: rgba(255,255,255,0.15);
      }
      .placeholder-msg .ph-icon { font-size: 40px; margin-bottom: 14px; opacity: 0.4; }
      .placeholder-msg p {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 14px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <a class="home-link" href="./index.html">VCT Archive</a>
      <a class="back-link" href="./index.html">← 홈</a>
    </header>

    <div class="records-shell">
      <p class="records-eyebrow">VCT 2026 시즌 기록</p>
      <h1 class="records-hero h1" style="font-family:'Barlow Condensed',sans-serif;font-size:clamp(44px,6vw,68px);font-weight:900;line-height:1;color:#fff;letter-spacing:.01em;text-transform:uppercase;margin-bottom:32px;">기록</h1>

      <!-- ── 권역 선택 카드 ── -->
      <div class="league-selector">
        <!-- 리그 4개 -->
        <div class="selector-row four">
          <button class="league-btn lb-pacific"  data-league="pacific">
            <img src="./assets/vct-pacific.webp" alt="Pacific" />
            <span>Pacific</span>
          </button>
          <button class="league-btn lb-cn"       data-league="cn">
            <img src="./assets/vct-cn.webp" alt="CN" />
            <span>CN</span>
          </button>
          <button class="league-btn lb-americas" data-league="americas">
            <img src="./assets/vct-americas.png" alt="Americas" />
            <span>Americas</span>
          </button>
          <button class="league-btn lb-emea"     data-league="emea">
            <img src="./assets/vct-emea.webp" alt="EMEA" />
            <span>EMEA</span>
          </button>
        </div>
        <!-- 국제 대회 3개 -->
        <div class="selector-row three">
          <button class="league-btn lb-masters-santiago" data-league="masters-santiago">
            <img src="./assets/vct-logo.png" alt="Masters Santiago" />
            <span>Masters</span>
            <span class="sub-label">Santiago</span>
          </button>
          <button class="league-btn lb-masters-london" data-league="masters-london">
            <img src="./assets/vct-logo.png" alt="Masters London" />
            <span>Masters</span>
            <span class="sub-label">London</span>
          </button>
          <button class="league-btn lb-champions" data-league="champions">
            <img src="./assets/vct-logo.png" alt="Champions" />
            <span>Champions</span>
          </button>
        </div>
      </div>

      <!-- ── 스테이지 필터 ── -->
      <div class="stage-filter-bar" id="stage-filter-bar">
        <!-- JS로 동적 생성 -->
      </div>

      <!-- ── 선택 전 안내 ── -->
      <div id="placeholder" class="placeholder-msg">
        <div class="ph-icon">📊</div>
        <p>권역 또는 대회를 선택하세요</p>
      </div>

      <!-- ── 데이터 영역 ── -->
      <div id="content-area" class="content-area">
        <!-- 헤더 -->
        <div class="content-header" id="content-header">
          <div class="accent-bar" id="accent-bar"></div>
          <img id="content-logo" src="" alt="" />
          <h2 id="content-title"></h2>
        </div>

        <!-- 팀 선택 그리드 -->
        <div class="team-selector-section" id="team-selector-section" style="display:none;">
          <div class="team-selector-label">팀 선택</div>
          <div class="team-grid" id="team-grid"></div>
        </div>

        <!-- 맵 조합 뷰 -->
        <div class="comp-section" id="comp-section">
          <div class="comp-view-header">
            <div>
              <span class="comp-team-title" id="comp-team-title"></span>
              <span class="comp-subtitle">맵 조합</span>
            </div>
            <button class="comp-close-btn" id="comp-close-btn">× 닫기</button>
          </div>
          <div class="comp-body" id="comp-body"></div>
        </div>

        <!-- 선수 기록 -->
        <div class="subsection" id="player-stats-section">
          <div class="subsection-header">
            <span class="subsection-title">선수 기록</span>
            <div class="sort-tabs" id="player-sort-tabs">
              <button class="sort-tab active" data-sort="acs">ACS</button>
              <button class="sort-tab" data-sort="kda">KDA</button>
              <button class="sort-tab" data-sort="maps">맵 수</button>
            </div>
          </div>
          <div class="stat-table-wrap">
            <table class="stat-table">
              <thead>
                <tr>
                  <th class="td-rank">#</th>
                  <th>선수</th>
                  <th class="num">ACS</th>
                  <th class="num">KDA</th>
                  <th class="num">맵</th>
                </tr>
              </thead>
              <tbody id="player-tbody"></tbody>
            </table>
          </div>
        </div>

        <!-- 팀 기록 (준비 중) -->
        <div class="subsection" id="team-stats-section">
          <div class="subsection-header">
            <span class="subsection-title">팀 기록</span>
          </div>
          <div class="stat-table-wrap">
            <table class="stat-table">
              <thead>
                <tr>
                  <th class="td-rank">#</th>
                  <th>팀</th>
                  <th class="num">승</th>
                  <th class="num">패</th>
                  <th class="num">맵 승</th>
                  <th class="num">맵 패</th>
                </tr>
              </thead>
              <tbody id="team-tbody">
                <tr class="empty-row"><td colspan="6">준비 중</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="./storage.js"></script>
    <script>
    /* ── 팀 로고 / 색상 맵 ─────────────────────── */
    var TEAM_LOGOS = {
      /* Pacific */
      "DetonatioN FocusMe": "https://static.lolesports.com/teams/1737376982013_DFM_LOGO_white_0-.png",
      "Global Esports":     "./assets/teams/ge.webp",
      "Kiwoom DRX":         "./assets/teams/krx.svg",
      "Nongshim RedForce":  "./assets/teams/ns.svg",
      "Paper Rex":          "./assets/teams/prx.svg",
      "Rex Regum Qeon":     "./assets/teams/rrq.png",
      "Team Secret":        "./assets/teams/ts.svg",
      "ZETA DIVISION":      "./assets/teams/zeta.png",
      "FULL SENSE":         "./assets/teams/fs.svg",

    /* ── 리그별 스테이지 필터 정의 ── */
    var STAGE_FILTERS = {
      league: [
        { key: "all",    label: "전체" },
        { key: "kickoff", label: "KickOff" },
        { key: "stage1",  label: "Stage 1" },

      ],
      champions: [

    function getFilterGroup(league) {
      if (league === "masters-santiago" || league === "masters-london") return "masters";
      if (league === "champions") return "champions";
      return "league";
    }

    /* ── 스테이지 값 → 그룹 키 정규화 ── */
    function getStageGroupKey(stageVal, league) {
      var fg = getFilterGroup(league);
      if (fg === "league") {
        if (stageVal === "kickoff") return "kickoff";
        if (stageVal === "stage1" || stageVal === "stage1playoffs") return "stage1";
        if (stageVal === "stage2" || stageVal === "stage2playoffs") return "stage2";
      }
      if (fg === "masters") {
        if (stageVal === "swiss")    return "swiss";
        if (stageVal === "playoffs") return "playoffs";
      }
      if (fg === "champions") {
        if (stageVal === "swiss" || stageVal === "groupstage") return "groupstage";
        if (stageVal === "playoffs") return "playoffs";
      }
      return stageVal;
    }

    /* ── localStorage에서 vct_p: 키 전부 읽기 ── */
    function getAllPlayerData() {
      var list = [];
      for (var i = 0; i < localStorage.length; i++) {
        var key = localStorage.key(i);
        if (!key || !key.startsWith("vct_p:")) continue;
        try {
          var pd = JSON.parse(localStorage.getItem(key) || "{}");
          if (pd.maps && pd.maps.length) {
            list.push({ name: key.slice(6), maps: pd.maps });
          }
        } catch(e) {}
      }
      return list;
    }

    /* ── 리그 매칭 ── */
    function matchesLeague(m, league) {
      var l = m.league || "", t = m.tournament || "";
      if (league === "pacific")          return l === "pacific";
      if (league === "cn")               return l === "cn";
      if (league === "americas")         return l === "americas";
      if (league === "emea")             return l === "emea";
      if (league === "masters-santiago") return l === "masters" && t === "santiago";
      if (league === "masters-london")   return l === "masters" && t === "london";
      if (league === "champions")        return l === "champions";
      return false;
    }

    /* ── 스테이지 필터 매칭 ── */
    function matchesStage(m, league, stage) {
      if (stage === "all") return true;
      var s = m.stage || "";
      var filterGroup = getFilterGroup(league);

      if (filterGroup === "league") {
        if (stage === "kickoff") return s === "kickoff";
        if (stage === "stage1")  return s === "stage1" || s === "stage1playoffs";
        if (stage === "stage2")  return s === "stage2" || s === "stage2playoffs";
      }
      if (filterGroup === "masters") {
        if (stage === "swiss")    return s === "swiss";
        if (stage === "playoffs") return s === "playoffs";
      }
      if (filterGroup === "champions") {
        if (stage === "groupstage") return s === "swiss" || s === "groupstage";
        if (stage === "playoffs")   return s === "playoffs";
      }
      return true;
    }

    /* ── veto에서 맵 이름 추출 ── */
    function getMapName(matchKey, mapIdx) {
      var vetoRaw = localStorage.getItem("veto:" + matchKey);
      if (!vetoRaw) return null;
      var veto;
      try { veto = JSON.parse(vetoRaw); } catch(e) { return null; }
      if (!veto.maps) return null;
      var played = veto.maps.filter(function(v) {
        return v.action === "pick" || v.action === "decider";
      });
      if (played[mapIdx]) return played[mapIdx].map;
      return null;
    }

    /* ── 이 리그에 데이터가 있는 팀 목록 ── */
    function getTeamsForLeague(league) {
      var teams = [];
      for (var i = 0; i < localStorage.length; i++) {
        var key = localStorage.key(i);
        if (!key || !key.startsWith("vct_roster:")) continue;
        var teamName = key.slice(11);
        var rosterRaw = localStorage.getItem(key);
        if (!rosterRaw) continue;
        var roster;
        try { roster = JSON.parse(rosterRaw); } catch(e) { continue; }
        var allPlayers = (roster.main || []).concat(roster.subs || []);

        var hasData = allPlayers.some(function(pName) {
          var pdRaw = localStorage.getItem("vct_p:" + pName);
          if (!pdRaw) return false;
          var pd;
          try { pd = JSON.parse(pdRaw); } catch(e) { return false; }
          if (!pd.maps) return false;
          return pd.maps.some(function(m) { return matchesLeague(m, league); });
        });

        if (hasData) teams.push(teamName);
      }
      return teams.sort();
    }

    /* ── 팀 조합 집계 ── */
    function getTeamCompositions(teamName, league, stage) {
      var rosterRaw = localStorage.getItem("vct_roster:" + teamName);
      if (!rosterRaw) return {};
      var roster;
      try { roster = JSON.parse(rosterRaw); } catch(e) { return {}; }
      var allPlayers = (roster.main || []).concat(roster.subs || []);
      var playerSet = {};
      allPlayers.forEach(function(p) { playerSet[p] = true; });

      /* 이 팀 선수가 포함된 matchKey + mapIdx 수집 */
      var matchMaps = {};
      allPlayers.forEach(function(pName) {
        var pdRaw = localStorage.getItem("vct_p:" + pName);
        if (!pdRaw) return;
        var pd;
        try { pd = JSON.parse(pdRaw); } catch(e) { return; }
        if (!pd.maps) return;
        pd.maps.forEach(function(m) {
          if (!matchesLeague(m, league)) return;
          if (stage !== "all" && !matchesStage(m, league, stage)) return;
          if (m.matchKey === undefined || m.matchKey === null || m.matchKey === "") return;
          var mk = String(m.matchKey);
          var mi = parseInt(m.mapIdx) || 0;
          var key = mk + "|" + mi;
          if (!matchMaps[key]) {
            matchMaps[key] = { matchKey: mk, mapIdx: mi, stageVal: m.stage || "" };
          }
        });
      });

      /* 각 경기·맵에서 조합 추출 */
      /* result: stageGroupKey → mapName → { comboKey: {agents, count} } */
      var result = {};

      Object.values(matchMaps).forEach(function(mm) {
        var playersKey = "players:" + mm.matchKey + ":" + mm.mapIdx;
        var pdRaw = localStorage.getItem(playersKey);
        if (!pdRaw) return;
        var pData;
        try { pData = JSON.parse(pdRaw); } catch(e) { return; }

        /* 팀이 어느 쪽 사이드인지 판별 */
        var aCount = 0, bCount = 0;
        ["a0","a1","a2","a3","a4"].forEach(function(k) {
          if (pData[k] && playerSet[pData[k].name]) aCount++;
        });
        ["b0","b1","b2","b3","b4"].forEach(function(k) {
          if (pData[k] && playerSet[pData[k].name]) bCount++;
        });

        var side = aCount >= bCount ? "a" : "b";
        var agents = [];
        for (var i = 0; i < 5; i++) {
          var entry = pData[side + i];
          if (entry && entry.agent) agents.push(entry.agent);
        }
        if (agents.length === 0) return;

        var mapName = getMapName(mm.matchKey, mm.mapIdx);
        if (!mapName) mapName = "Map " + (mm.mapIdx + 1);

        var sgKey = getStageGroupKey(mm.stageVal, league);
        var sortedAgents = agents.slice().sort();
        var comboKey = sortedAgents.join("|");

        if (!result[sgKey]) result[sgKey] = {};
        if (!result[sgKey][mapName]) result[sgKey][mapName] = {};
        if (!result[sgKey][mapName][comboKey]) {
          result[sgKey][mapName][comboKey] = { agents: sortedAgents, count: 0 };
        }
        result[sgKey][mapName][comboKey].count++;
      });

      return result;
    }

    /* ── 팀 선택기 렌더 ── */
    function renderTeamSelector(league) {
      var section = document.getElementById("team-selector-section");
      var grid    = document.getElementById("team-grid");
      var teams   = getTeamsForLeague(league);

      if (!teams.length) {
        section.style.display = "none";
        return;
      }

      section.style.display = "";
      grid.innerHTML = teams.map(function(team) {
        var logo  = TEAM_LOGOS[team]  || "";
        var color = TEAM_COLORS[team] || "#888";
        var isActive = team === currentTeam;
        return '<button class="team-btn' + (isActive ? " active" : "") +
          '" data-team="' + esc(team) + '" style="--tc:' + color + '">' +
          (logo ? '<img src="' + esc(logo) + '" alt="' + esc(team) + '" onerror="this.style.display=\'none\'" />' : "") +
          '<span>' + esc(team) + '</span>' +
          '</button>';
      }).join("");

      grid.querySelectorAll(".team-btn").forEach(function(btn) {
        btn.addEventListener("click", function() {
          var tname = this.dataset.team;
          if (currentTeam === tname) {
            deselectTeam();
          } else {
            selectTeam(tname);
          }
        });
      });
    }

    /* ── 조합 뷰 렌더 ── */
    function renderCompositions(teamName, league, stage) {
      var fg = getFilterGroup(league);
      var stageOrder;
      if (fg === "league")    stageOrder = ["kickoff", "stage1", "stage2"];
      else if (fg === "masters") stageOrder = ["swiss", "playoffs"];
      else                    stageOrder = ["groupstage", "playoffs"];

      /* 스테이지 필터가 선택된 경우 해당 그룹만 */
      if (stage !== "all") {
        stageOrder = stageOrder.filter(function(k) { return k === stage; });
      }

      var data = getTeamCompositions(teamName, league, stage);
      var html = "";
      var hasAny = false;

      stageOrder.forEach(function(sgKey) {
        var maps = data[sgKey];
        if (!maps) return;
        var mapNames = Object.keys(maps).sort();
        if (!mapNames.length) return;
        hasAny = true;

        html += '<div class="comp-stage-block">' +
          '<div class="comp-stage-title">' + (STAGE_GROUP_LABELS[sgKey] || sgKey) + '</div>' +
          '<div class="comp-maps-list">';

        mapNames.forEach(function(mapName) {
          var combos = maps[mapName];
          var comboKeys = Object.keys(combos).sort(function(a, b) {
            return combos[b].count - combos[a].count;
          });

          html += '<div class="comp-map-block">' +
            '<div class="comp-map-name">' + esc(mapName) + '</div>' +
            '<div class="comp-combos">';

          comboKeys.forEach(function(ck) {
            var combo = combos[ck];
            html += '<div class="comp-combo-item">' +
              '<div class="agent-chips">' +
              combo.agents.map(function(a) {
                return '<span class="agent-chip">' + esc(a) + '</span>';
              }).join("") +
              '</div>' +
              (combo.count > 1 ? '<span class="combo-count">×' + combo.count + '</span>' : '') +
              '</div>';
          });

          html += '</div></div>'; /* comp-combos / comp-map-block */
        });

        html += '</div></div>'; /* comp-maps-list / comp-stage-block */
      });

      if (!hasAny) {
        html = '<div class="comp-empty">조합 데이터가 없습니다</div>';
      }

      document.getElementById("comp-team-title").textContent = teamName;
      document.getElementById("comp-body").innerHTML = html;

      var compSection = document.getElementById("comp-section");
      compSection.style.display = "";
    }

    /* ── 팀 선택 ── */
    function selectTeam(teamName) {
      currentTeam = teamName;

      document.querySelectorAll(".team-btn").forEach(function(btn) {
        btn.classList.toggle("active", btn.dataset.team === teamName);
      });

      /* 조합 뷰 표시, 선수/팀 기록 숨김 */
      renderCompositions(teamName, currentLeague, currentStage);
      document.getElementById("player-stats-section").style.display = "none";
      document.getElementById("team-stats-section").style.display   = "none";
    }

    /* ── 팀 해제 ── */
    function deselectTeam() {
      currentTeam = null;
      document.querySelectorAll(".team-btn").forEach(function(btn) {
        btn.classList.remove("active");
      });
      document.getElementById("comp-section").style.display = "none";
      document.getElementById("player-stats-section").style.display = "";
      document.getElementById("team-stats-section").style.display   = "";
    }

    /* ── 선수 기록 집계 ── */
    function buildPlayerRows(league, stage) {
      var all = getAllPlayerData();
      var map = {};

      all.forEach(function(player) {
        player.maps.forEach(function(m) {
          if (!matchesLeague(m, league)) return;
          if (!matchesStage(m, league, stage)) return;
          var acs = parseFloat(m.acs) || 0;
          if (!acs) return;

          if (!map[player.name]) {
            map[player.name] = { name: player.name, maps: 0, totalAcs: 0,
              totalK: 0, totalD: 0, totalA: 0, kdaMaps: 0 };
          }
          var e = map[player.name];
          e.maps++;
          e.totalAcs += acs;
          if (m.kda && m.kda.indexOf("/") !== -1) {
            var pts = m.kda.split("/");
            e.totalK += parseFloat(pts[0]) || 0;
            e.totalD += parseFloat(pts[1]) || 0;
            e.totalA += parseFloat(pts[2]) || 0;
            e.kdaMaps++;
          }
        });
      });

      return Object.values(map).map(function(e) {
        var avgAcs = e.maps ? Math.round(e.totalAcs / e.maps) : 0;
        var kda = "—";
        if (e.kdaMaps > 0) {
          var d = e.totalD > 0 ? e.totalD : 0.5;
          kda = ((e.totalK + e.totalA * 0.5) / d).toFixed(2);
        }
        return { name: e.name, maps: e.maps, avgAcs: avgAcs, kda: kda, kdaNum: parseFloat(kda) || 0 };
      });
    }

    /* ── 정렬 ── */
    function sortRows(rows, sortKey) {
      var sorted = rows.slice();
      if (sortKey === "acs")  sorted.sort(function(a,b){ return b.avgAcs - a.avgAcs; });
      if (sortKey === "kda")  sorted.sort(function(a,b){ return b.kdaNum - a.kdaNum; });
      if (sortKey === "maps") sorted.sort(function(a,b){ return b.maps - a.maps; });
      return sorted;
    }

    /* ── 선수 테이블 렌더 ── */
    function renderPlayerTable(rows) {
      var tbody = document.getElementById("player-tbody");
      if (!rows.length) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="5">기록 없음</td></tr>';
        return;
      }
      tbody.innerHTML = rows.map(function(r, i) {
        return '<tr>' +
          '<td class="td-rank">' + (i + 1) + '</td>' +
          '<td><div class="player-cell"><span class="player-name">' + esc(r.name) + '</span></div></td>' +
          '<td class="num"><span class="stat-val' + (i === 0 ? " top" : "") + '">' + (r.avgAcs || "—") + '</span></td>' +
          '<td class="num"><span class="stat-val">' + r.kda + '</span></td>' +
          '<td class="num"><span class="stat-val">' + r.maps + '</span></td>' +
          '</tr>';
      }).join("");
    }

    function esc(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    /* ── 스테이지 필터 바 렌더 ── */
    function renderStageFilter(league) {
      var bar = document.getElementById("stage-filter-bar");
      var filters = STAGE_FILTERS[getFilterGroup(league)];
      bar.innerHTML = filters.map(function(f) {
        return '<button class="stage-btn' + (f.key === currentStage ? " active" : "") +
               '" data-stage="' + f.key + '">' + f.label + '</button>';
      }).join("");
      bar.classList.add("visible");
    }

    /* ── 데이터 새로고침 ── */
    function refreshData() {
      currentRows = buildPlayerRows(currentLeague, currentStage);
      renderPlayerTable(sortRows(currentRows, currentSort));
      /* 팀이 선택된 상태면 조합 뷰도 새로고침 */
      if (currentTeam) {
        renderCompositions(currentTeam, currentLeague, currentStage);
      }
    }

    /* ── 권역 선택 ── */
    function selectLeague(league) {
      currentLeague = league;
      currentStage  = "all";
      currentTeam   = null;
      var info = LEAGUE_INFO[league];

      /* 버튼 active */
      document.querySelectorAll(".league-btn").forEach(function(btn) {
        btn.classList.toggle("active", btn.dataset.league === league);
      });

      /* 헤더 업데이트 */
      document.getElementById("accent-bar").style.background = info.accent;
      document.getElementById("content-logo").src = info.logo;
      document.getElementById("content-title").textContent = info.label;

      /* 스테이지 필터 */
      renderStageFilter(league);

      /* 팀 선택기 */
      renderTeamSelector(league);

      /* 조합 뷰 초기화 */
      document.getElementById("comp-section").style.display = "none";

      /* 선수/팀 기록 표시 */
      document.getElementById("player-stats-section").style.display = "";
      document.getElementById("team-stats-section").style.display   = "";

      /* 데이터 로드 */
      refreshData();

      /* 영역 표시 */
      document.getElementById("placeholder").style.display = "none";
      document.getElementById("content-area").classList.add("visible");
    }

    /* ── 스테이지 필터 클릭 ── */
    document.getElementById("stage-filter-bar").addEventListener("click", function(e) {
      var btn = e.target.closest(".stage-btn");
      if (!btn) return;
      currentStage = btn.dataset.stage;
      document.querySelectorAll(".stage-btn").forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
      refreshData();
    });

    /* ── 정렬 탭 ── */
    document.getElementById("player-sort-tabs").addEventListener("click", function(e) {
      var btn = e.target.closest(".sort-tab");
      if (!btn) return;
      currentSort = btn.dataset.sort;
      document.querySelectorAll(".sort-tab").forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
      if (currentRows.length) renderPlayerTable(sortRows(currentRows, currentSort));
    });

    /* ── 조합 뷰 닫기 ── */
    document.getElementById("comp-close-btn").addEventListener("click", function() {
      deselectTeam();
    });

    /* ── 권역 버튼 ── */
    document.querySelectorAll(".league-btn").forEach(function(btn) {
      btn.addEventListener("click", function() {
        selectLeague(this.dataset.league);
      });
    });
    </script>
    <script src="./auth.js"></script>
  </body>
</html>
