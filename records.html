<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VCT 기록 — 시즌 스탯</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      a { color: inherit; text-decoration: none; }

      body {
        min-height: 100vh;
        font-family: "Noto Sans KR", system-ui, sans-serif;
        color: #f0f0f0;
        background: #0a0a0c;
      }

      /* ── HEADER ─────────────────────────────── */
      .site-header {
        display: flex; align-items: center; justify-content: space-between;
        gap: 20px; padding: 0 32px; height: 56px;
        background: rgba(10,10,12,0.92);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        position: sticky; top: 0; z-index: 100;
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      }
      .home-link { font-size: 15px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.55); transition: color 0.15s; }
      .home-link:hover { color: #fff; }
      .back-link { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-left: auto; transition: color 0.15s; }
      .back-link:hover { color: rgba(255,255,255,0.8); }

      /* ── SHELL ──────────────────────────────── */
      .records-shell { max-width: 1100px; margin: 0 auto; padding: 48px 24px 80px; }

      /* ── HERO ───────────────────────────────── */
      .records-eyebrow {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase;
        color: #e8b840; margin-bottom: 8px;
      }
      .records-hero h1 {
        font-family: "Barlow Condensed", sans-serif;
        font-size: clamp(44px, 6vw, 68px); font-weight: 900;
        line-height: 1; color: #fff; letter-spacing: 0.01em; text-transform: uppercase;
        margin-bottom: 32px;
      }

      /* ── LEAGUE SELECTOR ────────────────────── */
      .league-selector { display: flex; flex-direction: column; gap: 10px; margin-bottom: 40px; }
      .selector-row { display: grid; gap: 10px; }
      .selector-row.five  { grid-template-columns: repeat(5, 1fr); }
      .selector-row.four  { grid-template-columns: repeat(4, 1fr); }
      .selector-row.three { grid-template-columns: repeat(3, 1fr); }
      .league-btn {
        --accent: #888;
        position: relative;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 10px; padding: 18px 8px 14px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, transform 0.15s;
        user-select: none;
        overflow: hidden;
      }
      .league-btn::after {
        content: ""; position: absolute; left: 0; right: 0; bottom: 0;
        height: 3px; background: var(--accent); opacity: 0;
        transition: opacity 0.15s;
      }
      .league-btn:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15); transform: translateY(-2px); }
      .league-btn.active {
        background: color-mix(in srgb, var(--accent) 12%, transparent);
        border-color: color-mix(in srgb, var(--accent) 50%, transparent);
      }
      .league-btn.active::after { opacity: 1; }
      .league-btn img { width: 48px; height: 48px; object-fit: contain; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4)); }
      .league-btn .league-logo {
        display: block; width: 48px; height: 48px;
        background-color: var(--accent);
        -webkit-mask: url('./assets/vct-logo.png') center / contain no-repeat;
        mask: url('./assets/vct-logo.png') center / contain no-repeat;
        transition: background-color 0.15s;
      }
      .league-btn span {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 12px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase;
        color: rgba(255,255,255,0.45);
        transition: color 0.15s;
      }
      .league-btn.active span { color: var(--accent); }

      .league-btn.lb-pacific           { --accent: #01d2d7; }
      .league-btn.lb-cn                { --accent: #fb2659; }
      .league-btn.lb-americas          { --accent: #ff570c; }
      .league-btn.lb-emea              { --accent: #d4ff1f; }
      .league-btn.lb-masters-santiago  { --accent: #a07aff; }
      .league-btn.lb-masters-london    { --accent: #a07aff; }
      .league-btn.lb-champions         { --accent: #c5b174; }
      .league-btn.lb-global            { --accent: #ffffff; }

      .league-btn .sub-label {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
        color: rgba(255,255,255,0.28); margin-top: -6px;
      }
      .league-btn.active .sub-label { color: var(--accent); opacity: 0.75; }

      /* ── STAGE FILTER BAR ──────────────────── */
      .stage-filter-bar {
        display: none;
        gap: 6px; flex-wrap: wrap;
        margin-bottom: 28px;
        padding: 14px 16px;
        background: rgba(255,255,255,0.025);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 6px;
      }
      .stage-filter-bar.visible { display: flex; }
      .stage-btn {
        padding: 6px 16px;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
        border: 1px solid rgba(255,255,255,0.1); border-radius: 4px;
        background: transparent; color: rgba(255,255,255,0.35);
        cursor: pointer; transition: all 0.12s;
        appearance: none; -webkit-appearance: none;
      }
      .stage-btn:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.22); }
      .stage-btn.active {
        background: rgba(255,255,255,0.07);
        border-color: rgba(255,255,255,0.25);
        color: #fff;
      }

      /* ── CONTENT AREA ───────────────────────── */
      .content-area { display: none; }
      .content-area.visible { display: block; }

      .content-header {
        display: flex; align-items: center; gap: 16px;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid rgba(255,255,255,0.07);
      }
      .content-header img { width: 36px; height: 36px; object-fit: contain; }
      .content-header h2 {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 26px; font-weight: 900; letter-spacing: 0.05em; text-transform: uppercase;
        color: #fff;
      }
      .content-header .accent-bar {
        width: 4px; height: 28px; border-radius: 2px;
        background: var(--league-accent, #888);
        flex-shrink: 0;
      }

      /* ── TEAM SELECTOR SECTION ──────────────── */
      .team-selector-section {
        margin-bottom: 28px;
      }
      .team-selector-label {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase;
        color: rgba(255,255,255,0.25);
        margin-bottom: 10px;
      }
      .team-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 8px;
      }
      .team-btn {
        --tc: #888;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 6px; padding: 10px 8px 8px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, transform 0.12s;
        user-select: none;
        position: relative;
        overflow: hidden;
      }
      .team-btn::after {
        content: ""; position: absolute; left: 0; right: 0; bottom: 0;
        height: 2px; background: var(--tc); opacity: 0;
        transition: opacity 0.15s;
      }
      .team-btn:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15); transform: translateY(-1px); }
      .team-btn.active {
        background: color-mix(in srgb, var(--tc) 14%, transparent);
        border-color: color-mix(in srgb, var(--tc) 45%, transparent);
      }
      .team-btn.active::after { opacity: 1; }
      .team-btn img {
        width: 32px; height: 32px; object-fit: contain;
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
      }
      /* 검은색/어두운 로고 팀 → 흰색으로 변환 */
      .team-btn.logo-invert img        { filter: brightness(0) invert(1) drop-shadow(0 2px 4px rgba(0,0,0,0.6)); }
      .team-btn.logo-invert.active img { filter: brightness(0) invert(1) drop-shadow(0 2px 6px rgba(0,0,0,0.7)); }
      .team-btn span {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
        color: rgba(255,255,255,0.4); text-align: center; line-height: 1.2;
        transition: color 0.15s;
        max-width: 80px;
      }
      .team-btn.active span { color: var(--tc); }
      .team-btn.active img { filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6)); }

      /* ── COMPOSITION VIEW ───────────────────── */
      .comp-section {
        display: none;
        margin-bottom: 32px;
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 8px;
        overflow: hidden;
      }
      .comp-view-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 14px 20px;
        background: rgba(255,255,255,0.03);
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }
      .comp-team-title {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 18px; font-weight: 900; letter-spacing: 0.06em; text-transform: uppercase;
        color: #fff;
      }
      .comp-subtitle {
        font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.35); margin-left: 8px;
      }
      .comp-close-btn {
        padding: 5px 12px;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
        border: 1px solid rgba(255,255,255,0.12); border-radius: 4px;
        background: transparent; color: rgba(255,255,255,0.35);
        cursor: pointer; transition: all 0.12s;
        appearance: none; -webkit-appearance: none;
      }
      .comp-close-btn:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.25); }

      .comp-body { padding: 0; }

      /* ── 맵 카드 그리드 ─────────────────────────── */
      .comp-map-card-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        padding: 16px 20px 20px;
      }
      .comp-map-card {
        position: relative; cursor: pointer;
        border-radius: 6px; overflow: hidden;
        aspect-ratio: 16 / 9;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      }
      .comp-map-card:hover {
        transform: translateY(-3px);
        border-color: rgba(255,255,255,0.22);
        box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      }
      .comp-map-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .comp-map-card-name {
        position: absolute; bottom: 0; left: 0; right: 0;
        padding: 18px 8px 7px;
        background: linear-gradient(transparent, rgba(0,0,0,0.72));
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
        color: #fff; text-align: center;
      }
      .comp-map-card-noimg {
        width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
        color: rgba(255,255,255,0.2); text-transform: uppercase;
      }

      /* ── 맵 팝업 모달 ────────────────────────────── */
      .comp-modal-overlay {
        display: none; position: fixed; inset: 0; z-index: 500;
        background: rgba(0,0,0,0.7);
        align-items: center; justify-content: center;
        backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      }
      .comp-modal-overlay.active { display: flex; }
      .comp-modal {
        width: min(560px, 92vw); max-height: 82vh;
        background: #111113;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px; overflow: hidden;
        display: flex; flex-direction: column;
        box-shadow: 0 24px 64px rgba(0,0,0,0.7);
      }
      .comp-modal-banner {
        position: relative; height: 130px; flex-shrink: 0; overflow: hidden;
      }
      .comp-modal-banner img {
        width: 100%; height: 100%; object-fit: cover; display: block;
        filter: brightness(0.55);
      }
      .comp-modal-banner-noimg {
        width: 100%; height: 100%; background: rgba(255,255,255,0.04);
      }
      .comp-modal-map-name {
        position: absolute; bottom: 12px; left: 16px;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 26px; font-weight: 900; letter-spacing: 0.05em; text-transform: uppercase;
        color: #fff;
      }
      .comp-modal-close {
        position: absolute; top: 10px; right: 10px;
        width: 28px; height: 28px;
        background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.2);
        border-radius: 50%; color: rgba(255,255,255,0.75); font-size: 15px; line-height: 1;
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        transition: background 0.12s, color 0.12s;
        appearance: none; -webkit-appearance: none;
      }
      .comp-modal-close:hover { background: rgba(255,255,255,0.15); color: #fff; }
      .comp-modal-body { overflow-y: auto; padding: 16px 20px 20px; flex: 1; }
      .comp-modal-stage-title {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 10px; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase;
        color: rgba(255,255,255,0.28); margin-bottom: 10px; margin-top: 16px;
      }
      .comp-modal-stage-title:first-child { margin-top: 0; }
      .comp-modal-combos { display: flex; flex-direction: column; gap: 8px; }
      .comp-modal-combo { display: flex; flex-direction: column; gap: 4px; }
      .comp-modal-combo-main { display: flex; align-items: center; gap: 10px; }
      .combo-sources { display: flex; flex-wrap: wrap; gap: 4px; padding-left: 2px; }
      .combo-sources span { font-size: 10px; color: rgba(255,255,255,0.3); font-family: 'Barlow Condensed', sans-serif; letter-spacing: .05em; background: rgba(255,255,255,0.05); border-radius: 3px; padding: 1px 5px; }

      /* 공통 에이전트 아이콘 */
      .comp-combo-item {
        display: flex; align-items: center; gap: 8px;
      }
      .agent-chips { display: flex; gap: 3px; align-items: center; }
      .agent-icon {
        width: 38px; height: 38px;
        border-radius: 4px; overflow: hidden;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.12);
        flex-shrink: 0;
      }
      .agent-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .agent-icon-fallback {
        width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.4);
        text-transform: uppercase; text-align: center; line-height: 1.1; padding: 2px;
      }
      .combo-count {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px; font-weight: 800; letter-spacing: 0.05em;
        color: #e8b840;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .comp-empty {
        padding: 48px 20px;
        text-align: center;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 12px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
        color: rgba(255,255,255,0.18);
      }

      /* ── SUBSECTION ─────────────────────────── */
      .subsection { margin-bottom: 40px; }
      .subsection-header {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 12px;
      }
      .subsection-title {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 18px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
        color: rgba(255,255,255,0.7);
      }
      .sort-tabs { display: flex; gap: 4px; }
      .sort-tab {
        padding: 4px 11px;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
        border: 1px solid rgba(255,255,255,0.1); border-radius: 3px;
        background: transparent; color: rgba(255,255,255,0.3);
        cursor: pointer; transition: all 0.12s;
        appearance: none; -webkit-appearance: none;
      }
      .sort-tab:hover { color: rgba(255,255,255,0.65); border-color: rgba(255,255,255,0.2); }
      .sort-tab.active {
        background: rgba(232,184,64,0.12); border-color: rgba(232,184,64,0.35); color: #e8b840;
      }

      /* ── STAT TABLE (팀 기록용 유지) ──────────── */
      .stat-table-wrap { border: 1px solid rgba(255,255,255,0.07); border-radius: 6px; overflow: hidden; }
      .stat-table { width: 100%; border-collapse: collapse; font-size: 13px; }
      .stat-table thead th {
        padding: 9px 14px;
        background: rgba(255,255,255,0.03);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
        color: rgba(255,255,255,0.25); text-align: left;
        border-bottom: 1px solid rgba(255,255,255,0.07);
        white-space: nowrap;
      }
      .stat-table thead th.num, .stat-table td.num { text-align: right; }
      .stat-table tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.1s; }
      .stat-table tbody tr:last-child { border-bottom: none; }
      .stat-table tbody tr:hover { background: rgba(255,255,255,0.025); }
      .stat-table td { padding: 10px 14px; color: rgba(255,255,255,0.7); }

      /* ── TOP-10 LEADERBOARD PANELS ─────────── */
      .lb-panels {
        display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
      }
      @media (max-width: 640px) { .lb-panels { grid-template-columns: 1fr; } }

      .lb-panel {
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 10px; overflow: hidden;
      }
      .lb-panel-hd {
        display: flex; align-items: center; gap: 10px;
        padding: 14px 18px;
        background: rgba(255,255,255,0.03);
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }
      .lb-panel-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--league-accent, #888);
        flex-shrink: 0;
      }
      .lb-panel-ttl {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 17px; font-weight: 800; letter-spacing: .13em; text-transform: uppercase;
        color: rgba(255,255,255,0.85);
      }
      .lb-panel-meta {
        margin-left: auto;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
        color: rgba(255,255,255,0.22);
      }

      .lb-row {
        display: flex; align-items: center; gap: 12px;
        padding: 12px 18px;
        border-bottom: 1px solid rgba(255,255,255,0.04);
        transition: background 0.1s;
      }
      .lb-row:last-child { border-bottom: none; }
      .lb-row:hover { background: rgba(255,255,255,0.025); }

      .lb-rank {
        min-width: 22px; text-align: center;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 17px; font-weight: 800;
        color: rgba(255,255,255,0.22); flex-shrink: 0;
      }
      .lb-rank.r1 { color: #e8b840; }
      .lb-rank.r2 { color: #a8a8c0; }
      .lb-rank.r3 { color: #b87333; }

      .lb-logo {
        width: 34px; height: 34px; object-fit: contain; flex-shrink: 0;
      }
      .lb-logo.invert { filter: brightness(0) invert(1); }
      .lb-logo-ph {
        width: 34px; height: 34px; flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 10px; font-weight: 800; color: rgba(255,255,255,0.3);
        background: rgba(255,255,255,0.06); border-radius: 4px;
      }

      .lb-info { flex: 1; min-width: 0; }
      .lb-player {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 21px; font-weight: 800; letter-spacing: .02em;
        color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .lb-team {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 12px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
        color: rgba(255,255,255,0.38); margin-top: 1px;
      }

      .lb-maps {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 16px; font-weight: 700; color: rgba(255,255,255,0.75);
        text-align: right; white-space: nowrap; flex-shrink: 0; line-height: 1.2;
      }
      .lb-maps small {
        display: block; font-size: 10px; letter-spacing: .07em; text-transform: uppercase;
      }

      .lb-val {
        min-width: 72px; text-align: center; padding: 8px 12px; border-radius: 6px;
        background: var(--league-accent, #888);
        font-family: "Barlow Condensed", sans-serif;

    /* ── 리그 매칭 ── */
    function matchesLeague(m, league) {

      if (league === "masters-london")   return l === "masters" && t === "london";
      if (league === "champions")        return l === "champions";
      return false;
    }

    /* ── 스테이지 필터 매칭 ── */
    function matchesStage(m, league, stage) {
      if (stage === "all") return true;
      var s = m.stage || "";
      var filterGroup = getFilterGroup(league);

      /* 전체 뷰: 각 권역 리그 스테이지만 매칭 (masters/champions 경기는 제외) */
      if (filterGroup === "global") {
        if (stage === "kickoff-all" || stage === "kickoff-ms") return s === "kickoff";
        if (stage === "stage1-all"  || stage === "stage1-ml")  return s === "stage1" || s === "stage1playoffs";
        if (stage === "stage2-all"  || stage === "stage2-ch")  return s === "stage2" || s === "stage2playoffs";
      }

      if (filterGroup === "league") {
        if (stage === "kickoff") return s === "kickoff";
        if (stage === "stage1")  return s === "stage1" || s === "stage1playoffs";
        if (stage === "stage2")  return s === "stage2" || s === "stage2playoffs";
      }
      if (filterGroup === "masters") {
        if (stage === "swiss")    return s === "swiss";
        if (stage === "playoffs") return s === "playoffs";
      }
      if (filterGroup === "champions") {
        if (stage === "groupstage") return s === "swiss" || s === "groupstage";
        if (stage === "playoffs")   return s === "playoffs";

    /* ── veto에서 맵 이름 추출 ──────────────────────────────
       vetoState.maps = 7칸 배열 (뱅/픽 순서로 맵 이름 저장)
       BO3: 픽/디사이더 스텝 위치 = 2, 3, 6
       BO5: 픽/디사이더 스텝 위치 = 2, 3, 4, 5, 6
       matchMaxMapIdx ≥ 3 이면 BO5로 판단                    */
    function getMapName(matchKey, mapIdx, matchMaxMapIdx) {
      var vetoRaw = localStorage.getItem("veto:" + matchKey);
      if (!vetoRaw) return null;
      var veto;
      try { veto = JSON.parse(vetoRaw); } catch(e) { return null; }
      var maps = veto.maps;
      if (!Array.isArray(maps) || !maps.length) return null;

      var mi    = parseInt(mapIdx) || 0;
      /* BO5/GF 판별 (우선순위 순):
         1) veto.gf / veto.bo5 플래그 (match-dark 수정 이후 저장된 경우)
         2) matchMaxIdx >= 3 → 4맵 이상 플레이된 경우 (일반 BO5)
         3) veto.sides[4] 또는 veto.sides[5] 존재 →
            BO5에서만 step 4/5가 픽(플레이된 맵)이므로 sides에 기록됨.
            BO3는 step 4/5가 밴이라 sides에 절대 없음. 가장 신뢰도 높은 fallback.
         4) matchKey 날짜 부분에 "grand" / "gf" 키워드 → 기존 GF 데이터 fallback  */
      var isBo5 = !!(veto.gf || veto.bo5);
      if (!isBo5) isBo5 = (parseInt(matchMaxMapIdx) || 0) >= 3;
      if (!isBo5 && veto.sides) {
        isBo5 = (veto.sides[4] !== undefined) || (veto.sides[5] !== undefined);
      }
      if (!isBo5) {
        var datePart = (String(matchKey).split("|")[0] || "").toLowerCase();
        isBo5 = datePart.indexOf("grand") !== -1 || datePart.indexOf(" gf") !== -1
                || datePart.indexOf("_gf") !== -1 || datePart.startsWith("gf");
      }
      /* mapIdx → veto 배열 인덱스 */
      var stepPos;
      if      (mi === 0) stepPos = 2;
      else if (mi === 1) stepPos = 3;
      else if (mi === 2) stepPos = isBo5 ? 4 : 6;
      else if (mi === 3) stepPos = 5;
      else if (mi === 4) stepPos = 6;
      else return null;

      return maps[stepPos] || null;
    }

    /* ── 이 리그에 표시할 팀 목록 ── */
    function getTeamsForLeague(league) {
      /* 국내 리그: 하드코딩 목록 사용 (데이터 유무 무관, 항상 올바른 팀 표시) */
      if (LEAGUE_TEAMS[league]) {
        return LEAGUE_TEAMS[league].slice(); /* 이미 알파벳 정렬 */
      }

      /* 국제 대회(Masters·Champions): 데이터 기반 자동 감지 */
      var teams = [];
      for (var i = 0; i < localStorage.length; i++) {
        var key = localStorage.key(i);
        if (!key || !key.startsWith("vct_roster:")) continue;
        var teamName = key.slice(11);
        var rosterRaw = localStorage.getItem(key);
        if (!rosterRaw) continue;
        var roster;
        try { roster = JSON.parse(rosterRaw); } catch(e) { continue; }
        var allPlayers = (roster.main || []).concat(roster.subs || []);

        var hasData = allPlayers.some(function(pName) {
          var pdRaw = localStorage.getItem("vct_p:" + pName);
          if (!pdRaw) return false;
          var pd;
          try { pd = JSON.parse(pdRaw); } catch(e) { return false; }
          if (!pd.maps) return false;
          return pd.maps.some(function(m) { return matchesLeague(m, league); });
        });

        if (hasData) teams.push(teamName);
      }
      return teams.sort();
    }

    /* ── 팀 선수 명단 조회 (부분 이름 매칭 지원) ──────────
       "ZETA"로 저장된 경우도 "ZETA DIVISION"을 찾을 수 있도록
       정확 일치 실패 시 부분 문자열 매칭으로 재시도
       반환값: { players: [], foundKey: "vct_roster:..." | null }  */
    function getRosterPlayers(teamName) {
      /* 1. 정확한 roster 키 조회 */
      var raw = localStorage.getItem("vct_roster:" + teamName);
      if (raw) {
        try {
          var r = JSON.parse(raw);
          var p = (r.main || []).concat(r.subs || []);
          if (p.length) return { players: p, foundKey: "vct_roster:" + teamName };
        } catch(e) {}
      }
      /* 2. 부분 이름 매칭 (roster 키 스캔) */
      var lower = teamName.toLowerCase();
      for (var i = 0; i < localStorage.length; i++) {
        var key = localStorage.key(i);
        if (!key || !key.startsWith("vct_roster:")) continue;
        var storedLower = key.slice(11).toLowerCase();
        if (storedLower.length < 2) continue;
        var hit = storedLower === lower ||
                  (storedLower.length >= 3 && lower.indexOf(storedLower) !== -1) ||
                  (lower.length >= 3 && storedLower.indexOf(lower) !== -1);
        if (hit) {
          try {
            var roster = JSON.parse(localStorage.getItem(key) || "{}");
            var players = (roster.main || []).concat(roster.subs || []);
            if (players.length) return { players: players, foundKey: key };
          } catch(e) {}
        }
      }
      /* 3. Fallback: players:MATCH_KEY:MAPIDX 에서 사이드별 선수 역추적
             matchKey = "날짜|팀A|팀B" → 팀A면 side "a", 팀B면 side "b" */
      var playerSet = {};
      for (var j = 0; j < localStorage.length; j++) {
        var pkey = localStorage.key(j);
        if (!pkey || !pkey.startsWith("players:")) continue;
        /* key 형식: "players:날짜|팀A|팀B:맵인덱스" */
        var withoutPrefix = pkey.slice(8);          /* "날짜|팀A|팀B:맵인덱스" */
        var lastColon = withoutPrefix.lastIndexOf(":");
        if (lastColon < 0) continue;
        var matchKey = withoutPrefix.slice(0, lastColon);
        var parts = matchKey.split("|");
        if (parts.length < 3) continue;
        var side = null;
        if (parts[1].toLowerCase() === lower) side = "a";
        else if (parts[2].toLowerCase() === lower) side = "b";
        else continue;
        try {
          var pdata = JSON.parse(localStorage.getItem(pkey) || "{}");
          for (var si = 0; si < 5; si++) {
            var slot = pdata[side + si];
            if (slot && slot.name && slot.name.trim() && slot.name !== "-") {
              playerSet[slot.name.trim()] = true;
            }
          }
        } catch(e) {}
      }
      var fallbackPlayers = Object.keys(playerSet);
      if (fallbackPlayers.length) return { players: fallbackPlayers, foundKey: "players: 사이드 역추적" };

      /* 저장된 모든 vct_roster 키 수집 (진단용) */
      var allRosterKeys = [];
      for (var k2 = 0; k2 < localStorage.length; k2++) {
        var k = localStorage.key(k2);
        if (k && k.startsWith("vct_roster:")) allRosterKeys.push(k.slice(11));
      }
      return { players: [], foundKey: null, allKeys: allRosterKeys };
    }

    /* ── 팀 조합 집계 ─────────────────────────────────────────
       Step 1: vct_p:선수 → matchKey+mapIdx 수집 + 리그/스테이지 필터
       Step 2: players:MATCH_KEY:MAPIDX 에서 사이드별 에이전트 5개 읽기
       → 항상 5명 완성 조합만 포함 (미완성 맵 자동 제외)            */
    function getTeamCompositions(teamName, league, stage) {
      var rosterResult = getRosterPlayers(teamName);
      var allPlayers = rosterResult.players;
      if (!allPlayers.length) return { _debug: { noRoster: true, triedKey: "vct_roster:" + teamName, allRosterKeys: rosterResult.allKeys || [] } };

      var teamLower = teamName.toLowerCase();

      /* Step 1: vct_p로 관련 matchKey+mapIdx 탐색 (리그/스테이지 필터 포함) */
      var matchMapInfo = {};   /* "mk|mi" → { matchKey, mapIdx, stageVal, side } */

      allPlayers.forEach(function(pName) {
        var pdRaw = localStorage.getItem("vct_p:" + pName);
        if (!pdRaw) return;
        var pd;
        try { pd = JSON.parse(pdRaw); } catch(e) { return; }
        if (!pd.maps) return;
        pd.maps.forEach(function(m) {
          if (!matchesLeague(m, league)) return;
          if (stage !== "all" && !matchesStage(m, league, stage)) return;
          if (!m.matchKey) return;
          var mk = String(m.matchKey);
          var mi = parseInt(m.mapIdx) || 0;
          var key = mk + "|" + mi;
          if (!matchMapInfo[key]) {
            /* matchKey = "날짜|팀A|팀B" 에서 사이드 판별
               팀이 matchKey에 없으면 반드시 skip — 다른 팀 경기 데이터 오염 방지
               Playoff 단축 키(stage1playoffs|N 등 2조각) → players 슬롯에서 선수 위치로 판별 */
            /* matchKey 포맷별 사이드 판별:
               ① 구버전 "날짜|팀A|팀B" (3조각, parts[1]이 팀명) → 팀명 비교로 판별
               ② Masters 구조화 키 "tournament|stage|..." (3~4조각, parts[1]이 스테이지)
                  → 팀명이 parts에 없음, players 슬롯에서 선수 위치로 판별
               ③ CN Playoff 단축 키 "stage1playoffs|N" (2조각) → players 슬롯 판별 */
            var parts = mk.split("|");
            var side = null;
            if (parts.length >= 3 &&
                (parts[1].toLowerCase() === teamLower || parts[2].toLowerCase() === teamLower)) {
              /* ① 구버전 날짜|팀A|팀B 포맷: parts[1]/[2]가 실제 팀명 */
              if (parts[1].toLowerCase() === teamLower) side = "a";
              else side = "b";
            } else {
              /* ②③ 구조화 키 또는 단축 키: players 데이터에서 선수 슬롯 위치로 판별 */
              try {
                var _ppd = JSON.parse(localStorage.getItem("players:" + mk + ":" + mi) || "{}");
                var _pnLower = pName.toLowerCase();
                for (var _pi = 0; _pi < 5 && side === null; _pi++) {
                  var _sa = _ppd["a" + _pi], _sb = _ppd["b" + _pi];
                  if (_sa && (_sa.name || "").toLowerCase() === _pnLower) side = "a";
                  if (_sb && (_sb.name || "").toLowerCase() === _pnLower) side = "b";
                }
              } catch(e) {}
              if (side === null) return; /* players 데이터에서도 못 찾음 → 제외 */
            }
            matchMapInfo[key] = { matchKey: mk, mapIdx: mi, stageVal: m.stage || "", side: side };
          }
        });
      });

      /* ── 중복 제거: "Match N|팀A|팀B" (3조각)과 "stage1playoffs|N" (2조각)이
            같은 경기를 가리킬 때, 2조각 구버전 키를 제거해 카운트 2배 방지 ── */
      (function deduplicateMatchMapInfo() {
        /* 1) 3조각 "Match N|..." 키가 있는 matchNum:mapIdx 수집 */
        var canonSet = {};
        Object.keys(matchMapInfo).forEach(function(k) {
          var mm = matchMapInfo[k];
          var p = mm.matchKey.split("|");
          if (p.length >= 3 && /^match\s*\d+$/i.test(p[0].trim())) {
            var num = p[0].trim().replace(/^match\s*/i, "");
            canonSet[num + ":" + mm.mapIdx] = true;
          }
        });
        /* 2) 대응하는 2조각 키 삭제 */
        Object.keys(matchMapInfo).forEach(function(k) {
          var mm = matchMapInfo[k];
          var p = mm.matchKey.split("|");
          if (p.length < 3) {
            var num = p[p.length - 1];
            if (canonSet[num + ":" + mm.mapIdx]) delete matchMapInfo[k];
          }
        });
      })();

      /* matchKey별 최대 mapIdx (BO3 vs BO5 판별) */
      var matchMaxIdx = {};
      Object.values(matchMapInfo).forEach(function(mm) {
        if (matchMaxIdx[mm.matchKey] === undefined || mm.mapIdx > matchMaxIdx[mm.matchKey]) {
          matchMaxIdx[mm.matchKey] = mm.mapIdx;
        }
      });

      /* Step 2: players:MATCH_KEY:MAPIDX 에서 해당 사이드 에이전트 5개 읽기 */
      var result = {};

      Object.values(matchMapInfo).forEach(function(mm) {
        var pKey = "players:" + mm.matchKey + ":" + mm.mapIdx;
        var pData;
        try { pData = JSON.parse(localStorage.getItem(pKey) || "{}"); } catch(e) { return; }

        var agents = [];
        for (var i = 0; i < 5; i++) {
          var slot = pData[mm.side + i];
          if (slot && slot.agent && slot.agent.trim()) agents.push(slot.agent.trim());
        }
        if (agents.length < 5) return;   /* 5명 미완성이면 제외 */

        var mapName = getMapName(mm.matchKey, mm.mapIdx, matchMaxIdx[mm.matchKey]);
        if (!mapName) mapName = "Map " + (mm.mapIdx + 1);
        mapName = normalizeMapName(mapName);

        var sgKey = getStageGroupKey(mm.stageVal, league);
        var sortedAgents = agents.slice().sort();
        var comboKey = sortedAgents.join("|");

        /* matchKey에서 날짜·상대팀 추출 → 출처 표시용
           "날짜|팀A|팀B" → srcDate=날짜, opponent=상대팀
           "stage1playoffs|N" 같은 2조각 Playoff 키 → "Match N" 형식으로 표시 */
        var mkParts  = mm.matchKey.split("|");
        var srcDate, opponent;
        if (mkParts.length >= 3) {
          srcDate  = mkParts[0] || "";
          opponent = mm.side === "a" ? (mkParts[2] || "") : (mkParts[1] || "");
        } else {
          /* Playoff 단축 키: "stage1playoffs|7" → "Match 7" 표시 */
          srcDate  = "Match " + (mkParts[mkParts.length - 1] || "?");
          opponent = "";
        }
        var srcLabel = srcDate + (opponent ? " vs " + opponent : "");

        if (!result[sgKey]) result[sgKey] = {};
        if (!result[sgKey][mapName]) result[sgKey][mapName] = {};
        if (!result[sgKey][mapName][comboKey]) {
          result[sgKey][mapName][comboKey] = { agents: sortedAgents, count: 0, sources: [] };
        }
        result[sgKey][mapName][comboKey].count++;
        result[sgKey][mapName][comboKey].sources.push(srcLabel);
      });

      /* 진단 정보 (빈 결과일 때 renderCompositions에서 표시) */
      if (!Object.keys(result).length) {
        var debugPlayers = {};
        allPlayers.forEach(function(pName) {
          var pdRaw = localStorage.getItem("vct_p:" + pName);
          if (!pdRaw) { debugPlayers[pName] = "키 없음"; return; }
          try {
            var pd = JSON.parse(pdRaw);
            var maps = (pd.maps || []);
            var leagueMaps = maps.filter(function(m){ return matchesLeague(m, league); });
            debugPlayers[pName] = "전체 " + maps.length + "맵, " + league.toUpperCase().replace(/-/g,"·") + " " + leagueMaps.length + "맵";
          } catch(e) { debugPlayers[pName] = "파싱 오류"; }
        });
        result._debug = {
          foundRosterKey: rosterResult.foundKey,
          players: debugPlayers,
          matchMapsCount: Object.keys(matchMapInfo).length,
        };
      }

      return result;
    }

    /* ── 팀 선택기 렌더 ── */
    function renderTeamSelector(league) {
      var section = document.getElementById("team-selector-section");
      var grid    = document.getElementById("team-grid");
      var teams   = getTeamsForLeague(league);

      if (!teams.length) {
        section.style.display = "none";
        return;
      }

      section.style.display = "";
      grid.innerHTML = teams.map(function(team) {
        var logo  = TEAM_LOGOS[team]  || "";
        var color = TEAM_COLORS[team] || "#888";
        var isActive  = team === currentTeam;
        var isInvert  = LOGO_INVERT[team] || false;
        var cls = "team-btn" + (isActive ? " active" : "") + (isInvert ? " logo-invert" : "");
        return '<button class="' + cls + '" data-team="' + esc(team) + '" style="--tc:' + color + '">' +
          (logo ? '<img src="' + esc(logo) + '" alt="' + esc(team) + '" onerror="this.style.display=\'none\'" />' : "") +
          '<span>' + esc(team) + '</span>' +
          '</button>';
      }).join("");

      grid.querySelectorAll(".team-btn").forEach(function(btn) {
        btn.addEventListener("click", function() {
          var tname = this.dataset.team;
          if (currentTeam === tname) {
            deselectTeam();
          } else {
            selectTeam(tname);
          }
        });
      });
    }

    /* ── 조합 뷰 렌더 (맵 카드 그리드) ── */
    var _compMapData   = {};  /* openMapModal에서 참조 */
    var _compStageOrder = [];

    function renderCompositions(teamName, league, stage) {
      var fg = getFilterGroup(league);
      var stageOrder;
      if (fg === "league")       stageOrder = ["kickoff", "stage1", "stage2"];
      else if (fg === "masters") stageOrder = ["swiss", "playoffs"];
      else                       stageOrder = ["groupstage", "playoffs"];
      if (stage !== "all") stageOrder = stageOrder.filter(function(k) { return k === stage; });

      var data = getTeamCompositions(teamName, league, stage);

      /* 맵별로 스테이지 데이터 집계: { mapName → { sgKey → { comboKey → {agents,count} } } } */
      var mapData = {};
      stageOrder.forEach(function(sgKey) {
        var maps = data[sgKey];
        if (!maps) return;
        Object.keys(maps).forEach(function(mapName) {
          if (!mapData[mapName]) mapData[mapName] = {};
          mapData[mapName][sgKey] = maps[mapName];
        });
      });

      _compMapData    = mapData;
      _compStageOrder = stageOrder;

      document.getElementById("comp-team-title").textContent = teamName;

      var mapNames = Object.keys(mapData).sort();
      var html = "";

      if (!mapNames.length) {
        var dbg = data._debug || {};
        var dbgHtml = '';
        if (dbg.noRoster) {
          dbgHtml += '<div style="margin-top:8px;font-size:12px;color:#f87171">🔍 로스터 없음: ' + esc(dbg.triedKey) + '<br>';
          if (dbg.allRosterKeys && dbg.allRosterKeys.length) {
            dbgHtml += '저장된 팀: ' + dbg.allRosterKeys.map(esc).join(', ');
          } else {
            dbgHtml += '저장된 roster 키 없음';
          }
          dbgHtml += '</div>';
        } else if (dbg.players) {
          dbgHtml += '<div style="margin-top:8px;font-size:12px;color:#94a3b8">🔍 로스터: ' + esc(dbg.foundRosterKey || '?') + '<br>';
          dbgHtml += Object.keys(dbg.players).map(function(p){ return esc(p) + ': ' + esc(dbg.players[p]); }).join('<br>');
          dbgHtml += '<br>matchMaps 수집: ' + (dbg.matchMapsCount || 0) + '</div>';
        }
        html = '<div class="comp-empty">조합 데이터가 없습니다' + dbgHtml + '</div>';
      } else {
        html = '<div class="comp-map-card-grid">';
        mapNames.forEach(function(mapName) {
          var mImg = MAP_IMG[mapName] || "";
          html += '<div class="comp-map-card" data-map="' + esc(mapName) + '">' +
            (mImg
              ? '<img src="' + esc(mImg) + '" alt="' + esc(mapName) + '" />'
              : '<div class="comp-map-card-noimg">' + esc(mapName) + '</div>') +
            '<div class="comp-map-card-name">' + esc(mapName) + '</div>' +
            '</div>';
        });
        html += '</div>';
      }

      var body = document.getElementById("comp-body");
      body.innerHTML = html;

      /* 맵 카드 클릭 → 팝업 */
      body.querySelectorAll(".comp-map-card").forEach(function(card) {
        card.addEventListener("click", function() {
          openMapModal(this.dataset.map);
        });
      });

      document.getElementById("comp-section").style.display = "block";
    }

    /* ── 맵 팝업 열기 ── */
    function openMapModal(mapName) {
      var combosForMap = _compMapData[mapName] || {};
      var mImg = MAP_IMG[mapName] || "";

      /* 배너 */
      var bannerImg = document.getElementById("comp-modal-banner-img");
      if (mImg) {
        bannerImg.src = mImg; bannerImg.alt = mapName; bannerImg.style.display = "";
      } else {
        bannerImg.style.display = "none";
      }
      document.getElementById("comp-modal-map-name").textContent = mapName;

      /* 조합 목록 */
      var html = "";
      var hasAny = false;
      _compStageOrder.forEach(function(sgKey) {
        var combos = combosForMap[sgKey];
        if (!combos) return;
        var comboKeys = Object.keys(combos).sort(function(a, b) {
          return combos[b].count - combos[a].count;
        });
        if (!comboKeys.length) return;
        hasAny = true;

        /* 스테이지가 "전체"일 때만 섹션 제목 표시 */
        if (currentStage === "all") {
          html += '<div class="comp-modal-stage-title">' + (STAGE_GROUP_LABELS[sgKey] || sgKey) + '</div>';
        }
        html += '<div class="comp-modal-combos">';
        comboKeys.forEach(function(ck) {
          var combo = combos[ck];
          var srcHtml = '';
          if (combo.sources && combo.sources.length) {
            srcHtml = '<div class="combo-sources">' +
              combo.sources.map(function(s){ return '<span>' + esc(s) + '</span>'; }).join('') +
              '</div>';
          }
          html += '<div class="comp-modal-combo">' +
            '<div class="comp-modal-combo-main">' +
            '<div class="agent-chips">' +
            combo.agents.map(function(a) {
              var img = AGENT_IMG[a] || "";
              return img
                ? '<div class="agent-icon" title="' + esc(a) + '"><img src="' + esc(img) + '" alt="' + esc(a) + '" /></div>'
                : '<div class="agent-icon"><div class="agent-icon-fallback">' + esc(a.substring(0, 3)) + '</div></div>';
            }).join("") +
            '</div>' +
            (combo.count > 1 ? '<span class="combo-count">×' + combo.count + '</span>' : '') +
            '</div>' +
            srcHtml +
            '</div>';
        });
        html += '</div>';
      });

      if (!hasAny) {
        html = '<div style="color:rgba(255,255,255,0.25);font-family:\'Barlow Condensed\',sans-serif;font-size:12px;letter-spacing:.15em;text-transform:uppercase;text-align:center;padding:24px">데이터 없음</div>';
      }

      document.getElementById("comp-modal-body").innerHTML = html;
      document.getElementById("comp-modal-overlay").classList.add("active");
    }

    /* ── 팀 선택 ── */
    function selectTeam(teamName) {
      currentTeam = teamName;

      document.querySelectorAll(".team-btn").forEach(function(btn) {
        btn.classList.toggle("active", btn.dataset.team === teamName);
      });

      /* 조합 뷰 표시, 선수/팀 기록 숨김 */
      renderCompositions(teamName, currentLeague, currentStage);
      document.getElementById("player-stats-section").style.display = "none";
      document.getElementById("team-stats-section").style.display   = "none";
    }

    /* ── 팀 해제 ── */
    function deselectTeam() {
      currentTeam = null;
      document.querySelectorAll(".team-btn").forEach(function(btn) {
        btn.classList.remove("active");
      });
      document.getElementById("comp-section").style.display = "none";
      document.getElementById("player-stats-section").style.display = "";
      document.getElementById("team-stats-section").style.display   = "";
    }

    /* ── 선수→팀 맵 ──────────────────────────────────────────
       우선순위 1: vct_roster: 스캔
       우선순위 2: vct_p matchKey "날짜|팀A|팀B" 형식에서 자동 추론
       ────────────────────────────────────────────────────── */
    var _STAGE_WORDS = [
      "swiss","playoffs","kickoff","stage1","stage2",
      "stage1playoffs","stage2playoffs","santiago","london","all"
    ];
    function buildPlayerTeamMap() {
      var map = {};

      /* 1. vct_roster: 키에서 팀 → 선수 목록 */
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (!k || !k.startsWith("vct_roster:")) continue;
        var team = k.slice(11);
        try {
          var r = JSON.parse(localStorage.getItem(k) || "{}");
          var players = (r.main || []).concat(r.subs || []);
          players.forEach(function(p) { if (p) map[p] = team; });
        } catch(e) {}
      }

      /* 2. roster에 없는 선수: vct_p matchKey "날짜|팀A|팀B" 에서 추론 */
      for (var j = 0; j < localStorage.length; j++) {
        var vk = localStorage.key(j);
        if (!vk || !vk.startsWith("vct_p:")) continue;
        var pName = vk.slice(6);
        if (map[pName]) continue;          /* 이미 팀 있으면 스킵 */

        var pd;
        try { pd = JSON.parse(localStorage.getItem(vk) || "{}"); } catch(e) { continue; }
        if (!pd.maps) continue;

        for (var mi = 0; mi < pd.maps.length; mi++) {
          var m = pd.maps[mi];
          if (!m.matchKey) continue;
          var parts = m.matchKey.split("|");
          /* 구버전 "날짜|팀A|팀B" (3조각) 인지 확인 — 스테이지 키워드면 제외 */
          if (parts.length < 3) continue;
          if (_STAGE_WORDS.indexOf(parts[0].toLowerCase()) !== -1) continue;
          if (_STAGE_WORDS.indexOf(parts[1].toLowerCase()) !== -1) continue;

          /* players: 슬롯에서 이 선수가 a/b 어느 쪽인지 확인 */
          var playersRaw = localStorage.getItem("players:" + m.matchKey + ":" + (m.mapIdx || 0));
          if (!playersRaw) continue;
          var pData;
          try { pData = JSON.parse(playersRaw); } catch(e) { continue; }

          var pnLower = pName.toLowerCase();
          var side = null;
          for (var si = 0; si < 5 && side === null; si++) {
            var slotA = pData["a" + si], slotB = pData["b" + si];
            if (slotA && (slotA.name || "").toLowerCase() === pnLower) side = "a";
            if (slotB && (slotB.name || "").toLowerCase() === pnLower) side = "b";
          }
          if (side === "a" && parts[1]) { map[pName] = parts[1]; break; }
          if (side === "b" && parts[2]) { map[pName] = parts[2]; break; }
        }
      }

      return map;
    }

    /* ── 팀 로고 HTML ── */
    var _LB_INVERT = {
      "Paper Rex":true,"Team Secret":true,"ZETA DIVISION":true,"VARREL":true,
      "Evil Geniuses":true,"ENVY":true,"MIBR":true,
      "GIANTX":true,"Team Liquid":true,"ULF Esports":true,"Gentle Mates":true,
    };
    function _lbLogoHtml(team) {
      var src = (typeof TEAM_LOGOS !== "undefined" && TEAM_LOGOS[team]) || null;
      if (!src) {
        var code = (team||"?").slice(0,4).toUpperCase();
        return '<div class="lb-logo-ph">' + esc(code) + '</div>';
      }
      var inv = _LB_INVERT[team] ? " invert" : "";
      var imgEl = '<img class="lb-logo' + inv + '" src="' + esc(src) + '" alt="' + esc(team) + '" />';
      return imgEl;
    }

    /* ── Top-10 패널 렌더 ── */
    function _renderLbPanel(panelId, title, entries, accent) {
      var el = document.getElementById(panelId);
      if (!el) return;
      /* accent 색 밝기 판단 (어두운 색이면 흰 글자) */
      var darkAccents = ["#d4ff1f", "#ffffff"];
      var valCls = darkAccents.indexOf(accent) !== -1 ? " dk" : "";

      var html = '<div class="lb-panel-hd">' +
        '<div class="lb-panel-dot"></div>' +
        '<span class="lb-panel-ttl">' + esc(title) + '</span>' +
        '<span class="lb-panel-meta">' + entries.length + ' / 10</span>' +
        '</div>';

      if (!entries.length) {
        html += '<div class="lb-empty-panel">기록 없음</div>';
      } else {
        var teamMap = buildPlayerTeamMap();
        html += entries.map(function(r, i) {
          var rankCls = i===0?" r1":i===1?" r2":i===2?" r3":"";
          var team = teamMap[r.name] || "";
          var teamCode = TEAM_CODES[team] || team.slice(0,4).toUpperCase() || "";
          return '<div class="lb-row">' +
            '<span class="lb-rank' + rankCls + '">' + (i+1) + '</span>' +
            _lbLogoHtml(team) +
            '<div class="lb-info">' +
              '<div class="lb-player">' + esc(r.name) + '</div>' +
              (teamCode ? '<div class="lb-team">' + esc(teamCode) + '</div>' : '') +
            '</div>' +
            '<div class="lb-maps">' + r.maps + '<small>Maps</small></div>' +
            '<div class="lb-val' + valCls + '">' + r.val + '</div>' +
            '</div>';
        }).join("");
      }
      el.style.setProperty("--league-accent", accent);
      el.innerHTML = html;
    }

    /* ── 선수 기록 집계 + Top-10 패널 렌더 ── */
    function renderPlayerPanels(league, stage) {
      var all = getAllPlayerData();
      var acsPMap = {}, kdPMap = {};
      var accent = (LEAGUE_INFO[league] && LEAGUE_INFO[league].accent) || "#888";

      /* 전체 뷰: 해당 스테이지의 진출팀 목록 로드 */
      var globalTeamFilter = null;
      if (league === "global") {
        var participantsKey = GLOBAL_STAGE_PARTICIPANTS[stage];
        if (participantsKey) {
          globalTeamFilter = getParticipantTeams(participantsKey);
        }
      }

      /* 전체 뷰에서 선수가 진출팀 소속인지 확인하기 위해 팀맵 미리 빌드 */
      var teamMap = (league === "global") ? buildPlayerTeamMap() : null;

      all.forEach(function(player) {
        /* 전체 뷰: 진출팀 소속 선수만 포함 */
        if (league === "global" && globalTeamFilter && globalTeamFilter.length > 0) {
          var playerTeam = teamMap ? teamMap[player.name] : null;
          if (!playerTeam || globalTeamFilter.indexOf(playerTeam) === -1) return;
        }

        player.maps.forEach(function(m) {
          if (!matchesLeague(m, league)) return;
          if (!matchesStage(m, league, stage)) return;

          var acs = parseFloat(m.acs) || 0;
          var hasKda = m.kda && m.kda.indexOf("/") !== -1;
          /* k=0, d=0, a=0 → 칸 비우기된 빈 데이터는 무시 */
          if (hasKda) {
            var _pts = m.kda.split("/");
            var _k = parseFloat(_pts[0]) || 0, _d = parseFloat(_pts[1]) || 0, _a = parseFloat(_pts[2]) || 0;
            if (_k === 0 && _d === 0 && _a === 0) hasKda = false;
          }
          if (!acs && !hasKda) return;

          if (acs > 0) {
            if (!acsPMap[player.name]) acsPMap[player.name] = { maps:0, total:0 };
            acsPMap[player.name].maps++;
            acsPMap[player.name].total += acs;
          }
          if (hasKda) {
            var pts = m.kda.split("/");
            if (!kdPMap[player.name]) kdPMap[player.name] = { maps:0, totalK:0, totalD:0 };
            kdPMap[player.name].maps++;
            kdPMap[player.name].totalK += parseFloat(pts[0]) || 0;
            kdPMap[player.name].totalD += parseFloat(pts[1]) || 0;
          }
        });
      });

      var acsTop10 = Object.keys(acsPMap).map(function(n) {
        var e = acsPMap[n];
        return { name:n, maps:e.maps, val: Math.round(e.total/e.maps) };
      }).sort(function(a,b){ return b.val-a.val; }).slice(0,10);

      var kdTop10 = Object.keys(kdPMap).map(function(n) {
        var e = kdPMap[n];
        var d = e.totalD > 0 ? e.totalD : 0.5;
        return { name:n, maps:e.maps, val: parseFloat((e.totalK/d).toFixed(2)) };
      }).sort(function(a,b){ return b.val-a.val; }).slice(0,10);

      _renderLbPanel("lb-panel-acs", "ACS Top 10",  acsTop10, accent);
      _renderLbPanel("lb-panel-kd",  "K/D Top 10",  kdTop10,  accent);

      /* 스테이지 라벨 업데이트 */
      var stageLabelEl = document.getElementById("player-stats-stage-label");
      if (stageLabelEl) {
        var stageLabelMap = {
          all: "", kickoff: "· KickOff", stage1: "· Stage 1", stage2: "· Stage 2",
          swiss: "· Swiss Stage", playoffs: "· Playoffs", groupstage: "· Group Stage"
        };
        if (league === "global") {
          var globalLabelMap = {
            "all":         "",
            "kickoff-all": "· KickOff (전체)",
            "kickoff-ms":  "· KickOff — Masters Santiago 진출팀",
            "stage1-all":  "· Stage 1 (전체)",
            "stage1-ml":   "· Stage 1 — Masters London 진출팀",
            "stage2-all":  "· Stage 2 (전체)",
            "stage2-ch":   "· Stage 2 — Champions 진출팀",
          };
          stageLabelEl.textContent = globalLabelMap[stage] || "";
        } else {
          stageLabelEl.textContent = stageLabelMap[stage] || "";
        }
      }
    }

    function esc(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    /* ── 스테이지 필터 바 렌더 ── */
    function renderStageFilter(league) {
      var bar = document.getElementById("stage-filter-bar");
      var filters = STAGE_FILTERS[getFilterGroup(league)];
      bar.innerHTML = filters.map(function(f) {
        return '<button class="stage-btn' + (f.key === currentStage ? " active" : "") +
               '" data-stage="' + f.key + '">' + f.label + '</button>';
      }).join("");
      bar.classList.add("visible");
    }

    /* ── 데이터 새로고침 ── */
    function refreshData() {
      renderPlayerPanels(currentLeague, currentStage);
      /* 팀이 선택된 상태면 조합 뷰도 새로고침 */
      if (currentTeam) {
        renderCompositions(currentTeam, currentLeague, currentStage);
      }
    }

    /* ── 권역 선택 ── */
    function selectLeague(league) {
      currentLeague = league;
      currentStage  = "all";
      currentTeam   = null;
      var info = LEAGUE_INFO[league];

      /* 버튼 active */
      document.querySelectorAll(".league-btn").forEach(function(btn) {
        btn.classList.toggle("active", btn.dataset.league === league);
      });

      /* 헤더 업데이트 */
      document.getElementById("accent-bar").style.background = info.accent;
      document.getElementById("content-logo").src = info.logo;
      document.getElementById("content-title").textContent = info.label;

      /* 스테이지 필터 */
      renderStageFilter(league);

      /* 팀 선택기 (전체 뷰에서는 숨김) */
      if (league === "global") {
        document.getElementById("team-selector").style.display = "none";
      } else {
        renderTeamSelector(league);
      }

      /* 조합 뷰 초기화 */
      document.getElementById("comp-section").style.display = "none";

      /* 선수/팀 기록 표시 */
      document.getElementById("player-stats-section").style.display = "";
      document.getElementById("team-stats-section").style.display   = (league === "global") ? "none" : "";

      /* 데이터 로드 */
      refreshData();

      /* 영역 표시 */
      document.getElementById("placeholder").style.display = "none";
      document.getElementById("content-area").classList.add("visible");
    }

    /* ── 스테이지 필터 클릭 ── */
    document.getElementById("stage-filter-bar").addEventListener("click", function(e) {
      var btn = e.target.closest(".stage-btn");
      if (!btn) return;
      currentStage = btn.dataset.stage;
      document.querySelectorAll(".stage-btn").forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
      refreshData();
    });



    /* ── 조합 뷰 닫기 ── */
    document.getElementById("comp-close-btn").addEventListener("click", function() {
      deselectTeam();
    });

    /* ── 맵 팝업 닫기 ── */
    document.getElementById("comp-modal-close").addEventListener("click", function() {
      document.getElementById("comp-modal-overlay").classList.remove("active");
    });
    document.getElementById("comp-modal-overlay").addEventListener("click", function(e) {
      if (e.target === this) this.classList.remove("active");
    });
    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") {
        document.getElementById("comp-modal-overlay").classList.remove("active");
      }
    });

    /* ── 권역 버튼 ── */
    document.querySelectorAll(".league-btn").forEach(function(btn) {
      btn.addEventListener("click", function() {
        selectLeague(this.dataset.league);
      });
    });

    /* ── storageReady 완료 후 재렌더 (서버 슬립 중 첫 클릭 대응) ── */
    if (window.storageReady && typeof window.storageReady.then === "function") {
      window.storageReady.then(function() {
        if (currentLeague) {
          refreshData();
        }
      });
    }
    </script>
    <script src="./auth.js"></script>
  </body>
</html>
