<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VCT 기록 — 시즌 스탯</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      a { color: inherit; text-decoration: none; }

      body {
        min-height: 100vh;
        font-family: "Noto Sans KR", system-ui, sans-serif;
        color: #f0f0f0;
        background: #0a0a0c;
      }

      /* ── HEADER ─────────────────────────────── */
      .site-header {
        display: flex; align-items: center;
        gap: 20px; padding: 0 32px; height: 56px;
        background: rgba(10,10,12,0.92);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        position: sticky; top: 0; z-index: 100;
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      }
      .site-header .auth-header-btn { margin-left: auto !important; }
      .home-link { font-size: 15px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.55); transition: color 0.15s; }
      .home-link:hover { color: #fff; }
      .back-link { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.4); transition: color 0.15s; }
      .site-header .home-link::after { content: " /"; margin-left: 4px; color: rgba(255,255,255,.18); font-weight: 400; }
      .back-link:hover { color: rgba(255,255,255,0.8); }

      /* ── SHELL ──────────────────────────────── */
      .records-shell { max-width: 1100px; margin: 0 auto; padding: 48px 24px 80px; }

      /* ── HERO ───────────────────────────────── */
      .records-eyebrow {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase;
        color: #e8b840; margin-bottom: 8px;
      }
      .records-hero h1 {
        font-family: "Barlow Condensed", sans-serif;
        font-size: clamp(44px, 6vw, 68px); font-weight: 900;
        line-height: 1; color: #fff; letter-spacing: 0.01em; text-transform: uppercase;
        margin-bottom: 32px;
      }

      /* ── LEAGUE SELECTOR ────────────────────── */
      .league-selector { display: flex; flex-direction: column; gap: 10px; margin-bottom: 40px; }
      .selector-row { display: grid; gap: 10px; }
      .selector-row.five  { grid-template-columns: repeat(5, 1fr); }
      .selector-row.four  { grid-template-columns: repeat(4, 1fr); }
      .selector-row.three { grid-template-columns: repeat(3, 1fr); }
      .league-btn {
        --accent: #888;
        position: relative;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 10px; padding: 18px 8px 14px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, transform 0.15s;
        user-select: none;
        overflow: hidden;
      }
      .league-btn::after {
        content: ""; position: absolute; left: 0; right: 0; bottom: 0;
        height: 3px; background: var(--accent); opacity: 0;
        transition: opacity 0.15s;
      }
      .league-btn:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15); transform: translateY(-2px); }
      .league-btn.active {
        background: color-mix(in srgb, var(--accent) 12%, transparent);
        border-color: color-mix(in srgb, var(--accent) 50%, transparent);
      }
      .league-btn.active::after { opacity: 1; }
      .league-btn img { width: 48px; height: 48px; object-fit: contain; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4)); }
      .league-btn .league-logo {
        display: block; width: 48px; height: 48px;
        background-color: var(--accent);
        -webkit-mask: url('./assets/vct-logo.png') center / contain no-repeat;
        mask: url('./assets/vct-logo.png') center / contain no-repeat;
        transition: background-color 0.15s;
      }
      .league-btn span {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 12px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase;
        color: rgba(255,255,255,0.45);
        transition: color 0.15s;
      }
      .league-btn.active span { color: var(--accent); }

      .league-btn.lb-global           { --accent: #ffffff; }
      .league-btn.lb-pacific          { --accent: #01d2d7; }
      .league-btn.lb-cn               { --accent: #fb2659; }
      .league-btn.lb-americas         { --accent: #ff570c; }
      .league-btn.lb-emea             { --accent: #d4ff1f; }
      .league-btn.lb-masters-santiago { --accent: #a07aff; }
      .league-btn.lb-masters-london   { --accent: #a07aff; }
      .league-btn.lb-champions        { --accent: #c5b174; }

      /* ── STAGE FILTER ───────────────────────── */
      .stage-filter { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 32px; }
      .stage-btn {
        padding: 7px 16px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
        color: rgba(255,255,255,0.5);
        cursor: pointer;
        transition: all 0.15s;
      }
      .stage-btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8); }
      .stage-btn.active {
        background: color-mix(in srgb, var(--current-accent, #fff) 15%, transparent);
        border-color: color-mix(in srgb, var(--current-accent, #fff) 50%, transparent);
        color: var(--current-accent, #fff);
      }

      /* ── TEAM PICKER ────────────────────────── */
      .team-picker { margin-bottom: 32px; }
      .team-picker-label {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase;
        color: rgba(255,255,255,0.3); margin-bottom: 12px;
      }
      .team-grid { display: flex; flex-wrap: wrap; gap: 8px; }
      .team-chip {
        display: flex; align-items: center; gap: 8px;
        padding: 6px 12px 6px 8px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 20px;
        cursor: pointer;
        transition: all 0.15s;
        user-select: none;
      }
      .team-chip img { width: 22px; height: 22px; object-fit: contain; }
      .team-chip .chip-code {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 12px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
        color: rgba(255,255,255,0.5);
        transition: color 0.15s;
      }
      .team-chip:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.18); }
      .team-chip.active {
        background: color-mix(in srgb, var(--chip-color, #fff) 12%, transparent);
        border-color: color-mix(in srgb, var(--chip-color, #fff) 50%, transparent);
      }
      .team-chip.active .chip-code { color: var(--chip-color, #fff); }

      /* ── CONTENT AREA ───────────────────────── */
      .content-area { position: relative; min-height: 300px; }

      /* ── LOADING / PLACEHOLDER ──────────────── */
      .placeholder {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 16px; min-height: 300px; text-align: center;
        color: rgba(255,255,255,0.2);
      }
      .ph-icon { font-size: 48px; }

      /* ── STATS PANELS ───────────────────────── */
      .stats-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
      .stat-panel {
        background: rgba(255,255,255,0.02);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 12px;
        overflow: hidden;
      }
      .stat-panel-header {
        display: flex; align-items: center; gap: 10px;
        padding: 14px 20px;
        background: rgba(255,255,255,0.03);
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }
      .stat-panel-title {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase;
        color: rgba(255,255,255,0.5);
      }
      .stat-rows { padding: 8px 0; }
      .stat-row {
        display: flex; align-items: center; gap: 10px;
        padding: 8px 20px;
        border-bottom: 1px solid rgba(255,255,255,0.04);
        transition: background 0.1s;
      }
      .stat-row:last-child { border-bottom: none; }
      .stat-row:hover { background: rgba(255,255,255,0.03); }
      .stat-rank {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px; font-weight: 700;
        color: rgba(255,255,255,0.2);
        width: 20px; flex-shrink: 0; text-align: center;
      }
      .stat-rank.gold   { color: #f5c518; }
      .stat-rank.silver { color: #b0b8c8; }
      .stat-rank.bronze { color: #cd7f32; }
      .stat-player { flex: 1; min-width: 0; display: flex; align-items: center; gap: 10px; }
      .stat-team-logo {
        width: 26px; height: 26px; object-fit: contain; flex-shrink: 0;
        opacity: 0.9;
      }
      .stat-player-info { flex: 1; min-width: 0; }
      .stat-player-name {
        font-size: 13px; font-weight: 700; color: #f0f0f0;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .stat-player-team {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
        color: rgba(255,255,255,0.3);
      }
      .stat-maps {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px; color: rgba(255,255,255,0.25);
        width: 36px; text-align: right; flex-shrink: 0;
      }
      .stat-value {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 18px; font-weight: 800;
        color: #fff;
        width: 60px; text-align: right; flex-shrink: 0;
      }

      /* ── CAROUSEL (팀 통계) ─────────────────── */
      .carousel-section { margin-bottom: 28px; }
      .carousel-nav {
        display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
      }
      .carousel-label {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase;
        color: rgba(255,255,255,0.3);
      }
      .carousel-dots { display: flex; gap: 6px; margin-left: auto; }
      .carousel-dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: rgba(255,255,255,0.15);
        cursor: pointer; transition: background 0.15s;
      }
      .carousel-dot.active { background: var(--current-accent, #fff); }
      .carousel-prev, .carousel-next {
        background: none; border: none; cursor: pointer; padding: 4px 8px;
        color: rgba(255,255,255,0.4);
        font-size: 16px;
        transition: color 0.15s;
      }
      .carousel-prev:hover, .carousel-next:hover { color: #fff; }
      .carousel-track-wrap { overflow: hidden; }
      .carousel-track {
        display: flex;
        transition: transform 0.3s ease;
      }
      .carousel-page {
        min-width: 100%; flex-shrink: 0;
      }
      .team-stat-panel {
        background: rgba(255,255,255,0.02);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 12px;
        overflow: hidden;
      }
      .team-stat-header {
        display: flex; align-items: center; gap: 10px;
        padding: 14px 20px;
        background: rgba(255,255,255,0.03);
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }
      .team-stat-title {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase;
        color: rgba(255,255,255,0.5);
      }
      .team-stat-rows { padding: 8px 0; }
      .team-stat-row {
        display: flex; align-items: center; gap: 10px;
        padding: 8px 20px;
        border-bottom: 1px solid rgba(255,255,255,0.04);
        transition: background 0.1s;
      }
      .team-stat-row:last-child { border-bottom: none; }
      .team-stat-row:hover { background: rgba(255,255,255,0.03); }
      .ts-rank {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px; font-weight: 700;
        color: rgba(255,255,255,0.2);
        width: 20px; flex-shrink: 0; text-align: center;
      }
      .ts-rank.gold   { color: #f5c518; }
      .ts-rank.silver { color: #b0b8c8; }
      .ts-rank.bronze { color: #cd7f32; }
      .ts-logo { width: 24px; height: 24px; object-fit: contain; flex-shrink: 0; }
      .ts-team-name {
        flex: 1; min-width: 0;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 14px; font-weight: 700; letter-spacing: 0.04em;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        color: rgba(255,255,255,0.8);
      }
      .ts-bar-wrap { flex: 0 0 120px; }
      .ts-bar-bg { background: rgba(255,255,255,0.07); border-radius: 3px; height: 6px; }
      .ts-bar-fill { height: 6px; border-radius: 3px; background: var(--current-accent, #fff); transition: width 0.5s; }
      .ts-rate {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 16px; font-weight: 800;
        color: #fff;
        width: 50px; text-align: right; flex-shrink: 0;
      }
      .ts-total {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px; color: rgba(255,255,255,0.25);
        width: 40px; text-align: right; flex-shrink: 0;
      }

      /* ── TEAM DETAIL VIEW ───────────────────── */
      .team-detail-header {
        display: flex; align-items: center; gap: 16px; margin-bottom: 28px;
      }
      .team-detail-logo { width: 52px; height: 52px; object-fit: contain; }
      .team-detail-name {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 32px; font-weight: 900; letter-spacing: 0.02em; text-transform: uppercase;
        color: #fff;
      }
      .team-detail-back {
        margin-left: auto;
        padding: 8px 16px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 6px;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
        color: rgba(255,255,255,0.5);
        cursor: pointer;
        transition: all 0.15s;
      }
      .team-detail-back:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

      .detail-section-title {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase;
        color: rgba(255,255,255,0.3); margin-bottom: 14px;
      }

      /* 맵 카드 그리드 */
      .map-card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 12px; margin-bottom: 32px;
      }
      .map-card {
        position: relative; border-radius: 10px; overflow: hidden;
        aspect-ratio: 16/9; cursor: pointer;
        border: 1px solid rgba(255,255,255,0.08);
        transition: transform 0.15s, border-color 0.15s;
      }
      .map-card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.25); }
      .map-card img { width: 100%; height: 100%; object-fit: cover; display: block; filter: brightness(0.5); transition: filter 0.15s; }
      .map-card:hover img { filter: brightness(0.65); }
      .map-card-overlay {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 12px;
        background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 60%);
      }
      .map-card-name {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 15px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase;
        color: #fff;
      }
      .map-card-wr {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.6);
      }
      .map-card-comps {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px; color: rgba(255,255,255,0.4);
      }

      /* 맵 승률 바 차트 */
      .map-winrate-section { margin-bottom: 32px; }
      .map-wr-row {
        display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
      }
      .map-wr-name {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px; font-weight: 700; text-transform: uppercase;
        color: rgba(255,255,255,0.6); width: 80px; flex-shrink: 0;
      }
      .map-wr-bar-bg { flex: 1; background: rgba(255,255,255,0.07); border-radius: 4px; height: 8px; }
      .map-wr-bar-fill { height: 8px; border-radius: 4px; background: var(--current-accent,#fff); transition: width 0.4s; }
      .map-wr-pct {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 14px; font-weight: 800; color: #fff; width: 45px; text-align: right; flex-shrink: 0;
      }
      .map-wr-record {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px; color: rgba(255,255,255,0.3); width: 50px; flex-shrink: 0;
      }

      /* ── 팀 상세 스테이지 필터 ── */
      .td-stage-filter {
        display: flex; gap: 7px; flex-wrap: wrap;
        margin: 16px 0 20px;
      }
      .td-stage-btn {
        padding: 6px 16px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px;
        color: rgba(255,255,255,0.45);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
        cursor: pointer; transition: all 0.15s;
      }
      .td-stage-btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.2); }
      .td-stage-btn.active {
        background: color-mix(in srgb, var(--current-accent,#fff) 14%, transparent);
        border-color: color-mix(in srgb, var(--current-accent,#fff) 50%, transparent);
        color: var(--current-accent,#fff);
      }

      /* ── 밴픽 (새 디자인) ── */
      .banpick-section { margin-bottom: 32px; }
      .banpick-table { display: flex; flex-direction: column; }
      .bp-row-new {
        display: flex; align-items: center; gap: 14px;
        padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
      }
      .bp-row-new:last-child { border-bottom: none; }
      .bp-map-thumb {
        width: 72px; height: 40px; object-fit: cover; border-radius: 5px;
        flex-shrink: 0; background: rgba(255,255,255,0.05);
      }
      .bp-info { flex: 1; min-width: 0; }
      .bp-mapname {
        font-family: "Barlow Condensed", sans-serif; font-size: 11px; font-weight: 800;
        text-transform: uppercase; color: rgba(255,255,255,0.45); margin-bottom: 5px;
      }
      .bp-bar-group { display: flex; flex-direction: column; gap: 4px; }
      .bp-bar-line { display: flex; align-items: center; gap: 8px; }
      .bp-bar-tag {
        font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
        width: 18px; text-align: right; flex-shrink: 0;
      }
      .bp-bar-tag.pick { color: var(--current-accent, #01d2d7); }
      .bp-bar-tag.ban  { color: #e84040; }
      .bp-bar-outer { flex: 1; height: 7px; background: rgba(255,255,255,0.07); border-radius: 4px; overflow: hidden; }
      .bp-bar-inner { height: 100%; border-radius: 4px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
      .bp-bar-inner.pick { background: var(--current-accent, #01d2d7); }
      .bp-bar-inner.ban  { background: #e84040; }
      .bp-bar-count {
        font-family: "Barlow Condensed", sans-serif; font-size: 12px; font-weight: 700;
        color: rgba(255,255,255,0.4); width: 22px; text-align: right; flex-shrink: 0;
      }

      /* 조합 팝업 */
      .comp-modal-bg {
        position: fixed; inset: 0; background: rgba(0,0,0,0.7);
        display: flex; align-items: center; justify-content: center;
        z-index: 500; padding: 24px;
        backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      }
      .comp-modal {
        background: #131318; border: 1px solid rgba(255,255,255,0.1);
        border-radius: 16px; max-width: 560px; width: 100%;
        max-height: 80vh; overflow-y: auto;
        padding: 24px;
      }
      .comp-modal-header {
        display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
      }
      .comp-modal-map-img {
        width: 80px; height: 45px; object-fit: cover; border-radius: 6px;
      }
      .comp-modal-map-name {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 22px; font-weight: 900; text-transform: uppercase; color: #fff;
      }
      .comp-modal-close {
        margin-left: auto;
        background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.4);
        font-size: 20px; padding: 4px 8px; transition: color 0.15s;
      }
      .comp-modal-close:hover { color: #fff; }
      .comp-entry {
        display: flex; align-items: center; gap: 10px;
        padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
      }
      .comp-entry:last-child { border-bottom: none; }
      .comp-agents { display: flex; gap: 4px; }

      el.classList.remove("hidden");

      filters.forEach(function(f) {

    function renderTeamPicker(league) {
      var grid = document.getElementById("teamGrid");

      var teams = LEAGUE_TEAMS[league] || [];
      teams.forEach(function(t) {
        var chip = document.createElement("div");

          '<span class="chip-code">'+ esc(TEAM_CODES[t] || t) +'</span>';

          if (currentTeam === t) {
            /* 선택 해제 */
            currentTeam = null;

            renderMainView();

            currentTeam = t;

    /* ── HTML 이스케이프 ── */
    function esc(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    /* ── DB 진단 ── */
    function runDiag() {
      var overlay = document.getElementById("diagOverlay");
      var result  = document.getElementById("diagResult");
      overlay.style.display = "flex";
      result.textContent = "로딩 중...";
      fetch("/api/admin/records-diag")
        .then(function(r){ return r.json(); })
        .then(function(d){
          /* 핵심 요약만 표시 */
          var lines = [];
          lines.push("■ auto-match: 총 " + (d.autoMatch && d.autoMatch.total || 0) + "건");
          if (d.autoMatch && d.autoMatch.byLeague) {
            Object.keys(d.autoMatch.byLeague).forEach(function(lg){
              lines.push("    " + lg + ": " + d.autoMatch.byLeague[lg] + "건");
            });
          }
          lines.push("");
          lines.push("■ match-meta: 총 " + (d.matchMeta && d.matchMeta.total || 0) + "건");
          if (d.matchMeta && d.matchMeta.byLeague) {
            Object.keys(d.matchMeta.byLeague).forEach(function(lg){
              lines.push("    " + lg + ": " + d.matchMeta.byLeague[lg] + "건");
            });
          }
          lines.push("");
          lines.push("■ players:  " + (d.players && d.players.count || 0) + "건");
          lines.push("■ rounds:   " + (d.rounds  && d.rounds.count  || 0) + "건");
          lines.push("■ veto:     " + (d.veto    && d.veto.count    || 0) + "건");
          lines.push("■ vct_p:    " + (d.vctP    && d.vctP.players  || 0) + "명 / " + (d.vctP && d.vctP.totalMapEntries || 0) + "맵");
          lines.push("  league별: " + JSON.stringify((d.vctP && d.vctP.byLeague) || {}));
          lines.push("  emptyLeague: " + (d.vctP && d.vctP.emptyLeague || 0) + "건");
          /* vct_p league별 샘플 matchKey 표시 */
          if (d.vctP && d.vctP.samples) {
            Object.keys(d.vctP.samples).forEach(function(lg) {
              lines.push("  [" + lg + "] 샘플:");
              (d.vctP.samples[lg] || []).forEach(function(s) {
                lines.push("    " + s.player + " | matchKey=" + s.matchKey + " | stage=" + s.stage);
              });
            });
          }
          lines.push("");
          lines.push("■ vct_roster: " + (d.vctRoster && d.vctRoster.teams || 0) + "팀");
          lines.push("  " + ((d.vctRoster && d.vctRoster.keys) || []).join(", "));
          if (d.players && d.players.sampleKeys) {
            lines.push("");
            lines.push("■ players 키 샘플:");
            d.players.sampleKeys.forEach(function(k){ lines.push("  " + k); });
          }
          if (d.players && d.players.pacificVctpMatchKeys && d.players.pacificVctpMatchKeys.length) {
            lines.push("");
            lines.push("■ vct_p pacific matchKey 목록 (→ players: 연결 확인용):");
            d.players.pacificVctpMatchKeys.forEach(function(mk){ lines.push("  matchKey=" + mk); });
            lines.push("  → players: 엔트리 중 매칭: " + (d.players.pacificPlayerEntries || 0) + "건");
          }
          /* auto-match 샘플 — 모든 league 키 표시 */
          if (d.autoMatch && d.autoMatch.samples) {
            Object.keys(d.autoMatch.samples).forEach(function(lg) {
              lines.push("");
              lines.push("■ auto-match [" + lg + "] 샘플:");
              (d.autoMatch.samples[lg] || []).forEach(function(s){ lines.push("  " + JSON.stringify(s)); });
            });
          }
          result.textContent = lines.join("\n");
        })
        .catch(function(e){
          result.textContent = "오류: " + e.message;
        });
    }

    /* ── 로딩 표시 ── */
    function showLoading(msg) {
      document.getElementById("contentArea").innerHTML =
        '<div class="placeholder"><div class="ph-icon">⏳</div><p>'+ esc(msg||"로딩 중...") +'</p></div>';
    }

    /* ── compute API 호출 → 메인 뷰 렌더 ── */
    function loadAndRender() {
      if (!currentLeague) return;
      showLoading("데이터 계산 중...");
      var apiLeague = currentLeague;
      var url = "/api/records/compute?league=" + encodeURIComponent(apiLeague) +
                "&stage=" + encodeURIComponent(currentStage);
      if (currentQualifier) {
        url += "&qualifier=" + encodeURIComponent(currentQualifier);
      }
      fetch(url)
        .then(function(r){ return r.json(); })
        .then(function(data) {
          if (!data.ok) { showError(data.error || "오류"); return; }
          /* 디버그 정보 콘솔 출력 */
          if (data._debug) {
            console.log("[records compute debug]", data._debug);
          }
          lastComputeData = data;
          if (currentTeam) {
            loadTeamDetail(currentTeam);
          } else {
            renderMainView();
          }
        })
        .catch(function(e) { showError(e.message); });
    }

    function showError(msg) {
      document.getElementById("contentArea").innerHTML =
        '<div class="placeholder"><div class="ph-icon">⚠️</div><p>오류: '+ esc(msg) +'</p></div>';
    }

    /* ── 메인 뷰 렌더 (ACS/KD + 팀통계 캐러셀) ── */
    function renderMainView() {
      if (!lastComputeData) return;
      var data = lastComputeData;
      var accent = LEAGUE_ACCENT[currentLeague] || "#fff";
      var hasPicker = !!LEAGUE_TEAMS[currentLeague];

      var html = "";

      /* qualifier 설명 배너 */
      if (currentQualifier && data.qualifierTeams) {
        var qLabelMap = {
          "masters-santiago": "Masters Santiago 진출팀 · KickOff 성적",
          "masters-london":   "Masters London 진출팀 · Stage 1 성적",
          "champions":        "Champions 진출팀 · Stage 2 성적",
        };
        html += '<div style="background:rgba(160,122,255,0.12);border:1px solid rgba(160,122,255,0.3);border-radius:8px;padding:10px 16px;margin-bottom:16px;font-family:\'Barlow Condensed\',sans-serif;">'
              + '<div style="font-size:12px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:#a07aff;">'+ esc(qLabelMap[currentQualifier]||currentQualifier) +'</div>'
              + '</div>';
      }

      /* 매치 수 표시 */
      html += '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:12px;color:rgba(255,255,255,0.3);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:20px;">'
            + '총 ' + data.matchCount + '경기 집계</div>';

      /* ACS/KD 패널 */
      html += '<div class="stats-section">';
      html += renderStatPanel("평균 ACS Top 10", data.topAcs, "acs");
      html += renderStatPanel("K/D Ratio Top 10", data.topKd, "kd");
      html += '</div>';

      /* 팀 통계 캐러셀: global 이 아니고 팀 선택기 있는 리그에서만 */
      if (hasPicker && currentLeague !== "global") {
        html += renderCarouselSection(data.teamStats, accent);
      }

      document.getElementById("contentArea").innerHTML = html;

      /* 캐러셀 초기화 */
      if (hasPicker && currentLeague !== "global") {
        initCarousel();
      }
    }

    /* ── Stat 패널 HTML ── */
    function renderStatPanel(title, rows, field) {
      if (!rows || !rows.length) {
        return '<div class="stat-panel"><div class="stat-panel-header"><span class="stat-panel-title">'
          + esc(title) + '</span></div><div class="empty-note">데이터 없음</div></div>';
      }
      var html = '<div class="stat-panel"><div class="stat-panel-header"><span class="stat-panel-title">'
        + esc(title) + '</span></div><div class="stat-rows">';
      rows.forEach(function(p, i) {
        var rankCls = i===0?"gold":i===1?"silver":i===2?"bronze":"";
        var val = field === "acs" ? p.acs : p.kd;
        var valStr = field === "kd" ? Number(val).toFixed(2) : String(val);
        var teamCode = TEAM_CODES[p.team] || p.team || "—";
        var teamLogo = TEAM_LOGOS[p.team] || "";
        html += '<div class="stat-row">'
          + '<div class="stat-rank '+ rankCls +'">'+ (i+1) +'</div>'
          + '<div class="stat-player">'
          +   (teamLogo ? '<img class="stat-team-logo" src="'+ esc(teamLogo) +'" alt="" onerror="this.style.display=\'none\'">' : '')
          +   '<div class="stat-player-info">'
          +     '<div class="stat-player-name">'+ esc(p.name) +'</div>'
          +     '<div class="stat-player-team">'+ esc(teamCode) +'</div>'
          +   '</div>'
          + '</div>'
          + '<div class="stat-maps">'+ p.maps +'맵</div>'
          + '<div class="stat-value">'+ valStr +'</div>'
          + '</div>';
      });
      html += '</div></div>';
      return html;
    }

    /* ── 캐러셀 섹션 HTML ── */
    function renderCarouselSection(teamStats, accent) {
      var pages = [
        { title: "피스톨 라운드 승률", field: "pistol" },
        { title: "공격 라운드 승률",   field: "atk"    },
        { title: "수비 라운드 승률",   field: "def"    },
      ];
      var html = '<div class="carousel-section">'
        + '<div class="carousel-nav">'
        + '<span class="carousel-label">팀 라운드 통계</span>'
        + '<button class="carousel-prev" onclick="moveCarousel(-1)">&#8592;</button>'
        + '<div class="carousel-dots" id="carouselDots"></div>'
        + '<button class="carousel-next" onclick="moveCarousel(1)">&#8594;</button>'
        + '</div>'
        + '<div class="carousel-track-wrap"><div class="carousel-track" id="carouselTrack">';

      pages.forEach(function(page) {
        html += '<div class="carousel-page">' + renderTeamStatPage(page.title, page.field, teamStats) + '</div>';
      });

      html += '</div></div></div>';
      return html;
    }

    /* ── 팀 통계 페이지 HTML ── */
    function renderTeamStatPage(title, field, teamStats) {
      var teams = Object.keys(teamStats || {});
      if (!teams.length) {
        return '<div class="team-stat-panel"><div class="team-stat-header"><span class="team-stat-title">'
          + esc(title) + '</span></div><div class="empty-note">데이터 없음</div></div>';
      }

      /* 정렬 */
      var rows = teams.map(function(t) {
        var s = teamStats[t];
        var wins = 0, total = 0;
        if (field === "pistol") { wins = s.pistolWins; total = s.pistolTotal; }
        else if (field === "atk") { wins = s.atkWins; total = s.atkTotal; }
        else if (field === "def") { wins = s.defWins; total = s.defTotal; }
        var rate = total > 0 ? wins / total : 0;
        return { name: t, wins: wins, total: total, rate: rate };
      }).filter(function(r){ return r.total > 0; })
        .sort(function(a,b){ return b.rate - a.rate; });

      var maxRate = rows.length ? rows[0].rate : 1;

      var html = '<div class="team-stat-panel"><div class="team-stat-header"><span class="team-stat-title">'
        + esc(title) + '</span></div><div class="team-stat-rows">';

      rows.forEach(function(r, i) {
        var rankCls = i===0?"gold":i===1?"silver":i===2?"bronze":"";
        var pct = (r.rate * 100).toFixed(1) + "%";
        var barW = maxRate > 0 ? Math.round(r.rate / maxRate * 100) : 0;
        var logo = TEAM_LOGOS[r.name] || "";
        html += '<div class="team-stat-row">'
          + '<div class="ts-rank '+ rankCls +'">'+ (i+1) +'</div>'
          + (logo ? '<img class="ts-logo" src="'+ esc(logo) +'" alt="" onerror="this.style.display=\'none\'">' : '<div style="width:24px"></div>')
          + '<div class="ts-team-name">'+ esc(TEAM_CODES[r.name] || r.name) +'</div>'
          + '<div class="ts-bar-wrap"><div class="ts-bar-bg"><div class="ts-bar-fill" style="width:'+ barW +'%"></div></div></div>'
          + '<div class="ts-rate">'+ pct +'</div>'
          + '<div class="ts-total">'+ r.wins +'/'+ r.total +'</div>'
          + '</div>';
      });

      html += '</div></div>';
      return html;
    }

    /* ── 캐러셀 초기화 / 이동 ── */
    function initCarousel() {
      var dots = document.getElementById("carouselDots");
      if (!dots) return;
      dots.innerHTML = "";
      for (var i = 0; i < 3; i++) {
        var d = document.createElement("div");
        d.className = "carousel-dot" + (i===carouselIdx?" active":"");
        (function(idx){ d.onclick = function(){ carouselIdx = idx; updateCarousel(); }; })(i);
        dots.appendChild(d);
      }
      updateCarousel();
    }
    function moveCarousel(dir) {
      carouselIdx = Math.max(0, Math.min(2, carouselIdx + dir));
      updateCarousel();
    }
    function updateCarousel() {
      var track = document.getElementById("carouselTrack");
      if (track) track.style.transform = "translateX(-" + (carouselIdx * 100) + "%)";
      var dots = document.getElementById("carouselDots");
      if (dots) {
        dots.querySelectorAll(".carousel-dot").forEach(function(d, i) {
          d.classList.toggle("active", i === carouselIdx);
        });
      }
    }

    /* ── 팀 상세 스테이지 옵션 ── */
    function getTeamDetailStageOpts(league) {
      if (["pacific","cn","americas","emea"].indexOf(league) !== -1) {
        return [
          {key:"all",     label:"전체"},
          {key:"kickoff", label:"KickOff"},
          {key:"stage1",  label:"Stage 1"},
          {key:"stage2",  label:"Stage 2"},
        ];
      }
      if (league === "masters-santiago" || league === "masters-london") {
        return [
          {key:"all",        label:"전체"},
          {key:"groupstage", label:"Group Stage"},
          {key:"playoffs",   label:"Playoffs"},
        ];
      }
      if (league === "champions") {
        return [
          {key:"all",      label:"전체"},
          {key:"swiss",    label:"Swiss"},
          {key:"playoffs", label:"Playoffs"},
        ];
      }
      return [{key:"all", label:"전체"}];
    }

    function switchTeamDetailStage(stage) {
      currentTeamDetailStage = stage;
      loadTeamDetail(currentTeam);
    }

    /* ── 팀 상세 로드 ── */
    function loadTeamDetail(teamName) {
      currentTeam = teamName;
      showLoading(teamName + " 데이터 로딩 중...");
      var url = "/api/records/team-detail?league=" + encodeURIComponent(currentLeague)
              + "&stage=" + encodeURIComponent(currentTeamDetailStage)
              + "&team=" + encodeURIComponent(teamName);
      fetch(url)
        .then(function(r){ return r.json(); })
        .then(function(data) {
          if (!data.ok) { showError(data.error || "오류"); return; }
          renderTeamDetail(teamName, data);
        })
        .catch(function(e) { showError(e.message); });
    }

    /* ── 팀 상세 뷰 렌더 ── */
    function renderTeamDetail(teamName, data) {
      var logo = TEAM_LOGOS[teamName] || "";
      var html = "";

      /* 헤더 */
      html += '<div class="team-detail-header">';
      if (logo) html += '<img class="team-detail-logo" src="'+ esc(logo) +'" alt="" onerror="this.style.display=\'none\'">';
      html += '<div class="team-detail-name">'+ esc(teamName) +'</div>';
      html += '<button class="team-detail-back" onclick="clearTeam()">← 돌아가기</button>';
      html += '</div>';

      /* 스테이지 필터 탭 */
      var stageOpts = getTeamDetailStageOpts(currentLeague);
      if (stageOpts.length > 1) {
        html += '<div class="td-stage-filter">';
        stageOpts.forEach(function(opt) {
          var isActive = currentTeamDetailStage === opt.key;
          html += '<button class="td-stage-btn'+ (isActive ? ' active' : '') +'" '
                + 'onclick="switchTeamDetailStage(\''+ opt.key +'\')">'
                + esc(opt.label)
                + '</button>';
        });
        html += '</div>';
      }

      /* 맵별 에이전트 조합 카드 그리드 */
      var comps = data.compositions || {};
      var mapWr  = data.mapWinRates  || {};
      var banpick = data.banPick      || {};
      var mapNames = Object.keys(comps);

      if (!mapNames.length) {
        html += '<div class="empty-note">조합 데이터가 없습니다.</div>';
        document.getElementById("contentArea").innerHTML = html;
        return;
      }

      html += '<div class="detail-section-title">맵별 에이전트 조합</div>';
      html += '<div class="map-card-grid">';
      mapNames.forEach(function(mapName) {
        var img = MAP_IMG[mapName] || "";
        var wr = mapWr[mapName];
        var wrStr = wr ? Math.round(wr.wins/wr.total*100)+"%" : "—";
        var wrRecord = wr ? wr.wins+"W/"+( wr.total-wr.wins)+"L" : "";
        var compsArr = comps[mapName] || [];
        html += '<div class="map-card" onclick="showCompModal(\''+ esc(mapName.replace(/'/g,"\\'")) +'\')">'
          + (img ? '<img src="'+esc(img)+'" alt="">' : '<div style="background:#222;width:100%;height:100%"></div>')
          + '<div class="map-card-overlay">'
          + '<div class="map-card-name">'+ esc(mapName) +'</div>'
          + '<div class="map-card-wr">'+ wrStr + (wrRecord ? ' ('+wrRecord+')' : '') +'</div>'
          + '<div class="map-card-comps">'+ compsArr.length +'가지 조합</div>'
          + '</div></div>';
      });
      html += '</div>';

      /* 맵 승률 바 차트 */
      if (Object.keys(mapWr).length) {
        html += '<div class="map-winrate-section">';
        html += '<div class="detail-section-title">맵별 승률</div>';
        var wrRows = Object.keys(mapWr).map(function(mn) {
          var d2 = mapWr[mn];
          return { name: mn, wins: d2.wins, total: d2.total, rate: d2.total > 0 ? d2.wins/d2.total : 0 };
        }).sort(function(a,b){ return b.rate - a.rate; });
        wrRows.forEach(function(r) {
          var pct = Math.round(r.rate * 100);
          html += '<div class="map-wr-row">'
            + '<div class="map-wr-name">'+ esc(r.name) +'</div>'
            + '<div class="map-wr-bar-bg"><div class="map-wr-bar-fill" style="width:'+ pct +'%"></div></div>'
            + '<div class="map-wr-pct">'+ pct +'%</div>'
            + '<div class="map-wr-record">'+ r.wins +'W/'+(r.total-r.wins)+'L</div>'
            + '</div>';
        });
        html += '</div>';
      }

      /* 밴픽 */
      if (Object.keys(banpick).length) {
        /* 최대값 계산 (바 비율용) */
        var maxPick = 1, maxBan = 1;
        Object.keys(banpick).forEach(function(mn) {
          var bp = banpick[mn];
          var p = (bp.teamPick||0) + (bp.opponentPick||0);
          var b = (bp.teamBan||0) + (bp.opponentBan||0);
          if (p > maxPick) maxPick = p;
          if (b > maxBan)  maxBan  = b;
        });
        /* 총 픽(=플레이) 기준 내림차순 정렬 */
        var bpKeys = Object.keys(banpick).sort(function(a, b2) {
          var pa = (banpick[a].teamPick||0) + (banpick[a].opponentPick||0);
          var pb = (banpick[b2].teamPick||0) + (banpick[b2].opponentPick||0);
          return pb - pa;
        });

        html += '<div class="banpick-section">';
        html += '<div class="detail-section-title">맵 밴픽</div>';
        html += '<div class="banpick-table">';
        bpKeys.forEach(function(mn) {
          var bp = banpick[mn];
          var teamPick = bp.teamPick || 0;
          var oppPick  = bp.opponentPick || 0;
          var teamBan  = bp.teamBan  || 0;
          var totalPick = teamPick + oppPick;
          var img = MAP_IMG[mn] || "";
          var pickPct = Math.round(totalPick / maxPick * 100);
          var banPct  = Math.round(teamBan   / maxBan  * 100);
          html += '<div class="bp-row-new">'
            + (img ? '<img class="bp-map-thumb" src="'+ esc(img) +'" alt="">' : '<div class="bp-map-thumb"></div>')
            + '<div class="bp-info">'
            +   '<div class="bp-mapname">'+ esc(mn) +'</div>'
            +   '<div class="bp-bar-group">'
            +     '<div class="bp-bar-line">'
            +       '<span class="bp-bar-tag pick">픽</span>'
            +       '<div class="bp-bar-outer"><div class="bp-bar-inner pick" style="width:'+ pickPct +'%"></div></div>'
            +       '<span class="bp-bar-count">'+ totalPick +'</span>'
            +     '</div>'
            +     '<div class="bp-bar-line">'
            +       '<span class="bp-bar-tag ban">밴</span>'
            +       '<div class="bp-bar-outer"><div class="bp-bar-inner ban" style="width:'+ banPct +'%"></div></div>'
            +       '<span class="bp-bar-count">'+ teamBan +'</span>'
            +     '</div>'
            +   '</div>'
            + '</div>'
            + '</div>';
        });
        html += '</div></div>';
      }

      /* 조합 데이터 저장 (팝업용) */
      window._currentComps = comps;

      document.getElementById("contentArea").innerHTML = html;
    }

    /* ── 조합 팝업 ── */
    function showCompModal(mapName) {
      var comps = (window._currentComps || {})[mapName] || [];
      var img = MAP_IMG[mapName] || "";
      var html = '<div class="comp-modal-bg" id="compModalBg" onclick="closeCompModal(event)">'
        + '<div class="comp-modal">'
        + '<div class="comp-modal-header">'
        + (img ? '<img class="comp-modal-map-img" src="'+esc(img)+'" alt="">' : "")
        + '<div class="comp-modal-map-name">'+ esc(mapName) +'</div>'
        + '<button class="comp-modal-close" onclick="document.getElementById(\'compModal\').remove()">&#10005;</button>'
        + '</div>';

      if (!comps.length) {
        html += '<div class="empty-note">조합 없음</div>';
      } else {
        comps.forEach(function(c) {
          html += '<div class="comp-entry"><div class="comp-agents">';
          c.agents.forEach(function(ag) {
            var agImg = AGENT_IMG[ag] || "";
            html += agImg
              ? '<img class="comp-agent-img" src="'+esc(agImg)+'" title="'+esc(ag)+'" alt="'+esc(ag)+'">'
              : '<div class="comp-agent-img" title="'+esc(ag)+'"></div>';
          });
          html += '</div><div style="flex:1"></div>'
            + '<div style="text-align:right">'
            + '<div class="comp-count">'+ c.count +'</div>'
            + '<div class="comp-count-label">경기</div>'
            + '</div></div>';
        });
      }

      html += '</div></div>';
      var el = document.createElement("div");
      el.id = "compModal";
      el.innerHTML = html;
      document.body.appendChild(el);
    }
    function closeCompModal(e) {
      if (e.target.id === "compModalBg") {
        var el = document.getElementById("compModal");
        if (el) el.remove();
      }
    }

    /* ── 팀 선택 해제 → 메인 뷰 복귀 ── */
    function clearTeam() {
      currentTeam            = null;
      currentTeamDetailStage = "all";
      /* 팀 선택기 체크 해제 */
      document.querySelectorAll(".team-chip").forEach(function(c){ c.classList.remove("active"); });
      renderMainView();
    }

    </script>
  </body>
</html>
