<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VCT CN 2026 경기 상세</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet" />
  <script src="./storage.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0a0b;
      color: #e8e4e0;
      font-family: 'Noto Sans KR', sans-serif;
      padding: 0 24px;
      min-height: 100vh;
    }

    /* ── MAP CARD ─────────────────────────────── */
    .map-card {
      background: #0f0a0b;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 4px;
      margin-bottom: 24px;
      overflow: hidden;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ── SCOREBOARD ─────────────────────────────── */
    .map-scoreboard {
      position: relative;
      width: 100%;
      overflow: hidden;
      height: 160px;
      background: linear-gradient(135deg, #0d0406 0%, #150306 50%, #0d0406 100%);
    }

    .scoreboard-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 42%;
      display: block;
    }

    /* 이미지 위 오버레이 */
    .scoreboard-overlay {
      position: absolute;
      inset: 0;
    }

    /* 팀 이름 (절대 위치) */
    .sb-team-name {
      position: absolute;
      top: 42%;
      transform: translateY(-50%);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: clamp(14px, 3vw, 22px);
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 1px 6px rgba(0,0,0,0.8);
    }
    /* 팀 로고+이름 묶음 */
    .sb-team-block {
      position: absolute;
      top: 42%;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sb-team-block-l { left: 24%; transform: translate(-100%, -50%); gap: 18px; }
    .sb-team-block-r { left: 76%; transform: translateY(-50%); gap: 28px; }

    .sb-team-logo.sb-team-logo-white {
      filter: brightness(0) invert(1) drop-shadow(0 1px 4px rgba(0,0,0,0.8));
    }
    .sb-team-logo {
      width: clamp(48px, 7vw, 80px);
      height: clamp(48px, 7vw, 80px);
      object-fit: contain;
      filter: drop-shadow(0 1px 4px rgba(0,0,0,0.8));
      margin-right: 4px;
    }
    .sb-team-name-l, .sb-team-name-r {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: clamp(14px, 3vw, 22px);
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 1px 6px rgba(0,0,0,0.8);
    }

    /* 센터 맵 패널 */
    .sb-center {
      position: absolute;
      top: 42%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 150px;
      height: 94px;
      border: 1px solid rgba(255,255,255,0.28);
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.6), inset 0 0 12px rgba(0,0,0,0.4);
    }
    .sb-map-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
      display: block;
    }
    .sb-map-name {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 4px 0;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      text-align: center;
    }

    /* 다이아몬드 위 스코어 (절대 위치) */
    .sb-score-diamond-l,
    .sb-score-diamond-r {
      position: absolute;
      top: 42%;
      font-family: Impact, 'Barlow Condensed', 'Noto Sans KR', sans-serif;
      font-size: clamp(34px, 6vw, 64px);
      font-weight: 400;
      letter-spacing: 0.02em;
      text-shadow: 0 1px 10px rgba(0,0,0,0.95);
      line-height: 1;
    }
    .sb-score-diamond-l {
      left: 29%;
      transform: translate(-50%, -50%);
      color: #fff;
    }
    .sb-score-diamond-r {
      left: 71%;
      transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.4);
    }
    .sb-score-diamond-l.lose { color: rgba(255,255,255,0.4); }
    .sb-score-diamond-r.win  { color: #fff; }

    /* 클릭 가능한 다이아몬드 오버레이 */
    .sb-diamonds {
      position: absolute;
      top: calc(78% - 13px);
      display: flex; gap: 10px; align-items: center;
      transform: translateY(-50%);
    }
    .sb-diamonds-l { left: 28.5%; transform: translate(calc(-50% + 10px), -50%); }
    .sb-diamonds-r { left: 70%; transform: translate(calc(-50% + 3px), -50%); }
    .sb-diamond {
      width: 13px; height: 13px;
      border: 1.5px solid rgba(255,255,255,0.55);
      transform: rotate(45deg);
      cursor: pointer;
      background: transparent;
      transition: background 0.12s, border-color 0.12s;
      flex-shrink: 0;
    }
    .sb-diamond:hover { border-color: rgba(255,255,255,0.9); }
    .sb-diamond.filled { background: rgba(255,255,255,0.88); border-color: #fff; }

    /* ── ROUND TRACKER ───────────────────────── */
    .rt-wrap {
      display: flex;
      align-items: stretch;
      background: #0d0406;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      overflow: hidden;
    }
    .rt-left {
      flex-shrink: 0;
      border-right: 1px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
    }
    .rt-left-spacer {
      height: 22px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .rt-team-row {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 12px 0 14px;
      height: 34px;
      position: relative;
    }
    .rt-team-row + .rt-team-row {
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .rt-accent {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
    }
    .rt-logo { width: 18px; height: 18px; object-fit: contain; flex-shrink: 0; }
    .rt-logo-white { filter: brightness(0) invert(1); }
    .rt-team-name {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase;
      color: #fff; min-width: 26px;
    }
    .rt-sides { display: flex; flex-direction: column; gap: 2px; margin-left: 2px; }
    .rt-side-box {
      width: 9px; height: 9px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.04);
    }
    .rt-grid-wrap { flex: 1; overflow-x: auto; }
    .rt-grid { display: flex; flex-direction: column; min-width: max-content; }
    .rt-block { display: flex; flex-direction: column; }
    .rt-block + .rt-block {
      border-top: 1px solid rgba(255,255,255,0.07);
      margin-top: 2px;
    }
    .rt-block + .rt-block .rt-num { color: rgba(255,165,60,0.85); } /* OT 라운드 번호 주황색 */
    .rt-row { display: flex; align-items: center; gap: 3px; padding: 0 6px; }
    .rt-row.num-row  { height: 20px; padding-top: 4px; }
    .rt-row.cell-row { height: 34px; padding-bottom: 3px; }
    .rt-row.cell-row + .rt-row.cell-row { padding-top: 0; padding-bottom: 6px; }
    .rt-num {
      width: 28px; flex-shrink: 0; text-align: center;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 9px; font-weight: 700; letter-spacing: 0.04em;
      color: rgba(255,255,255,0.8);
      display: flex; align-items: center; justify-content: center;
    }
    .rt-cell {
      width: 28px; height: 26px; flex-shrink: 0;
      background: #1a0508;
      border: 1px solid rgba(255,255,255,0.35);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s;
    }
    .rt-cell:hover { background: rgba(255,255,255,0.12); }
    .rt-cell.win-atk { background: rgba(208,53,53,0.35); }
    .rt-cell.win-def { background: rgba(0,196,176,0.35); }
    .rt-cell img    { width: 14px; height: 14px; object-fit: contain; display: block; }
    .rt-sep     { width: 6px; flex-shrink: 0; }
    .rt-sep-num { width: 6px; flex-shrink: 0; }

    /* ── ROUND PICKER MODAL ──────────────────── */
    .round-picker {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 2000; display: grid; place-items: center;
    }
    .round-picker-panel {
      background: #fff; border-radius: 10px;
      min-width: 280px; max-width: 460px; width: 90vw;
      overflow: hidden; box-shadow: 0 14px 48px rgba(0,0,0,0.5);
    }
    .round-picker-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid rgba(7,17,17,0.12);
    }
    .round-picker-head strong { font-size: 16px; font-weight: 900; color: #111; }
    .round-picker-head-actions { display: flex; gap: 8px; }
    .rp-clear-btn, .rp-close-btn {
      padding: 4px 10px; border: 1px solid rgba(7,17,17,0.22);
      border-radius: 5px; background: transparent;
      font-size: 13px; cursor: pointer; transition: background 120ms;
    }
    .rp-clear-btn:hover, .rp-close-btn:hover { background: rgba(7,17,17,0.07); }
    .round-picker-body { display: grid; grid-template-columns: 1fr 1fr; }
    .rp-team-section { padding: 12px; border-right: 1px solid rgba(7,17,17,0.1); }
    .rp-team-section:last-child { border-right: 0; }
    .rp-team-label { font-size: 12px; font-weight: 700; margin-bottom: 8px; color: rgba(7,17,17,0.6); }
    .rp-icons { display: flex; flex-direction: column; gap: 3px; }
    .rp-icon-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 7px; border: 1.5px solid transparent;
      border-radius: 6px; background: transparent; cursor: pointer;
      transition: background 110ms, border-color 110ms;
      width: 100%; text-align: left; font-size: 11px; color: rgba(7,17,17,0.7);
    }
    .rp-icon-btn:hover { background: rgba(7,17,17,0.06); }
    .rp-icon-btn.selected { background: rgba(7,17,17,0.09); border-color: rgba(7,17,17,0.28); }
    .rp-icon-btn img { width: 22px; height: 22px; object-fit: contain; flex-shrink: 0; }

    /* ── PLAYER TABLE ─────────────────────────── */
    .player-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 4px;
      padding: 4px 6px 6px;
    }

    /* 컬럼: [skills-l][ult-l][player-l] | div | [player-r][ult-r][skills-r] */
    .player-table colgroup col:nth-child(1) { width: 96px; }   /* left skills */
    .player-table colgroup col:nth-child(2) { width: 50px; }   /* left ult */
    .player-table colgroup col:nth-child(3) { width: auto; }   /* left player cell */
    .player-table colgroup col:nth-child(4) { width: 1px;  }   /* divider */
    .player-table colgroup col:nth-child(5) { width: auto; }   /* right player cell */
    .player-table colgroup col:nth-child(6) { width: 52px; }   /* right ult */
    .player-table colgroup col:nth-child(7) { width: 96px; }   /* right skills */

    /* ── PLAYER CELL ── */
    .player-cell {
      border: 1px solid rgba(255,255,255,0.35);
      padding: 0 !important;
      vertical-align: top;
    }
    /* 이미지 + 텍스트 영역을 stretch로 */
    .pc-inner {
      display: flex;
      align-items: center;
      width: 100%;
      height: 54px;
      box-sizing: border-box;
      overflow: hidden;
    }
    /* 요원 이미지 래퍼 */
    .pc-agent {
      width: 54px;
      height: 54px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .pc-agent .agent-portrait {
      width: 54px;
      height: 54px;
      object-fit: cover;
      object-position: top center;
      display: block;
      border: none;
    }
    /* 이름+KDA 텍스트 영역 */
    .pc-text {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      flex: 1;
    }
    /* 왼팀: ACS+KDA 묶음을 오른쪽 끝으로 */
    .player-cell-l .pc-stats { margin-left: auto; }
    /* 오른팀: 이름 오른쪽으로 밀고, 이미지 오른쪽 끝 */
    .player-cell-r .pc-name { margin-left: auto; }

    /* ACS+KDA 묶음 */
    .pc-stats {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .pc-acs {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.01em;
      white-space: nowrap;
    }
    /* 오른팀 요원 사진 좌우 반전 */
    .player-cell-r .agent-portrait { transform: scaleX(-1); }

    /* Header row */
    .player-table thead th {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      padding: 6px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .player-table thead th.col-kda-l { text-align: right; }
    .player-table thead th.col-kda-r { text-align: left;  }
    .player-table thead th.col-name-l { text-align: left;  padding-left: 10px; }
    .player-table thead th.col-name-r { text-align: right; padding-right: 10px; }
    .player-table thead th.col-div { background: transparent; }

    /* Data rows */
    .player-table tbody tr { height: 56px; transition: background 0.1s; }
    .player-table tbody tr:hover .player-cell { background: rgba(255,255,255,0.04) !important; }

    .player-table tbody td {
      padding: 7px 8px;
      vertical-align: middle;
    }

    /* Skills column — 가로로 3칸 나란히 */
    .cell-skills { text-align: center; padding: 0 !important; vertical-align: top; }
    .skill-stack {
      display: flex;
      flex-direction: row;
      width: 84px;
      height: 56px;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 0;
      overflow: hidden;
      margin: 0 auto;
    }
    .skill-box {
      flex: 1;
      background: #1a0508;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      overflow: hidden;
      padding: 3px 2px 11px;
      gap: 3px;
    }
    .skill-box img {
      width: 100%;
      max-height: 36px;
      object-fit: contain;
      display: block;
      flex-shrink: 0;
    }
    .skill-charges {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }
    .skill-charge {
      width: 7px;
      height: 2.5px;
      background: rgba(255,255,255,0.75);
    }

    /* ── 체임버 특수 레이아웃 ──────────────────────── */
    .chamber-q-charges {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      justify-content: center;
      width: calc(4 * 3px + 3 * 2px);
      margin: 0 auto;
      flex-shrink: 0;
    }
    .chamber-q-charges .skill-charge {
      width: 3px;
    }
    .chamber-skill-box {
      justify-content: flex-end !important;
      padding-bottom: 11px !important;
    }

    /* ── 아스트라 특수 스킬 레이아웃 ───────────────── */
    .astra-skills-row {
      flex: 1;
      display: flex;
      flex-direction: row;
      min-height: 0;
    }
    .astra-gage-row {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      gap: 3px;
      padding: 2px 3px 3px;
      margin-bottom: 8px;
      flex-shrink: 0;
      background: #1a0508;
    }
    .astra-gage-row img {
      width: 9px;
      height: 9px;
      object-fit: contain;
      display: block;
    }
    .astra-skills-row .skill-box {
      justify-content: flex-start;
      padding-top: 5px;
      padding-bottom: 3px;
    }

    /* ── 레이나 특수 스킬 레이아웃 ─────────────────── */
    .reyna-eq {
      flex: 2;
      display: flex;
      flex-direction: column;
      background: #1a0508;
      overflow: hidden;
    }
    .reyna-eq-imgs {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: row;
      align-items: stretch;
    }
    .reyna-eq-imgs .skill-box {
      border-right: none;
      justify-content: flex-end;
      padding-bottom: 5px;
    }
    .reyna-shared-charges {
      display: flex;
      gap: 2px;
      padding: 2px 3px 3px;
      margin-bottom: 8px;
      flex-shrink: 0;
    }
    .reyna-shared-charge {
      flex: 1;
      height: 2.5px;
      background: rgba(255,255,255,0.75);
    }

    /* Ultimate column */
    .cell-ult { padding: 0 !important; vertical-align: top; }
    .cell-ult-l { padding-right: 4px !important; }
    .cell-ult-r { padding-left: 4px !important; }
    .ult-box {
      width: 48px; height: 56px;
      background: #1a0508;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 0;
      margin: 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .ult-ring-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .ult-icon-img {
      position: relative;
      z-index: 1;
      width: 38%;
      height: 38%;
      object-fit: contain;
      display: block;
      flex-shrink: 0;
    }

    /* Agent portrait */
    .cell-agent {
      text-align: center;
      padding: 5px 4px !important;
    }
    .agent-portrait {
      width: 54px;
      height: 54px;
      border-radius: 0;
      object-fit: cover;
      object-position: top center;
      display: block;
      border: none;
      max-width: 100%;
      max-height: 100%;
    }
    .agent-placeholder {
      width: 48px;
      min-height: 42px;
      border-radius: 0;
      background: #1a0508;
      border-right: 1px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      flex-shrink: 0;
    }

    /* Player name */
    .cell-name-l { text-align: left;  padding-left: 10px !important; }
    .cell-name-r { text-align: right; padding-right: 10px !important; }
    .player-name {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: #fff;
    }
    .player-sub {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      margin-top: 1px;
    }

    /* K/D/A */
    .cell-kda-l { text-align: right; }
    .cell-kda-r { text-align: left;  }

    .kda-display {
      display: inline-flex;
      align-items: baseline;
      gap: 2px;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .kda-k { font-size: 20px; font-weight: 900; color: #fff; }
    .kda-sep { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.3); }
    .kda-d { font-size: 20px; font-weight: 900; color: #fff; }
    .kda-a { font-size: 20px; font-weight: 900; color: #fff; }

    /* MVP / highlight row */
    .row-mvp .player-name { color: #ffd700; }
    .row-mvp .kda-k       { color: #ffd700; }

    /* Center divider column */
    .cell-div {
      background: transparent;
      width: 1px;
      padding: 0 !important;
    }

    /* Inline edit (click to edit KDA) */
    .kda-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: inherit;
      padding: 2px 4px;
      border-radius: 3px;
      transition: background 0.1s;
      display: inline-flex;
    }
    .kda-btn:hover { background: rgba(255,255,255,0.08); }

    /* Edit popup */
    .kda-popup {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.6);
    }
    .kda-popup-panel {
      background: #1a0508;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 20px 24px;
      min-width: 240px;
    }
    .kda-popup-panel h3 {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 14px;
    }
    .kda-popup-panel .kda-inputs {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mo-team-logo-sm {
      width: 48px; height: 48px;

    .mo-logo-white { filter: brightness(0) invert(1); }
    .mo-team-name-lg {

      letter-spacing: 0.06em; text-transform: uppercase; color: #fff;

      font-family: 'Noto Sans KR', sans-serif;
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(255,255,255,0.28);
    }
    .mo-vs-text {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.05em; color: rgba(255,255,255,0.2);
    }
    .mo-match-sub {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 10px; font-weight: 600;
      color: rgba(255,255,255,0.18);
    }
    /* 맵 결과 */
    .mo-results {
      border-top: 1px solid rgba(255,255,255,0.06);
      background: #0d0406;
      display: flex; align-items: center;
      padding: 14px 24px;
    }
    .mo-results-team {
      flex: 1; display: flex; align-items: center; gap: 12px;
    }
    .mo-results-team-b { justify-content: flex-end; }
    .mo-record {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase;
      color: rgba(255,255,255,0.32); white-space: nowrap;
    }
    .mo-map-icons { display: flex; gap: 5px; }
    /* 맵 결과 슬롯: 클릭으로 빈→O→X→빈 순환 */
    .mo-map-slot {
      width: 34px; height: 34px; border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 18px; font-weight: 900; line-height: 1;
      border: 1px solid rgba(255,255,255,0.12);
      background: #1a0508;
      cursor: pointer; user-select: none;
      color: transparent;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .mo-map-slot[data-v="O"].side-a {
      background: rgba(232,64,87,0.15); border-color: rgba(232,64,87,0.5); color: #e84057;
    }
    .mo-map-slot[data-v="O"].side-b {
      background: rgba(232,64,87,0.15); border-color: rgba(232,64,87,0.5); color: #e84057;
    }
    .mo-map-slot[data-v="X"].side-a {
      background: rgba(241,23,46,0.15); border-color: rgba(241,23,46,0.3); color: rgba(241,23,46,0.6);
    }
    .mo-map-slot[data-v="X"].side-b {
      background: rgba(241,23,46,0.15); border-color: rgba(241,23,46,0.3); color: rgba(241,23,46,0.6);

    .mo-score-center {
      width: 140px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; gap: 4px;

      background: rgba(255,255,255,0.05); border-radius: 3px;

    .mo-score-sep {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 26px; color: rgba(255,255,255,0.18);

    /* 시청자 예측 */
    .mo-prediction { border-top: 1px solid rgba(255,255,255,0.06); }
    .mo-pred-title {
      text-align: center; padding: 8px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }
    .mo-pred-bar { display: flex; height: 68px; }
    .mo-pred-side {
      display: flex; align-items: center;
      gap: 12px; padding: 0 20px; overflow: hidden;
    }
    .mo-pred-a {
      background: linear-gradient(to right, rgba(var(--color-a-rgb),0.30), rgba(var(--color-a-rgb),0.06));
      border-top: 1px solid rgba(var(--color-a-rgb),0.25);
    }
    .mo-pred-b {
      background: linear-gradient(to left, rgba(var(--color-b-rgb),0.30), rgba(var(--color-b-rgb),0.06));

    .mo-pred-logo {
      width: 34px; height: 34px;
      object-fit: contain; flex-shrink: 0; opacity: 0.85;
    }
    .mo-pred-info { display: flex; flex-direction: column; gap: 1px; }
    .mo-pred-pct {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 26px; font-weight: 900; color: #fff; line-height: 1;

    .mo-pred-odds {
      font-family: 'Noto Sans KR', sans-serif;

    .mo-pred-sep { width: 1px; background: rgba(255,255,255,0.07); flex-shrink: 0; }
    /* 배당률 입력 팝업 */
    .odds-popup {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 3000; display: grid; place-items: center;
    }
    .odds-popup-panel {
      background: #1a0508; border: 1px solid rgba(255,255,255,0.12);

      box-shadow: 0 12px 40px rgba(0,0,0,0.6);

    .odds-popup-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.08);

    .odds-popup-head strong { font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700; color: #fff; }
    .odds-popup-head button {
      background: transparent; border: 1px solid rgba(255,255,255,0.2);

      flex: 1; background: #0f0a0b; border: 1px solid rgba(255,255,255,0.18);
      border-radius: 4px; color: #fff; font-size: 15px; padding: 7px 10px; outline: none;

    .odds-popup-form input:focus { border-color: rgba(255,255,255,0.45); }
    .odds-popup-form button {
      background: #e84057; border: none; border-radius: 4px;
      color: #fff; font-size: 13px; font-weight: 700; padding: 7px 14px; cursor: pointer;
    }
    /* 맵 밴픽 */
    .mo-veto { border-top: 1px solid rgba(255,255,255,0.06); }
    .mo-veto-title {
      padding: 8px 12px 6px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }
    .mo-veto-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);

      display: flex; flex-direction: column;
      border-radius: 3px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.07);

      padding: 4px 5px; background: #0d0406; text-align: center;

    .mo-veto-action {

      font-size: 9px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
    }

    .mo-veto-action.pick    { color: rgba(100,220,180,0.9); }
    .mo-veto-action.decider { color: rgba(255,200,60,0.85); }
    .mo-veto-who {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 8px; font-weight: 600;
      color: rgba(255,255,255,0.3); margin-top: 1px;

    .mo-veto-img-wrap { position: relative; height: 130px; overflow: hidden; }
    .mo-veto-img {
      width: 100%; height: 100%; object-fit: cover; display: block;

      position: absolute; inset: 0;
      display: flex; align-items: flex-end; padding: 5px;

    .mo-veto-mapname {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px; font-weight: 900;
      color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.9); line-height: 1;

    .mo-veto-cell.banned .mo-veto-mapname { color: rgba(255,255,255,0.45); }
    .mo-veto-bottom {
      padding: 3px 5px 4px; background: #0d0406; text-align: center;

    .mo-veto-side {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 8px; font-weight: 700;

    .mo-veto-cell.pick-a .mo-veto-bottom { background: rgba(232,64,87,0.18); }
    .mo-veto-cell.pick-a .mo-veto-side   { color: #e84057; }
    .mo-veto-cell.pick-b .mo-veto-top    { background: rgba(241,23,46,0.15); }
    .mo-veto-cell.pick-b .mo-veto-bottom { background: rgba(241,23,46,0.18); }

    .mo-veto-cell.decider-cell .mo-veto-top    { background: rgba(255,200,60,0.1); }
    .mo-veto-cell.decider-cell .mo-veto-bottom { background: rgba(255,200,60,0.1); }
    .mo-veto-cell.decider-cell .mo-veto-side   { color: rgba(255,200,60,0.8); }

    /* 밴픽 편집 팝업 */
    .veto-popup {

  if (label) label.textContent = activeMapCount + " / " + maxMaps;

function roundIsAttacking(side, roundIdx, firstAttacker) {
  if (!firstAttacker) return null;
  const n = roundIdx + 1;
  let faAtks;
  if (n <= 12)       faAtks = true;
  else if (n <= 24)  faAtks = false;
  else { const ot = n - 24; faAtks = (ot % 2 === 1); }
  return faAtks ? (firstAttacker === side) : (firstAttacker !== side);
}

function kdaHtml(p, mapIdx, playerIdx) {
  let k = p.k, d = p.d, a = p.a;
  if (p.kda != null) {
    const parts = String(p.kda).split("/");
    k = parts[0] ?? 0;
    d = parts[1] ?? 0;
    a = parts[2] ?? 0;
  }
  const isWhite = document.body.classList.contains('white-mode');
  if (isWhite) {
    return `<button class="kda-btn" onclick="openKda(${mapIdx},${playerIdx})" title="KDA 수정">
      <span class="kda-display"><span class="kda-k">${k}</span><span class="kda-sep">/</span><span class="kda-d">${d}</span><span class="kda-sep">/</span><span class="kda-a">${a}</span></span>
    </button>`;
  }
  return `
    <button class="kda-btn" onclick="openKda(${mapIdx},${playerIdx})" title="KDA 수정">
      <span class="kda-display">
        <span class="kda-k">${k}</span>
        <span class="kda-sep">/</span>
        <span class="kda-d">${d}</span>
        <span class="kda-sep">/</span>
        <span class="kda-a">${a}</span>
      </span>
    </button>`;
}

function agentCell(agent) {

  if (src) return `<img class="agent-portrait" src="${src}" alt="${agent}" />`;

}

function hexRgb(hex) {
  const h = hex.replace("#","");
  return `${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)}`;
}

function renderMap(mapData, mapIdx) {
  const tbody = document.getElementById(mapData.tbodyId);
  const sideA = mapData.players.filter(p => p.side === "a");
  const sideB = mapData.players.filter(p => p.side === "b");
  const rows  = Math.max(sideA.length, sideB.length);

  const rA = hexRgb(mapData.colorA);
  const rB = hexRgb(mapData.colorB);
  // player-cell 전체가 하나의 칸 → 왼쪽 끝(요원 사진)부터 그라데이션
  const gradA = `linear-gradient(to right, rgba(${rA},0.32) 0%, rgba(${rA},0.10) 45%, transparent 100%)`;
  const gradB = `linear-gradient(to left,  rgba(${rB},0.32) 0%, rgba(${rB},0.10) 45%, transparent 100%)`;

  function makeSkillStack(p) {
    const s = p.skills || [];
    const agentData = AGENT_DATA[p.agent];

    // 아스트라 특수 레이아웃: 공유 게이지 아이콘 5개
    if (agentData && agentData.layout === 'astra') {
      function astraImg(i) {
        const skill = s[i];
        if (!skill) return '';
        const src = typeof skill === 'string' ? skill : skill.src;
        return src ? `<img src="${src}" alt="" />` : '';
      }
      const gageImg = agentData.gageImg || '';
      const gages = gageImg
        ? Array(5).fill(`<img src="${gageImg}" alt="" />`).join('')
        : '';
      return `<div class="skill-stack" style="flex-direction:column;background:#1a0508">
        <div class="astra-skills-row">
          <div class="skill-box">${astraImg(0)}</div>
          <div class="skill-box">${astraImg(1)}</div>
          <div class="skill-box">${astraImg(2)}</div>
        </div>
        <div class="astra-gage-row">${gages}</div>
      </div>`;
    }

    // 체임버 특수 레이아웃: 스킬 이미지 위 정렬, 게이지 아래 정렬 (e/c: 4개, q: 4+4)
    if (agentData && agentData.layout === 'chamber') {
      function chamberBox(i) {
        const skill = s[i];
        if (!skill) return `<div class="skill-box chamber-skill-box"></div>`;
        const src = typeof skill === 'string' ? skill : skill.src;
        const charges = typeof skill === 'object' ? (skill.charges || 0) : 0;
        const img = src ? `<img src="${src}" alt="" />` : '';
        let bars = '';
        if (charges === 1) {
          bars = `<div style="display:flex;justify-content:center;align-items:center;flex-shrink:0;width:100%;height:7px"><div class="skill-charge" style="width:8px"></div></div>`;
        } else if (charges > 1) {
          bars = `<div class="chamber-q-charges">${'<div class="skill-charge"></div>'.repeat(charges)}</div>`;
        }
        return `<div class="skill-box chamber-skill-box">${img}${bars}</div>`;
      }
      return `<div class="skill-stack">
        ${chamberBox(0)}${chamberBox(1)}${chamberBox(2)}
      </div>`;
    }

    // 레이나 특수 레이아웃: E, Q 공유 게이지
    if (agentData && agentData.layout === 'reyna') {
      function skillImg(i) {
        const skill = s[i];
        if (!skill) return '';
        const src = typeof skill === 'string' ? skill : skill.src;
        return src ? `<img src="${src}" alt="" />` : '';
      }
      const eqCount = agentData.sharedCharges || 2;
      const sharedBars = '<div class="reyna-shared-charge"></div>'.repeat(eqCount);
      const cSkill = s[2];
      const cSrc = cSkill ? (typeof cSkill === 'string' ? cSkill : cSkill.src) : '';
      const cCharges = cSkill && typeof cSkill === 'object' ? (cSkill.charges || 0) : 0;
      const cBars = cCharges > 0
        ? `<div class="skill-charges">${'<div class="skill-charge"></div>'.repeat(cCharges)}</div>`
        : '';
      return `<div class="skill-stack">
        <div class="reyna-eq">
          <div class="reyna-eq-imgs">
            <div class="skill-box">${skillImg(0)}</div>
            <div class="skill-box">${skillImg(1)}</div>
          </div>
          <div class="reyna-shared-charges">${sharedBars}</div>
        </div>
        <div class="skill-box">${cSrc ? `<img src="${cSrc}" alt="" />` : ''}${cBars}</div>
      </div>`;
    }

    // 기본 레이아웃
    const boxes = [0,1,2].map(i => {
      const skill = s[i];
      if (!skill) return `<div class="skill-box"></div>`;
      const src     = typeof skill === 'string' ? skill : skill.src;
      const charges = typeof skill === 'object'  ? (skill.charges || 0) : 0;
      const img     = src ? `<img src="${src}" alt="" />` : '';
      const bars    = charges > 0
        ? `<div class="skill-charges">${'<div class="skill-charge"></div>'.repeat(charges)}</div>`
        : '';
      return `<div class="skill-box">${img}${bars}</div>`;
    }).join("");
    return `<div class="skill-stack">${boxes}</div>`;
  }

  /* 문자열 시드 → 0 이상 1 미만 결정론적 값 (새로고침해도 같음) */
  function seededRand(seed) {
    let h = 0;
    for (let i = 0; i < seed.length; i++) {
      h = (Math.imul(31, h) + seed.charCodeAt(i)) | 0;
    }
    return (h >>> 0) / 0xFFFFFFFF;
  }

  function makeUltRingSvg(charges, filled) {
    const cx = 24, cy = 28, r = 18, sw = 4.2, gapDeg = 9;
    const segDeg = (360 / charges) - gapDeg;
    const isWhite = document.body.classList.contains('white-mode');
    const filledCol = isWhite ? 'rgba(0,0,0,0.70)' : 'rgba(255,255,255,0.88)';
    const emptyCol  = isWhite ? 'rgba(0,0,0,0.12)' : 'rgba(255,255,255,0.16)';

    function pt(angleDeg) {
      const rad = (angleDeg - 90) * Math.PI / 180;
      return [
        (cx + r * Math.cos(rad)).toFixed(2),
        (cy + r * Math.sin(rad)).toFixed(2)
      ];
    }

    let paths = '';
    for (let i = 0; i < charges; i++) {
      const startDeg = (360 / charges) * i + gapDeg / 2;
      const endDeg   = startDeg + segDeg;
      const [x1, y1] = pt(startDeg);
      const [x2, y2] = pt(endDeg);
      const largeArc = segDeg > 180 ? 1 : 0;
      const col = i < filled ? filledCol : emptyCol;
      paths += `<path d="M${x1},${y1} A${r},${r} 0 ${largeArc},1 ${x2},${y2}"
        fill="none" stroke="${col}" stroke-width="${sw}" stroke-linecap="butt"/>`;
    }
    return `<svg class="ult-ring-svg" viewBox="0 0 48 56" xmlns="http://www.w3.org/2000/svg">${paths}</svg>`;
  }

  function makeUltBox(p, mapIdx, pIdx) {
    const charges = (p.ultCharges != null) ? p.ultCharges : 6;
    if (p.ultFilled == null) {
      p.ultFilled = Math.floor(seededRand(p.name + p.agent) * (charges + 1));
    }
    const filled = p.ultFilled;
    const ring   = makeUltRingSvg(charges, filled);
    const icon   = p.ult ? `<img class="ult-icon-img" src="${p.ult}" alt="" />` : '';
    const click  = (mapIdx != null && pIdx != null)
      ? `onclick="clickUlt(${mapIdx},${pIdx})"` : '';
    return `<div class="ult-box" ${click} style="cursor:pointer">${ring}${icon}</div>`;
  }


  let html = "";
  for (let i = 0; i < rows; i++) {
    const a  = sideA[i];
    const b  = sideB[i];
    const ai = a ? mapData.players.indexOf(a) : -1;

// ── 화이트 모드 DB 데이터 마이그레이션 ──────────────────────────
function applyWhiteModeSetState(mapIdx, data) {
  var m = maps[mapIdx];
  if (!m) return;

  if (Array.isArray(data.rows)) {
    var sideA = m.players.filter(function(p) { return p.side === 'a'; });
    var sideB = m.players.filter(function(p) { return p.side === 'b'; });
    data.rows.forEach(function(row, i) {
      var pa = sideA[i];
      var pb = sideB[i];
      if (pa) {
        if (row.aAgent) pa.agent = row.aAgent;
        if (row.aKda && String(row.aKda).indexOf('/') !== -1) {
          pa.kda = row.aKda;
          var pts = String(row.aKda).split('/');
          pa.k = parseInt(pts[0]) || 0;
          pa.d = parseInt(pts[1]) || 0;
          pa.a = parseInt(pts[2]) || 0;
        }
        if (row.aAcs != null) pa.acs = row.aAcs;
        if (row.aPlayer) pa.name = row.aPlayer;
      }
      if (pb) {
        if (row.bAgent) pb.agent = row.bAgent;
        if (row.bKda && String(row.bKda).indexOf('/') !== -1) {
          pb.kda = row.bKda;
          var pts = String(row.bKda).split('/');
          pb.k = parseInt(pts[0]) || 0;
          pb.d = parseInt(pts[1]) || 0;
          pb.a = parseInt(pts[2]) || 0;
        }
        if (row.bAcs != null) pb.acs = row.bAcs;
        if (row.bPlayer) pb.name = row.bPlayer;
      }
    });
  }

  if (data.stats) {
    var s = data.stats;
    var ts = m.teamStats;
    if (ts[0]) { if (s.firstKillsA != null) ts[0].a = s.firstKillsA; if (s.firstKillsB != null) ts[0].b = s.firstKillsB; }
    if (ts[1]) { if (s.thriftyA != null)    ts[1].a = s.thriftyA;    if (s.thriftyB != null)    ts[1].b = s.thriftyB; }
    if (ts[2]) { if (s.postPlantA != null)  ts[2].a = s.postPlantA;  if (s.postPlantB != null)  ts[2].b = s.postPlantB; }
    if (ts[3]) { if (s.clutchA != null)     ts[3].a = s.clutchA;     if (s.clutchB != null)     ts[3].b = s.clutchB; }
    var scoreId = ['m1','m2','m3'][mapIdx];
    if (scoreId && scoreState[scoreId]) {
      if (s.aScore != null) { m.rtState.stats.aScore = s.aScore; scoreState[scoreId].l = s.aScore; }
      if (s.bScore != null) { m.rtState.stats.bScore = s.bScore; scoreState[scoreId].r = s.bScore; }
    }
  }
}

function migrateFromWhiteMode() {
  var prefix = 'set:' + MATCH_KEY + ':';
  Object.keys(localStorage).forEach(function(key) {
    if (key.indexOf(prefix) !== 0) return;
    var rest = key.slice(prefix.length);
    var colonIdx = rest.indexOf(':');
    if (colonIdx === -1) return;
    var mapIdx = parseInt(rest.slice(0, colonIdx));
    if (isNaN(mapIdx) || mapIdx < 0 || mapIdx >= maps.length) return;
    try {
      var raw = localStorage.getItem(key);
      if (!raw) return;
      var data = JSON.parse(raw);
      applyWhiteModeSetState(mapIdx, data);
    } catch(e) {}
  });
}

// ── 라운드 트래커 렌더링 ──────────────────────────────────────
function renderRoundTracker(m, mapIdx) {
  const wrap = document.getElementById(m.rtId);
  if (!wrap) return;

  const state  = m.rtState;
  const rounds = state.rounds || [];
  const aScore = parseInt(state.stats && state.stats.aScore) || 0;
  const bScore = parseInt(state.stats && state.stats.bScore) || 0;
  const total  = Math.max(24, aScore + bScore);

  function isSep(idx) { return idx === 12 || (idx > 12 && idx % 12 === 0 && idx < total); }

  // 왼쪽 팀 패널
  const leftHtml = `
    <div class="rt-left">
      <div class="rt-left-spacer"></div>
      <div class="rt-team-row">
        <div class="rt-accent" style="background:${m.colorA}"></div>
        <img class="rt-logo${m.logoAWhite ? ' rt-logo-white' : ''}" src="${m.logoA}" />
        <span class="rt-team-name">${m.teamA}</span>
      </div>
      <div class="rt-team-row">
        <div class="rt-accent" style="background:${m.colorB}"></div>
        <img class="rt-logo${m.logoBWhite ? ' rt-logo-white' : ''}" src="${m.logoB}" />
        <span class="rt-team-name">${m.teamB}</span>
      </div>
    </div>`;

  // 24라운드씩 블록으로 분할, 각 블록에 왼쪽 팀 패널 포함
  const numBlocks = Math.ceil(total / 24);
  let blocksHtml = '';
  for (let b = 0; b < numBlocks; b++) {
    const start = b * 24;
    const end   = Math.min(start + 24, total);
    let numCells = '', cellsA = '', cellsB = '';
    for (let i = start; i < end; i++) {
      if ((i - start) === 12) {
        numCells += `<div class="rt-sep-num"></div>`;
        cellsA   += `<div class="rt-sep"></div>`;
        cellsB   += `<div class="rt-sep"></div>`;
      }
      numCells += `<div class="rt-num">${String(i + 1).padStart(2, '0')}</div>`;
      const r    = rounds[i] || {};
      const isAtk = ATK_TYPES.includes(r.type);
      const winCls = r.winner ? (isAtk ? ' win-atk' : ' win-def') : '';
      const clsA = r.winner === 'a' ? winCls : '';
      const clsB = r.winner === 'b' ? winCls : '';
      const iconA = (r.winner === 'a' && r.type) ? `<img src="${ROUND_ICONS[r.type]}" alt="" />` : '';
      const iconB = (r.winner === 'b' && r.type) ? `<img src="${ROUND_ICONS[r.type]}" alt="" />` : '';
      cellsA += `<div class="rt-cell${clsA}" data-map="${mapIdx}" data-round="${i}" data-side="a">${iconA}</div>`;
      cellsB += `<div class="rt-cell${clsB}" data-map="${mapIdx}" data-round="${i}" data-side="b">${iconB}</div>`;
    }
    blocksHtml += `
      <div class="rt-wrap">
        ${leftHtml}
        <div class="rt-grid-wrap">
          <div class="rt-grid">
            <div class="rt-block">
              <div class="rt-row num-row">${numCells}</div>
              <div class="rt-row cell-row">${cellsA}</div>
              <div class="rt-row cell-row">${cellsB}</div>
            </div>
          </div>
        </div>
      </div>`;
  }

  wrap.innerHTML = blocksHtml;
  wrap.style.flexDirection = 'column';

  wrap.querySelectorAll('.rt-cell').forEach(cell => {
    cell.addEventListener('click', () => {
      openRoundPicker(wrap, maps[+cell.dataset.map], +cell.dataset.map, +cell.dataset.round);
    });
  });
}

// ── 라운드 픽커 모달 ──────────────────────────────────────────
function openRoundPicker(container, m, mapIdx, roundIdx) {
  document.querySelector(".round-picker")?.remove();
  const state = m.rtState;
  const fa = state.firstAttacker || null;
  const aAtks = roundIsAttacking("a", roundIdx, fa);
  const r = (state.rounds || [])[roundIdx] || {};
  const roundNum = roundIdx + 1;

  const aTypes = fa ? (aAtks ? ATK_TYPES : DEF_TYPES) : [...ATK_TYPES, ...DEF_TYPES];
  const bTypes = fa ? (aAtks ? DEF_TYPES : ATK_TYPES) : [...ATK_TYPES, ...DEF_TYPES];

  function iconGroup(winner, types, label) {
    return `<div class="rp-team-section">
      <div class="rp-team-label">${label}</div>
      <div class="rp-icons">
        ${types.map(t => `
          <button class="rp-icon-btn${r.winner === winner && r.type === t ? " selected" : ""}"
            data-rp-winner="${winner}" data-rp-type="${t}">
            <img src="${ROUND_ICONS[t]}" alt="" />
            ${ROUND_ICON_LABELS[t]}
          </button>`).join("")}
      </div>
    </div>`;
  }

  const aLabel = m.teamA + (fa ? (aAtks ? " (공격)" : " (수비)") : "");
  const bLabel = m.teamB + (fa ? (aAtks ? " (수비)" : " (공격)") : "");

  const picker = document.createElement("div");
  picker.className = "round-picker";
  picker.innerHTML = `
    <div class="round-picker-panel">
      <div class="round-picker-head">
        <strong>라운드 ${roundNum}</strong>
        <div class="round-picker-head-actions">
          ${r.winner ? `<button class="rp-clear-btn" data-rp-clear>초기화</button>` : ""}
          <button class="rp-close-btn" data-rp-close>닫기</button>
        </div>
      </div>
      <div class="round-picker-body">
        ${iconGroup("a", aTypes, aLabel)}
        ${iconGroup("b", bTypes, bLabel)}
      </div>
    </div>`;
  document.body.appendChild(picker);

  picker.addEventListener("click", e => {
    if (e.target === picker || e.target.closest("[data-rp-close]")) {
      picker.remove(); return;
    }
    if (e.target.closest("[data-rp-clear]")) {
      if (!state.rounds) state.rounds = [];
      state.rounds[roundIdx] = { winner: null, type: null };
      saveRoundState(mapIdx);
      renderRoundTracker(m, mapIdx);
      picker.remove(); return;
    }
    const btn = e.target.closest("[data-rp-winner]");
    if (btn) {
      if (!state.rounds) state.rounds = [];
      while (state.rounds.length <= roundIdx) state.rounds.push({ winner: null, type: null });
      state.rounds[roundIdx] = { winner: btn.dataset.rpWinner, type: btn.dataset.rpType };
      saveRoundState(mapIdx);
      renderRoundTracker(m, mapIdx);
      picker.remove();
    }
  });
}

// ── 팀 스탯 렌더링 ────────────────────────────────────────────
function renderTeamStats(m, mapIdx) {
  const wrap = document.getElementById(m.tsId);
  if (!wrap || !m.teamStats) return;

  const aScore = m.rtState.stats.aScore;
  const bScore = m.rtState.stats.bScore;

  /* 숫자 비교: "8/11" 같은 분수형은 분자로 비교 */
  function toNum(v) { return parseFloat(String(v).split("/")[0]) || 0; }

  function winClass(va, vb) {
    const na = toNum(va), nb = toNum(vb);
    if (na > nb) return ["ts-win", "ts-lose"];
    if (nb > na) return ["ts-lose", "ts-win"];
    return ["", ""];
  }

  /* 스코어 행 */
  const [scA, scB] = winClass(aScore, bScore);
  let rows = `
    <div class="ts-row">
      <span class="ts-val ts-val-a ${scA}" style="cursor:pointer"
        onclick="openStatEditor(${mapIdx},'score','a')">${aScore}</span>
      <div class="ts-label-wrap"><span class="ts-label">스코어</span></div>
      <span class="ts-val ts-val-b ${scB}" style="cursor:pointer"
        onclick="openStatEditor(${mapIdx},'score','b')">${bScore}</span>
    </div>
    <div class="ts-divider"></div>`;

  m.teamStats.forEach((stat, i) => {
    const [clsA, clsB] = winClass(stat.a, stat.b);
    rows += `
      <div class="ts-row">
        <span class="ts-val ts-val-a ${clsA}" style="cursor:pointer"
          onclick="openStatEditor(${mapIdx},${i},'a')">${stat.a}</span>
        <div class="ts-label-wrap"><span class="ts-label">${stat.label}</span></div>
        <span class="ts-val ts-val-b ${clsB}" style="cursor:pointer"

// ── 플레이어 스탯 공유 localStorage 동기화 (딕셔너리 방식) ──────
var PLAYERS_MATCH_KEY = 'players:' + MATCH_KEY;

function getPlayerSideKey(mapIdx, pIdx) {
  var m = maps[mapIdx];
  var p = m.players[pIdx];
  var sideA = m.players.filter(function(q) { return q.side === 'a'; });
  var sideB = m.players.filter(function(q) { return q.side === 'b'; });
  var idx = (p.side === 'a' ? sideA : sideB).indexOf(p);
  return p.side + idx;
}

function saveFieldSync(mapIdx, pIdx, field, value) {
  var PKEY = PLAYERS_MATCH_KEY + ':' + mapIdx;
  var data = {};
  try { var raw = localStorage.getItem(PKEY); if (raw) { var p = JSON.parse(raw); if (!Array.isArray(p)) data = p; } } catch(e) {}
  var pKey = getPlayerSideKey(mapIdx, pIdx);
  if (!data[pKey]) data[pKey] = {};
  data[pKey][field] = value;
  try { localStorage.setItem(PKEY, JSON.stringify(data)); } catch(e) {}
}

function loadPlayersSync(mapIdx) {
  try {
    var raw = localStorage.getItem(PLAYERS_MATCH_KEY + ':' + mapIdx);
    if (!raw) return;
    var data = JSON.parse(raw);
    if (Array.isArray(data)) return;
    var m = maps[mapIdx];
    var sideA = m.players.filter(function(p) { return p.side === 'a'; });
    var sideB = m.players.filter(function(p) { return p.side === 'b'; });
    [sideA, sideB].forEach(function(side, si) {
      var sideLetter = si === 0 ? 'a' : 'b';
      side.forEach(function(p, i) {
        var src = data[sideLetter + i];
        if (!src) return;
        if (src.name != null) p.name = src.name;
        if (src.agent) p.agent = src.agent;
        if (src.kda && src.kda.indexOf('/') !== -1) {
          p.kda = src.kda;
          var pts = src.kda.split('/');
          p.k = isNaN(parseInt(pts[0])) ? (pts[0] || '-') : parseInt(pts[0]);
          p.d = isNaN(parseInt(pts[1])) ? (pts[1] || '-') : parseInt(pts[1]);
          p.a = isNaN(parseInt(pts[2])) ? (pts[2] || '-') : parseInt(pts[2]);
        }
        if (src.acs != null) p.acs = src.acs;
      });
    });
  } catch(e) {}
}

/* Bo3 고정 순서: ban ban pick pick ban ban decider */
const VETO_STEPS_BO3 = [
  { type: "ban",     label: "BAN" },
  { type: "ban",     label: "BAN" },
  { type: "pick",    label: "PICK",    mapIndex: 0 },
  { type: "pick",    label: "PICK",    mapIndex: 1 },
  { type: "ban",     label: "BAN" },
  { type: "ban",     label: "BAN" },
  { type: "decider", label: "DECIDER", mapIndex: 2 },
];
const VETO_STEPS_BO5 = [
  { type: "ban",  label: "BAN" },
  { type: "ban",  label: "BAN" },
  { type: "pick", label: "PICK", mapIndex: 0 },
  { type: "pick", label: "PICK", mapIndex: 1 },
  { type: "pick", label: "PICK", mapIndex: 2 },
  { type: "pick", label: "PICK", mapIndex: 3 },
  { type: "pick", label: "PICK", mapIndex: 4 },
];
var VETO_STEPS = VETO_STEPS_BO3;

/* 각 스텝에서 행동하는 팀 (A=Paper Rex / B=FULL SENSE) */
function vetoStepTeam(idx, firstBan) {
  return idx % 2 === 0 ? firstBan : (firstBan === "A" ? "B" : "A");
}
/* 픽/디사이더에서 진영을 "선택하는" 팀 = 픽한 상대 팀, 디사이더는 3번째픽(index 3) 진영선택팀과 동일 */
function vetoSideChooser(idx, firstBan) {
  const step = VETO_STEPS[idx];
  if (step.type === "pick") {
    const picker = vetoStepTeam(idx, firstBan);
    return picker === "A" ? "B" : "A";
  }
  if (step.type === "decider") {
    return vetoSideChooser(3, firstBan);
  }
  return "";
}

function vetoTeamName(code) { return code === "A" ? MATCH_TEAM_A : MATCH_TEAM_B; }
function vetoTeamShort(code) { return code === "A" ? TEAM_A_CODE : TEAM_B_CODE; }

  popup.className = "odds-popup";
  popup.innerHTML =
    '<div class="odds-popup-panel">' +
      '<div class="odds-popup-head"><strong>' + teamName + ' 배당률</strong><button onclick="this.closest(\'.odds-popup\').remove()">닫기</button></div>' +
      '<form class="odds-popup-form">' +
        '<input type="text" inputmode="decimal" value="' + (predState[key] || "") + '" placeholder="예: 1.61" autofocus />' +
        '<button type="submit">적용</button>' +
      '</form>' +
    '</div>';
  document.body.appendChild(popup);
  popup.addEventListener("click", function(e) { if (e.target === popup) popup.remove(); });
  popup.querySelector("form").addEventListener("submit", function(e) {
    e.preventDefault();
    predState[key] = e.currentTarget.querySelector("input").value.trim();
    savePredState();
    renderPredBar();
    popup.remove();
  });
  popup.querySelector("input").focus();
}

renderPredBar();

/* 맵 결과 슬롯 토글: 빈 → O → X → 빈 */
// ── 화이트/다크 공유 동기화 ────────────────────────────────────
var RESULT_KEY     = 'result:'     + MATCH_KEY;
var PRED_KEY       = 'prediction:' + MATCH_KEY;
var VETO_SYNC_KEY  = 'veto:'       + MATCH_KEY;

function savePredState() {
  try { localStorage.setItem(PRED_KEY, JSON.stringify(predState)); } catch(e) {}
}
function loadPredState() {
  try { return JSON.parse(localStorage.getItem(PRED_KEY) || '{}'); } catch(e) { return {}; }
}
function saveVetoSyncState() {
  try { localStorage.setItem(VETO_SYNC_KEY, JSON.stringify(vetoState)); } catch(e) {}
}
function loadVetoSyncState() {
  try { return JSON.parse(localStorage.getItem(VETO_SYNC_KEY) || '{}'); } catch(e) { return {}; }
}

function loadSharedResult() {
  try { return JSON.parse(localStorage.getItem(RESULT_KEY) || '{}'); } catch(e) { return {}; }
}

function saveSharedResult() {
  var marksA = [], marksB = [];
  document.querySelectorAll('#slots-a .mo-map-slot').forEach(function(el) { marksA.push(el.getAttribute('data-v') || ''); });
  document.querySelectorAll('#slots-b .mo-map-slot').forEach(function(el) { marksB.push(el.getAttribute('data-v') || ''); });
  var current = loadSharedResult();
  current.marksA = marksA;
  current.marksB = marksB;
  current.scoreA = document.getElementById('score-a').value || '-';
  current.scoreB = document.getElementById('score-b').value || '-';
  localStorage.setItem(RESULT_KEY, JSON.stringify(current));
}

function applySharedResult() {
  var data = loadSharedResult();
  if (Array.isArray(data.marksA)) {
    var slotsA = document.querySelectorAll('#slots-a .mo-map-slot');
    data.marksA.forEach(function(v, i) {
      if (slotsA[i]) { slotsA[i].setAttribute('data-v', v || ''); slotsA[i].textContent = v || ''; }
    });
  }
  if (Array.isArray(data.marksB)) {
    var slotsB = document.querySelectorAll('#slots-b .mo-map-slot');
    data.marksB.forEach(function(v, i) {
      if (slotsB[i]) { slotsB[i].setAttribute('data-v', v || ''); slotsB[i].textContent = v || ''; }
    });
  }
  if (data.scoreA !== undefined) document.getElementById('score-a').value = data.scoreA;
  if (data.scoreB !== undefined) document.getElementById('score-b').value = data.scoreB;
}
// ────────────────────────────────────────────────────────────────

function toggleSlot(el, side) {
  const cycle = ["", "O", "X"];
  const cur = el.getAttribute("data-v") || "";
  const next = cycle[(cycle.indexOf(cur) + 1) % cycle.length];
  el.setAttribute("data-v", next);
  el.textContent = next;
  saveSharedResult();
}

function renderVeto() {
  const grid = document.getElementById("veto-grid");
  if (!grid) return;
  grid.innerHTML = VETO_STEPS.map(function(step, idx) {
    const mapName  = vetoState.maps[idx] || ALL_MAPS[idx];
    const imgSrc   = MAP_IMGS[mapName] || "";
    const imgTag   = imgSrc
      ? `<img class="mo-veto-img" src="${imgSrc}" alt="${mapName}" />`
      : `<div style="width:100%;height:100%;background:#1a0508"></div>`;

    let cellClass   = "mo-veto-cell";
    let actionClass = step.type;
    const teamCode  = vetoStepTeam(idx, vetoState.firstBan);

    if (step.type === "ban") {
      cellClass += " banned";
    } else if (step.type === "pick") {
      cellClass += teamCode === "A" ? " pick-a" : " pick-b";
    } else {
      cellClass += " decider-cell";
    }

    const whoLabel = step.type === "decider" ? "자동" : vetoTeamShort(teamCode);

    let sideHtml = `<div class="mo-veto-side" style="opacity:0.3">—</div>`;
    if (step.type === "pick" || step.type === "decider") {
      const chooser   = vetoSideChooser(idx, vetoState.firstBan);
      const sideVal   = vetoState.sides[idx] || "defense";
      const sideText  = sideVal === "attack" ? "선 공격" : "선 수비";
      sideHtml = `<div class="mo-veto-side">${vetoTeamShort(chooser)} ${sideText}</div>`;
    }

    return `<div class="${cellClass}" data-veto-idx="${idx}" onclick="openVetoPicker(${idx})">
      <div class="mo-veto-top">
        <div class="mo-veto-action ${actionClass}">${step.label}</div>
        <div class="mo-veto-who">${whoLabel}</div>
      </div>
      <div class="mo-veto-img-wrap">
        ${imgTag}
        <div class="mo-veto-overlay">
          <span class="mo-veto-mapname">${mapName}</span>
        </div>
      </div>
      <div class="mo-veto-bottom">${sideHtml}</div>
    </div>`;
  }).join("");
}

function openVetoPicker(idx) {
  document.querySelector(".veto-popup")?.remove();
  const step      = VETO_STEPS[idx];
  const isPlayable = step.type === "pick" || step.type === "decider";
  const chooser    = isPlayable ? vetoSideChooser(idx, vetoState.firstBan) : "";
  const curSide    = vetoState.sides[idx] || "defense";
  const curMap     = vetoState.maps[idx] || "";

  const firstBanOptions = idx === 0
    ? `<div class="veto-popup-row">
        <label>선 밴 팀</label>
        <select id="vp-firstban">
          <option value="A" ${vetoState.firstBan==="A"?"selected":""}>${MATCH_TEAM_A} (${TEAM_A_CODE})</option>
          <option value="B" ${vetoState.firstBan==="B"?"selected":""}>${MATCH_TEAM_B} (${TEAM_B_CODE})</option>
        </select>
      </div>` : "";

  const sideOptions = isPlayable
    ? `<div class="veto-popup-row">
        <label>${vetoTeamName(chooser)} 진영</label>
        <select id="vp-side">
          <option value="defense" ${curSide==="defense"?"selected":""}>선 수비</option>
          <option value="attack"  ${curSide==="attack" ?"selected":""}>선 공격</option>
        </select>
      </div>` : "";

  const mapButtons = ALL_MAPS.map(function(m) {
    return `<button class="vp-map-btn${m===curMap?" active":""}" data-map="${m}">
      <img src="${MAP_IMGS[m]||""}" alt="${m}" />
      <span>${m}</span>
    </button>`;
  }).join("");

  const popup = document.createElement("div");
  popup.className = "veto-popup";
  popup.innerHTML = `
    <div class="veto-popup-panel">
      <div class="veto-popup-head">
        <strong>${step.label} — ${idx+1}번 스텝</strong>
        <button onclick="this.closest('.veto-popup').remove()">닫기</button>
      </div>
      ${firstBanOptions}
      ${sideOptions}
      <div class="vp-map-grid">${mapButtons}</div>
    </div>`;
  document.body.appendChild(popup);

  popup.addEventListener("click", function(e) {
    if (e.target === popup) { popup.remove(); return; }
    const btn = e.target.closest(".vp-map-btn");
    if (btn) {
      const fb  = popup.querySelector("#vp-firstban");
      const sd  = popup.querySelector("#vp-side");
      if (fb) { vetoState.firstBan = fb.value; }
      vetoState.maps[idx] = btn.dataset.map;
      if (sd) { vetoState.sides[idx] = sd.value; }
      saveVetoSyncState();
      renderVeto();
      syncVetoMaps();
      popup.remove();
    }
  });

  popup.addEventListener("change", function(e) {
    if (e.target.id === "vp-firstban") {
      vetoState.firstBan = e.target.value;
      saveVetoSyncState(); renderVeto(); syncVetoMaps();
    }
    if (e.target.id === "vp-side") {
      vetoState.sides[idx] = e.target.value;
      saveVetoSyncState(); renderVeto(); syncVetoMaps();
    }
  });
}

/* 밴픽 → 스코어보드 맵 이미지 자동 연동 */
/* Bo3: 픽은 index 2, 3 / 디사이더 index 6 */
var VETO_MAP_SLOT = [2, 3, 6]; /* Bo3: map-1, map-2, map-3 / Bo5: [2,3,4,5,6] */

function syncVetoMaps() {
  VETO_MAP_SLOT.forEach(function(stepIdx, i) {
    var mapName  = vetoState.maps[stepIdx] || "";
    var imgSrc   = MAP_IMGS[mapName] || "";
    var imgEl    = document.getElementById("m" + (i+1) + "-sb-map-img");
    var nameEl   = document.getElementById("m" + (i+1) + "-sb-map-name");
    if (imgEl  && imgSrc)  { imgEl.src = imgSrc; imgEl.alt = mapName; }
    if (nameEl && mapName) { nameEl.textContent = mapName; }

    // 베토 사이드 → firstAttacker 자동 계산
    var chooser = vetoSideChooser(stepIdx, vetoState.firstBan); // "A" or "B"
    var side    = vetoState.sides[stepIdx] || "defense";         // chooser가 선택한 side
    // chooser가 attack이면 그 팀이 먼저 공격, defense면 상대가 먼저 공격
    var fa = null;
    if (chooser === "A") fa = (side === "attack") ? "a" : "b";
    if (chooser === "B") fa = (side === "attack") ? "b" : "a";
    if (maps[i]) maps[i].rtState.firstAttacker = fa;
  });
}

/* 스코어보드 숫자 클릭 편집 */
var scoreState = {
  m1: { l: "-", r: "-" },
  m2: { l: "-", r: "-" },
  m3: { l: "-", r: "-" },
};

function applyScoreClasses(mapId) {
  var s   = scoreState[mapId];
  var elL = document.getElementById(mapId + "-score-l");
  var elR = document.getElementById(mapId + "-score-r");
  if (!elL || !elR) return;
  elL.textContent = s.l;
  elR.textContent = s.r;
  var nL = Number(s.l), nR = Number(s.r);
  elL.className = "sb-score-diamond-l" + (nL < nR ? " lose" : "");
  elR.className = "sb-score-diamond-r" + (nR > nL ? " win"  : "");
  elL.style.cursor = "pointer";
  elR.style.cursor = "pointer";
}

function openScoreEditor(mapId, side) {
  document.querySelector(".score-popup")?.remove();
  var label = side === "l" ? TEAM_A_CODE + " 라운드 수" : TEAM_B_CODE + " 라운드 수";
  var cur   = scoreState[mapId][side];
  var popup = document.createElement("div");
  popup.className = "odds-popup score-popup";
  popup.innerHTML =
    '<div class="odds-popup-panel">' +
      '<div class="odds-popup-head"><strong>' + label + '</strong>' +
        '<button onclick="this.closest(\'.score-popup\').remove()">닫기</button></div>' +
      '<form class="odds-popup-form">' +
        '<input type="number" min="0" max="30" value="' + cur + '" autofocus />' +
        '<button type="submit">적용</button>' +
      '</form>' +
    '</div>';
  document.body.appendChild(popup);
  popup.addEventListener("click", function(e) { if (e.target === popup) popup.remove(); });
  popup.querySelector("form").addEventListener("submit", function(e) {
    e.preventDefault();
    var val = parseInt(e.currentTarget.querySelector("input").value) || 0;
    scoreState[mapId][side] = val;
    applyScoreClasses(mapId);
    // 라운드 트래커도 동기화
    var mapIdx = parseInt(mapId.slice(1)) - 1;
    maps[mapIdx].rtState.stats.aScore = scoreState[mapId].l;
    maps[mapIdx].rtState.stats.bScore = scoreState[mapId].r;
    renderRoundTracker(maps[mapIdx], mapIdx);
    renderTeamStats(maps[mapIdx], mapIdx);
    saveStatsState(mapIdx);
    popup.remove();
  });
  popup.querySelector("input").focus();
}

function toggleDiamond(el) {
  el.classList.toggle("filled");
  saveDiamondState();
}

function saveDiamondState() {
  try {
    var state = {};
    document.querySelectorAll('.sb-diamonds').forEach(function(wrap) {
      if (!wrap.id) return;
      state[wrap.id] = Array.from(wrap.querySelectorAll('.sb-diamond')).map(function(d) {
        return d.classList.contains('filled');
      });
    });
    localStorage.setItem('diamonds:' + MATCH_KEY, JSON.stringify(state));
  } catch(e) {}
}

function loadDiamondState() {
  try {
    var raw = localStorage.getItem('diamonds:' + MATCH_KEY);
    if (!raw) return;
    var state = JSON.parse(raw);
    Object.keys(state).forEach(function(id) {
      var wrap = document.getElementById(id);
      if (!wrap) return;
      var diamonds = wrap.querySelectorAll('.sb-diamond');
      state[id].forEach(function(filled, i) {
        if (diamonds[i]) diamonds[i].classList.toggle('filled', filled);
      });
    });
  } catch(e) {}
}

function toggleMode() {
  const isWhite = document.body.classList.toggle('white-mode');
  const btn = document.getElementById('mode-toggle-btn');
  if (btn) btn.textContent = isWhite ? '🌙 Dark' : '☀ White';
  maps.forEach(function(m, i) { renderMap(m, i); });
}
