<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VCT Champions 2026 Match</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260502-0014" />
    <style>
      /* ── Champions 매치 페이지 테마 ── */
      .champions-page .match-hero-board {
        border-color: #c5b174;
        box-shadow: 0 28px 70px rgba(197,177,116,0.22);
      }
      .champions-page .match-result-panel,
      .champions-page .prediction-panel,
      .champions-page .set-score span,
      .champions-page .veto-card em,
      .champions-page .set-detail-banner,
      .champions-page .agent-picker-head,
      .champions-page .value-editor-form button,
      .champions-page .veto-quick-actions button:last-child {
        background: #b89640;
      }
      .champions-page .match-result-panel,
      .champions-page .prediction-panel {
        box-shadow: 0 24px 54px rgba(197,177,116,0.18);
      }
      .champions-page .prediction-panel {
        border-color: #c5b174;
      }
      .champions-page .set-team strong,
      .champions-page .match-team-name,
      .champions-page .set-team-title {
        background: var(--team-a-color, #b89640);
      }
      .champions-page .set-team:last-child strong,
      .champions-page .match-team-b .match-team-name,
      .champions-page .set-team-title.right {
        background: var(--team-b-color, #5c4618);
      }
      .champions-page .veto-card > button,
      .champions-page .map-picker-grid button {
        background:
          linear-gradient(180deg, rgba(26,20,0,0.02) 18%, rgba(26,20,0,0.74) 100%),
          var(--map-image),
          linear-gradient(135deg, #b89640, #5c4618);
        background-position: center, var(--map-position, center), center;
        background-repeat: no-repeat;
        background-size: 100% 100%, cover, cover;
      }
      .champions-page .map-picker-grid button:hover,
      .champions-page .veto-card > button:hover { filter: brightness(1.12); }
      .champions-page .eyebrow { color: #b89640; }
      .champions-page .match-result-panel .eyebrow,
      .champions-page .match-result-panel h1 { color: #fff; }
      .champions-page .back-link  { border-color: rgba(197,177,116,0.3); color: #7a6028; }
      .site-header .home-link::after { content: " /"; margin-left: 4px; color: rgba(255,255,255,.18); font-weight: 400; }
      .champions-page .home-link  { color: #5c4618; }
    </style>
  </head>
  <body class="league-page match-page champions-page">
    <header class="site-header">
      <a class="home-link" href="./index.html">VCT Archive</a>
      <a class="back-link" id="back-link" href="./champions-group.html">Group Stage</a>
    </header>

    <main class="match-shell">
      <section class="match-hero-board" aria-labelledby="match-title">
        <div class="match-team match-team-a">
          <div class="match-team-name" id="team-a-name">Team A</div>
          <div class="match-team-logo" id="team-a-logo">A</div>
        </div>
        <div class="match-team match-team-b">
          <div class="match-team-name" id="team-b-name">Team B</div>
          <div class="match-team-logo" id="team-b-logo">B</div>
        </div>
      </section>

      <section class="match-result-panel" aria-labelledby="match-title">
        <p class="eyebrow">VCT Champions 2026</p>
        <h1 id="match-title">Group Stage</h1>
        <p id="match-date" class="match-date">2026. 04.</p>

        <div class="set-board">
          <div class="set-team">
            <strong id="set-team-a">Team A</strong>
            <div class="set-marks" id="team-a-marks"></div>

          <div class="set-score">
            <button class="inline-edit set-score-button" id="score-a" type="button" data-result-edit="scoreA">0</button>
            <button class="inline-edit set-score-button" id="score-b" type="button" data-result-edit="scoreB">0</button>
            <span>결과</span>
          </div>
          <div class="set-team">
            <strong id="set-team-b">Team B</strong>
            <div class="set-marks" id="team-b-marks"></div>
            <span id="team-b-record">-</span>
          </div>

      </section>

      <section class="prediction-panel" aria-labelledby="prediction-title">

        </div>
        <div class="prediction-board" id="prediction-board"></div>
      </section>

        </div>

      </section>
    </main>

    <script src="./storage.js"></script>

        "Team Vitality": { code:"VIT",  logo:"https://images.secretlab.co/theme/common/vitality_25_spacer_logo.png", color:"#f8ff04" },
        "GIANTX":        { code:"GX",   logo:"https://i.namu.wiki/i/smbcvKZYz5eUQqXRfGl_7bXNclG0mpQkHJ-vk2WLqNefG_xO_lErENqYn2GQWvDpO9sSZPBYOHo-Td0lXg1vvQ.svg", color:"#28b8ff" },
        "Eternal Fire":  { code:"EF",   logo:"https://i.namu.wiki/i/mkmrm6lQKQlLsm4GMnZzHvOhujJ1yPSpJE9w5U5p4rQHkef-0XAH4Ga3FUQLt7HSAZO6WwwXBgiaOaJz621qEg.svg", color:"#9c8d69" },
        "PCIFIC Esports":{ code:"PCF", logo:"https://i.namu.wiki/i/1Mc2sGqVID3LVIKcGjKpitWA-4ZflKXzVsyD7wfyziCL7TsCYSVOStcvsJ6GT1oi8WLF7tCzN5V0lJznozZ7HQ.svg", color:"#41c0dc" },
      };

      function td(name) { return TEAM_DATA[name] || { code: name?.slice(0,3)||"TBD", logo:"", color:"#444" }; }
      const teamCodes  = new Proxy({}, { get: (_,k) => td(k).code  });
      const teamLogos  = new Proxy({}, { get: (_,k) => td(k).logo  });

      function teamBrandStyle(teamName, fallback) {
        return td(teamName).color || fallback;
      }

      /* ── Round Tracker constants ── */
      const ROUND_ICONS = {
        attack_kill:  "https://i.ibb.co/9HcDhzQ4/image.webp",
        attack_spike: "https://i.ibb.co/k2hrj8Dp/image.webp",
        def_defuse:   "https://i.ibb.co/TMjk5drN/image.webp",
        def_timeout:  "https://i.ibb.co/DXqXggC/image.webp",
        def_kill:     "https://i.ibb.co/4RLQmnjG/image.webp",
      };
      const ROUND_ICON_LABELS = {
        attack_kill:  "공격 처치",
        attack_spike: "스파이크 폭파",
        def_defuse:   "스파이크 해체",
        def_timeout:  "설치 실패",
        def_kill:     "수비 처치",
      };
      const ATK_TYPES = ["attack_kill", "attack_spike"];
      const DEF_TYPES = ["def_defuse", "def_timeout", "def_kill"];

      function roundIsAttacking(side, roundIdx, firstAttacker) {
        if (!firstAttacker) return null;
        const n = roundIdx + 1;
        let faAtks;
        if (n <= 12) faAtks = true;
        else if (n <= 24) faAtks = false;
        else {
          const otRound = n - 24;
          faAtks = (otRound % 2 === 1);
        }
        return faAtks ? (firstAttacker === side) : (firstAttacker !== side);
      }

      function renderRoundTracker(state) {
        const aScore = parseInt(state.stats && state.stats.aScore) || 0;
        const bScore = parseInt(state.stats && state.stats.bScore) || 0;
        const totalRounds = Math.max(24, aScore + bScore);
        const fa = state.firstAttacker || null;
        const rounds = state.rounds || [];
        const numBlocks = Math.ceil(totalRounds / 24);

        const logoA = teamLogos[match.teamA]
          ? `<img src="${teamLogos[match.teamA]}" alt="${match.teamA}" />`
          : `<span>${match.teamA.substring(0, 3)}</span>`;
        const logoB = teamLogos[match.teamB]
          ? `<img src="${teamLogos[match.teamB]}" alt="${match.teamB}" />`
          : `<span>${match.teamB.substring(0, 3)}</span>`;

        function renderCell(side, i) {
          const r = rounds[i] || {};
          const won = r.winner === side;
          const attacking = roundIsAttacking(side, i, fa);
          let cls = "round-cell";
          if (i === 11) cls += " round-halftime";
          if (won) cls += attacking ? " rc-atk" : " rc-def";
          else if (r.winner) cls += " rc-lost";
          const iconUrl = won && r.type ? ROUND_ICONS[r.type] : "";
          return `<div class="${cls}" data-round-cell="${i}">${iconUrl ? `<img src="${iconUrl}" alt="" />` : ""}</div>`;
        }

        let blocksHtml = "";
        for (let b = 0; b < numBlocks; b++) {
          const start = b * 24;
          const end = Math.min(start + 24, totalRounds);
          let numRow = "", cellsA = "", cellsB = "";
          for (let i = start; i < end; i++) {
            const htCls = i === 11 ? " round-halftime" : "";
            numRow  += `<div class="round-num-label${htCls}">${i + 1}</div>`;
            cellsA  += renderCell("a", i);
            cellsB  += renderCell("b", i);
          }
          blocksHtml += `
          <div class="round-block">
            <div class="round-tracker-team-col">
              <div class="round-num-spacer"></div>
              <div class="round-tracker-team-logo">${logoA}</div>
              <div class="round-tracker-team-logo">${logoB}</div>
            </div>
            <div class="round-tracker-grid">
              <div class="round-num-row">${numRow}</div>
              <div class="round-tracker-row">${cellsA}</div>
              <div class="round-tracker-row">${cellsB}</div>
            </div>
          </div>`;
        }

        return `
          <div class="round-tracker">
            <div class="round-tracker-top">
              <span class="round-tracker-label">라운드 결과</span>
            </div>
            ${blocksHtml}
          </div>`;
      }
      function openRoundPicker(card, state, mapName, index, roundIdx) {
        document.querySelector(".round-picker")?.remove();
        const fa = state.firstAttacker || null;
        const aAtks = roundIsAttacking("a", roundIdx, fa);
        const r = (state.rounds || [])[roundIdx] || {};
        const roundNum = roundIdx + 1;

        const aTypes = fa ? (aAtks ? ATK_TYPES : DEF_TYPES) : [...ATK_TYPES, ...DEF_TYPES];
        const bTypes = fa ? (aAtks ? DEF_TYPES : ATK_TYPES) : [...ATK_TYPES, ...DEF_TYPES];

        function iconGroup(winner, types, label) {
          return `<div class="rp-team-section">
            <div class="rp-team-label">${label}</div>
            <div class="rp-icons">
              ${types.map((t) => `
                <button class="rp-icon-btn${r.winner === winner && r.type === t ? " selected" : ""}"
                  data-rp-winner="${winner}" data-rp-type="${t}">
                  <img src="${ROUND_ICONS[t]}" alt="" />
                  ${ROUND_ICON_LABELS[t]}
                </button>`).join("")}
            </div>
          </div>`;

        const picker = document.createElement("div");
        picker.className = "round-picker";
        picker.innerHTML = `
          <div class="round-picker-panel">
            <div class="round-picker-head">
              <strong>라운드 ${roundNum}</strong>
              <div class="round-picker-head-actions">
                ${r.winner ? `<button class="rp-clear-btn" data-rp-clear>초기화</button>` : ""}
                <button class="rp-close-btn" data-rp-close>닫기</button>
              </div>
            </div>
            <div class="round-picker-body">
              ${iconGroup("a", aTypes, aLabel)}
              ${iconGroup("b", bTypes, bLabel)}
            </div>
          </div>`;
        document.body.appendChild(picker);

        picker.addEventListener("click", (e) => {
          if (e.target === picker || e.target.closest("[data-rp-close]")) {
            picker.remove();
            return;
          }
          if (e.target.closest("[data-rp-clear]")) {
            if (!state.rounds) state.rounds = [];
            state.rounds[roundIdx] = { winner: null, type: null };
            saveSetState(mapName, index, state);
            renderSetView(card, state);
            picker.remove();
            return;
          }
          const btn = e.target.closest("[data-rp-winner]");
          if (btn) {
            if (!state.rounds) state.rounds = [];
            while (state.rounds.length <= roundIdx) state.rounds.push({ winner: null, type: null });
            state.rounds[roundIdx] = { winner: btn.dataset.rpWinner, type: btn.dataset.rpType };
            saveSetState(mapName, index, state);
            renderSetView(card, state);
            picker.remove();
          }
        });
      }

      document.getElementById("set-team-b").style.background = teamBrandStyle(match.teamB, "#071111");
      document.getElementById("match-title").textContent = match.label;

      function renderMarks(target, marks, side) {
        const markCount = isBo5 ? 5 : 3;
        const paddedMarks = [...marks];
        while (paddedMarks.length < markCount) paddedMarks.push("");
        target.innerHTML = paddedMarks
          .slice(0, markCount)
          .map(
            (mark, index) =>
              `<span><button class="inline-edit mark-edit-button" type="button" data-result-edit="mark" data-side="${side}" data-mark-index="${index}">${mark || ""}</button></span>`,
          )
          .join("");
      }

      function setMarksFromMaps() {
        return maps.map((map) => {
          const score = map.split(" ")[1] || "";
          const [a, b] = score.split("-").map((part) => Number(part));
          return a > b ? ["O", "X"] : ["X", "O"];
        });
      }

      function recordsThroughCurrentMatch() {
        const records = {};
        const ensure = (team) => {
          if (!records[team]) records[team] = { wins: 0, losses: 0 };
          return records[team];
        };

        for (const [date, teamA, teamB, result] of matchResults) {
          const [a, b] = result.split(":").map((part) => Number(part.trim()));
          if (a > b) {
            ensure(teamA).wins += 1;
            ensure(teamB).losses += 1;
          } else {
            ensure(teamB).wins += 1;
            ensure(teamA).losses += 1;
          }

          if (date === match.date && teamA === match.teamA && teamB === match.teamB) {
            break;
          }
        }

        return records;
      }

      function defaultResultState() {
        const defaultState = {
          date: /^\d{2}\.\d{2}$/.test(match.date) ? `2026. ${match.date.replace(".", ". ")}` : match.date,
          scoreA: isUpcoming ? "0" : scoreA,
          scoreB: isUpcoming ? "0" : scoreB,
          marksA: isUpcoming ? (isBo5 ? ["", "", "", "", ""] : ["", "", ""]) : [],
          marksB: isUpcoming ? (isBo5 ? ["", "", "", "", ""] : ["", "", ""]) : [],
          recordA: isUpcoming ? "-승 -패" : "-",
          recordB: isUpcoming ? "-승 -패" : "-",
        };

        if (!isUpcoming) {
          const setMarks = setMarksFromMaps();
          defaultState.marksA = setMarks.map(([teamAMark]) => teamAMark);
          defaultState.marksB = setMarks.map(([, teamBMark]) => teamBMark);
          const records = recordsThroughCurrentMatch();
          const teamARecord = records[match.teamA] || { wins: 0, losses: 0 };
          const teamBRecord = records[match.teamB] || { wins: 0, losses: 0 };
          defaultState.recordA = `${teamARecord.wins}승 ${teamARecord.losses}패`;
          defaultState.recordB = `${teamBRecord.wins}승 ${teamBRecord.losses}패`;
        }

        return defaultState;
      }

      function loadResultState() {
        const defaults = defaultResultState();
        try {
          const stored = JSON.parse(localStorage.getItem(resultStorageKey) || "{}");
          return {
            ...defaults,
            ...stored,
            marksA: Array.isArray(stored.marksA) ? stored.marksA : defaults.marksA,
            marksB: Array.isArray(stored.marksB) ? stored.marksB : defaults.marksB,
          };
        } catch {
          return defaults;
        }
      }

      let resultState = loadResultState();

      function saveResultState() {
        localStorage.setItem(resultStorageKey, JSON.stringify(resultState));
      }

      function loadPredictionState() {
        try {
          return { oddsA: "", oddsB: "", ...JSON.parse(localStorage.getItem(predictionStorageKey) || "{}") };
        } catch {
          return { oddsA: "", oddsB: "" };
        }
      }

      let predictionState = loadPredictionState();

      function savePredictionState() {
        localStorage.setItem(predictionStorageKey, JSON.stringify(predictionState));
      }

      function parseOdds(value) {
        const odds = Number(String(value || "").replace(",", "."));
        return Number.isFinite(odds) && odds > 1 ? odds : null;
      }

      function predictionPercentages() {
        const oddsA = parseOdds(predictionState.oddsA);
        const oddsB = parseOdds(predictionState.oddsB);
        if (!oddsA || !oddsB) return { a: 50, b: 50, ready: false };
        const impliedA = 1 / oddsA;
        const impliedB = 1 / oddsB;
        const pctA = Math.round((impliedA / (impliedA + impliedB)) * 100);
        return { a: pctA, b: 100 - pctA, ready: true };
      }

      function teamPredictionLogo(teamName, side) {
        const logo = teamLogos[teamName];
        if (!logo) return `<span class="prediction-logo-text">${teamCodes[teamName] || teamName.slice(0, 2)}</span>`;
        const extraClass = "";
        return `<img class="${side === "b" ? "right" : ""}${extraClass}" src="${logo}" alt="" />`;
      }

      function renderPredictionBoard() {
        const prediction = predictionPercentages();
        const board = document.getElementById("prediction-board");
        board.style.setProperty("--prediction-a", `${prediction.a}%`);
        board.style.setProperty("--prediction-left-color", teamPredictionColor(match.teamA, "#fb2659", "left"));
        board.style.setProperty("--prediction-right-color", teamPredictionColor(match.teamB, "#071111", "right"));
        board.innerHTML = `
          <div class="prediction-side prediction-side-a" style="--team-color:${teamBrandStyle(match.teamA, "#fb2659")}">
            <div class="prediction-logo">${teamPredictionLogo(match.teamA, "a")}</div>
            <strong>${match.teamA}</strong>
            <span>${prediction.ready ? `${prediction.a}%` : "50%"}</span>
            <button class="inline-edit prediction-odds" type="button" data-odds-side="A">${predictionState.oddsA || "배당률"}</button>
          </div>
          <div class="prediction-divider"></div>
          <div class="prediction-side prediction-side-b" style="--team-color:${teamBrandStyle(match.teamB, "#071111")}">
            <div class="prediction-logo">${teamPredictionLogo(match.teamB, "b")}</div>
            <strong>${match.teamB}</strong>
            <span>${prediction.ready ? `${prediction.b}%` : "50%"}</span>
            <button class="inline-edit prediction-odds" type="button" data-odds-side="B">${predictionState.oddsB || "배당률"}</button>
          </div>
        `;
      }

      function openOddsEditor(side) {
        document.querySelector(".agent-picker")?.remove();
        const key = side === "A" ? "oddsA" : "oddsB";
        const teamName = side === "A" ? match.teamA : match.teamB;
        const picker = document.createElement("div");
        picker.className = "agent-picker";
        picker.innerHTML = `
          <div class="agent-picker-panel compact">
            <div class="agent-picker-head">
              <strong>${teamName} 배당률</strong>
              <button type="button" data-agent-close>닫기</button>
            </div>
            <form class="value-editor-form">
              <input inputmode="decimal" value="${predictionState[key] || ""}" placeholder="예: 1.27" autofocus />
              <button type="submit">적용</button>
            </form>
          </div>
        `;

          if (event.target === picker || event.target.dataset.agentClose !== undefined) close();
        });
        picker.querySelector("form").addEventListener("submit", (event) => {
          event.preventDefault();
          predictionState[key] = event.currentTarget.querySelector("input").value.trim();
          savePredictionState();
          renderPredictionBoard();
          close();
        });
        picker.querySelector("input").focus();
      }

      function renderResultBoard() {
        document.getElementById("match-date").innerHTML =
          `<button class="inline-edit result-date-button" type="button" data-result-edit="date">${resultState.date}</button>`;
        document.getElementById("score-a").textContent = resultState.scoreA;
        document.getElementById("score-b").textContent = resultState.scoreB;
        document.getElementById("team-a-record").innerHTML =
          `<button class="inline-edit result-record-button" type="button" data-result-edit="recordA">${resultState.recordA}</button>`;
        document.getElementById("team-b-record").innerHTML =
          `<button class="inline-edit result-record-button" type="button" data-result-edit="recordB">${resultState.recordB}</button>`;
        renderMarks(document.getElementById("team-a-marks"), resultState.marksA, "a");
        renderMarks(document.getElementById("team-b-marks"), resultState.marksB, "b");
      }

      function openResultEditor(options) {
        document.querySelector(".agent-picker")?.remove();
        const picker = document.createElement("div");
        picker.className = "agent-picker";
        picker.innerHTML = `
          <div class="agent-picker-panel compact">
            <div class="agent-picker-head">
              <strong>${options.title}</strong>
              <button type="button" data-agent-close>닫기</button>
            </div>
            ${
              options.choices
                ? `<div class="agent-picker-grid result-choice-grid">
                    ${options.choices
                      .map((choice) => `<button type="button" data-value="${choice.value}">${choice.label}</button>`)
                      .join("")}
                  </div>`
                : `<form class="value-editor-form">
                    <input value="${options.value || ""}" placeholder="${options.placeholder || "-"}" autofocus />
                    <button type="submit">적용</button>
                  </form>`
            }
          </div>
        `;
        document.body.appendChild(picker);
        const close = () => picker.remove();
        const apply = (value) => {
          options.apply(value);
          saveResultState();
          renderResultBoard();
          close();
        };
        picker.addEventListener("click", (event) => {
          if (event.target === picker || event.target.dataset.agentClose !== undefined) close();
          if (event.target.dataset.clearField !== undefined) { apply(""); return; }
          if (event.target.dataset.value !== undefined) apply(event.target.dataset.value);
        });
        picker.querySelector("form")?.addEventListener("submit", (event) => {
          event.preventDefault();
          apply(event.currentTarget.querySelector("input").value.trim());
        });
        picker.querySelector("input")?.focus();
      }

      function editResultField(trigger) {
        const field = trigger.dataset.resultEdit;
        if (field === "mark") {
          const side = trigger.dataset.side;
          const index = Number(trigger.dataset.markIndex);
          const key = side === "a" ? "marksA" : "marksB";
          openResultEditor({
            title: `${index + 1}세트 결과`,

              { label: "빈칸", value: "" },

            apply(value) {
              resultState[key][index] = value;
            },
          });
          return;
        }

        const labels = {

          scoreA: `${match.teamA} 세트 승`,
          scoreB: `${match.teamB} 세트 승`,
          recordA: `${match.teamA} 당시 승패`,

        };

        openResultEditor({
          title: labels[field],
          value: resultState[field],

      }

      document.querySelector(".match-result-panel").addEventListener("click", (event) => {
        const trigger = event.target.closest("[data-result-edit]");
        if (!trigger) return;
        editResultField(trigger);
      });

      renderResultBoard();
      renderPredictionBoard();

      document.querySelector(".prediction-panel").addEventListener("click", (event) => {
        const trigger = event.target.closest("[data-odds-side]");
        if (!trigger) return;
        openOddsEditor(trigger.dataset.oddsSide);
      });

      const mapNames = ["Pearl", "Fracture", "Breeze", "Split", "Lotus", "Haven", "Bind", "Ascent", "Icebox", "Sunset", "Corrode", "Abyss"];
      const vetoGrid = document.getElementById("veto-grid");
      const vetoStorageKey = `veto:${key}`;
      const teamOptions = [
        { value: "A", label: `${teamCodes[match.teamA] || match.teamA} (${match.teamA})` },
        { value: "B", label: `${teamCodes[match.teamB] || match.teamB} (${match.teamB})` },
      ];
      const vetoSteps = isBo5 ? [
        { type: "ban",     name: "1맵 밴" },
        { type: "ban",     name: "2맵 밴" },
        { type: "pick",    name: "3맵 선택",    mapIndex: 0 },
        { type: "pick",    name: "4맵 선택",    mapIndex: 1 },
        { type: "pick",    name: "5맵 선택",    mapIndex: 2 },
        { type: "pick",    name: "6맵 선택",    mapIndex: 3 },
        { type: "decider", name: "7맵 디사이더", mapIndex: 4 },
      ] : [
        { type: "ban",     name: "1맵 밴" },
        { type: "ban",     name: "2맵 밴" },
        { type: "pick",    name: "3맵 선택",    mapIndex: 0 },
        { type: "pick",    name: "4맵 선택",    mapIndex: 1 },
        { type: "ban",     name: "5맵 밴" },
        { type: "ban",     name: "6맵 밴" },
        { type: "decider", name: "7맵 디사이더", mapIndex: 2 },
      ];

      function sideLabel(value) {
        return value === "attack" ? "선 공격" : "선 수비";
      }

      function sideChooserForStep(stepIndex, firstBan) {
        const orderTeam = stepTeam(stepIndex, firstBan);
        if (vetoSteps[stepIndex].type === "pick") return orderTeam === "A" ? "B" : "A";
        if (vetoSteps[stepIndex].type === "decider") return sideChooserForStep(isBo5 ? 5 : 3, firstBan);
        return "";
      }

      function teamNameByCode(code) {
        return code === "A" ? match.teamA : match.teamB;
      }

      function teamShortByCode(code) {
        return teamCodes[teamNameByCode(code)] || teamNameByCode(code);
      }

      function oppositeTeam(code) {
        return code === "A" ? "B" : "A";
      }

      function stepTeam(index, firstBan) {
        return index % 2 === 0 ? firstBan : oppositeTeam(firstBan);
      }

      function defaultVetoState() {
        const playedMapNames = maps.map((map) => map.split(" ")[0]);
        const remainingMaps = mapNames.filter((mapName) => !playedMapNames.includes(mapName));
        if (isBo5) {
          return {
            firstBan: "A",
            maps: [
              remainingMaps[0] || "Pearl",
              remainingMaps[1] || "Fracture",
              playedMapNames[0] || remainingMaps[2] || "Breeze",
              playedMapNames[1] || remainingMaps[3] || "Split",
              playedMapNames[2] || remainingMaps[4] || "Lotus",
              playedMapNames[3] || remainingMaps[5] || "Haven",
              playedMapNames[4] || remainingMaps[6] || "Bind",
            ],
            sides: { 2: "defense", 3: "defense", 4: "defense", 5: "defense", 6: "defense" },
          };
        }
        return {
          firstBan: "A",
          maps: [
            remainingMaps[0] || "Pearl",
            remainingMaps[1] || "Fracture",
            playedMapNames[0] || remainingMaps[2] || "Breeze",
            playedMapNames[1] || remainingMaps[3] || "Split",
            remainingMaps[2] || "Lotus",
            remainingMaps[3] || "Haven",
            playedMapNames[2] || remainingMaps[4] || "Bind",
          ],
          sides: {
            2: "defense",
            3: "defense",
            6: "defense",
          },
        };
      }

      function loadVetoState() {
        try {
          return { ...defaultVetoState(), ...JSON.parse(localStorage.getItem(vetoStorageKey) || "{}") };
        } catch {
          return defaultVetoState();
        }
      }

      function saveVetoState(state) {
        localStorage.setItem(vetoStorageKey, JSON.stringify(state));
      }

      function playableMapsFromVeto(state) {
        const playableIndices = isBo5 ? [2, 3, 4, 5, 6] : [2, 3, 6];
        return playableIndices.map((stepIndex, mapIndex) => {
          const mapName = state.maps[stepIndex] || maps[mapIndex]?.split(" ")[0] || mapNames[mapIndex];
          const fallbackScore = maps[mapIndex]?.split(" ")[1] || "-";
          return `${mapName} ${fallbackScore}`;
        });
      }

      function renderVeto(state) {
        vetoGrid.innerHTML = vetoSteps
          .map((step, index) => {
            const orderTeam = stepTeam(index, state.firstBan);
            const mapName = state.maps[index] || mapNames[index];
            const isPlayable = step.type === "pick" || step.type === "decider";
            const sideChooser = isPlayable ? sideChooserForStep(index, state.firstBan) : "";
            const side = state.sides[index] || "defense";
            const title =
              step.type === "ban"
                ? `${teamShortByCode(orderTeam)} 거부`
                : step.type === "pick"
                  ? `${teamShortByCode(orderTeam)} 선택`
                  : "디사이더";
            const sideText = isPlayable
              ? `${teamShortByCode(sideChooser)} 선택<br>${sideLabel(side)}`
              : "";
            return `
              <article class="veto-card ${step.type}" data-veto-step="${index}">
                <strong>${title}<small>${mapKo[mapName] || mapName}</small></strong>
                <button type="button" data-veto-map-button="${index}" style="${mapBackgroundStyle(mapName)}">${mapKo[mapName] || mapName}</button>
                ${isPlayable ? `<em>${sideText}</em>` : ""}
              </article>
            `;
          })
          .join("");
      }

      let vetoState = loadVetoState();
      renderVeto(vetoState);

      function openVetoPicker(stepIndex) {
        document.querySelector(".agent-picker")?.remove();
        const step = vetoSteps[stepIndex];
        const isPlayable = step.type === "pick" || step.type === "decider";
        const picker = document.createElement("div");
        picker.className = "agent-picker";
        picker.innerHTML = `
          <div class="agent-picker-panel map-picker-panel">
            <div class="agent-picker-head">
              <strong>${step.name}</strong>
              <button type="button" data-agent-close>닫기</button>
            </div>
            <div class="veto-quick-form">
              ${
                stepIndex === 0
                  ? `<label>첫 밴 팀<select data-quick-first-ban>${teamOptions
                      .map((option) => `<option value="${option.value}" ${vetoState.firstBan === option.value ? "selected" : ""}>${option.label}</option>`)
                      .join("")}</select></label>`
                  : ""
              }
              ${
                isPlayable
                  ? `<label>진영 선택<select data-quick-side>
                      <option value="attack" ${vetoState.sides[stepIndex] === "attack" ? "selected" : ""}>선 공격</option>
                      <option value="defense" ${vetoState.sides[stepIndex] === "defense" ? "selected" : ""}>선 수비</option>
                    </select></label>`
                  : ""
              }
              <div class="map-picker-grid">
                ${mapNames
                  .map(
                    (mapName) => `
                      <button class="${vetoState.maps[stepIndex] === mapName ? "active" : ""}" type="button" data-quick-map="${mapName}" style="${mapBackgroundStyle(mapName)}" aria-label="${mapKo[mapName] || mapName}"></button>
                    `,
                  )
                  .join("")}
              </div>
              <div class="veto-quick-actions">
                <button type="button" data-veto-reset>초기화</button>
              </div>
            </div>
          </div>
        `;
        document.body.appendChild(picker);
        picker.addEventListener("change", (event) => {
          if (event.target.matches("[data-quick-first-ban]")) {
            vetoState.firstBan = event.target.value;
            saveVetoState(vetoState);
            renderVeto(vetoState);
            renderMapReports();
          }
          if (event.target.matches("[data-quick-side]")) {
            vetoState.sides[stepIndex] = event.target.value;
            saveVetoState(vetoState);
            renderVeto(vetoState);
            renderMapReports();
          }
        });
        picker.addEventListener("click", (event) => {
          if (event.target === picker || event.target.dataset.agentClose !== undefined) picker.remove();
          if (event.target.dataset.vetoReset !== undefined) {
            localStorage.removeItem(vetoStorageKey);
            vetoState = defaultVetoState();
            saveVetoState(vetoState);
            renderVeto(vetoState);
            renderMapReports();
            picker.remove();
          }
          const mapButton = event.target.closest("[data-quick-map]");
          if (!mapButton) return;
          const firstBan = picker.querySelector("[data-quick-first-ban]");
          const side = picker.querySelector("[data-quick-side]");
          if (firstBan) vetoState.firstBan = firstBan.value;
          vetoState.maps[stepIndex] = mapButton.dataset.quickMap;
          if (side) vetoState.sides[stepIndex] = side.value;
          saveVetoState(vetoState);
          renderVeto(vetoState);
          renderMapReports();
          picker.remove();
        });
      }

      vetoGrid.addEventListener("click", (event) => {
        const card = event.target.closest("[data-veto-step]");
        if (!card) return;
        openVetoPicker(Number(card.dataset.vetoStep));
      });

      function optionList(items, selected = "") {
        return items
          .map((item) => `<option value="${item}" ${item === selected ? "selected" : ""}>${item}</option>`)
          .join("");
      }

      function defaultSetState(mapName, mapScore, index, players) {
        const rows = Array.from({ length: 5 }, (_, rowIndex) => ({
          aPlayer: players?.[rowIndex]?.[0] || getTeamRoster(match.teamA)?.[rowIndex] || "",
          aAgent: "",
          aKda: players?.[rowIndex]?.[1] || "",
          aAcs: players?.[rowIndex]?.[2] || "",
          bPlayer: players?.[rowIndex]?.[3] || getTeamRoster(match.teamB)?.[rowIndex] || "",
          bAgent: "",
          bKda: players?.[rowIndex]?.[4] || "",
          bAcs: players?.[rowIndex]?.[5] || "",
        }));
        const [aScore = "", bScore = ""] = mapScore.split("-");
        return {
          mapName,
          mapScore,
          title: `Map ${index + 1} ${mapKo[mapName] || mapName}`,
          rows,
          stats: {
            aScore,
            bScore,
            firstKillsA: "",
            firstKillsB: "",
            thriftyA: "",
            thriftyB: "",
            postPlantA: "",
            postPlantB: "",
            clutchA: "",
            clutchB: "",
          },
        };
      }

      function setStorageKey(mapName, index) {
        return `set:${key}:${index}:${mapName}`;
      }

      function loadSetState(mapName, mapScore, index, players) {
        const defaults = defaultSetState(mapName, mapScore, index, players);
        try {
          const saved = JSON.parse(localStorage.getItem(setStorageKey(mapName, index)) || "{}");
          return {
            ...defaults,
            ...saved,
            rows: saved.rows || defaults.rows,
            stats: { ...defaults.stats, ...(saved.stats || {}) },
          };
        } catch {
          return defaults;
        }
      }

      function saveSetState(mapName, index, state) {
        localStorage.setItem(setStorageKey(mapName, index), JSON.stringify(state));
      }

      function syncMapScore(state) {
        state.mapScore = `${state.stats.aScore || "-"}-${state.stats.bScore || "-"}`;
      }

      function renderMapCardHero(card, state) {
        card.querySelector(".map-report-hero strong").textContent = state.mapScore;
        card.querySelector(".map-report-hero h3").textContent = mapKo[state.mapName] || state.mapName;
      }

      function renderSetView(card, state) {
        renderMapCardHero(card, state);
        const view = card.querySelector(".set-detail-view");
        view.innerHTML = `
          <div class="set-detail-banner">
            <span>${state.title}</span>
            <strong>${state.mapScore}</strong>
          </div>
          <div class="set-player-grid">
            <div class="set-team-title" style="background: ${teamBrandStyle(match.teamA, "#0cab82")}">${match.teamA}</div>
            <div class="set-team-title right" style="background: ${teamBrandStyle(match.teamB, "#ff2638")}">${match.teamB}</div>
            ${state.rows
              .map(
                (row) => `
                  <div class="set-player-row">
                    ${renderAgentButton(row.aAgent, "a", state.rows.indexOf(row))}
                    <div>
                      <button class="inline-edit player-name" type="button" data-row="${state.rows.indexOf(row)}" data-side="a" data-edit="player">${row.aPlayer || "-"}</button>
                      <span>
                        <button class="inline-edit" type="button" data-row="${state.rows.indexOf(row)}" data-side="a" data-edit="kda">${row.aKda || "-"}</button>
                        (<button class="inline-edit" type="button" data-row="${state.rows.indexOf(row)}" data-side="a" data-edit="acs">${row.aAcs || "-"}</button>)
                      </span>
                    </div>
                    <div>
                      <button class="inline-edit player-name" type="button" data-row="${state.rows.indexOf(row)}" data-side="b" data-edit="player">${row.bPlayer || "-"}</button>
                      <span>
                        <button class="inline-edit" type="button" data-row="${state.rows.indexOf(row)}" data-side="b" data-edit="kda">${row.bKda || "-"}</button>
                        (<button class="inline-edit" type="button" data-row="${state.rows.indexOf(row)}" data-side="b" data-edit="acs">${row.bAcs || "-"}</button>)
                      </span>
                    </div>
                    ${renderAgentButton(row.bAgent, "b", state.rows.indexOf(row))}
                  </div>
                `,
              )
              .join("")}
          </div>
          ${renderRoundTracker(state)}
          <div class="capsule-stats-v2">
            <div class="capsule-stats-head-v2">
              <strong>${match.teamA}</strong>
              <button class="inline-edit stat-value" type="button" data-stat="aScore">${state.stats.aScore || "-"}</button>
              <span>스코어</span>
              <button class="inline-edit stat-value" type="button" data-stat="bScore">${state.stats.bScore || "-"}</button>
              <strong>${match.teamB}</strong>
            </div>
            <div class="capsule-stats-body-v2">
              <div class="capsule-art-v2">${teamCapsuleSrc(match.teamA) ? `<img${teamCapsuleClass(match.teamA)} src="${teamCapsuleSrc(match.teamA)}" alt="" />` : ""}</div>
              <div class="capsule-center-v2">
                <div class="capsule-stat-line-v2"><button class="inline-edit stat-value" type="button" data-stat="firstKillsA">${state.stats.firstKillsA || "-"}</button><span>첫킬</span><button class="inline-edit stat-value" type="button" data-stat="firstKillsB">${state.stats.firstKillsB || "-"}</button></div>
                <div class="capsule-stat-line-v2"><button class="inline-edit stat-value" type="button" data-stat="thriftyA">${state.stats.thriftyA || "-"}</button><span>절약왕</span><button class="inline-edit stat-value" type="button" data-stat="thriftyB">${state.stats.thriftyB || "-"}</button></div>
                <div class="capsule-stat-line-v2"><button class="inline-edit stat-value" type="button" data-stat="postPlantA">${state.stats.postPlantA || "-"}</button><span>포스트 플랜트</span><button class="inline-edit stat-value" type="button" data-stat="postPlantB">${state.stats.postPlantB || "-"}</button></div>
                <div class="capsule-stat-line-v2"><button class="inline-edit stat-value" type="button" data-stat="clutchA">${state.stats.clutchA || "-"}</button><span>클러치</span><button class="inline-edit stat-value" type="button" data-stat="clutchB">${state.stats.clutchB || "-"}</button></div>
                <div class="capsule-pacific-v2"><img src="./assets/vct-logo.png" alt="" style="filter:brightness(0) saturate(100%) invert(75%) sepia(38%) saturate(600%) hue-rotate(8deg) brightness(98%);" /></div>
              </div>
              <div class="capsule-art-v2">${teamCapsuleSrc(match.teamB) ? `<img${teamCapsuleClass(match.teamB)} src="${teamCapsuleSrc(match.teamB)}" alt="" />` : ""}</div>
            </div>
          </div>
        `;
      }

      function openAgentPicker(card, state, mapName, index, rowIndex, side) {
        document.querySelector(".agent-picker")?.remove();
        const picker = document.createElement("div");
        picker.className = "agent-picker";
        picker.innerHTML = `
          <div class="agent-picker-panel">
            <div class="agent-picker-head">
              <strong>요원 선택</strong>
              <button type="button" data-agent-close>닫기</button>
            </div>
            <div class="agent-picker-grid agent-image-grid">
              ${agents
                .map(
                  (agent, agentIndex) => `
                    <button type="button" data-agent-index="${agentIndex}" aria-label="${agent}">
                      <img src="${agentImage(agent)}" alt="" />
                    </button>
                  `,
                )
                .join("")}
                        <div class="picker-clear-row"><button type="button" data-clear-field>칸 비우기</button></div>
          </div>
          </div>
        `;
        document.body.appendChild(picker);
        picker.addEventListener("click", (event) => {
          if (event.target === picker || event.target.dataset.agentClose !== undefined) {
            picker.remove();
            return;
          }
          if (event.target.dataset.clearField !== undefined) {
            state.rows[rowIndex][`${side}Agent`] = "";
            saveSetState(mapName, index, state);
            renderSetView(card, state);
            picker.remove();
            return;
          }
          const agentButton = event.target.closest("[data-agent-index]");
          if (!agentButton) return;
          const agent = agents[Number(agentButton.dataset.agentIndex)];
          state.rows[rowIndex][`${side}Agent`] = agent;
          saveSetState(mapName, index, state);
          renderSetView(card, state);
          picker.remove();
        });
      }

      function openValueEditor(card, state, mapName, index, options) {
        document.querySelector(".agent-picker")?.remove();
        const picker = document.createElement("div");
        picker.className = "agent-picker";
        const isPlayer = options.kind === "player";
        const roster = options.side === "a" ? getTeamRoster(match.teamA) : getTeamRoster(match.teamB);
        picker.innerHTML = `
          <div class="agent-picker-panel compact">
            <div class="agent-picker-head">
              <strong>${options.title}</strong>
              <button type="button" data-agent-close>닫기</button>
            </div>
            ${
              isPlayer
                ? `<div class="agent-picker-grid">${roster.map((player) => `<button type="button" data-value="${player}">${player}</button>`).join("")}</div>`
                : `<form class="value-editor-form">
                    <input value="${options.value || ""}" placeholder="${options.placeholder || "-"}" autofocus />
                    <button type="submit">적용</button>
                  </form>`
            }
            <div class="picker-clear-row"><button type="button" data-clear-field>칸 비우기</button></div>
          </div>
        `;
        document.body.appendChild(picker);
        const close = () => picker.remove();
        const apply = (value) => {
          options.apply(value);
          if (options.syncScore) syncMapScore(state);
          saveSetState(mapName, index, state);
          renderSetView(card, state);
          close();
        };
        picker.addEventListener("click", (event) => {
          if (event.target === picker || event.target.dataset.agentClose !== undefined) close();
          if (event.target.dataset.clearField !== undefined) { apply(""); return; }
          if (event.target.dataset.value !== undefined) apply(event.target.dataset.value);
        });
        picker.querySelector("form")?.addEventListener("submit", (event) => {
          event.preventDefault();
          apply(event.currentTarget.querySelector("input").value.trim());
        });
        picker.querySelector("input")?.focus();
      }

      const reportGrid = document.getElementById("map-report-grid");

      const mapCountKey = `mapCount:${key}`;
      function loadActiveMapCount(max) {
        try { const s = localStorage.getItem(mapCountKey); if (s !== null) return Math.max(1, Math.min(max, parseInt(s))); } catch (e) {}
        return max;
      }
      function saveActiveMapCount(n) { try { localStorage.setItem(mapCountKey, String(n)); } catch (e) {} }

      function confirmMapRemove(onConfirm) {
        const backdrop = document.createElement("div");
        backdrop.className = "map-remove-confirm-backdrop";
        backdrop.innerHTML = `
          <div class="map-remove-confirm-panel">
            <p>맵 창을 삭제하겠습니까?<small>입력된 데이터는 유지됩니다.</small></p>
            <div class="map-remove-confirm-actions">
              <button class="map-remove-confirm-cancel" data-cancel>취소</button>
              <button class="map-remove-confirm-ok" data-ok>삭제</button>
            </div>
          </div>`;
        document.body.appendChild(backdrop);
        backdrop.addEventListener("click", e => {
          if (e.target.dataset.cancel !== undefined || e.target === backdrop) backdrop.remove();
          if (e.target.dataset.ok !== undefined) { backdrop.remove(); onConfirm(); }
        });
      }

      function getFirstAttackerFromVeto(mapIndex) {
        const playableIndices = isBo5 ? [2, 3, 4, 5, 6] : [2, 3, 6];
        const stepIndex = playableIndices[mapIndex];
        if (stepIndex === undefined) return null;
        const chooser = sideChooserForStep(stepIndex, vetoState.firstBan);
        const chosenSide = vetoState.sides[stepIndex] || "defense";
        return chosenSide === "attack" ? (chooser === "A" ? "a" : "b") : (chooser === "A" ? "b" : "a");
      }
      function renderMapReports() {
        const allMaps = playableMapsFromVeto(vetoState);
        const maxMaps = allMaps.length;
        const isAdmin = !document.body.classList.contains("view-only");
        const activeCount = loadActiveMapCount(maxMaps);

        let ctrl = document.getElementById("map-count-ctrl");
        if (isAdmin) {
          if (!ctrl) {
            ctrl = document.createElement("div");
            ctrl.id = "map-count-ctrl";
            ctrl.className = "map-count-ctrl";
            reportGrid.parentElement.insertBefore(ctrl, reportGrid);
          }
          ctrl.innerHTML = `
            <button type="button" class="map-count-btn" id="mcb-minus" ${activeCount <= 1 ? "disabled" : ""}>−</button>
            <span>${activeCount} / ${maxMaps}</span>
            <button type="button" class="map-count-btn" id="mcb-plus" ${activeCount >= maxMaps ? "disabled" : ""}>+</button>`;
          document.getElementById("mcb-minus").onclick = () => {
            const c = loadActiveMapCount(maxMaps);
            if (c > 1) confirmMapRemove(() => { saveActiveMapCount(c - 1); renderMapReports(); });
          };
          document.getElementById("mcb-plus").onclick = () => {
            const c = loadActiveMapCount(maxMaps);
            if (c < maxMaps) { saveActiveMapCount(c + 1); renderMapReports(); }
          };
        } else if (ctrl) {
          ctrl.remove();
        }

        const reportMaps = allMaps.slice(0, activeCount);
        reportGrid.innerHTML = reportMaps
          .map((mapText, index) => {
            const [mapName, mapScore] = mapText.split(" ");
            const players = null;
            return `
              <article class="map-report-card set-card" data-map-index="${index}">
                <div class="map-report-hero" style="${mapBackgroundStyle(mapName)}">
                  <span>Map ${index + 1}</span>
                  <h3>${mapKo[mapName] || mapName}</h3>
                  <strong>${mapScore}</strong>
                </div>
                <div class="set-detail-view"></div>
              </article>
            `;
          })
          .join("");

        document.querySelectorAll(".set-card").forEach((card, index) => {
          const [mapName, mapScore] = reportMaps[index].split(" ");
          const players = null;
          const state = loadSetState(mapName, mapScore, index, players);
          state.mapName = mapName;
          state.mapScore = state.stats.aScore || state.stats.bScore ? `${state.stats.aScore || "-"}-${state.stats.bScore || "-"}` : mapScore;
          state.title = `Map ${index + 1} ${mapKo[mapName] || mapName}`;
          state.firstAttacker = getFirstAttackerFromVeto(index);
          renderSetView(card, state);
          card.addEventListener("click", (event) => {
            const chip = event.target.closest("[data-agent-row]");
            if (chip) {
              openAgentPicker(card, state, mapName, index, Number(chip.dataset.agentRow), chip.dataset.agentSide);
              return;
            }
            const roundCell = event.target.closest("[data-round-cell]");
            if (roundCell) {
              if (!document.body.classList.contains("view-only"))
                openRoundPicker(card, state, mapName, index, Number(roundCell.dataset.roundCell));
              return;
            }
            const editable = event.target.closest("[data-edit], [data-stat]");
            if (!editable) return;
            const rowIndex = Number(editable.dataset.row);
            const side = editable.dataset.side;
            const edit = editable.dataset.edit;
            const stat = editable.dataset.stat;
            if (edit === "player") {
              openValueEditor(card, state, mapName, index, {
                kind: "player",
                side,
                title: "선수 선택",
                apply: (value) => {
                  state.rows[rowIndex][`${side}Player`] = value;
                },
              });
            } else if (edit === "kda" || edit === "acs") {
              openValueEditor(card, state, mapName, index, {
                title: edit === "kda" ? "K/D/A 입력" : "ACS 입력",
                value: state.rows[rowIndex][`${side}${edit === "kda" ? "Kda" : "Acs"}`],
                placeholder: edit === "kda" ? "예: 21/20/3" : "예: 230",
                apply: (value) => {
                  state.rows[rowIndex][`${side}${edit === "kda" ? "Kda" : "Acs"}`] = value;
                },
              });
            } else if (stat) {
              openValueEditor(card, state, mapName, index, {
                title: "지표 입력",
                value: state.stats[stat],
                placeholder: "-",
                syncScore: stat === "aScore" || stat === "bScore",
                apply: (value) => {
                  state.stats[stat] = value;
                },
              });
            }
          });
        });
      }

      renderMapReports();
        });
    </script>
  <script src="./auth.js"></script>
  <script src="./help.js" defer></script>
</body>
</html>
