<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>선수 주식 — VCT Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    a { text-decoration: none; color: inherit; }

    :root {
      --bg:       #080c10;
      --bg-card:  #0d1117;
      --bg-card2: #111820;
      --border:   rgba(255,255,255,.07);
      --up:       #e84444;   /* 상승 빨강 */
      --down:     #3b8fff;   /* 하락 파랑 */
      --neutral:  rgba(255,255,255,.45);
      --accent:   #ff2638;
    }

    body {
      min-height: 100vh;
      font-family: "Noto Sans KR", "Barlow", system-ui, sans-serif;
      color: #f0f0f0;
      background: var(--bg);
    }
    body::before {
      position: fixed; inset: 0; z-index: -1; pointer-events: none; content: "";
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.5), transparent 80%);
    }

    /* ── HEADER ── */
    .site-header {
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; gap: 8px;
      padding: 0 20px; height: 52px;
      background: rgba(8,12,16,.92);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-brand {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 13px; font-weight: 900; color: var(--accent);
      letter-spacing: .09em; text-transform: uppercase; flex-shrink: 0;
    }
    .nav-sep { width: 1px; height: 16px; background: rgba(255,255,255,.1); margin: 0 4px; flex-shrink: 0; }
    .back-link {
      display: inline-flex; align-items: center; height: 30px; padding: 0 13px;
      border: 1px solid rgba(255,255,255,.08); border-radius: 4px;
      background: rgba(255,255,255,.04); font-size: 12px; font-weight: 700;
      color: rgba(255,255,255,.5); transition: background .15s, color .15s;
    }
    .back-link:hover { background: rgba(255,255,255,.09); color: #fff; }
    .site-header .auth-header-btn { margin-left: auto !important; }

    /* ── PAGE SHELL ── */
    .page-shell {
      width: min(1400px, calc(100% - 32px));
      margin: 0 auto; padding: 28px 0 64px;
    }

    /* ── PAGE TITLE ── */
    .page-title-row {
      display: flex; align-items: baseline; gap: 12px; margin-bottom: 24px;
    }
    .page-title {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 32px; font-weight: 900; letter-spacing: .04em;
      text-transform: uppercase; color: #fff;
    }
    .page-subtitle { font-size: 13px; color: rgba(255,255,255,.3); }

    /* ── MARKET TICKER (상단 요약 바) ── */
    .ticker-bar {
      display: flex; gap: 0; overflow: hidden;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg-card); margin-bottom: 20px;
    }
    .ticker-item {
      flex: 1; display: flex; flex-direction: column; gap: 2px;
      padding: 12px 18px; border-right: 1px solid var(--border);
      min-width: 0;
    }
    .ticker-item:last-child { border-right: none; }
    .ticker-label { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.3); }
    .ticker-value { font-family: "Barlow Condensed", sans-serif; font-size: 22px; font-weight: 900; color: #fff; letter-spacing: .02em; }
    .ticker-change { font-size: 12px; font-weight: 700; }
    .ticker-change.up   { color: var(--up); }
    .ticker-change.down { color: var(--down); }
    .ticker-change.flat { color: var(--neutral); }

    /* ── LAYOUT ── */
    .stock-layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      grid-template-rows: auto 1fr;
      gap: 16px;
    }
    @media (max-width: 900px) {
      .stock-layout { grid-template-columns: 1fr; }
    }

    /* ── CHART PANEL ── */
    .chart-panel {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden;
    }
    .chart-header {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 20px 12px; border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .chart-player-info { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
    .chart-player-logo {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,.06); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900; flex-shrink: 0;
    }
    .chart-player-logo img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }
    .chart-player-name {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 22px; font-weight: 900; letter-spacing: .03em; color: #fff;
    }
    .chart-player-team { font-size: 11px; color: rgba(255,255,255,.38); margin-top: 1px; }
    .chart-price-block { text-align: right; }
    .chart-current-price {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 28px; font-weight: 900; color: #fff;
    }
    .chart-price-change {
      font-size: 13px; font-weight: 700; margin-top: 2px;
    }
    .chart-price-change.up   { color: var(--up); }
    .chart-price-change.down { color: var(--down); }
    .chart-price-change.flat { color: var(--neutral); }

    /* 기간 탭 */
    .chart-period-tabs {
      display: flex; gap: 4px; padding: 10px 20px;
      border-bottom: 1px solid var(--border);
    }
    .period-tab {
      padding: 4px 12px; border-radius: 4px; border: none; background: none;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 13px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
      color: rgba(255,255,255,.3); cursor: pointer; transition: background .15s, color .15s;
    }
    .period-tab:hover  { background: rgba(255,255,255,.06); color: rgba(255,255,255,.7); }
    .period-tab.active { background: rgba(255,255,255,.1);  color: #fff; }

    /* 캔들/라인 차트 영역 */
    .chart-area {
      position: relative; height: 300px; padding: 16px 20px 8px;
    }
    .chart-canvas { width: 100%; height: 100%; display: block; }

    /* 차트 눈금 */
    .chart-y-axis {
      position: absolute; right: 20px; top: 16px; bottom: 24px;
      display: flex; flex-direction: column; justify-content: space-between;
      pointer-events: none;
    }
    .chart-y-label { font-size: 10px; color: rgba(255,255,255,.22); font-family: "Barlow Condensed", sans-serif; text-align: right; }

    /* 차트 하단 정보 바 */
    .chart-info-bar {
      display: flex; gap: 0;
      border-top: 1px solid var(--border);
    }
    .chart-stat {
      flex: 1; padding: 10px 16px; border-right: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 2px;
    }
    .chart-stat:last-child { border-right: none; }
    .chart-stat-label { font-size: 10px; color: rgba(255,255,255,.28); letter-spacing: .08em; text-transform: uppercase; }
    .chart-stat-value { font-family: "Barlow Condensed", sans-serif; font-size: 15px; font-weight: 700; color: #fff; }
    .chart-stat-value.up   { color: var(--up); }
    .chart-stat-value.down { color: var(--down); }

    /* ── 종목 리스트 (테이블) ── */
    .stock-table-panel {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden;
      grid-row: 1 / 3;
    }
    .panel-header {
      padding: 14px 18px 10px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .panel-title {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 14px; font-weight: 900; letter-spacing: .1em; text-transform: uppercase;
      color: rgba(255,255,255,.6);
    }
    .panel-search {
      width: 130px; height: 28px; padding: 0 10px;
      background: rgba(255,255,255,.05); border: 1px solid var(--border);
      border-radius: 4px; color: #fff; font-size: 12px; outline: none;
    }
    .panel-search:focus { border-color: rgba(255,255,255,.2); }
    .panel-search::placeholder { color: rgba(255,255,255,.2); }

    /* 권역 탭 */
    .region-tabs {
      display: flex; gap: 4px; padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,.02);
      flex-wrap: wrap;
    }
    .region-tab {
      padding: 3px 11px; border: 1px solid rgba(255,255,255,.1); border-radius: 4px;
      background: none; color: rgba(255,255,255,.35);
      font-family: "Barlow Condensed", sans-serif; font-size: 11px; font-weight: 900;
      letter-spacing: .07em; text-transform: uppercase; cursor: pointer; transition: all .12s;
      white-space: nowrap;
    }
    .region-tab:hover { background: rgba(255,255,255,.07); color: rgba(255,255,255,.7); }
    .region-tab.active { background: rgba(255,255,255,.1); color: #fff; border-color: rgba(255,255,255,.25); }
    .region-tab[data-region="americas"].active { background: rgba(255,100,60,.15);  color: #ff7744; border-color: rgba(255,100,60,.3); }
    .region-tab[data-region="emea"].active     { background: rgba(80,160,255,.15);  color: #60b0ff; border-color: rgba(80,160,255,.3); }
    .region-tab[data-region="pacific"].active  { background: rgba(80,220,160,.15);  color: #50dda0; border-color: rgba(80,220,160,.3); }
    .region-tab[data-region="cn"].active       { background: rgba(255,200,50,.15);  color: #ffcc44; border-color: rgba(255,200,50,.3); }

    /* 권역 뱃지 (전체 뷰에서) */
    .region-badge {
      display: inline-block; padding: 1px 5px; border-radius: 3px;
      font-family: "Barlow Condensed", sans-serif; font-size: 9px; font-weight: 900;
      letter-spacing: .07em; text-transform: uppercase; vertical-align: middle; margin-left: 4px;
    }
    .region-badge.americas { background: rgba(255,100,60,.2);  color: #ff7744; }
    .region-badge.emea     { background: rgba(80,160,255,.2);  color: #60b0ff; }
    .region-badge.pacific  { background: rgba(80,220,160,.2);  color: #50dda0; }
    .region-badge.cn       { background: rgba(255,200,50,.2);  color: #ffcc44; }

    /* 정렬 헤더 */
    .st-head {
      display: grid;
      grid-template-columns: minmax(0,1fr) 70px 70px 68px;
      padding: 6px 14px;
      background: rgba(255,255,255,.03);
      border-bottom: 1px solid var(--border);
    }
    .st-head-cell {
      font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      color: rgba(255,255,255,.28); cursor: pointer; user-select: none;
      display: flex; align-items: center; gap: 3px;
    }
    .st-head-cell:not(:first-child) { justify-content: flex-end; }
    .st-head-cell:hover { color: rgba(255,255,255,.6); }
    .sort-arrow { opacity: .4; font-size: 9px; }
    .st-head-cell.sorted .sort-arrow { opacity: 1; color: #fff; }

    /* 종목 행 */
    .stock-list { max-height: 560px; overflow-y: auto; }
    .stock-list::-webkit-scrollbar { width: 4px; }
    .stock-list::-webkit-scrollbar-track { background: transparent; }
    .stock-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }
    .stock-row {
      display: grid;
      grid-template-columns: minmax(0,1fr) 70px 70px 68px;
      padding: 9px 14px; border-bottom: 1px solid rgba(255,255,255,.04);
      cursor: pointer; transition: background .12s; align-items: center;
    }
    .stock-row:last-child { border-bottom: none; }
    .stock-row:hover { background: rgba(255,255,255,.04); }
    .stock-row.active { background: rgba(255,255,255,.07); }
    .stock-player { display: flex; align-items: center; gap: 9px; min-width: 0; }
    .stock-player-logo {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 900; flex-shrink: 0; overflow: hidden;
    }
    .stock-player-logo img { width: 100%; height: 100%; object-fit: contain; }
    .stock-player-info { min-width: 0; }
    .stock-player-name {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 14px; font-weight: 700; letter-spacing: .03em; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .stock-player-team { font-size: 10px; color: rgba(255,255,255,.3); }
    .stock-price {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 14px; font-weight: 700; color: #fff; text-align: right;
    }
    .stock-change {
      font-size: 12px; font-weight: 700; text-align: right;
    }
    .stock-change.up   { color: var(--up); }
    .stock-change.down { color: var(--down); }
    .stock-change.flat { color: var(--neutral); }
    .stock-rate {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 13px; font-weight: 700; text-align: right;
      padding: 2px 8px; border-radius: 4px;
    }
    .stock-rate.up   { background: rgba(232,68,68,.14); color: var(--up); }
    .stock-rate.down { background: rgba(59,143,255,.14); color: var(--down); }
    .stock-rate.flat { color: var(--neutral); background: rgba(255,255,255,.05); }

    /* ── 매수 / 매도 패널 ── */
    .trade-panel {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden;
    }
    .trade-tabs {
      display: grid; grid-template-columns: 1fr 1fr;
    }
    .trade-tab {
      padding: 13px 0; border: none; cursor: pointer;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 15px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase;
      background: rgba(255,255,255,.04); color: rgba(255,255,255,.35);
      border-bottom: 2px solid transparent; transition: all .15s;
    }
    .trade-tab:hover { color: rgba(255,255,255,.7); }
    .trade-tab.active-buy  { background: rgba(232,68,68,.1);  color: var(--up);   border-bottom-color: var(--up); }
    .trade-tab.active-sell { background: rgba(59,143,255,.1); color: var(--down); border-bottom-color: var(--down); }

    .trade-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

    /* 주당 가격 표시 */
    .trade-price-display {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px;
      background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 6px;
    }
    .trade-price-label { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: rgba(255,255,255,.35); }
    .trade-price-value { font-family: "Barlow Condensed", sans-serif; font-size: 18px; font-weight: 900; color: #fff; }
    .trade-price-value span { font-size: 12px; color: rgba(255,255,255,.35); margin-left: 4px; }

    /* 보유 수량 (간단) */
    .trade-holding-simple {
      font-size: 12px; color: rgba(255,255,255,.35); text-align: right;
    }
    .trade-holding-simple strong { font-family: "Barlow Condensed", sans-serif; font-size: 14px; color: rgba(255,255,255,.7); font-weight: 900; }

    /* 입력 행 */
    .trade-row { display: flex; flex-direction: column; gap: 5px; }
    .trade-label {
      font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      color: rgba(255,255,255,.35);
    }
    .trade-input-wrap {
      display: flex; align-items: center;
      background: rgba(255,255,255,.05); border: 1px solid var(--border);
      border-radius: 6px; overflow: hidden; transition: border-color .15s;
    }
    .trade-input-wrap:focus-within { border-color: rgba(255,255,255,.2); }
    .trade-input {
      flex: 1; height: 44px; padding: 0 14px;
      background: none; border: none; color: #fff;
      font-family: "Barlow Condensed", sans-serif; font-size: 22px; font-weight: 700;
      outline: none;
    }
    .trade-input::placeholder { color: rgba(255,255,255,.18); font-size: 16px; font-family: "Noto Sans KR", sans-serif; font-weight: 500; }
    .trade-input-unit {
      padding: 0 14px; font-size: 13px; font-weight: 700;
      color: rgba(255,255,255,.3); letter-spacing: .05em; flex-shrink: 0;
    }

    /* 총액 표시 */
    .trade-total {
      background: rgba(255,255,255,.03); border: 1px solid var(--border);
      border-radius: 6px; padding: 10px 14px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .trade-total-label { font-size: 11px; color: rgba(255,255,255,.3); font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }
    .trade-total-value {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 20px; font-weight: 900; color: #fff;
    }
    .trade-total-value span { font-size: 12px; color: rgba(255,255,255,.3); margin-left: 4px; font-family: "Noto Sans KR", sans-serif; font-weight: 500; }

    /* 주문 버튼 */
    .trade-btn {
      width: 100%; height: 44px; border: none; border-radius: 6px;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 17px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase;
      cursor: pointer; transition: filter .15s, opacity .15s;
    }
    .trade-btn:hover:not(:disabled) { filter: brightness(1.12); }
    .trade-btn:disabled { opacity: .35; cursor: not-allowed; }
    .trade-btn.buy-btn  { background: var(--up);   color: #fff; }
    .trade-btn.sell-btn { background: var(--down); color: #fff; }

    /* 코인 잔고 */
    .coin-balance {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0 0; border-top: 1px solid var(--border);
    }
    .coin-balance-label { font-size: 11px; color: rgba(255,255,255,.28); }
    .coin-balance-value {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 15px; font-weight: 900; color: rgba(255,255,255,.7);
    }

    /* ── 하단 테이블 (전체 종목) ── */
    .full-table-panel {
      grid-column: 1 / 3;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden; margin-top: 0;
    }
    .ft-table { width: 100%; border-collapse: collapse; }
    .ft-table th {
      padding: 9px 14px; text-align: right;
      font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      color: rgba(255,255,255,.28); background: rgba(255,255,255,.03);
      border-bottom: 1px solid var(--border); cursor: pointer; user-select: none;
      white-space: nowrap;
    }
    .ft-table th:first-child { text-align: left; }
    .ft-table th:hover { color: rgba(255,255,255,.6); }
    .ft-table td {
      padding: 10px 14px; text-align: right;
      border-bottom: 1px solid rgba(255,255,255,.04);
      font-family: "Barlow Condensed", sans-serif; font-size: 14px; font-weight: 700; color: #fff;
      white-space: nowrap;
    }
    .ft-table td:first-child { text-align: left; }
    .ft-table tr { cursor: pointer; transition: background .12s; }
    .ft-table tr:hover { background: rgba(255,255,255,.04); }
    .ft-table tr.active { background: rgba(255,255,255,.07); }
    .ft-player-cell { display: flex; align-items: center; gap: 10px; }
    .ft-player-logo {
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 900; flex-shrink: 0; overflow: hidden;
    }
    .ft-player-logo img { width: 100%; height: 100%; object-fit: contain; }
    .ft-player-name { font-family: "Barlow Condensed", sans-serif; font-size: 15px; font-weight: 700; color: #fff; }
    .ft-player-team { font-size: 10px; color: rgba(255,255,255,.3); font-family: "Noto Sans KR", sans-serif; font-weight: 500; }

    .up   { color: var(--up) !important; }
    .down { color: var(--down) !important; }
    .flat { color: var(--neutral) !important; }

    /* ── 준비 중 오버레이 ── */
  </style>
</head>
<body>
  <!-- HEADER -->
  <header class="site-header">
    <a class="nav-brand" href="./index.html">VCT Archive</a>
    <span class="nav-sep"></span>
    <a class="back-link" href="./index.html">홈</a>
  </header>


  <main class="page-shell">
    <!-- 페이지 타이틀 -->
    <div class="page-title-row">
      <h1 class="page-title">📈 선수 주식</h1>
      <span class="page-subtitle">VCT 선수들의 퍼포먼스 기반 가상 주식 시장</span>
    </div>

    <!-- 상단 시장 요약 -->
    <div class="ticker-bar" id="ticker-bar">
      <div class="ticker-item">
        <span class="ticker-label">시장 지수</span>
        <span class="ticker-value" id="tk-index">—</span>
        <span class="ticker-change flat" id="tk-index-chg">—</span>
      </div>
      <div class="ticker-item">

  <script src="./storage.js"></script>

  <script>
  (function () {

    /* ── 팀 → 권역 fallback (vct_roster: 에 없는 팀 대비) ── */
    var REGION_MAP = {
      "Sentinels":"americas","G2 Esports":"americas","NRG":"americas",
      "100 Thieves":"americas","Cloud9":"americas","MIBR":"americas",
      "LOUD":"americas","FURIA":"americas","KRÜ Esports":"americas",
      "Leviatán":"americas","Evil Geniuses":"americas","ENVY":"americas",
      "Gentle Mates":"emea","Team Liquid":"emea","Team Heretics":"emea",
      "Natus Vincere":"emea","Karmine Corp":"emea","FUT Esports":"emea",
      "BBL Esports":"emea","Fnatic":"emea","Team Vitality":"emea",
      "Eternal Fire":"emea","PCIFIC Esports":"emea","ULF Esports":"emea",
      "GIANTX":"emea","NAVI":"emea",
      "DetonatioN FocusMe":"pacific","Global Esports":"pacific",
      "Kiwoom DRX":"pacific","Nongshim RedForce":"pacific",
      "Paper Rex":"pacific","Rex Regum Qeon":"pacific",
      "Team Secret":"pacific","ZETA DIVISION":"pacific",
      "FULL SENSE":"pacific","Gen.G":"pacific","VARREL":"pacific","T1":"pacific",
      "Wuxi Titan Esports Club":"cn","Guangzhou Huadu Bilibili Gaming":"cn",
      "FunPlus Phoenix":"cn","EDward Gaming":"cn",
      "Trace Esports":"cn","Nova Esports":"cn",
    };

    /* ── leaderboard.html과 동일한 방식으로 vct_p: / vct_roster: 키에서 집계 ── */
    function buildPlayersFromStorage() {
      /* 1. vct_roster:팀명 → 선수-팀 매핑 */
      var playerTeamMap = {};
      for (var ri = 0; ri < localStorage.length; ri++) {
        var rk = localStorage.key(ri);
        if (!rk || rk.indexOf("vct_roster:") !== 0) continue;
        var rTeam = rk.slice(11);
        try {
          var r = JSON.parse(localStorage.getItem(rk) || "{}");
          ((r.main || []).concat(r.subs || [])).forEach(function (p) {
            if (p) playerTeamMap[p.trim()] = rTeam;
          });
        } catch (e) {}
      }

      /* 2. vct_p:선수명 → ACS / KDA 집계 */
      var pMap = {};
      for (var pi = 0; pi < localStorage.length; pi++) {
        var pk = localStorage.key(pi);
        if (!pk || pk.indexOf("vct_p:") !== 0) continue;
        var pName = pk.slice(6);
        var pdRaw = localStorage.getItem(pk);
        if (!pdRaw) continue;
        var pd;
        try { pd = JSON.parse(pdRaw); } catch (e) { continue; }
        if (!pd.maps || !pd.maps.length) continue;

        pd.maps.forEach(function (m) {
          /* records.html matchesLeague("global")과 동일: 4대 리그만 허용 */
          var lg = m.league || "";
          if (lg !== "americas" && lg !== "emea" && lg !== "pacific" && lg !== "cn") return;

          var acs = parseFloat(m.acs) || 0;
          var hasKda = m.kda && m.kda.indexOf("/") !== -1;
          /* k=0, d=0, a=0 → 빈 데이터 제외 (records와 동일) */
          if (hasKda) {
            var _p = m.kda.split("/");
            if ((parseFloat(_p[0])||0) === 0 && (parseFloat(_p[1])||0) === 0 && (parseFloat(_p[2])||0) === 0) hasKda = false;
          }
          if (acs <= 0 && !hasKda) return;

          if (!pMap[pName]) {
            pMap[pName] = {
              name: pName,
              acsMaps: 0, totalAcs: 0,
              totalK: 0, totalD: 0, kdMaps: 0,
              regionCounts: {},
            };
          }
          var e = pMap[pName];

          /* 권역 결정 (= 맵이 속한 리그 = lg) */
          e.regionCounts[lg] = (e.regionCounts[lg] || 0) + 1;

          if (acs > 0) { e.acsMaps++; e.totalAcs += acs; }
          if (hasKda) {
            var pts = m.kda.split("/");
            e.totalK += parseFloat(pts[0]) || 0;
            e.totalD += parseFloat(pts[1]) || 0;
            e.kdMaps++;
          }
        });
      }

      /* 3. 선수 목록 생성 */
      var players = [];
      var idx = 0;
      Object.keys(pMap).forEach(function (pName) {
        var e = pMap[pName];
        if (e.acsMaps === 0) return;

        /* 가장 많이 나온 regional league = 권역 */
        var region = "americas";
        var maxCnt = 0;
        Object.keys(e.regionCounts).forEach(function (r) {
          if (e.regionCounts[r] > maxCnt) { maxCnt = e.regionCounts[r]; region = r; }
        });

        /* 팀: vct_roster 우선, 없으면 REGION_MAP 역방향 미적용 (공백) */
        var team = playerTeamMap[pName] || playerTeamMap[pName.trim()] || "";
        if (!team) {
          /* REGION_MAP 역으로 찾기 어려우므로 권역명만 표시 */
        }

        var avgAcs  = Math.round(e.totalAcs / e.acsMaps);
        var basePrice = Math.max(1, Math.round(avgAcs / 10));
        var kd      = e.kdMaps > 0
          ? parseFloat((e.totalK / Math.max(e.totalD, 0.5)).toFixed(2))
          : null;

        /* stock_p: 키에서 실제 현재가 / 이전가 / history / 누적평균 로드 */
        var stockData = null;
        try { stockData = JSON.parse(localStorage.getItem("stock_p:" + pName) || "null"); } catch (se) {}
        var price   = (stockData && stockData.price)   ? stockData.price   : basePrice;
        var prev    = (stockData && stockData.history && stockData.history.length >= 2)
                        ? stockData.history[stockData.history.length - 2]
                        : price;
        var history = (stockData && stockData.history && stockData.history.length > 0)
                        ? stockData.history : null;
        /* 반영된 맵들의 누적 평균 ACS가 있으면 우선 사용 */
        if (stockData && stockData.runCount > 0) {
          avgAcs = Math.round(stockData.runTotal / stockData.runCount);
        }

        players.push({
          id:       "p" + (idx++),
          name:     pName,
          team:     team,
          region:   region,
          logo:     null,
          price:    price,
          prev:     prev,
          history:  history,
          mapCount: e.acsMaps,
          avgAcs:   avgAcs,
          kd:       kd,
          shares:   10000,
        });
      });

      players.sort(function (a, b) { return b.price - a.price; });
      return players;
    }

    /* ── 상태 변수 ── */
    var PLAYERS       = [];
    var selectedId    = null;
    var tradeMode     = "buy";
    var myCoins       = 0;
    var myHoldings    = {};
    var currentRegion = "all";

    function calcChange(p)  { return p.price - p.prev; }
    function calcRate(p)    { return p.prev > 0 ? ((p.price - p.prev) / p.prev * 100) : 0; }
    function fmtPrice(n)    { return n.toLocaleString(); }
    function fmtRate(r)     { return (r >= 0 ? "+" : "") + r.toFixed(2) + "%"; }
    function fmtChg(c)      { return (c >= 0 ? "▲" : "▼") + " " + Math.abs(c).toLocaleString(); }
    function colorCls(n)    { return n > 0 ? "up" : n < 0 ? "down" : "flat"; }
    function findPlayer(id) { return PLAYERS.find(function (x) { return x.id === id; }); }

    var REGION_LABEL = { americas: "AMR", emea: "EMEA", pacific: "PAC", cn: "CN" };

    /* ── 티커 바 업데이트 ── */
    function updateTicker() {
      var upCnt = 0, downCnt = 0;
      PLAYERS.forEach(function (p) {
        var c = calcChange(p);
        if (c > 0) upCnt++;
        else if (c < 0) downCnt++;
      });
      document.getElementById("tk-up").textContent    = upCnt;
      document.getElementById("tk-down").textContent   = downCnt;
      document.getElementById("tk-vol").textContent    = PLAYERS.length;
      document.getElementById("tk-index").textContent  = "VCT-IDX";
      document.getElementById("tk-asset").textContent  = myCoins.toLocaleString();
    }

    /* ── 종목 리스트 렌더링 ── */
    function renderStockList(filter) {
      var list   = document.getElementById("stock-list");
      var search = (filter || "").toLowerCase();
      var html   = "";
      PLAYERS.forEach(function (p) {
        if (currentRegion !== "all" && p.region !== currentRegion) return;
        if (search && p.name.toLowerCase().indexOf(search) === -1 && p.team.toLowerCase().indexOf(search) === -1) return;
        var chg = calcChange(p), rate = calcRate(p), cls = colorCls(chg);
        var initial = p.name.charAt(0).toUpperCase();
        var regionBadge = currentRegion === "all"
          ? '<span class="region-badge ' + p.region + '">' + (REGION_LABEL[p.region] || "?") + '</span>'
          : "";
        html += '<div class="stock-row' + (p.id === selectedId ? " active" : "") + '" data-id="' + p.id + '">' +
          '<div class="stock-player">' +
            '<div class="stock-player-logo">' + initial + '</div>' +
            '<div class="stock-player-info">' +
              '<div class="stock-player-name">' + p.name + regionBadge + '</div>' +
              '<div class="stock-player-team">' + p.team + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="stock-price">' + fmtPrice(p.price) + '</div>' +
          '<div class="stock-change ' + cls + '">' + fmtChg(chg) + '</div>' +
          '<div class="stock-rate ' + cls + '">' + fmtRate(rate) + '</div>' +
        '</div>';
      });
      list.innerHTML = html || '<div style="padding:24px;text-align:center;color:rgba(255,255,255,.25);font-size:13px;">검색 결과 없음</div>';
      list.querySelectorAll(".stock-row").forEach(function (row) {
        row.addEventListener("click", function () { selectPlayer(row.dataset.id); });
      });
    }

    /* ── 전체 테이블 렌더링 ── */
    function renderFullTable() {
      var tbody = document.getElementById("ft-tbody");
      var html  = "";
      PLAYERS.forEach(function (p) {
        var chg = calcChange(p), rate = calcRate(p), cls = colorCls(chg);
        var initial = p.name.charAt(0).toUpperCase();
        html += '<tr class="' + (p.id === selectedId ? "active" : "") + '" data-id="' + p.id + '">' +
          '<td><div class="ft-player-cell">' +
            '<div class="ft-player-logo">' + initial + '</div>' +
            '<div><div class="ft-player-name">' + p.name + '</div>' +
            '<div class="ft-player-team">' + p.team + '</div></div></div></td>' +
          '<td>' + fmtPrice(p.price) + '</td>' +
          '<td class="' + cls + '">' + fmtChg(chg) + '</td>' +
          '<td class="' + cls + '">' + fmtRate(rate) + '</td>' +
        '</tr>';
      });
      tbody.innerHTML = html || '<tr><td colspan="4" style="text-align:center;color:rgba(255,255,255,.25);padding:24px;">데이터 없음</td></tr>';
      tbody.querySelectorAll("tr").forEach(function (tr) {
        tr.addEventListener("click", function () { selectPlayer(tr.dataset.id); });
      });
    }

    /* ── 선수 선택 ── */
    function selectPlayer(id) {
      var p = findPlayer(id);
      if (!p) return;
      selectedId = id;
      var chg = calcChange(p), rate = calcRate(p), cls = colorCls(chg);
      document.getElementById("chart-name").textContent   = p.name;
      document.getElementById("chart-team").textContent   = p.team;
      document.getElementById("chart-price").textContent  = fmtPrice(p.price) + " 코인";
      var cpEl = document.getElementById("chart-price-change");
      cpEl.textContent = fmtChg(chg) + " (" + fmtRate(rate) + ")";
      cpEl.className   = "chart-price-change " + cls;
      document.getElementById("chart-logo").textContent   = p.name.charAt(0).toUpperCase();
      document.getElementById("stat-open").textContent    = fmtPrice(p.prev);
      document.getElementById("stat-close").textContent   = fmtPrice(p.price);
      var statChgEl  = document.getElementById("stat-chg");
      var statRateEl = document.getElementById("stat-rate");
      statChgEl.textContent  = fmtChg(chg);
      statChgEl.className    = "chart-stat-value " + cls;
      statRateEl.textContent = fmtRate(rate);
      statRateEl.className   = "chart-stat-value " + cls;
      document.getElementById("stat-avgacs").textContent   = p.avgAcs != null ? p.avgAcs : "—";
      document.getElementById("stat-mapcount").textContent = p.mapCount != null ? p.mapCount + "맵" : "—";
      document.getElementById("trade-unit-price").innerHTML = fmtPrice(p.price) + ' <span>코인</span>';
      var h = myHoldings[p.id];
      document.getElementById("holding-qty").textContent  = (h && h.qty > 0 ? h.qty : 0) + " 주";
      document.getElementById("trade-qty-input").value    = "";
      drawChart(p);
      renderStockList(document.getElementById("stock-search").value);
      renderFullTable();
      updateTotal();
    }

    /* ── 차트 그리기 ──
       p.history 배열이 있으면 실제 데이터로 그리고,
       없으면 (아직 거래 기록 없음) 빈 상태 표시        */
    function drawChart(p) {
      var canvas = document.getElementById("stock-chart");
      var ctx    = canvas.getContext("2d");
      var W = canvas.parentElement.offsetWidth - 40;
      var H = canvas.parentElement.offsetHeight;
      canvas.width = W; canvas.height = H;
      ctx.clearRect(0, 0, W, H);

      var data = p.history && p.history.length > 1 ? p.history : null;

      if (!data) {
        /* 거래 기록 없음 → 빈 상태 */
        ctx.font = "13px 'Pretendard', sans-serif";
        ctx.fillStyle = "rgba(255,255,255,0.15)";
        ctx.textAlign = "center";
        ctx.fillText("거래 기록이 없습니다", W / 2, H / 2);
        return;
      }

      /* 실제 데이터로 차트 그리기 */
      var minV = Math.min.apply(null, data) * 0.998;
      var maxV = Math.max.apply(null, data) * 1.002;
      if (maxV === minV) { maxV += 1; minV -= 1; }
      var toX = function (i) { return (i / (data.length - 1)) * W; };
      var toY = function (v) { return H - ((v - minV) / (maxV - minV)) * H * 0.85 - H * 0.05; };
      var isUp = data[data.length - 1] >= data[0];
      var lineColor = isUp ? "#e84444" : "#3b8fff";
      var fillColor = isUp ? "rgba(232,68,68,.12)" : "rgba(59,143,255,.12)";

      /* 그리드 */
      ctx.strokeStyle = "rgba(255,255,255,.05)"; ctx.lineWidth = 1;
      for (var g = 0; g < 5; g++) {
        var gy = H * 0.05 + (H * 0.85 / 4) * g;
        ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
      }
      /* 채우기 */
      ctx.beginPath();
      ctx.moveTo(toX(0), H);
      data.forEach(function (v, i) { ctx.lineTo(toX(i), toY(v)); });
      ctx.lineTo(toX(data.length - 1), H);
      ctx.closePath(); ctx.fillStyle = fillColor; ctx.fill();
      /* 선 */
      ctx.beginPath();
      data.forEach(function (v, i) {
        if (i === 0) ctx.moveTo(toX(i), toY(v));
        else         ctx.lineTo(toX(i), toY(v));
      });
      ctx.strokeStyle = lineColor; ctx.lineWidth = 2; ctx.lineJoin = "round"; ctx.stroke();
      /* 끝점 */
      var lx = toX(data.length - 1), ly = toY(data[data.length - 1]);
      ctx.beginPath(); ctx.arc(lx, ly, 4, 0, Math.PI * 2);
      ctx.fillStyle = lineColor; ctx.fill();
    }

    /* ── 총액 계산 ── */
    function updateTotal() {
      var p   = selectedId ? findPlayer(selectedId) : null;
      var qty = parseInt(document.getElementById("trade-qty-input").value) || 0;
      document.getElementById("trade-total").innerHTML = fmtPrice((p ? p.price : 0) * qty) + ' <span>코인</span>';
    }

    /* ── 이벤트 리스너 ── */
    document.getElementById("tab-buy").addEventListener("click", function () {
      tradeMode = "buy";
      document.getElementById("tab-buy").className  = "trade-tab active-buy";
      document.getElementById("tab-sell").className = "trade-tab";
      document.getElementById("trade-btn").textContent = "매수";
      document.getElementById("trade-btn").className   = "trade-btn buy-btn";
    });
    document.getElementById("tab-sell").addEventListener("click", function () {
      tradeMode = "sell";
      document.getElementById("tab-buy").className  = "trade-tab";
      document.getElementById("tab-sell").className = "trade-tab active-sell";
      document.getElementById("trade-btn").textContent = "매도";
      document.getElementById("trade-btn").className   = "trade-btn sell-btn";
    });
    document.getElementById("trade-qty-input").addEventListener("input", updateTotal);
    document.getElementById("trade-btn").addEventListener("click", function () {
      var p = selectedId ? findPlayer(selectedId) : null;
      if (!p) { alert("선수를 먼저 선택해 주세요."); return; }
      var qty = parseInt(document.getElementById("trade-qty-input").value) || 0;
      if (qty < 1) { alert("수량을 입력해 주세요."); return; }
      var total = p.price * qty;
      if (tradeMode === "buy") {
        if (total > myCoins) { alert("코인이 부족합니다."); return; }
        myCoins -= total;
        if (!myHoldings[p.id]) myHoldings[p.id] = { qty: 0 };
        myHoldings[p.id].qty += qty;
        alert("✅ " + p.name + " " + qty + "주 매수 완료 (" + fmtPrice(total) + " 코인)");
      } else {
        var h = myHoldings[p.id];
        if (!h || h.qty < qty) { alert("보유 수량이 부족합니다."); return; }
        h.qty -= qty;
        myCoins += total;
        alert("✅ " + p.name + " " + qty + "주 매도 완료 (" + fmtPrice(total) + " 코인)");
      }
      document.getElementById("trade-qty-input").value = "";
      document.getElementById("holding-qty").textContent = (myHoldings[p.id] ? myHoldings[p.id].qty : 0) + " 주";
      document.getElementById("coin-balance").textContent = myCoins.toLocaleString() + " 코인";
      updateTotal(); updateTicker(); renderFullTable();
    });
    document.getElementById("stock-search").addEventListener("input", function () {
      renderStockList(this.value);
    });
    document.querySelectorAll(".region-tab").forEach(function (btn) {
      btn.addEventListener("click", function () {
        document.querySelectorAll(".region-tab").forEach(function (b) { b.classList.remove("active"); });
        btn.classList.add("active");
        currentRegion = btn.dataset.region;
        renderStockList(document.getElementById("stock-search").value);
      });
    });
    document.querySelectorAll(".period-tab").forEach(function (btn) {
      btn.addEventListener("click", function () {
        document.querySelectorAll(".period-tab").forEach(function (b) { b.classList.remove("active"); });
        btn.classList.add("active");
        var p = selectedId ? findPlayer(selectedId) : null;
        if (p) drawChart(p);
      });
    });
    window.addEventListener("resize", function () {
      var p = selectedId ? findPlayer(selectedId) : null;
      if (p) drawChart(p);
    });

    /* ── 콘솔 디버그 도구 ──
       window.debugStock("Silvan")  → 해당 선수의 모든 raw ACS 목록 출력
       window.debugStock()          → 전체 선수 목록 + avgAcs + mapCount 출력
    ── */
    window.debugStock = function (searchName) {
      /* vct_p: 키에서 raw 데이터 확인 (leaderboard와 동일한 소스) */
      var q = searchName ? searchName.toLowerCase() : null;
      var found = false;
      for (var pi = 0; pi < localStorage.length; pi++) {
        var pk = localStorage.key(pi);
        if (!pk || pk.indexOf("vct_p:") !== 0) continue;
        var pName = pk.slice(6);
        if (q && pName.toLowerCase().indexOf(q) === -1) continue;
        found = true;
        var pd;
        try { pd = JSON.parse(localStorage.getItem(pk) || "{}"); } catch (e) { continue; }
        if (!pd.maps) { console.log("[debugStock]", pName, "→ maps 없음"); continue; }
        var entries = pd.maps.map(function (m) {
          return { league: m.league || "?", stage: m.stage || "?", acs: m.acs, kda: m.kda, matchKey: m.matchKey };
        });
        var validAcs   = entries.filter(function (e) { return parseFloat(e.acs) > 0; });
        var avgAcs     = validAcs.length ? Math.round(validAcs.reduce(function (s, e) { return s + parseFloat(e.acs); }, 0) / validAcs.length) : 0;
        console.group("[debugStock] " + pName + " (" + validAcs.length + "맵, 평균ACS " + avgAcs + " → " + Math.max(1, Math.round(avgAcs / 10)) + "코인)");
        console.table(entries);
        console.groupEnd();
      }
      if (!found) console.log("[debugStock] '" + searchName + "' 해당 선수 없음 (vct_p: 키 없음)");
      if (!searchName) {
        /* 전체 테이블 */
        var rows = [];
        for (var ai = 0; ai < localStorage.length; ai++) {
          var ak = localStorage.key(ai);
          if (!ak || ak.indexOf("vct_p:") !== 0) continue;
          var apd; try { apd = JSON.parse(localStorage.getItem(ak) || "{}"); } catch (e) { continue; }
          if (!apd.maps) continue;
          var valid = apd.maps.filter(function (m) { return parseFloat(m.acs) > 0; });
          var avg = valid.length ? Math.round(valid.reduce(function (s, m) { return s + parseFloat(m.acs); }, 0) / valid.length) : 0;
          rows.push({ 선수: ak.slice(6), 맵수: valid.length, 평균ACS: avg, 코인: Math.max(1, Math.round(avg / 10)) });
        }
        console.table(rows.sort(function (a, b) { return b.코인 - a.코인; }));
      }
    };

    /* ── storageReady 후 초기화 ── */
    (window.storageReady || Promise.resolve()).then(function () {
      /* 코인 로드: coins:{username} 키 사용 */
      try {
        var userRaw = localStorage.getItem("vct_auth_user");
        if (userRaw) {
          var user = JSON.parse(userRaw);
          if (user && user.username) {
            var coinRaw = localStorage.getItem("coins:" + user.username);
            myCoins = coinRaw ? (parseInt(coinRaw, 10) || 0) : 0;
          }
        }
      } catch (e) { myCoins = 0; }
      document.getElementById("coin-balance").textContent = myCoins.toLocaleString() + " 코인";

      /* 경기 기록에서 선수 집계 */
      PLAYERS = buildPlayersFromStorage();

      if (PLAYERS.length === 0) {
        document.getElementById("stock-list").innerHTML =
          '<div style="padding:32px;text-align:center;color:rgba(255,255,255,.3);font-size:13px;line-height:1.6;">' +
          '아직 입력된 경기 데이터가 없습니다.<br><span style="font-size:11px;opacity:.6;">ACS가 입력된 경기 기록이 생기면 자동으로 표시됩니다.</span></div>';
        document.getElementById("chart-name").textContent = "선수를 선택하세요";
        document.getElementById("tk-vol").textContent = "0";
        document.getElementById("tk-up").textContent  = "0";
        document.getElementById("tk-down").textContent = "0";
        return;
      }

      updateTicker();
      renderStockList();
      renderFullTable();
      selectPlayer(PLAYERS[0].id);
    });

  })();
  </script>
  <script src="./help.js" defer></script>
</body>
