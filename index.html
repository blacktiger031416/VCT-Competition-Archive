<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VCT Match Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      a { color: inherit; text-decoration: none; }

      body {
        min-height: 100vh;
        font-family: "Noto Sans KR", system-ui, sans-serif;
        color: #f0f0f0;
        background:
          linear-gradient(115deg, rgba(255,38,56,0.18), transparent 38%),
          linear-gradient(245deg, rgba(80,40,20,0.14), transparent 32%),
          #080808;
      }

      /* grid overlay */
      body::before {
        position: fixed; inset: 0; z-index: -1; pointer-events: none; content: "";
        background-image:
          linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent 80%);
      }

      /* vct watermark */
      body::after {
        position: fixed; right: max(-120px,-9vw); bottom: max(-160px,-12vw);
        z-index: -1; width: min(680px,76vw); aspect-ratio: 927/1002;
        pointer-events: none; content: "";
        background: url("./assets/vct-logo.png") center / contain no-repeat;
        opacity: 0.05; filter: grayscale(1);
      }

      .page-shell {
        width: min(1180px, calc(100% - 40px));
        min-height: 100vh;
        margin: 0 auto;
        display: grid;
        place-items: center;
        padding: 44px 0;
      }

      .hero {
        width: 100%;
        display: grid;
        grid-template-columns: minmax(320px,0.9fr) minmax(360px,1.1fr);
        gap: 34px;
        align-items: center;
      }

      .vct-logo {
        display: block;
        width: min(240px,64vw);
        height: auto;
        margin-bottom: 36px;
        filter: drop-shadow(0 18px 34px rgba(255,38,56,0.32));
      }

      .eyebrow {
        margin: 0 0 10px;
        color: #ff2638;
        font-size: 15px;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 620px;
        font-size: clamp(46px,7vw,82px);
        line-height: 1.03;
        font-weight: 900;
        color: #fff;
      }

      .intro {
        max-width: 560px;
        margin: 24px 0 0;
        color: rgba(255,255,255,0.5);
        font-size: 19px;
        line-height: 1.75;
        word-break: keep-all;
      }

      /* ── League Grid ── */
      .league-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0,1fr));
        gap: 16px;
      }

      .league-card {
        --accent: #ff2638;
        position: relative;
        min-height: 250px;
        display: grid;
        grid-template-rows: 1fr auto auto;
        gap: 14px;
        padding: 22px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 8px;
        background:
          linear-gradient(145deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02)),
          #111;
        box-shadow: 0 26px 70px rgba(0,0,0,0.5);
        transition: transform 180ms ease, border-color 180ms ease;
      }

      .league-card::before {
        position: absolute; inset: 0; content: "";
        background:
          linear-gradient(180deg, transparent 34%, rgba(0,0,0,0.65)),
          linear-gradient(135deg, color-mix(in srgb, var(--accent) 30%, transparent), transparent 54%);
        opacity: 0.85;
      }

      .league-card::after {
        position: absolute; left: 0; right: 0; bottom: 0;
        height: 5px; content: "";
        background: var(--accent);
      }

      .league-card:hover {
        transform: translateY(-5px);
        border-color: color-mix(in srgb, var(--accent) 60%, white);
      }

      .league-logo-wrap, .league-name, .league-action { position: relative; z-index: 1; }

      .league-logo-wrap {
        min-height: 128px;
        display: grid;
        place-items: center;
        padding: 14px;
      }

      .league-logo-wrap img {
        max-width: 100%;
        max-height: 110px;
        object-fit: contain;
        filter: drop-shadow(0 14px 24px rgba(0,0,0,0.5));
      }

      .league-name { font-size: 32px; line-height: 1.1; font-weight: 900; color: #fff; }

      .league-action {
        width: fit-content;
        min-height: 38px;
        display: inline-flex;
        align-items: center;
        padding: 0 14px;
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: 999px;
        color: #fff;
        background: rgba(0,0,0,0.32);
        font-size: 14px;
        font-weight: 900;
      }

      /* ── League accent colors ── */
      .pacific  { --accent: #01d2d7; }
      .cn       { --accent: #fb2659; }
      .americas { --accent: #ff570c; }
      .emea     { --accent: #d4ff1f; }
      .masters  { --accent: #651eff; }
      .champions{ --accent: #c5b174; }
      .records  { --accent: #e8b840; grid-column: 1 / -1; min-height: 120px; grid-template-rows: auto auto; gap: 10px; }

      /* ── Enter transitions ── */
      body.entering-pacific .league-card:not(.pacific),
      body.entering-emea .league-card:not(.emea),
      body.entering-cn .league-card:not(.cn),
      body.entering-americas .league-card:not(.americas),
      body.entering-masters .league-card:not(.masters),
      body.entering-champions .league-card:not(.champions),
      body.entering-records .league-card:not(.records) {
        opacity: 0.3; transform: scale(0.96); filter: blur(2px);
      }

      body.entering-pacific .hero-copy,
      body.entering-emea .hero-copy,
      body.entering-cn .hero-copy,
      body.entering-americas .hero-copy,
      body.entering-masters .hero-copy,
      body.entering-champions .hero-copy {
        opacity: 0.15; transform: translateX(-18px); filter: blur(4px);
        transition: opacity 320ms ease, transform 320ms ease, filter 320ms ease;
      }

      body.entering-pacific .league-card.pacific {
        z-index: 20; transform: scale(1.08);
        border-color: #01d2d7;
        box-shadow: 0 0 0 2px rgba(1,210,215,0.7), 0 34px 90px rgba(1,210,215,0.36);
      }
      body.entering-emea .league-card.emea {
        z-index: 20; transform: scale(1.08);
        border-color: #d4ff1f;
        box-shadow: 0 0 0 2px rgba(212,255,31,0.72), 0 34px 90px rgba(212,255,31,0.28);
      }
      body.entering-cn .league-card.cn {
        z-index: 20; transform: scale(1.08);
        border-color: #fb2659;
        box-shadow: 0 0 0 2px rgba(251,38,89,0.72), 0 34px 90px rgba(251,38,89,0.28);
      }
      body.entering-americas .league-card.americas {
        z-index: 20; transform: scale(1.08);
        border-color: #ff570c;
        box-shadow: 0 0 0 2px rgba(255,87,12,0.72), 0 34px 90px rgba(255,87,12,0.32);
      }
      body.entering-masters .league-card.masters {
        z-index: 20; transform: scale(1.08);
        border-color: #651eff;
        box-shadow: 0 0 0 2px rgba(101,30,255,0.72), 0 34px 90px rgba(101,30,255,0.32);
      }
      body.entering-champions .league-card.champions {
        z-index: 20; transform: scale(1.08);
        border-color: #c5b174;
        box-shadow: 0 0 0 2px rgba(197,177,116,0.72), 0 34px 90px rgba(197,177,116,0.32);
      }
      body.entering-records .league-card.records {
        z-index: 20; transform: scale(1.03);
        border-color: #e8b840;
        box-shadow: 0 0 0 2px rgba(232,184,64,0.72), 0 34px 90px rgba(232,184,64,0.28);
      }

      /* ── Swipe overlays ── */
      .pacific-enter-transition, .emea-enter-transition, .cn-enter-transition,
      .americas-enter-transition, .masters-enter-transition, .champions-enter-transition {
        position: fixed; inset: 0; z-index: 80;
        pointer-events: none;
        display: grid; place-items: center;
        opacity: 0; transform: translateX(-100%);
      }
      .pacific-enter-transition   { background: linear-gradient(120deg, rgba(1,210,215,0), rgba(1,210,215,0.92) 48%, rgba(1,210,215,0)), rgba(5,14,14,0.65); }
      .emea-enter-transition      { background: linear-gradient(120deg, rgba(212,255,31,0), rgba(212,255,31,0.92) 48%, rgba(212,255,31,0)), rgba(10,12,5,0.65); }
      .cn-enter-transition        { background: linear-gradient(120deg, rgba(251,38,89,0), rgba(251,38,89,0.92) 48%, rgba(251,38,89,0)), rgba(14,5,8,0.65); }
      .americas-enter-transition  { background: linear-gradient(120deg, rgba(255,87,12,0), rgba(255,87,12,0.92) 48%, rgba(255,87,12,0)), rgba(14,8,5,0.65); }
      .masters-enter-transition   { background: linear-gradient(120deg, rgba(101,30,255,0), rgba(101,30,255,0.92) 48%, rgba(101,30,255,0)), rgba(7,5,20,0.65); }
      .champions-enter-transition { background: linear-gradient(120deg, rgba(197,177,116,0), rgba(197,177,116,0.92) 48%, rgba(197,177,116,0)), rgba(17,14,5,0.65); }

      .pacific-enter-transition img, .emea-enter-transition img, .cn-enter-transition img,
      .americas-enter-transition img, .masters-enter-transition img, .champions-enter-transition img {
        width: min(280px,58vw); opacity: 0; transform: scale(0.78);
      }
      .pacific-enter-transition img   { filter: drop-shadow(0 24px 44px rgba(1,210,215,0.42)); }
      .emea-enter-transition img      { filter: drop-shadow(0 24px 44px rgba(212,255,31,0.34)); }
      .cn-enter-transition img        { filter: drop-shadow(0 24px 44px rgba(251,38,89,0.34)); }
      .americas-enter-transition img  { filter: drop-shadow(0 24px 44px rgba(255,87,12,0.34)); }
      .masters-enter-transition img   { filter: drop-shadow(0 24px 44px rgba(101,30,255,0.42)); }
      .champions-enter-transition img { filter: drop-shadow(0 24px 44px rgba(197,177,116,0.42)); }

      body.entering-pacific .pacific-enter-transition,
      body.entering-emea .emea-enter-transition,
      body.entering-cn .cn-enter-transition,
      body.entering-americas .americas-enter-transition,
      body.entering-masters .masters-enter-transition,
      body.entering-champions .champions-enter-transition {
        animation: pacific-swipe 620ms cubic-bezier(0.2,0.76,0.22,1) forwards;
      }
      body.entering-pacific .pacific-enter-transition img,
      body.entering-emea .emea-enter-transition img,
      body.entering-cn .cn-enter-transition img,
      body.entering-americas .americas-enter-transition img,
      body.entering-masters .masters-enter-transition img,
      body.entering-champions .champions-enter-transition img {
        animation: pacific-mark-pop 520ms ease 90ms forwards;
      }

      @keyframes pacific-swipe {
        0%   { opacity: 0; transform: translateX(-100%); }
        28%  { opacity: 1; }
        100% { opacity: 1; transform: translateX(0); }
      }
      @keyframes pacific-mark-pop {
        0%   { opacity: 0; transform: scale(0.78) rotate(-4deg); }
        70%  { opacity: 1; transform: scale(1.08) rotate(0deg); }
        100% { opacity: 1; transform: scale(1) rotate(0deg); }
      }
    </style>
  </head>
  <body>
    <main class="page-shell">
      <section class="hero" aria-labelledby="site-title">
        <div class="hero-copy">
          <img class="vct-logo" src="./assets/vct-logo.png" alt="VCT" />
          <p class="eyebrow">VALORANT Champions Tour</p>
          <h1 id="site-title">VCT 경기 결과 아카이브</h1>
          <p class="intro">
            Pacific, CN, Americas, EMEA 네 리그의 경기 결과와 맵별 기록을
            한눈에 정리하는 개인 VCT 리포트 사이트입니다.
          </p>
        </div>

        <nav class="league-grid" aria-label="VCT 리그 선택">
          <a class="league-card pacific" href="./pacific.html" aria-label="VCT Pacific 보기" data-pacific-enter>
            <span class="league-logo-wrap">
              <img src="./assets/vct-pacific.webp" alt="" />
            </span>
            <span class="league-name">Pacific</span>
            <span class="league-action">리그 보기</span>
          </a>

          <a class="league-card cn" href="./cn.html" aria-label="VCT CN 보기" data-cn-enter>
            <span class="league-logo-wrap">
              <img src="./assets/vct-cn.webp" alt="" />
            </span>
            <span class="league-name">CN</span>
            <span class="league-action">리그 보기</span>
          </a>

          <a class="league-card americas" href="./americas.html" aria-label="VCT Americas 보기" data-americas-enter>
            <span class="league-logo-wrap">
              <img src="./assets/vct-americas.png" alt="" />
            </span>
            <span class="league-name">Americas</span>
            <span class="league-action">리그 보기</span>
          </a>

          <a class="league-card emea" href="./emea.html" aria-label="VCT EMEA 보기" data-emea-enter>
            <span class="league-logo-wrap">
              <img src="./assets/vct-emea.webp" alt="" />
            </span>
            <span class="league-name">EMEA</span>
            <span class="league-action">리그 보기</span>
          </a>

          <a class="league-card masters" href="./masters.html" aria-label="VCT Masters 보기" data-masters-enter>
            <span class="league-logo-wrap">
              <img src="./assets/vct-logo.png" alt="" />
            </span>
            <span class="league-name">Masters</span>
            <span class="league-action">대회 보기</span>
          </a>

          <a class="league-card champions" href="./champions.html" aria-label="VCT Champions 보기" data-champions-enter>
            <span class="league-logo-wrap">
              <img src="./assets/vct-logo.png" alt="" />
            </span>
            <span class="league-name">Champions</span>
            <span class="league-action">대회 보기</span>
          </a>

          <a class="league-card records" href="./records.html" aria-label="VCT 시즌 기록 보기" data-records-enter>
            <span class="league-name">기록</span>
            <span class="league-action">기록 보기</span>
          </a>
        </nav>
      </section>
    </main>

    <div class="pacific-enter-transition" aria-hidden="true"><img src="./assets/vct-pacific.webp" alt="" /></div>
    <div class="emea-enter-transition" aria-hidden="true"><img src="./assets/vct-emea.webp" alt="" /></div>
    <div class="cn-enter-transition" aria-hidden="true"><img src="./assets/vct-cn.webp" alt="" /></div>
    <div class="americas-enter-transition" aria-hidden="true"><img src="./assets/vct-americas.png" alt="" /></div>
    <div class="masters-enter-transition" aria-hidden="true"><img src="./assets/vct-logo.png" alt="" /></div>
    <div class="champions-enter-transition" aria-hidden="true"><img src="./assets/vct-logo.png" alt="" /></div>

    <script>
      const entries = [
        { attr: "data-pacific-enter",   cls: "entering-pacific" },
        { attr: "data-emea-enter",      cls: "entering-emea" },
        { attr: "data-cn-enter",        cls: "entering-cn" },
        { attr: "data-americas-enter",  cls: "entering-americas" },
        { attr: "data-masters-enter",   cls: "entering-masters" },
        { attr: "data-champions-enter", cls: "entering-champions" },
        { attr: "data-records-enter",   cls: "entering-records" },
      ];
      entries.forEach(({ attr, cls }) => {
        const link = document.querySelector(`[${attr}]`);
        link?.addEventListener("click", (e) => {
          if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.button !== 0) return;
          e.preventDefault();
          document.body.classList.add(cls);
          setTimeout(() => { window.location.href = link.href; }, 620);
        });
      });
    </script>
    <script src="./auth.js"></script>
  </body>
</html>
