<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VCT Match Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      a { color: inherit; text-decoration: none; }

      body {
        min-height: 100vh;
        font-family: "Noto Sans KR", system-ui, sans-serif;
        color: #f0f0f0;
        background:
          linear-gradient(115deg, rgba(255,38,56,0.18), transparent 38%),
          linear-gradient(245deg, rgba(80,40,20,0.14), transparent 32%),
          #080808;
      }

      /* grid overlay */
      body::before {
        position: fixed; inset: 0; z-index: -1; pointer-events: none; content: "";
        background-image:
          linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent 80%);
      }

      /* vct watermark */
      body::after {
        position: fixed; right: max(-120px,-9vw); bottom: max(-160px,-12vw);
        z-index: -1; width: min(680px,76vw); aspect-ratio: 927/1002;
        pointer-events: none; content: "";
        background: url("./assets/vct-logo.png") center / contain no-repeat;
        opacity: 0.05; filter: grayscale(1);
      }

      .page-shell {
        width: min(1180px, calc(100% - 40px));
        min-height: calc(100vh - 52px);
        margin: 0 auto;
        display: grid;
        place-items: center;
        padding: 36px 0 52px;
      }

      .hero {
        width: 100%;
        display: grid;
        grid-template-columns: minmax(320px,0.9fr) minmax(360px,1.1fr);
        gap: 34px;
        align-items: center;
      }

      .vct-logo {
        display: block;
        width: min(240px,64vw);
        height: auto;
        margin-bottom: 36px;
        filter: drop-shadow(0 18px 34px rgba(255,38,56,0.32));
      }

      .eyebrow {
        margin: 0 0 10px;
        color: #ff2638;
        font-size: 15px;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 620px;
        font-size: clamp(46px,7vw,82px);
        line-height: 1.03;
        font-weight: 900;
        color: #fff;
      }

      .intro {
        max-width: 560px;
        margin: 24px 0 0;
        color: rgba(255,255,255,0.5);
        font-size: 19px;
        line-height: 1.75;
        word-break: keep-all;
      }

      /* ── League Grid ── */
      .league-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0,1fr));
        gap: 16px;
      }

      .league-card {
        --accent: #ff2638;
        position: relative;
        min-height: 250px;
        display: grid;
        grid-template-rows: 1fr auto auto;
        gap: 14px;
        padding: 22px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 8px;
        background:
          linear-gradient(145deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02)),
          #111;
        box-shadow: 0 26px 70px rgba(0,0,0,0.5);
        transition: transform 180ms ease, border-color 180ms ease;
      }

      .league-card::before {
        position: absolute; inset: 0; content: "";
        background:
          linear-gradient(180deg, transparent 34%, rgba(0,0,0,0.65)),
          linear-gradient(135deg, color-mix(in srgb, var(--accent) 30%, transparent), transparent 54%);
        opacity: 0.85;
      }

      .league-card::after {
        position: absolute; left: 0; right: 0; bottom: 0;
        height: 5px; content: "";
        background: var(--accent);
      }

      .league-card:hover {
        transform: translateY(-5px);
        border-color: color-mix(in srgb, var(--accent) 60%, white);
      }

      .league-logo-wrap, .league-name, .league-action { position: relative; z-index: 1; }

      .league-logo-wrap {
        min-height: 128px;
        display: grid;
        place-items: center;
        padding: 14px;
      }

      .league-logo-wrap img {
        max-width: 100%;
        max-height: 110px;
        object-fit: contain;
        filter: drop-shadow(0 14px 24px rgba(0,0,0,0.5));
      }

      .league-name { font-size: 32px; line-height: 1.1; font-weight: 900; color: #fff; }

      .league-action {
        width: fit-content;
        min-height: 38px;
        display: inline-flex;
        align-items: center;
        padding: 0 14px;
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: 999px;
        color: #fff;
        background: rgba(0,0,0,0.32);
        font-size: 14px;
        font-weight: 900;
      }

      /* ── League accent colors ── */
      .pacific  { --accent: #01d2d7; }
      .cn       { --accent: #fb2659; }
      .americas { --accent: #ff570c; }
      .emea     { --accent: #d4ff1f; }
      .masters  { --accent: #651eff; }
      .champions{ --accent: #c5b174; }

      /* ── Grid Slider ── */
      .grid-slider-outer { display: flex; flex-direction: column; gap: 10px; }

      .grid-slider-tabs { display: flex; gap: 6px; }
      .gst-tab {
        height: 27px; padding: 0 14px; border-radius: 14px;
        background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.10);
        color: rgba(255,255,255,0.35); font-size: 11px; font-weight: 800;
        font-family: 'Barlow Condensed', 'Noto Sans KR', sans-serif;
        letter-spacing: 0.12em; text-transform: uppercase;
        cursor: pointer; transition: background .15s, color .15s, border-color .15s;
      }
      .gst-tab.active { background: rgba(255,38,56,0.14); border-color: rgba(255,38,56,0.38); color: #ff2638; }

      .grid-slider-row { display: flex; align-items: center; gap: 10px; }
      .grid-slider-wrap { flex: 1; overflow: hidden; }
      .grid-slider-track {
        display: flex; will-change: transform;
        transition: transform 0.42s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .grid-slide { flex: 0 0 100%; }

      .grid-slide-arrow {
        flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%;
        background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.14);
        color: rgba(255,255,255,0.55); font-size: 22px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: background .15s, color .15s, transform .42s ease;
        line-height: 1; padding-bottom: 1px;
      }
      .grid-slide-arrow:hover { background: rgba(255,255,255,0.14); color: #fff; }
      .grid-slide-arrow.flipped { transform: scaleX(-1); }

      /* ── Challengers: #159194 배경 ── */
      .challengers-card {
        background:
          linear-gradient(145deg, rgba(21,145,148,0.45), rgba(21,145,148,0.12)),
          #081818;
      }
      .challengers-card::before { display: none; }
      /* 3열 Challengers 카드: 이름 크기 축소 */
      .challengers-grid .league-name { font-size: 22px; }
      .challengers-grid .league-action { font-size: 12px; min-height: 32px; padding: 0 10px; white-space: nowrap; }

      /* ── Challengers lock badge ── */
      .challengers-grid .league-card { cursor: pointer; }
      .lock-badge {
        position: absolute; top: 10px; right: 10px; z-index: 2;
        padding: 3px 9px; border-radius: 4px;
        background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.13);
        font-size: 10px; font-weight: 800; color: rgba(255,255,255,0.4);
        font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.1em; text-transform: uppercase;
      }

      /* ── Locked toast ── */
      .locked-toast {
        position: fixed; bottom: 36px; left: 50%;
        transform: translateX(-50%) translateY(14px);
        background: rgba(12,14,22,0.97); border: 1px solid rgba(255,255,255,0.11);
        border-radius: 8px; padding: 12px 26px;
        font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.82);
        z-index: 99999; opacity: 0;
        transition: opacity .22s, transform .22s;
        pointer-events: none; white-space: nowrap;
        box-shadow: 0 12px 40px rgba(0,0,0,0.6);
      }
      .locked-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

      /* ── Admin 공개 토글 버튼 ── */
      .card-action-row {
        position: relative; z-index: 1;
        display: flex; align-items: center; gap: 8px;
      }
      .admin-unlock-btn {
        display: none; /* 기본 숨김 — Admin에게만 표시 */
        padding: 0 11px; height: 38px; border-radius: 999px;
        background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.18);
        color: rgba(255,255,255,0.6); font-size: 12px; font-weight: 800;
        font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.08em; text-transform: uppercase;
        cursor: pointer; transition: background .15s, border-color .15s, color .15s;
        white-space: nowrap;
      }
      body:not(.view-only) .admin-unlock-btn { display: inline-flex; align-items: center; }
      .admin-unlock-btn:hover { background: rgba(61,220,132,0.2); border-color: rgba(61,220,132,0.45); color: #3ddc84; }
      .admin-unlock-btn.is-unlocked { background: rgba(61,220,132,0.15); border-color: rgba(61,220,132,0.35); color: #3ddc84; }
      .admin-unlock-btn.is-unlocked:hover { background: rgba(220,50,50,0.15); border-color: rgba(220,50,50,0.35); color: #ff6b6b; }

      /* 잠금 해제된 카드: 업데이트 예정 배지 숨김 */
      .challengers-card.unlocked .lock-badge { display: none; }

      /* ── Site nav (sticky) ── */
      .site-header {
        position: sticky; top: 0; z-index: 200;
        display: flex; align-items: center; gap: 8px;
        padding: 0 20px; height: 52px; width: 100%;
        background: rgba(8,8,8,.92);
        backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(255,255,255,.07);
      }
      .site-header .auth-header-btn { margin-left: auto !important; }
      .nav-brand {
        font-size: 12px; font-weight: 900; color: #ff2638;
        letter-spacing: .09em; text-transform: uppercase; flex-shrink: 0;
      }
      .nav-sep { width: 1px; height: 16px; background: rgba(255,255,255,.1); margin: 0 4px; flex-shrink: 0; }
      .nav-links { display: flex; gap: 4px; align-items: center; }
      .nav-link {
        display: inline-flex; align-items: center; gap: 5px;
        height: 30px; padding: 0 13px;
        border: 1px solid rgba(255,255,255,.08); border-radius: 4px;
        background: rgba(255,255,255,.04);
        font-size: 12px; font-weight: 700; color: rgba(255,255,255,.5);
        transition: background .15s, border-color .15s, color .15s; white-space: nowrap;
      }
      .nav-link:hover { background: rgba(255,255,255,.09); color: #fff; border-color: rgba(255,255,255,.18); }
      .nav-spacer { flex: 1; }

      /* ── Enter transitions ── */
      body.entering-pacific .league-card:not(.pacific),
      body.entering-emea .league-card:not(.emea),
      body.entering-cn .league-card:not(.cn),
      body.entering-americas .league-card:not(.americas),
      body.entering-masters .league-card:not(.masters),
      body.entering-champions .league-card:not(.champions),
      body.entering-records .league-card:not(.records) {
        opacity: 0.3; transform: scale(0.96); filter: blur(2px);
      }

      body.entering-pacific .hero-copy,
      body.entering-emea .hero-copy,
      body.entering-cn .hero-copy,
      body.entering-americas .hero-copy,
      body.entering-masters .hero-copy,
      body.entering-champions .hero-copy {
        opacity: 0.15; transform: translateX(-18px); filter: blur(4px);
        transition: opacity 320ms ease, transform 320ms ease, filter 320ms ease;
      }

      body.entering-pacific .league-card.pacific {
        z-index: 20; transform: scale(1.08);
        border-color: #01d2d7;
        box-shadow: 0 0 0 2px rgba(1,210,215,0.7), 0 34px 90px rgba(1,210,215,0.36);
      }
      body.entering-emea .league-card.emea {
        z-index: 20; transform: scale(1.08);
        border-color: #d4ff1f;
        box-shadow: 0 0 0 2px rgba(212,255,31,0.72), 0 34px 90px rgba(212,255,31,0.28);
      }
      body.entering-cn .league-card.cn {
        z-index: 20; transform: scale(1.08);
        border-color: #fb2659;
        box-shadow: 0 0 0 2px rgba(251,38,89,0.72), 0 34px 90px rgba(251,38,89,0.28);
      }
      body.entering-americas .league-card.americas {
        z-index: 20; transform: scale(1.08);
        border-color: #ff570c;
        box-shadow: 0 0 0 2px rgba(255,87,12,0.72), 0 34px 90px rgba(255,87,12,0.32);
      }
      body.entering-masters .league-card.masters {
        z-index: 20; transform: scale(1.08);
        border-color: #651eff;
        box-shadow: 0 0 0 2px rgba(101,30,255,0.72), 0 34px 90px rgba(101,30,255,0.32);
      }
      body.entering-champions .league-card.champions {
        z-index: 20; transform: scale(1.08);
        border-color: #c5b174;
        box-shadow: 0 0 0 2px rgba(197,177,116,0.72), 0 34px 90px rgba(197,177,116,0.32);
      }
      body.entering-records .league-card.records {
        z-index: 20; transform: scale(1.03);
        border-color: #e8b840;
        box-shadow: 0 0 0 2px rgba(232,184,64,0.72), 0 34px 90px rgba(232,184,64,0.28);
      }


      /* ── Swipe overlays ── */
      .pacific-enter-transition, .emea-enter-transition, .cn-enter-transition,
      .americas-enter-transition, .masters-enter-transition, .champions-enter-transition {
        position: fixed; inset: 0; z-index: 80;
        pointer-events: none;
        display: grid; place-items: center;
        opacity: 0; transform: translateX(-100%);
      }
      .pacific-enter-transition   { background: linear-gradient(120deg, rgba(1,210,215,0), rgba(1,210,215,0.92) 48%, rgba(1,210,215,0)), rgba(5,14,14,0.65); }
      .emea-enter-transition      { background: linear-gradient(120deg, rgba(212,255,31,0), rgba(212,255,31,0.92) 48%, rgba(212,255,31,0)), rgba(10,12,5,0.65); }
      .cn-enter-transition        { background: linear-gradient(120deg, rgba(251,38,89,0), rgba(251,38,89,0.92) 48%, rgba(251,38,89,0)), rgba(14,5,8,0.65); }
      .americas-enter-transition  { background: linear-gradient(120deg, rgba(255,87,12,0), rgba(255,87,12,0.92) 48%, rgba(255,87,12,0)), rgba(14,8,5,0.65); }
      .masters-enter-transition   { background: linear-gradient(120deg, rgba(101,30,255,0), rgba(101,30,255,0.92) 48%, rgba(101,30,255,0)), rgba(7,5,20,0.65); }
      .champions-enter-transition { background: linear-gradient(120deg, rgba(197,177,116,0), rgba(197,177,116,0.92) 48%, rgba(197,177,116,0)), rgba(17,14,5,0.65); }

      .pacific-enter-transition img, .emea-enter-transition img, .cn-enter-transition img,
      .americas-enter-transition img, .masters-enter-transition img, .champions-enter-transition img {
        width: min(280px,58vw); opacity: 0; transform: scale(0.78);
      }
      .pacific-enter-transition img   { filter: drop-shadow(0 24px 44px rgba(1,210,215,0.42)); }
      .emea-enter-transition img      { filter: drop-shadow(0 24px 44px rgba(212,255,31,0.34)); }
      .cn-enter-transition img        { filter: drop-shadow(0 24px 44px rgba(251,38,89,0.34)); }
      .americas-enter-transition img  { filter: drop-shadow(0 24px 44px rgba(255,87,12,0.34)); }
      .masters-enter-transition img   { filter: drop-shadow(0 24px 44px rgba(101,30,255,0.42)); }
      .champions-enter-transition img { filter: drop-shadow(0 24px 44px rgba(197,177,116,0.42)); }

      body.entering-pacific .pacific-enter-transition,
      body.entering-emea .emea-enter-transition,
      body.entering-cn .cn-enter-transition,
      body.entering-americas .americas-enter-transition,
      body.entering-masters .masters-enter-transition,
      body.entering-champions .champions-enter-transition {
        animation: pacific-swipe 620ms cubic-bezier(0.2,0.76,0.22,1) forwards;
      }
      body.entering-pacific .pacific-enter-transition img,
      body.entering-emea .emea-enter-transition img,
      body.entering-cn .cn-enter-transition img,
      body.entering-americas .americas-enter-transition img,
      body.entering-masters .masters-enter-transition img,
      body.entering-champions .champions-enter-transition img {
        animation: pacific-mark-pop 520ms ease 90ms forwards;
      }

      @keyframes pacific-swipe {
        0%   { opacity: 0; transform: translateX(-100%); }
        28%  { opacity: 1; }
        100% { opacity: 1; transform: translateX(0); }
      }
      @keyframes pacific-mark-pop {
        0%   { opacity: 0; transform: scale(0.78) rotate(-4deg); }
        70%  { opacity: 1; transform: scale(1.08) rotate(0deg); }
        100% { opacity: 1; transform: scale(1) rotate(0deg); }
      }
    </style>
  </head>
  <body>
    <!-- ── Sticky top nav ── -->
    <header class="site-header">
      <span class="nav-brand">VCT Archive</span>
      <span class="nav-sep"></span>
      <nav class="nav-links" aria-label="사이트 메뉴">
        <a class="nav-link" href="./records.html" data-records-enter>📋 기록</a>
        <a class="nav-link" href="./tierlist.html">🏅 티어리스트</a>
        <a class="nav-link" href="./prediction.html">🏆 승부 예측</a>
      </nav>
      <span class="nav-spacer"></span>
      <!-- auth.js 버튼 자동 주입 -->
    </header>

    <main class="page-shell">
      <section class="hero" aria-labelledby="site-title">
        <div class="hero-copy">
          <img class="vct-logo" src="./assets/vct-logo.png" alt="VCT" />
          <p class="eyebrow">VALORANT Champions Tour</p>
          <h1 id="site-title">VCT Archive</h1>
          <p class="intro">
            Pacific, CN, Americas, EMEA 네 리그의 경기 결과와 맵별 기록을
            한눈에 정리하는 개인 VCT 리포트 사이트입니다.
          </p>
        </div>

        <!-- ── Grid Slider ── -->
        <div class="grid-slider-outer">
          <!-- 탭 -->
          <div class="grid-slider-tabs">
            <button class="gst-tab active" data-slide="0">VCT</button>
            <button class="gst-tab" data-slide="1">Challengers</button>
          </div>

          <div class="grid-slider-row">
            <div class="grid-slider-wrap">
              <div class="grid-slider-track" id="grid-track">

                <!-- Slide 0: VCT -->
                <div class="grid-slide">
                  <nav class="league-grid" aria-label="VCT 리그 선택">
                    <a class="league-card pacific" href="./pacific.html" aria-label="VCT Pacific 보기" data-pacific-enter>
                      <span class="league-logo-wrap"><img src="./assets/vct-pacific.webp" alt="" /></span>
                      <span class="league-name">Pacific</span>
                      <span class="league-action">리그 보기</span>
                    </a>
                    <a class="league-card cn" href="./cn.html" aria-label="VCT CN 보기" data-cn-enter>
                      <span class="league-logo-wrap"><img src="./assets/vct-cn.webp" alt="" /></span>
                      <span class="league-name">CN</span>
                      <span class="league-action">리그 보기</span>
                    </a>
                    <a class="league-card americas" href="./americas.html" aria-label="VCT Americas 보기" data-americas-enter>
                      <span class="league-logo-wrap"><img src="./assets/vct-americas.png" alt="" /></span>
                      <span class="league-name">Americas</span>
                      <span class="league-action">리그 보기</span>
                    </a>
                    <a class="league-card emea" href="./emea.html" aria-label="VCT EMEA 보기" data-emea-enter>
                      <span class="league-logo-wrap"><img src="./assets/vct-emea.webp" alt="" /></span>
                      <span class="league-name">EMEA</span>
                      <span class="league-action">리그 보기</span>
                    </a>
                    <a class="league-card masters" href="./masters.html" aria-label="VCT Masters 보기" data-masters-enter>
                      <span class="league-logo-wrap"><img src="./assets/vct-logo.png" alt="" /></span>
                      <span class="league-name">Masters</span>
                      <span class="league-action">대회 보기</span>
                    </a>
                    <a class="league-card champions" href="./champions.html" aria-label="VCT Champions 보기" data-champions-enter>
                      <span class="league-logo-wrap"><img src="./assets/vct-logo.png" alt="" /></span>
                      <span class="league-name">Champions</span>
                      <span class="league-action">대회 보기</span>
                    </a>
                  </nav>
                </div>

                <!-- Slide 1: Challengers (3 regions) -->
                <div class="grid-slide">
                  <nav class="league-grid challengers-grid" aria-label="VCT Challengers 지역 선택" style="grid-template-columns:repeat(3,minmax(0,1fr))">
                    <a class="league-card challengers-card" style="--accent:#01d2d7" href="./challengers-pacific.html" aria-label="Pacific Challengers" data-slug="ch-pacific">
                      <span class="lock-badge">업데이트 예정</span>
                      <span class="league-logo-wrap"><img src="https://static.wikia.nocookie.net/logopedia/images/f/f1/VALORANT_Challengers_logo.png/revision/latest?cb=20210816022910" alt="" /></span>
                      <span class="league-name">Pacific</span>
                      <div class="card-action-row">
                        <span class="league-action">챌린저스 보기</span>
                        <button class="admin-unlock-btn" type="button">🔓 공개하기</button>
                      </div>
                    </a>

                      <span class="league-name">EMEA</span>

                        <button class="admin-unlock-btn" type="button">🔓 공개하기</button>

                      <span class="league-logo-wrap"><img src="https://static.wikia.nocookie.net/logopedia/images/f/f1/VALORANT_Challengers_logo.png/revision/latest?cb=20210816022910" alt="" /></span>
                      <span class="league-name">Americas</span>

    <div class="pacific-enter-transition" aria-hidden="true"><img src="./assets/vct-pacific.webp" alt="" /></div>
    <div class="emea-enter-transition" aria-hidden="true"><img src="./assets/vct-emea.webp" alt="" /></div>
    <div class="cn-enter-transition" aria-hidden="true"><img src="./assets/vct-cn.webp" alt="" /></div>
    <div class="americas-enter-transition" aria-hidden="true"><img src="./assets/vct-americas.png" alt="" /></div>
    <div class="masters-enter-transition" aria-hidden="true"><img src="./assets/vct-logo.png" alt="" /></div>
    <div class="champions-enter-transition" aria-hidden="true"><img src="./assets/vct-logo.png" alt="" /></div>

    <script>
      /* ── 기존 VCT 입장 트랜지션 ── */
      const entries = [
        { attr: "data-pacific-enter",   cls: "entering-pacific" },
        { attr: "data-emea-enter",      cls: "entering-emea" },
        { attr: "data-cn-enter",        cls: "entering-cn" },
        { attr: "data-americas-enter",  cls: "entering-americas" },
        { attr: "data-masters-enter",   cls: "entering-masters" },
        { attr: "data-champions-enter", cls: "entering-champions" },
        { attr: "data-records-enter",   cls: "entering-records" },
      ];
      entries.forEach(({ attr, cls }) => {
        const link = document.querySelector(`[${attr}]`);
        link?.addEventListener("click", (e) => {
          if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.button !== 0) return;
          e.preventDefault();
          document.body.classList.add(cls);
          setTimeout(() => { window.location.href = link.href; }, 620);
        });
      });

      /* ── Grid Slider ── */
      (function () {
        var track  = document.getElementById("grid-track");
        var arrow  = document.getElementById("grid-arrow");
        var tabs   = document.querySelectorAll(".gst-tab");
        var cur    = 0;

        function goTo(n) {
          cur = n;
          track.style.transform = "translateX(" + (-100 * n) + "%)";
          arrow.classList.toggle("flipped", n === 1);
          tabs.forEach(function (t) {
            t.classList.toggle("active", parseInt(t.dataset.slide) === n);
          });
        }

        arrow.addEventListener("click", function () { goTo(cur === 0 ? 1 : 0); });
        tabs.forEach(function (t) {
          t.addEventListener("click", function () { goTo(parseInt(t.dataset.slide)); });
        });

        /* ── Challengers 잠금 상태 관리 ── */
        var _toastTimer = null;
        function showLockedToast() {
          var existing = document.querySelector(".locked-toast");
          if (existing) { existing.remove(); clearTimeout(_toastTimer); }
          var toast = document.createElement("div");
          toast.className = "locked-toast";
          toast.textContent = "업데이트 예정입니다.";
          document.body.appendChild(toast);
          requestAnimationFrame(function () {
            requestAnimationFrame(function () { toast.classList.add("show"); });
          });
          _toastTimer = setTimeout(function () {
            toast.classList.remove("show");
            setTimeout(function () { toast.remove(); }, 260);
          }, 2000);
        }

        function applyUnlockStates() {
          document.querySelectorAll(".challengers-card").forEach(function (card) {
            var slug = card.dataset.slug;
            var unlocked = localStorage.getItem("challengers-unlocked:" + slug) === "1";
            card.classList.toggle("unlocked", unlocked);
            var btn = card.querySelector(".admin-unlock-btn");
            if (btn) {
              btn.textContent = unlocked ? "🔒 비공개로" : "🔓 공개하기";
              btn.classList.toggle("is-unlocked", unlocked);
            }
          });
        }

        /* storageReady 후 상태 적용 */
        if (window.storageReady) {
          window.storageReady.then(applyUnlockStates);
        } else {
          applyUnlockStates();
        }

        /* Admin 공개 토글 */
        document.querySelectorAll(".admin-unlock-btn").forEach(function (btn) {
          btn.addEventListener("click", function (e) {
            e.preventDefault();
            e.stopPropagation();
            var card = btn.closest(".challengers-card");
            var slug = card.dataset.slug;
            var key = "challengers-unlocked:" + slug;
            if (localStorage.getItem(key) === "1") {
              localStorage.removeItem(key);
            } else {
              localStorage.setItem(key, "1");
            }
            applyUnlockStates();
          });
        });

        /* 카드 클릭: 잠금 여부 체크 */
        document.querySelectorAll(".challengers-card").forEach(function (card) {
          card.addEventListener("click", function (e) {
            var isAdmin = window.vctIsAdmin && window.vctIsAdmin();
            if (!isAdmin && !card.classList.contains("unlocked")) {
              e.preventDefault();
              showLockedToast();
            }
          });
        });
      })();
    </script>
    <script src="./auth.js"></script>
    <script src="./help.js" defer></script>
  </body>
