<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>발락대 공식 대회 대진표</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #f5f7fa; color: #111; min-height: 100vh; }

    .site-header { display:flex;align-items:center;padding:0 40px;height:56px;background:#fff;border-bottom:1px solid rgba(0,0,0,0.08);position:sticky;top:0;z-index:100; }
    .home-link { font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:#111;text-decoration:none;letter-spacing:0.04em; }
    .back-link { font-size:13px;font-weight:700;color:#3db8b0;text-decoration:none;margin-left:14px;padding:5px 14px;border:1.5px solid #3db8b0;border-radius:20px;transition:background 0.15s,color 0.15s; }
    .back-link:hover { background:#3db8b0;color:#fff; }

    .shell { max-width:1100px;margin:0 auto;padding:40px 32px 80px; }
    .page-title { font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:900;letter-spacing:0.02em;margin-bottom:4px; }
    .page-sub { font-size:13px;color:#999;margin-bottom:36px; }

    /* ── Bracket card ── */
    .bracket-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.09);
      padding: 44px 48px;
      overflow-x: auto;
    }

    /* ── Grid ──
       Columns: [sf-col 180px] [gap 80px] [mid-col 180px] [gap 80px] [gf-col 180px]
       Rows:    [sf1] [row-gap 24px] [sf2] [section-gap 48px] [lb1]
    */
    .bracket-grid {
      display: grid;
      grid-template-columns: 180px 80px 180px 80px 180px;
      grid-template-rows: auto 24px auto 52px auto;
      min-width: 720px;
      position: relative;
    }

    /* Grid placements */
    .nd-sf1  { grid-column: 1; grid-row: 1; }
    .nd-sf2  { grid-column: 1; grid-row: 3; }
    .nd-wb   { grid-column: 3; grid-row: 1 / 4; align-self: center; }
    .nd-lb1  { grid-column: 1; grid-row: 5; }
    .nd-sflb { grid-column: 3; grid-row: 5; }
    .nd-gf   { grid-column: 5; grid-row: 1 / 6; align-self: center; }

    /* ── Match node ── */
    .match-node {
      background: #f8f9fc;
      border: 1.5px solid rgba(0,0,0,0.08);
      border-radius: 14px;
      overflow: hidden;
      width: 180px;
    }

    .round-tag {
      padding: 6px 12px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .rt-w { background: rgba(232,96,106,0.13); color: #e8606a; }
    .rt-l { background: rgba(61,184,176,0.13);  color: #3db8b0; }
    .rt-f { background: rgba(200,144,26,0.13);  color: #c8901a; }

    .team-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-top: 1px solid rgba(0,0,0,0.06);
      transition: background 0.13s;
      cursor: default;
      min-height: 38px;
    }
    .team-row.clickable { cursor: pointer; }
    .team-row.clickable:hover { background: rgba(0,0,0,0.03); }
    .team-row.win  { background: rgba(21,184,166,0.07); }
    .team-row.lose { opacity: 0.35; }

    .pip { width:8px;height:8px;border-radius:50%;flex-shrink:0; }
    .tlbl { font-size:12px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .team-row.win .tlbl { font-weight:900; }
    .win-tag { font-size:9px;font-weight:900;background:#3db8b0;color:#fff;padding:2px 5px;border-radius:3px;flex-shrink:0; }

    /* ── Node wrapper (match + detail btn) ── */
    .nd-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
    }

    .detail-btn {
      display: inline-block;
      padding: 4px 14px;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.05em;
      border-radius: 20px;
      text-decoration: none;
      transition: opacity 0.15s;
      color: #fff;
      background: #3db8b0;
    }
    .detail-btn.dw { background: #e8606a; }
    .detail-btn.dl { background: #3db8b0; }
    .detail-btn.df { background: #c8901a; }
    .detail-btn:hover { opacity: 0.78; }

    .p-note { font-size:10px;color:#c0c0c0;text-align:center;margin-top:2px; }

    /* ── SVG connector overlay ── */
    .bracket-svg {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      overflow: visible;
    }

    /* ── Score row ── */
    .score-row {
      text-align: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 900;
      color: #555;
      padding: 4px 12px 6px;
      border-top: 1px solid rgba(0,0,0,0.06);
      letter-spacing: 0.1em;
    }

    /* ── Admin reset ── */
    .admin-bar { margin-top:16px;display:flex;justify-content:flex-end; }
    .reset-btn { padding:6px 14px;border-radius:8px;border:1.5px solid rgba(0,0,0,0.12);background:transparent;color:#c0c0c0;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.13s; }
    .reset-btn:hover { border-color:#e8606a;color:#e8606a; }
  </style>
</head>
<body>
  <header class="site-header">
    <div style="display:flex;align-items:center;">
      <a class="home-link" href="./index.html">VCT Archive</a>
      <a class="back-link" href="./ballakdae.html">발락대</a>
    </div>
  </header>

  <div class="shell">
    <h1 class="page-title">공식 대회 대진표</h1>
    <p class="page-sub">더블 엘리미네이션 · 4강 Bo3 → 결승전 Bo5</p>

    <div class="bracket-card">
      <div class="bracket-grid" id="bracket-grid">
        <!-- JS로 렌더 -->
        <svg class="bracket-svg" id="bracket-svg"></svg>
      </div>
      <div id="admin-bar-root"></div>
    </div>
  </div>

  <script src="./auth.js" defer></script>
  <script>
  (function() {
    var COACHES_KEY = 'ballakdae_draft_coaches';
    var TOURNEY_KEY = 'ballakdae_tournament_v2';
    var SLOT_COLORS = ['#e8606a','#c8901a','#3db8b0','#424242'];
    var SLOT_NAMES  = ['슬롯1','슬롯2','슬롯3','슬롯4'];

    var coaches = {};
    /* s0=SF1 위, s1=SF1 아래, s2=SF2 위, s3=SF2 아래 (슬롯 인덱스 0~3 또는 null) */
    var T = { s0:null, s1:null, s2:null, s3:null };

    function isAdmin() { return typeof window.vctIsAdmin==='function' && window.vctIsAdmin(); }
    function getName(s) { return (s!==null&&s!==undefined) ? (coaches[s]||SLOT_NAMES[s]) : null; }
    function getColor(s) { return (s!==null&&s!==undefined) ? (SLOT_COLORS[s]||'#ccc') : '#ccc'; }

    function load() {
      try { coaches = JSON.parse(localStorage.getItem(COACHES_KEY)||'{}'); } catch(e){}
      try { var sv=JSON.parse(localStorage.getItem(TOURNEY_KEY)||'{}'); if(sv) Object.assign(T,sv); } catch(e){}
    }
    function save() { localStorage.setItem(TOURNEY_KEY, JSON.stringify(T)); }

    /* 상세 경기 결과 읽기 (result:ballakdae|tournament|matchId) */
    function getResult(matchId) {
      try {
        var raw=localStorage.getItem('result:ballakdae|tournament|'+matchId);
        return raw ? JSON.parse(raw) : null;
      } catch(e) { return null; }
    }
    function getScore(matchId) {
      var r=getResult(matchId);
      if(!r||!r.scoreA||!r.scoreB||r.scoreA==='-'||r.scoreB==='-') return null;
      var a=parseInt(r.scoreA), b=parseInt(r.scoreB);
      if(isNaN(a)||isNaN(b)) return null;
      return {a:a, b:b};
    }
    function winnerOf(matchId, slotA, slotB) {
      if(slotA===null||slotA===undefined||slotB===null||slotB===undefined) return null;
      var sc=getScore(matchId);
      if(!sc||sc.a===sc.b) return null;
      return sc.a>sc.b ? slotA : slotB;
    }
    function loserOf(matchId, slotA, slotB) {
      var w=winnerOf(matchId,slotA,slotB);
      return w===null ? null : (w===slotA ? slotB : slotA);
    }

    function derived() {
      var sf1w=winnerOf('sf1',T.s0,T.s1), sf1l=loserOf('sf1',T.s0,T.s1);
      var sf2w=winnerOf('sf2',T.s2,T.s3), sf2l=loserOf('sf2',T.s2,T.s3);
      var wbw =winnerOf('wb', sf1w,sf2w),  wbl =loserOf('wb', sf1w,sf2w);
      var lb1w=winnerOf('lb1',sf1l,sf2l),  lb1l=loserOf('lb1',sf1l,sf2l);
      var sflbw=winnerOf('sflb',wbl,lb1w), sflbl=loserOf('sflb',wbl,lb1w);
      var gfw =winnerOf('gf', wbw,sflbw),  gfl =loserOf('gf', wbw,sflbw);
      return {sf1w,sf1l,sf2w,sf2l,wbw,wbl,lb1w,lb1l,sflbw,sflbl,gfw,gfl};
    }

    function detailUrl(matchId, slotA, slotB) {
      var a=slotA!==null&&slotA!==undefined ? encodeURIComponent(getName(slotA)) : '';
      var b=slotB!==null&&slotB!==undefined ? encodeURIComponent(getName(slotB)) : '';
      return './ballakdae-match-dark.html?from=tournament&tournament=ballakdae&match='+matchId+'&teamA='+a+'&teamB='+b;
    }

    /* 어드민: 시드 위치 클릭 시 사용 가능한 슬롯으로 순환 */
    function cycleSeed(skey) {
      var used=[];
      ['s0','s1','s2','s3'].forEach(function(k){ if(k!==skey&&T[k]!==null&&T[k]!==undefined) used.push(T[k]); });
      var avail=[0,1,2,3].filter(function(v){ return used.indexOf(v)===-1; });
      avail.push(null);
      var cur=T[skey], idx=avail.indexOf(cur);
      T[skey]=avail[(idx+1)%avail.length];
    }

    /* seedKeyA/B 있으면 어드민이 클릭해 팀 배정, 없으면 스코어 자동 반영만 */
    function makeNode(tagLabel, tagClass, slotA, slotB, matchId, seedKeyA, seedKeyB) {
      var el=document.createElement('div');
      el.className='match-node';

      var tag=document.createElement('div');
      tag.className='round-tag '+tagClass;
      tag.textContent=tagLabel;
      el.appendChild(tag);

      var sc=getScore(matchId);
      var wSlot=winnerOf(matchId,slotA,slotB);

      [[slotA,seedKeyA],[slotB,seedKeyB]].forEach(function(pair){
        var slot=pair[0], skey=pair[1];
        var row=document.createElement('div');
        row.className='team-row';
        var has=slot!==null&&slot!==undefined;
        var isW=wSlot!==null&&has&&wSlot===slot;
        var isL=wSlot!==null&&has&&wSlot!==slot;
        if(isW) row.classList.add('win');
        if(isL) row.classList.add('lose');
        if(skey&&isAdmin()){
          row.classList.add('clickable');
          row.addEventListener('click',function(){ cycleSeed(skey); save(); renderBracket(); });
        }
        var pip=document.createElement('div');
        pip.className='pip';
        pip.style.background=has?getColor(slot):'#ddd';
        var lbl=document.createElement('div');
        lbl.className='tlbl';
        lbl.style.color=has?getColor(slot):'#aaa';
        lbl.textContent=has?getName(slot):(skey&&isAdmin()?'팀 배정 ▸':'–');
        row.appendChild(pip);
        row.appendChild(lbl);
        if(isW){var wt=document.createElement('span');wt.className='win-tag';wt.textContent='승';row.appendChild(wt);}
        el.appendChild(row);
      });

      if(sc){
        var sr=document.createElement('div');
        sr.className='score-row';
        sr.textContent=sc.a+' : '+sc.b;
        el.appendChild(sr);
      }

      return el;
    }

    function makeWrap(cls, node, btnClass, matchId, slotA, slotB, note) {
      var wrap=document.createElement('div');
      wrap.className='nd-wrap '+cls;
      wrap.appendChild(node);
      var btn=document.createElement('a');
      btn.className='detail-btn '+btnClass;
      btn.href=detailUrl(matchId,slotA,slotB);
      btn.textContent='상세';
      wrap.appendChild(btn);
      if(note){var n=document.createElement('div');n.className='p-note';n.textContent=note;wrap.appendChild(n);}
      return wrap;
    }

    /* ── SVG 연결선 ── */
    function drawLines() {
      var grid=document.getElementById('bracket-grid');
      var svg =document.getElementById('bracket-svg');
      svg.innerHTML='';
      var cr=grid.getBoundingClientRect();

      function pos(cls,anchor) {
        var el=grid.querySelector('.'+cls);
        if(!el) return null;
        var r=el.querySelector('.match-node').getBoundingClientRect();
        var h=r.height;
        switch(anchor){
          case 'rc': return {x:r.right-cr.left, y:(r.top+r.bottom)/2-cr.top};
          case 'lc': return {x:r.left-cr.left,  y:(r.top+r.bottom)/2-cr.top};
          case 'lt': return {x:r.left-cr.left,  y:r.top+h*0.33-cr.top};
          case 'lb': return {x:r.left-cr.left,  y:r.top+h*0.67-cr.top};
        }
      }
      function line(d,color){
        var p=document.createElementNS('http://www.w3.org/2000/svg','path');
        p.setAttribute('d',d); p.setAttribute('stroke',color);
        p.setAttribute('stroke-width','2'); p.setAttribute('fill','none');
        p.setAttribute('stroke-linecap','round');
        svg.appendChild(p);
      }

      var W='#e8606a', L='#3db8b0';
      var sf1=pos('nd-sf1','rc'), sf2=pos('nd-sf2','rc');
      var wblc=pos('nd-wb','lc'), wbrc=pos('nd-wb','rc');
      var lb1=pos('nd-lb1','rc');
      var sflb_lt=pos('nd-sflb','lt'), sflb_lb=pos('nd-sflb','lb'), sflb_rc=pos('nd-sflb','rc');
      var gf_lt=pos('nd-gf','lt'), gf_lb=pos('nd-gf','lb');

      if(sf1&&sf2&&wblc){
        var bx=sf1.x+(wblc.x-sf1.x)*0.42;
        line('M'+sf1.x+','+sf1.y+' L'+bx+','+sf1.y,W);
        line('M'+sf2.x+','+sf2.y+' L'+bx+','+sf2.y,W);
        line('M'+bx+','+sf1.y+' L'+bx+','+sf2.y,W);
        line('M'+bx+','+wblc.y+' L'+wblc.x+','+wblc.y,W);
      }
      if(wbrc&&gf_lt){
        var mx=(wbrc.x+gf_lt.x)/2;
        line('M'+wbrc.x+','+wbrc.y+' L'+mx+','+wbrc.y+' L'+mx+','+gf_lt.y+' L'+gf_lt.x+','+gf_lt.y,W);
      }
      if(lb1&&sflb_lb){
        var mx2=(lb1.x+sflb_lb.x)/2;
        line('M'+lb1.x+','+lb1.y+' L'+mx2+','+lb1.y+' L'+mx2+','+sflb_lb.y+' L'+sflb_lb.x+','+sflb_lb.y,L);
      }
      if(sflb_rc&&gf_lb){
        var mx3=(sflb_rc.x+gf_lb.x)/2;
        line('M'+sflb_rc.x+','+sflb_rc.y+' L'+mx3+','+sflb_rc.y+' L'+mx3+','+gf_lb.y+' L'+gf_lb.x+','+gf_lb.y,L);
      }
      svg.setAttribute('width',grid.offsetWidth);
      svg.setAttribute('height',grid.offsetHeight);
    }

    function renderBracket() {
      var d=derived();
      var grid=document.getElementById('bracket-grid');
      Array.from(grid.children).forEach(function(c){ if(!c.classList.contains('bracket-svg')) c.remove(); });

      grid.appendChild(makeWrap('nd-sf1',
        makeNode('4강 1경기 · Bo3','rt-w',T.s0,T.s1,'sf1','s0','s1'),
        'dw','sf1',T.s0,T.s1));

      grid.appendChild(makeWrap('nd-sf2',
        makeNode('4강 2경기 · Bo3','rt-w',T.s2,T.s3,'sf2','s2','s3'),
        'dw','sf2',T.s2,T.s3));

      grid.appendChild(makeWrap('nd-wb',
        makeNode('승자조 · Bo1','rt-w',d.sf1w,d.sf2w,'wb',null,null),
        'dw','wb',d.sf1w,d.sf2w));

      grid.appendChild(makeWrap('nd-lb1',
        makeNode('패자조 · Bo1','rt-l',d.sf1l,d.sf2l,'lb1',null,null),
        'dl','lb1',d.sf1l,d.sf2l,'패배 시 4위'));

      grid.appendChild(makeWrap('nd-sflb',
        makeNode('준결승전 · Bo3','rt-l',d.wbl,d.lb1w,'sflb',null,null),
        'dl','sflb',d.wbl,d.lb1w,'패배 시 3위'));

      grid.appendChild(makeWrap('nd-gf',
        makeNode('결승전 · Bo5','rt-f',d.wbw,d.sflbw,'gf',null,null),
        'df','gf',d.wbw,d.sflbw,d.gfl!==null?getName(d.gfl)+' (2위)':null));

      var abRoot=document.getElementById('admin-bar-root');
      abRoot.innerHTML='';
      if(isAdmin()){
        var bar=document.createElement('div');
        bar.className='admin-bar';
        var btn=document.createElement('button');
        btn.className='reset-btn';
        btn.textContent='대진표 초기화';
        btn.addEventListener('click',function(){
          if(!confirm('대진표 팀 배정을 초기화할까요?')) return;
          T={s0:null,s1:null,s2:null,s3:null};
          save(); renderBracket();
        });
        bar.appendChild(btn);
        abRoot.appendChild(bar);
      }

      requestAnimationFrame(function(){ requestAnimationFrame(drawLines); });
    }

    load();
    renderBracket();
    window.addEventListener('load', function(){ renderBracket(); });
    window.addEventListener('resize', drawLines);
  })();
  </script>
</body>
</html>
