<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>л°ңлқҪлҢҖ кіөмӢқ лҢҖнҡҢ лҢҖм§„н‘ң</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #f5f7fa; color: #111; min-height: 100vh; }

    .site-header { display:flex;align-items:center;padding:0 40px;height:56px;background:#fff;border-bottom:1px solid rgba(0,0,0,0.08);position:sticky;top:0;z-index:100; }
    .home-link { font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:#111;text-decoration:none;letter-spacing:0.04em; }
    .back-link { font-size:13px;font-weight:700;color:#3db8b0;text-decoration:none;margin-left:14px;padding:5px 14px;border:1.5px solid #3db8b0;border-radius:20px;transition:background 0.15s,color 0.15s; }
    .back-link:hover { background:#3db8b0;color:#fff; }

    .shell { max-width:1100px;margin:0 auto;padding:40px 32px 80px; }
    .page-title { font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:900;letter-spacing:0.02em;margin-bottom:4px; }
    .page-sub { font-size:13px;color:#999;margin-bottom:36px; }

    /* в”Җв”Җ Bracket card в”Җв”Җ */
    .bracket-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.09);
      padding: 44px 48px;
      overflow-x: auto;
    }

    /* в”Җв”Җ Grid в”Җв”Җ
       Columns: [sf-col 180px] [gap 80px] [mid-col 180px] [gap 80px] [gf-col 180px]
       Rows:    [sf1] [row-gap 24px] [sf2] [section-gap 48px] [lb1]
    */
    .bracket-grid {
      display: grid;
      grid-template-columns: 180px 80px 180px 80px 180px;
      grid-template-rows: auto 24px auto 52px auto;
      min-width: 720px;
      position: relative;
    }

    /* Grid placements */
    .nd-sf1  { grid-column: 1; grid-row: 1; }
    .nd-sf2  { grid-column: 1; grid-row: 3; }
    .nd-wb   { grid-column: 3; grid-row: 1 / 4; align-self: center; }
    .nd-lb1  { grid-column: 1; grid-row: 5; }
    .nd-sflb { grid-column: 3; grid-row: 5; }
    .nd-gf   { grid-column: 5; grid-row: 1 / 6; align-self: center; }

    /* в”Җв”Җ Match node в”Җв”Җ */
    .match-node {
      background: #f8f9fc;
      border: 1.5px solid rgba(0,0,0,0.08);
      border-radius: 14px;
      overflow: hidden;
      width: 180px;
    }

    .round-tag {
      padding: 6px 12px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .rt-w { background: rgba(232,96,106,0.13); color: #e8606a; }
    .rt-l { background: rgba(61,184,176,0.13);  color: #3db8b0; }
    .rt-f { background: rgba(200,144,26,0.13);  color: #c8901a; }

    .team-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-top: 1px solid rgba(0,0,0,0.06);
      transition: background 0.13s;
      cursor: default;
      min-height: 38px;
    }
    .team-row.clickable { cursor: pointer; }
    .team-row.clickable:hover { background: rgba(0,0,0,0.03); }
    .team-row.win  { background: rgba(21,184,166,0.07); }
    .team-row.lose { opacity: 0.35; }

    .pip { width:8px;height:8px;border-radius:50%;flex-shrink:0; }
    .tlbl { font-size:12px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .team-row.win .tlbl { font-weight:900; }
    .win-tag { font-size:9px;font-weight:900;background:#3db8b0;color:#fff;padding:2px 5px;border-radius:3px;flex-shrink:0; }

    /* в”Җв”Җ Node wrapper (match + detail btn) в”Җв”Җ */
    .nd-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
    }

    .detail-btn {
      display: inline-block;
      padding: 4px 14px;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.05em;
      border-radius: 20px;
      text-decoration: none;
      transition: opacity 0.15s;
      color: #fff;
      background: #3db8b0;
    }
    .detail-btn.dw { background: #e8606a; }
    .detail-btn.dl { background: #3db8b0; }
    .detail-btn.df { background: #c8901a; }
    .detail-btn:hover { opacity: 0.78; }

    .p-note { font-size:10px;color:#c0c0c0;text-align:center;margin-top:2px; }

    /* в”Җв”Җ SVG connector overlay в”Җв”Җ */
    .bracket-svg {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      overflow: visible;
    }

    /* в”Җв”Җ кІ°мҠ№м „ м§Ғн–ү label в”Җв”Җ */
    .gf-label {
      position: absolute;
      font-size:10px;font-weight:700;color:#e8606a;
      white-space:nowrap;
      pointer-events:none;
    }

    /* в”Җв”Җ Admin reset в”Җв”Җ */
    .admin-bar { margin-top:16px;display:flex;justify-content:flex-end; }
    .reset-btn { padding:6px 14px;border-radius:8px;border:1.5px solid rgba(0,0,0,0.12);background:transparent;color:#c0c0c0;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.13s; }
    .reset-btn:hover { border-color:#e8606a;color:#e8606a; }
  </style>
</head>
<body>
  <header class="site-header">
    <div style="display:flex;align-items:center;">
      <a class="home-link" href="./index.html">VCT Archive</a>
      <a class="back-link" href="./ballakdae.html">л°ңлқҪлҢҖ</a>
    </div>
  </header>

  <div class="shell">
    <h1 class="page-title">кіөмӢқ лҢҖнҡҢ лҢҖм§„н‘ң</h1>
    <p class="page-sub">лҚ”лё” м—ҳлҰ¬лҜёл„Өмқҙм…ҳ В· 4к°• Bo3 вҶ’ кІ°мҠ№м „ Bo5</p>

    <div class="bracket-card">
      <div class="bracket-grid" id="bracket-grid">
        <!-- JSлЎң л ҢлҚ” -->
        <svg class="bracket-svg" id="bracket-svg"></svg>
      </div>
      <div id="admin-bar-root"></div>
    </div>
  </div>

  <script src="./auth.js" defer></script>
  <script>
  (function() {
    var COACHES_KEY = 'ballakdae_draft_coaches';
    var TOURNEY_KEY = 'ballakdae_tournament_v1';
    var SLOT_COLORS = ['#e8606a','#c8901a','#3db8b0','#424242'];
    var SLOT_NAMES  = ['мҠ¬лЎҜ1','мҠ¬лЎҜ2','мҠ¬лЎҜ3','мҠ¬лЎҜ4'];

    var coaches = {};
    var T = { sf1:null, sf2:null, wb:null, lb1:null, sflb:null, gf:null };

    function isAdmin() { return typeof window.vctIsAdmin === 'function' && window.vctIsAdmin(); }
    function getName(s) {
      if (s === null || s === undefined) return null;
      return coaches[s] || SLOT_NAMES[s];
    }
    function getColor(s) {
      if (s === null || s === undefined) return '#ccc';
      return SLOT_COLORS[s] || '#ccc';
    }
    function load() {
      try { coaches = JSON.parse(localStorage.getItem(COACHES_KEY) || '{}'); } catch(e){}
      try { var sv = JSON.parse(localStorage.getItem(TOURNEY_KEY)||'{}'); if(sv) Object.assign(T,sv); } catch(e){}
    }
    function save() { localStorage.setItem(TOURNEY_KEY, JSON.stringify(T)); }

    function derived() {
      var sf1w = T.sf1, sf1l = sf1w!=null ? (sf1w===0?1:0) : null;
      var sf2w = T.sf2, sf2l = sf2w!=null ? (sf2w===2?3:2) : null;
      var wbw  = T.wb,  wbl  = (wbw!=null&&sf1w!=null&&sf2w!=null) ? (wbw===sf1w?sf2w:sf1w) : null;
      var lb1w = T.lb1, lb1l = (lb1w!=null&&sf1l!=null&&sf2l!=null) ? (lb1w===sf1l?sf2l:sf1l) : null;
      var sflbw= T.sflb,sflbl= (sflbw!=null&&wbl!=null&&lb1w!=null) ? (sflbw===wbl?lb1w:wbl) : null;
      var gfw  = T.gf,  gfl  = (gfw!=null&&wbw!=null&&sflbw!=null) ? (gfw===wbw?sflbw:wbw) : null;
      return { sf1w,sf1l,sf2w,sf2l,wbw,wbl,lb1w,lb1l,sflbw,sflbl,gfw,gfl };
    }

    /* мғҒм„ё кІҪкё° URL */
    function detailUrl(matchId, slotA, slotB) {
      var a = (slotA!=null) ? encodeURIComponent(getName(slotA)) : '';
      var b = (slotB!=null) ? encodeURIComponent(getName(slotB)) : '';
      return './ballakdae-match-dark.html?from=tournament&tournament=ballakdae&match=' + matchId
        + '&teamA=' + a + '&teamB=' + b;
    }

    /* в”Җв”Җ л§Өм№ҳ л…ёл“ң мғқм„ұ в”Җв”Җ */
    function makeNode(tagLabel, tagClass, slotA, slotB, winner, onA, onB) {
      var el = document.createElement('div');
      el.className = 'match-node';

      var tag = document.createElement('div');
      tag.className = 'round-tag ' + tagClass;
      tag.textContent = tagLabel;
      el.appendChild(tag);

      [[slotA, onA], [slotB, onB]].forEach(function(pair) {
        var slot = pair[0], cb = pair[1];
        var row = document.createElement('div');
        row.className = 'team-row';
        var hasSlot = slot != null;
        var hasResult = winner != null;
        var isWin = hasResult && hasSlot && winner === slot;
        if (hasResult) row.classList.add(isWin ? 'win' : 'lose');
        if (hasSlot && cb) {
          row.classList.add('clickable');
          row.addEventListener('click', function(){ cb(); save(); renderBracket(); });
        }
        var pip = document.createElement('div');
        pip.className = 'pip';
        pip.style.background = hasSlot ? getColor(slot) : '#ddd';
        var lbl = document.createElement('div');
        lbl.className = 'tlbl';
        lbl.style.color = hasSlot ? getColor(slot) : '#ccc';
        lbl.textContent = hasSlot ? getName(slot) : 'вҖ“';
        row.appendChild(pip);
        row.appendChild(lbl);
        if (isWin) {
          var wt = document.createElement('span');
          wt.className = 'win-tag';
          wt.textContent = 'мҠ№';
          row.appendChild(wt);
        }
        el.appendChild(row);
      });
      return el;
    }

    /* в”Җв”Җ л…ёл“ң лһҳнҚј (л§Өм№ҳ + мғҒм„ё лІ„нҠј + мҲңмң„ л…ёнҠё) в”Җв”Җ */
    function makeWrap(cls, node, btnClass, matchId, slotA, slotB, note) {
      var wrap = document.createElement('div');
      wrap.className = 'nd-wrap ' + cls;
      wrap.appendChild(node);
      var btn = document.createElement('a');
      btn.className = 'detail-btn ' + btnClass;
      btn.href = detailUrl(matchId, slotA, slotB);
      btn.textContent = 'мғҒм„ё';
      wrap.appendChild(btn);
      if (note) {
        var n = document.createElement('div');
        n.className = 'p-note';
        n.textContent = note;
        wrap.appendChild(n);
      }
      return wrap;
    }

    /* в”Җв”Җ SVG м—°кІ°м„  в”Җв”Җ */
    function drawLines() {
      var grid = document.getElementById('bracket-grid');
      var svg  = document.getElementById('bracket-svg');
      svg.innerHTML = '';
      var cr = grid.getBoundingClientRect();

      function pos(cls, anchor) {
        var el = grid.querySelector('.' + cls);
        if (!el) return null;
        var r = el.querySelector('.match-node').getBoundingClientRect();
        var h = r.height;
        switch(anchor) {
          case 'rc': return { x: r.right-cr.left, y: (r.top+r.bottom)/2-cr.top };
          case 'lc': return { x: r.left-cr.left,  y: (r.top+r.bottom)/2-cr.top };
          case 'lt': return { x: r.left-cr.left,  y: r.top+h*0.33-cr.top };
          case 'lb': return { x: r.left-cr.left,  y: r.top+h*0.67-cr.top };
          case 'rt': return { x: r.right-cr.left, y: r.top+h*0.33-cr.top };
          case 'rb': return { x: r.right-cr.left, y: r.top+h*0.67-cr.top };
        }
      }

      function line(d, color, dashed) {
        var p = document.createElementNS('http://www.w3.org/2000/svg','path');
        p.setAttribute('d', d);
        p.setAttribute('stroke', color);
        p.setAttribute('stroke-width', '2');
        p.setAttribute('fill', 'none');
        p.setAttribute('stroke-linecap', 'round');
        if (dashed) p.setAttribute('stroke-dasharray', '5,4');
        svg.appendChild(p);
      }

      var W = '#e8606a', L = '#3db8b0', F = '#c8901a';

      var sf1 = pos('nd-sf1','rc'), sf2 = pos('nd-sf2','rc');
      var wblc = pos('nd-wb','lc'), wbrc = pos('nd-wb','rc');
      var lb1 = pos('nd-lb1','rc');
      var sflb_lt = pos('nd-sflb','lt'), sflb_lb = pos('nd-sflb','lb'), sflb_rc = pos('nd-sflb','rc');
      var gf_lt = pos('nd-gf','lt'), gf_lb = pos('nd-gf','lb');

      /* SF1+SF2 вҶ’ WB fork */
      if (sf1 && sf2 && wblc) {
        var bx = sf1.x + (wblc.x - sf1.x) * 0.42;
        line('M'+sf1.x+','+sf1.y+' L'+bx+','+sf1.y, W);
        line('M'+sf2.x+','+sf2.y+' L'+bx+','+sf2.y, W);
        line('M'+bx+','+sf1.y+' L'+bx+','+sf2.y, W);
        line('M'+bx+','+wblc.y+' L'+wblc.x+','+wblc.y, W);
      }

      /* WB winner вҶ’ GF top */
      if (wbrc && gf_lt) {
        var mx = (wbrc.x + gf_lt.x) / 2;
        line('M'+wbrc.x+','+wbrc.y+' L'+mx+','+wbrc.y+' L'+mx+','+gf_lt.y+' L'+gf_lt.x+','+gf_lt.y, W);
      }

      /* LB1 вҶ’ SF_LB bottom */
      if (lb1 && sflb_lb) {
        var mx2 = (lb1.x + sflb_lb.x) / 2;
        line('M'+lb1.x+','+lb1.y+' L'+mx2+','+lb1.y+' L'+mx2+','+sflb_lb.y+' L'+sflb_lb.x+','+sflb_lb.y, L);
      }

      /* SF_LB winner вҶ’ GF bottom */
      if (sflb_rc && gf_lb) {
        var mx3 = (sflb_rc.x + gf_lb.x) / 2;
        line('M'+sflb_rc.x+','+sflb_rc.y+' L'+mx3+','+sflb_rc.y+' L'+mx3+','+gf_lb.y+' L'+gf_lb.x+','+gf_lb.y, L);
      }

      /* SVG нҒ¬кё° */
      svg.setAttribute('width', grid.offsetWidth);
      svg.setAttribute('height', grid.offsetHeight);

    }

    function renderBracket() {
      var d = derived();
      var grid = document.getElementById('bracket-grid');

      /* кё°мЎҙ match л…ёл“ң м ңкұ° (SVGлҠ” мң м§Җ) */
      Array.from(grid.children).forEach(function(c){
        if (!c.classList.contains('bracket-svg')) c.remove();
      });

      /* SF1 */
      grid.appendChild(makeWrap('nd-sf1',
        makeNode('4к°• 1кІҪкё° В· Bo3','rt-w', 0, 1, T.sf1,
          function(){T.sf1=0;}, function(){T.sf1=1;}),
        'dw', 'sf1', 0, 1));

      /* SF2 */
      grid.appendChild(makeWrap('nd-sf2',
        makeNode('4к°• 2кІҪкё° В· Bo3','rt-w', 2, 3, T.sf2,
          function(){T.sf2=2;}, function(){T.sf2=3;}),
        'dw', 'sf2', 2, 3));

      /* WB */
      grid.appendChild(makeWrap('nd-wb',
        makeNode('мҠ№мһҗмЎ° В· Bo1','rt-w', d.sf1w, d.sf2w, T.wb,
          function(){T.wb=d.sf1w;}, function(){T.wb=d.sf2w;}),
        'dw', 'wb', d.sf1w, d.sf2w));

      /* LB1 */
      grid.appendChild(makeWrap('nd-lb1',
        makeNode('нҢЁмһҗмЎ° В· Bo1','rt-l', d.sf1l, d.sf2l, T.lb1,
          function(){T.lb1=d.sf1l;}, function(){T.lb1=d.sf2l;}),
        'dl', 'lb1', d.sf1l, d.sf2l, 'нҢЁл°° мӢң 4мң„'));

      /* SF_LB */
      grid.appendChild(makeWrap('nd-sflb',
        makeNode('мӨҖкІ°мҠ№м „ В· Bo3','rt-l', d.wbl, d.lb1w, T.sflb,
          function(){T.sflb=d.wbl;}, function(){T.sflb=d.lb1w;}),
        'dl', 'sflb', d.wbl, d.lb1w, 'нҢЁл°° мӢң 3мң„'));

      /* GF */
      grid.appendChild(makeWrap('nd-gf',
        makeNode('кІ°мҠ№м „ В· Bo5','rt-f', d.wbw, d.sflbw, T.gf,
          function(){T.gf=d.wbw;}, function(){T.gf=d.sflbw;}),
        'df', 'gf', d.wbw, d.sflbw, d.gfl!=null ? getName(d.gfl)+' (2мң„)' : null));

      /* Admin reset */
      var abRoot = document.getElementById('admin-bar-root');
      abRoot.innerHTML = '';
      if (isAdmin()) {
        var bar = document.createElement('div');
        bar.className = 'admin-bar';
        var btn = document.createElement('button');
        btn.className = 'reset-btn';
        btn.textContent = 'лҢҖм§„н‘ң кІ°кіј мҙҲкё°нҷ”';
        btn.addEventListener('click', function(){
          if (!confirm('лҢҖм§„н‘ң кІ°кіјлҘј м „л¶Җ мҙҲкё°нҷ”н• к№Ңмҡ”?')) return;
          T = {sf1:null,sf2:null,wb:null,lb1:null,sflb:null,gf:null};
          save(); renderBracket();
        });
        bar.appendChild(btn);
        abRoot.appendChild(bar);
      }

      /* SVG м—°кІ°м„  (DOM м—…лҚ°мқҙнҠё нӣ„ к·ёлҰ¬кё°) */
      requestAnimationFrame(function(){
        requestAnimationFrame(drawLines);
      });
    }

    load();
    renderBracket();
    window.addEventListener('auth-state-change', function(){ renderBracket(); });
    window.addEventListener('resize', drawLines);
  })();
  </script>
</body>
</html>
