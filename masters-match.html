        target.innerHTML = marks.slice(0,3).map((mark, i) =>
          `<span><button class="inline-edit mark-edit-button" type="button" data-result-edit="mark" data-side="${side}" data-mark-index="${i}">${mark||""}</button></span>`
        ).join("");
      }

      function renderResultBoard() {
        document.getElementById("match-date").innerHTML =
          `<button class="inline-edit result-date-button" type="button" data-result-edit="date">${resultState.date}</button>`;
        document.getElementById("score-a").textContent = resultState.scoreA;
        document.getElementById("score-b").textContent = resultState.scoreB;
        document.getElementById("team-a-record").innerHTML =
          `<button class="inline-edit result-record-button" type="button" data-result-edit="recordA">${resultState.recordA}</button>`;
        document.getElementById("team-b-record").innerHTML =
          `<button class="inline-edit result-record-button" type="button" data-result-edit="recordB">${resultState.recordB}</button>`;
        renderMarks(document.getElementById("team-a-marks"), resultState.marksA, "a");
        renderMarks(document.getElementById("team-b-marks"), resultState.marksB, "b");
      }

      function openResultEditor(options) {
        document.querySelector(".agent-picker")?.remove();
        const picker = document.createElement("div");
        picker.className = "agent-picker";
        picker.innerHTML = `
          <div class="agent-picker-panel compact">
            <div class="agent-picker-head">
              <strong>${options.title}</strong>
              <button type="button" data-agent-close>닫기</button>
            </div>
            ${options.choices
              ? `<div class="agent-picker-grid result-choice-grid">
                  ${options.choices.map(c=>`<button type="button" data-value="${c.value}">${c.label}</button>`).join("")}
                 </div>`
              : `<form class="value-editor-form">
                  <input value="${options.value||""}" placeholder="${options.placeholder||"-"}" autofocus />
                  <button type="submit">적용</button>
                 </form>`}
          </div>`;
        document.body.appendChild(picker);
        const close = () => picker.remove();
        const apply = (v) => { options.apply(v); saveResultState(); renderResultBoard(); close(); };
        picker.addEventListener("click", e => {
          if (e.target===picker || e.target.dataset.agentClose!==undefined) close();
          if (e.target.dataset.value!==undefined) apply(e.target.dataset.value);
        });
        picker.querySelector("form")?.addEventListener("submit", e => { e.preventDefault(); apply(e.currentTarget.querySelector("input").value.trim()); });
        picker.querySelector("input")?.focus();
      }

      function editResultField(trigger) {
        const field = trigger.dataset.resultEdit;
        if (field === "mark") {
          const side = trigger.dataset.side;
          const i = Number(trigger.dataset.markIndex);
          const k = side === "a" ? "marksA" : "marksB";
          openResultEditor({ title:`${i+1}세트 결과`, choices:[{label:"O",value:"O"},{label:"X",value:"X"},{label:"빈칸",value:""}], apply(v){resultState[k][i]=v;} });
          return;
        }
        const labels = { date:"경기 날짜", scoreA:`${teamA} 세트 승`, scoreB:`${teamB} 세트 승`, recordA:`${teamA} 당시 승패`, recordB:`${teamB} 당시 승패` };
        openResultEditor({ title:labels[field], value:resultState[field], placeholder:field==="date"?"2026. 05.":"-", apply(v){resultState[field]=v||"-";} });
      }

      document.querySelector(".match-result-panel").addEventListener("click", e => {
        const t = e.target.closest("[data-result-edit]");
        if (t) editResultField(t);
      });

      renderResultBoard();

      /* ── 예측 패널 ─────────────────────────────────────── */
      function loadPredictionState() {
        try { return { oddsA:"", oddsB:"", ...JSON.parse(localStorage.getItem(predictionKey)||"{}") }; }
        catch { return { oddsA:"", oddsB:"" }; }
      }
      function savePredictionState() { localStorage.setItem(predictionKey, JSON.stringify(predictionState)); }
      function parseOdds(v) { const n = Number(String(v||"").replace(",",".")); return Number.isFinite(n)&&n>1?n:null; }

      let predictionState = loadPredictionState();

      function predPct() {
        const a = parseOdds(predictionState.oddsA), b = parseOdds(predictionState.oddsB);
        if (!a||!b) return {a:50,b:50,ready:false};
        const ia=1/a,ib=1/b,pa=Math.round(ia/(ia+ib)*100);
        return {a:pa,b:100-pa,ready:true};
      }

      function predLogo(name, side) {
        const logo = teamLogo(name);
        if (!logo) return `<span class="prediction-logo-text">${teamCode(name)}</span>`;
        return `<img class="${side==="b"?"right":""}" src="${logo}" alt="" />`;
      }

      function renderPredictionBoard() {
        const p = predPct();
        const board = document.getElementById("prediction-board");
        board.style.setProperty("--prediction-a", `${p.a}%`);
        board.style.setProperty("--prediction-left-color", colorExtract(teamColor(teamA),"left"));
        board.style.setProperty("--prediction-right-color", colorExtract(teamColor(teamB),"right"));
        board.innerHTML = `
          <div class="prediction-side prediction-side-a" style="--team-color:${teamColor(teamA)}">
            <div class="prediction-logo">${predLogo(teamA,"a")}</div>
            <strong>${teamA}</strong>
            <span>${p.ready?`${p.a}%`:"50%"}</span>
            <button class="inline-edit prediction-odds" type="button" data-odds-side="A">${predictionState.oddsA||"배당률"}</button>
          </div>
          <div class="prediction-divider"></div>
          <div class="prediction-side prediction-side-b" style="--team-color:${teamColor(teamB)}">
            <div class="prediction-logo">${predLogo(teamB,"b")}</div>
            <strong>${teamB}</strong>
            <span>${p.ready?`${p.b}%`:"50%"}</span>
            <button class="inline-edit prediction-odds" type="button" data-odds-side="B">${predictionState.oddsB||"배당률"}</button>
          </div>`;
      }

      function openOddsEditor(side) {
        document.querySelector(".agent-picker")?.remove();
        const k = side==="A"?"oddsA":"oddsB";
        const name = side==="A"?teamA:teamB;
        const picker = document.createElement("div");
        picker.className = "agent-picker";
        picker.innerHTML = `
          <div class="agent-picker-panel compact">
            <div class="agent-picker-head"><strong>${name} 배당률</strong><button type="button" data-agent-close>닫기</button></div>
            <form class="value-editor-form">
              <input inputmode="decimal" value="${predictionState[k]||""}" placeholder="예: 1.27" autofocus />
              <button type="submit">적용</button>
            </form>
          </div>`;
        document.body.appendChild(picker);
        picker.addEventListener("click", e => { if(e.target===picker||e.target.dataset.agentClose!==undefined) picker.remove(); });
        picker.querySelector("form").addEventListener("submit", e => {
          e.preventDefault();
          predictionState[k] = e.currentTarget.querySelector("input").value.trim();
          savePredictionState(); renderPredictionBoard(); picker.remove();
        });
        picker.querySelector("input").focus();
      }

      document.querySelector(".prediction-panel").addEventListener("click", e => {
        const t = e.target.closest("[data-odds-side]");
        if (t) openOddsEditor(t.dataset.oddsSide);
      });

      renderPredictionBoard();

      /* ── 밴픽 (BO3 고정) ────────────────────────────────── */
      const vetoKey = `veto:${matchKeyPrefix}`;
      const teamOptions = [
        { value:"A", label:`${teamCode(teamA)} (${teamA})` },
        { value:"B", label:`${teamCode(teamB)} (${teamB})` },
      ];
      const vetoSteps = isGF
        ? [
            {type:"ban",name:"1맵 밴"},
            {type:"ban",name:"2맵 밴"},
            {type:"pick",name:"3맵 선택",mapIndex:0},
            {type:"pick",name:"4맵 선택",mapIndex:1},
            {type:"pick",name:"5맵 선택",mapIndex:2},
            {type:"pick",name:"6맵 선택",mapIndex:3},
            {type:"decider",name:"7맵 디사이더",mapIndex:4},
          ]
        : [
            {type:"ban",name:"1맵 밴"},{type:"ban",name:"2맵 밴"},
            {type:"pick",name:"3맵 선택",mapIndex:0},{type:"pick",name:"4맵 선택",mapIndex:1},
            {type:"ban",name:"5맵 밴"},{type:"ban",name:"6맵 밴"},
            {type:"decider",name:"7맵 디사이더",mapIndex:2},
          ];

      function sideLabel(v) { return v==="attack"?"선 공격":"선 수비"; }
      function teamShortByCode(code) { return code==="A"?teamCode(teamA):teamCode(teamB); }
      function teamNameByCode(code) { return code==="A"?teamA:teamB; }
      function stepTeam(i, firstBan) {
        if (isGF) {
          const lb = firstBan==="A"?"B":"A";
          if (i<=1) return firstBan;
          if (i===2||i===4) return firstBan;
          if (i===3||i===5) return lb;
          return "";
        }
        return i%2===0?firstBan:(firstBan==="A"?"B":"A");
      }
      function sideChooserForStep(i, firstBan) {
        if(vetoSteps[i].type==="pick") { const t=stepTeam(i,firstBan); return t==="A"?"B":"A"; }
        if(vetoSteps[i].type==="decider") return sideChooserForStep(isGF?5:3,firstBan);
        return "";
      }

      function defaultVetoState() {
        const sides = isGF
          ? {2:"defense",3:"defense",4:"defense",5:"defense",6:"defense"}
          : {2:"defense",3:"defense",6:"defense"};
        return { firstBan:"A", maps:mapNames.slice(0,7), sides };
      }
      function loadVetoState() {
        try { return {...defaultVetoState(),...JSON.parse(localStorage.getItem(vetoKey)||"{}")}; }
        catch { return defaultVetoState(); }
      }
      function saveVetoState(s) { localStorage.setItem(vetoKey, JSON.stringify(s)); }
      function playableMaps(s) {
        const idx = isGF ? [2,3,4,5,6] : [2,3,6];
        return idx.map(si => `${s.maps[si]||mapNames[si]} -`);
      }

      const vetoGrid = document.getElementById("veto-grid");
      let vetoState = loadVetoState();

      function renderVeto(s) {
        vetoGrid.innerHTML = vetoSteps.map((step, i) => {
          const orderTeam = stepTeam(i, s.firstBan);
          const mapName = s.maps[i]||mapNames[i];
          const isPlayable = step.type==="pick"||step.type==="decider";
          const sc = isPlayable?sideChooserForStep(i,s.firstBan):"";
          const side = s.sides[i]||"defense";
          const title = step.type==="ban"?`${teamShortByCode(orderTeam)} 거부`:step.type==="pick"?`${teamShortByCode(orderTeam)} 선택`:"디사이더";
          const sideText = isPlayable?`${teamShortByCode(sc)} 선택<br>${sideLabel(side)}`:"";
          return `<article class="veto-card ${step.type}" data-veto-step="${i}">
            <strong>${title}<small>${mapKo[mapName]||mapName}</small></strong>
            <button type="button" data-veto-map-button="${i}" style="${mapBgStyle(mapName)}">${mapKo[mapName]||mapName}</button>
            ${isPlayable?`<em>${sideText}</em>`:""}
          </article>`;
        }).join("");
      }

      renderVeto(vetoState);

      function openVetoPicker(si) {
        document.querySelector(".agent-picker")?.remove();
        const step = vetoSteps[si];
        const isPlayable = step.type==="pick"||step.type==="decider";
        const picker = document.createElement("div");
        picker.className = "agent-picker";
        picker.innerHTML = `
          <div class="agent-picker-panel map-picker-panel">
            <div class="agent-picker-head"><strong>${step.name}</strong><button type="button" data-agent-close>닫기</button></div>
            <div class="veto-quick-form">
              ${si===0?`<label>${isGF?"UB 팀 (어드밴티지)":"첫 밴 팀"}<select data-quick-first-ban>${teamOptions.map(o=>`<option value="${o.value}"${vetoState.firstBan===o.value?" selected":""}>${o.label}</option>`).join("")}</select></label>`:""}
              ${isPlayable?`<label>진영<select data-quick-side>
                <option value="attack"${vetoState.sides[si]==="attack"?" selected":""}>선 공격</option>
                <option value="defense"${vetoState.sides[si]==="defense"?" selected":""}>선 수비</option>
              </select></label>`:""}
              <div class="map-picker-grid">
                ${mapNames.map(m=>`<button class="${vetoState.maps[si]===m?"active":""}" type="button" data-quick-map="${m}" style="${mapBgStyle(m)}" aria-label="${mapKo[m]||m}"></button>`).join("")}
              </div>
              <div class="veto-quick-actions"><button type="button" data-veto-reset>초기화</button></div>
            </div>
          </div>`;
        document.body.appendChild(picker);
        picker.addEventListener("change", e => {
          if(e.target.matches("[data-quick-first-ban]")) { vetoState.firstBan=e.target.value; saveVetoState(vetoState); renderVeto(vetoState); renderMapReports(); }
          if(e.target.matches("[data-quick-side]")) { vetoState.sides[si]=e.target.value; saveVetoState(vetoState); renderVeto(vetoState); renderMapReports(); }
        });
        picker.addEventListener("click", e => {
          if(e.target===picker||e.target.dataset.agentClose!==undefined) picker.remove();
          if(e.target.dataset.vetoReset!==undefined) { localStorage.removeItem(vetoKey); vetoState=defaultVetoState(); saveVetoState(vetoState); renderVeto(vetoState); renderMapReports(); picker.remove(); }
          const mb = e.target.closest("[data-quick-map]");
          if(!mb) return;
          const fb = picker.querySelector("[data-quick-first-ban]");
          const sv = picker.querySelector("[data-quick-side]");
          if(fb) vetoState.firstBan=fb.value;
          vetoState.maps[si]=mb.dataset.quickMap;
          if(sv) vetoState.sides[si]=sv.value;
          saveVetoState(vetoState); renderVeto(vetoState); renderMapReports(); picker.remove();
        });
      }

      vetoGrid.addEventListener("click", e => {
        const card = e.target.closest("[data-veto-step]");
        if(card) openVetoPicker(Number(card.dataset.vetoStep));
      });

      /* ── 맵 리포트 ─────────────────────────────────────── */
      function setStorageKey(mapName, i) { return `set:${matchKeyPrefix}:${i}:${mapName}`; }

      function defaultSetState(mapName, i) {
        const rows = Array.from({length:5},()=>({ aPlayer:"",aAgent:"",aKda:"",aAcs:"",bPlayer:"",bAgent:"",bKda:"",bAcs:"" }));
        return { mapName, mapScore:"-", title:`Map ${i+1} ${mapKo[mapName]||mapName}`, rows,
          stats:{aScore:"",bScore:"",firstKillsA:"",firstKillsB:"",thriftyA:"",thriftyB:"",postPlantA:"",postPlantB:"",clutchA:"",clutchB:""} };
      }

      function loadSetState(mapName, i) {
        const d = defaultSetState(mapName, i);
        try {
          const s = JSON.parse(localStorage.getItem(setStorageKey(mapName,i))||"{}");
          return {...d,...s,rows:s.rows||d.rows,stats:{...d.stats,...(s.stats||{})}};
        } catch { return d; }
      }
      function saveSetState(mapName, i, state) { localStorage.setItem(setStorageKey(mapName,i),JSON.stringify(state)); }
      function syncMapScore(state) { state.mapScore=`${state.stats.aScore||"-"}-${state.stats.bScore||"-"}`; }

      /* ── Round Tracker constants ── */
      const ROUND_ICONS = {
        attack_kill:  "https://i.ibb.co/9HcDhzQ4/image.webp",
        attack_spike: "https://i.ibb.co/k2hrj8Dp/image.webp",
        def_defuse:   "https://i.ibb.co/TMjk5drN/image.webp",
        def_timeout:  "https://i.ibb.co/DXqXggC/image.webp",
        def_kill:     "https://i.ibb.co/4RLQmnjG/image.webp",
      };
      const ROUND_ICON_LABELS = {
        attack_kill:  "공격 처치",
        attack_spike: "스파이크 폭파",
        def_defuse:   "스파이크 해체",
        def_timeout:  "설치 실패",
        def_kill:     "수비 처치",
      };
      const ATK_TYPES = ["attack_kill", "attack_spike"];
      const DEF_TYPES = ["def_defuse", "def_timeout", "def_kill"];

      function roundIsAttacking(side, roundIdx, firstAttacker) {
        if (!firstAttacker) return null;
        const n = roundIdx + 1;
        let faAtks;
        if (n <= 12) faAtks = true;
        else if (n <= 24) faAtks = false;
        else { const otRound = n - 24; faAtks = (otRound % 2 === 1); }
        return faAtks ? (firstAttacker === side) : (firstAttacker !== side);
      }

      function renderRoundTracker(state) {
        const aScore = parseInt(state.stats && state.stats.aScore) || 0;
        const bScore = parseInt(state.stats && state.stats.bScore) || 0;
        const totalRounds = Math.max(24, aScore + bScore);
        const fa = state.firstAttacker || null;
        const rounds = state.rounds || [];
        const numBlocks = Math.ceil(totalRounds / 24);
        const logoSrcA = teamLogo(teamA), logoSrcB = teamLogo(teamB);
        const logoA = logoSrcA ? `<img src="${logoSrcA}" alt="${teamA}" />` : `<span>${teamA.substring(0,3)}</span>`;
        const logoB = logoSrcB ? `<img src="${logoSrcB}" alt="${teamB}" />` : `<span>${teamB.substring(0,3)}</span>`;
        function renderCell(side, i) {
          const r = rounds[i] || {};
          const won = r.winner === side;
          const attacking = roundIsAttacking(side, i, fa);
          let cls = "round-cell";
          if (i === 11) cls += " round-halftime";
          if (won) cls += attacking ? " rc-atk" : " rc-def";
          else if (r.winner) cls += " rc-lost";
          const iconUrl = won && r.type ? ROUND_ICONS[r.type] : "";
          return `<div class="${cls}" data-round-cell="${i}">${iconUrl ? `<img src="${iconUrl}" alt="" />` : ""}</div>`;
        }
        let blocksHtml = "";
        for (let b = 0; b < numBlocks; b++) {
          const start = b * 24;
          const end = Math.min(start + 24, totalRounds);
          let numRow = "", cellsA = "", cellsB = "";
          for (let i = start; i < end; i++) {
            const htCls = i === 11 ? " round-halftime" : "";
            numRow += `<div class="round-num-label${htCls}">${i + 1}</div>`;
            cellsA += renderCell("a", i);
            cellsB += renderCell("b", i);
          }
          blocksHtml += `
          <div class="round-block">
            <div class="round-tracker-team-col">
              <div class="round-num-spacer"></div>
              <div class="round-tracker-team-logo">${logoA}</div>
              <div class="round-tracker-team-logo">${logoB}</div>
            </div>
            <div class="round-tracker-grid">
              <div class="round-num-row">${numRow}</div>
              <div class="round-tracker-row">${cellsA}</div>
              <div class="round-tracker-row">${cellsB}</div>
            </div>
          </div>`;
        }
        return `
          <div class="round-tracker">
            <div class="round-tracker-top">
              <span class="round-tracker-label">라운드 결과</span>
            </div>
            ${blocksHtml}
          </div>`;
      }
      function openRoundPicker(card, state, mapName, i, roundIdx) {
        document.querySelector(".round-picker")?.remove();
        const fa = state.firstAttacker || null;
        const aAtks = roundIsAttacking("a", roundIdx, fa);
        const r = (state.rounds || [])[roundIdx] || {};
        const roundNum = roundIdx + 1;
        const aTypes = fa ? (aAtks ? ATK_TYPES : DEF_TYPES) : [...ATK_TYPES, ...DEF_TYPES];
        const bTypes = fa ? (aAtks ? DEF_TYPES : ATK_TYPES) : [...ATK_TYPES, ...DEF_TYPES];
        function iconGroup(winner, types, label) {
          return `<div class="rp-team-section">
            <div class="rp-team-label">${label}</div>
            <div class="rp-icons">
              ${types.map((t) => `
                <button class="rp-icon-btn${r.winner === winner && r.type === t ? " selected" : ""}"
                  data-rp-winner="${winner}" data-rp-type="${t}">
                  <img src="${ROUND_ICONS[t]}" alt="" />${ROUND_ICON_LABELS[t]}
                </button>`).join("")}
            </div>
          </div>`;
        }
        const aLabel = teamA + (fa ? (aAtks ? " (공격)" : " (수비)") : "");
        const bLabel = teamB + (fa ? (aAtks ? " (수비)" : " (공격)") : "");
        const picker = document.createElement("div");
        picker.className = "round-picker";
        picker.innerHTML = `
          <div class="round-picker-panel">
            <div class="round-picker-head">
              <strong>라운드 ${roundNum}</strong>
              <div class="round-picker-head-actions">
                ${r.winner ? `<button class="rp-clear-btn" data-rp-clear>초기화</button>` : ""}
                <button class="rp-close-btn" data-rp-close>닫기</button>
              </div>
            </div>
            <div class="round-picker-body">
              ${iconGroup("a", aTypes, aLabel)}
              ${iconGroup("b", bTypes, bLabel)}
            </div>
          </div>`;
        document.body.appendChild(picker);
        picker.addEventListener("click", (e) => {
          if (e.target === picker || e.target.closest("[data-rp-close]")) { picker.remove(); return; }
          if (e.target.closest("[data-rp-clear]")) {
            if (!state.rounds) state.rounds = [];
            state.rounds[roundIdx] = { winner: null, type: null };
            saveSetState(mapName, i, state); renderSetView(card, state); picker.remove(); return;
          }
          const btn = e.target.closest("[data-rp-winner]");
          if (btn) {
            if (!state.rounds) state.rounds = [];
            while (state.rounds.length <= roundIdx) state.rounds.push({ winner: null, type: null });
            state.rounds[roundIdx] = { winner: btn.dataset.rpWinner, type: btn.dataset.rpType };
            saveSetState(mapName, i, state); renderSetView(card, state); picker.remove();
          }
        });
      }

      function renderAgentButton(agent, side, rowIdx) {
        const label = agentLabel(agent||"요원");
        const img = agentImage(agent);
        return `<button class="agent-chip${side==="b"?" right":""}" type="button" data-agent-row="${rowIdx}" data-agent-side="${side}" aria-label="${label}">
          ${img?`<img src="${img}" alt="" />`:`<span>${label}</span>`}
        </button>`;
      }

      function renderSetView(card, state) {
        card.querySelector(".map-report-hero strong").textContent = state.mapScore;
        card.querySelector(".map-report-hero h3").textContent = mapKo[state.mapName]||state.mapName;
        card.querySelector(".set-detail-view").innerHTML = `
          <div class="set-detail-banner"><span>${state.title}</span><strong>${state.mapScore}</strong></div>
          <div class="set-player-grid">
            <div class="set-team-title" style="background:${teamColor(teamA)}">${teamA}</div>
            <div class="set-team-title right" style="background:${teamColor(teamB)}">${teamB}</div>
            ${state.rows.map((row,ri)=>`
              <div class="set-player-row">
                ${renderAgentButton(row.aAgent,"a",ri)}
                <div>
                  <button class="inline-edit player-name" type="button" data-row="${ri}" data-side="a" data-edit="player">${row.aPlayer||"-"}</button>
                  <span>
                    <button class="inline-edit" type="button" data-row="${ri}" data-side="a" data-edit="kda">${row.aKda||"-"}</button>
                    (<button class="inline-edit" type="button" data-row="${ri}" data-side="a" data-edit="acs">${row.aAcs||"-"}</button>)
                  </span>
                </div>
                <div>
                  <button class="inline-edit player-name" type="button" data-row="${ri}" data-side="b" data-edit="player">${row.bPlayer||"-"}</button>
                  <span>
                    <button class="inline-edit" type="button" data-row="${ri}" data-side="b" data-edit="kda">${row.bKda||"-"}</button>
                    (<button class="inline-edit" type="button" data-row="${ri}" data-side="b" data-edit="acs">${row.bAcs||"-"}</button>)
                  </span>
                </div>
                ${renderAgentButton(row.bAgent,"b",ri)}
              </div>`).join("")}
          </div>
          ${renderRoundTracker(state)}
          <div class="capsule-stats-v2">
            <div class="capsule-stats-head-v2">
              <strong>${teamA}</strong>
              <button class="inline-edit stat-value" type="button" data-stat="aScore">${state.stats.aScore||"-"}</button>
              <span>스코어</span>
              <button class="inline-edit stat-value" type="button" data-stat="bScore">${state.stats.bScore||"-"}</button>
              <strong>${teamB}</strong>
            </div>
            <div class="capsule-stats-body-v2">
              <div class="capsule-art-v2">${teamCapsuleSrc(teamA) ? `<img${teamCapsuleClass(teamA)} src="${teamCapsuleSrc(teamA)}" alt="" />` : ""}</div>
              <div class="capsule-center-v2">
                <div class="capsule-stat-line-v2"><button class="inline-edit stat-value" type="button" data-stat="firstKillsA">${state.stats.firstKillsA||"-"}</button><span>첫킬</span><button class="inline-edit stat-value" type="button" data-stat="firstKillsB">${state.stats.firstKillsB||"-"}</button></div>
                <div class="capsule-stat-line-v2"><button class="inline-edit stat-value" type="button" data-stat="thriftyA">${state.stats.thriftyA||"-"}</button><span>절약왕</span><button class="inline-edit stat-value" type="button" data-stat="thriftyB">${state.stats.thriftyB||"-"}</button></div>
                <div class="capsule-stat-line-v2"><button class="inline-edit stat-value" type="button" data-stat="postPlantA">${state.stats.postPlantA||"-"}</button><span>포스트 플랜트</span><button class="inline-edit stat-value" type="button" data-stat="postPlantB">${state.stats.postPlantB||"-"}</button></div>
                <div class="capsule-stat-line-v2"><button class="inline-edit stat-value" type="button" data-stat="clutchA">${state.stats.clutchA||"-"}</button><span>클러치</span><button class="inline-edit stat-value" type="button" data-stat="clutchB">${state.stats.clutchB||"-"}</button></div>
                <div class="capsule-pacific-v2"><img src="./assets/vct-logo.png" alt="" style="filter:brightness(0) saturate(100%) invert(26%) sepia(89%) saturate(5000%) hue-rotate(252deg) brightness(105%)" /></div>
              </div>
              <div class="capsule-art-v2">${teamCapsuleSrc(teamB) ? `<img${teamCapsuleClass(teamB)} src="${teamCapsuleSrc(teamB)}" alt="" />` : ""}</div>
            </div>
          </div>`;
      }

      function openAgentPicker(card, state, mapName, i, rowIdx, side) {
        document.querySelector(".agent-picker")?.remove();
        const picker = document.createElement("div");
        picker.className = "agent-picker";
        picker.innerHTML = `
          <div class="agent-picker-panel">
            <div class="agent-picker-head"><strong>요원 선택</strong><button type="button" data-agent-close>닫기</button></div>
            <div class="agent-picker-grid agent-image-grid">
              ${agents.map((a,ai)=>`<button type="button" data-agent-index="${ai}" aria-label="${a}"><img src="${agentImage(a)}" alt="" /></button>`).join("")}
            </div>
            <div class="picker-clear-row"><button type="button" data-clear-field>칸 비우기</button></div>
          </div>`;
        document.body.appendChild(picker);
        picker.addEventListener("click", e => {
          if(e.target===picker||e.target.dataset.agentClose!==undefined){picker.remove();return;}
          if(e.target.dataset.clearField!==undefined){
            state.rows[rowIdx][`${side}Agent`] = "";
            saveSetState(mapName,i,state); renderSetView(card,state); picker.remove(); return;
          }
          const ab = e.target.closest("[data-agent-index]");
          if(!ab)return;
          state.rows[rowIdx][`${side}Agent`] = agents[Number(ab.dataset.agentIndex)];
          saveSetState(mapName,i,state); renderSetView(card,state); picker.remove();
        });
      }

      function openValueEditor(card, state, mapName, i, options) {
        document.querySelector(".agent-picker")?.remove();
        const picker = document.createElement("div");
        picker.className = "agent-picker";
        const isPlayer = options.kind === "player";
        const roster = isPlayer ? (options.side === "a" ? getTeamRoster(teamA) : getTeamRoster(teamB)) : [];
        picker.innerHTML = `
          <div class="agent-picker-panel compact">
            <div class="agent-picker-head"><strong>${options.title}</strong><button type="button" data-agent-close>닫기</button></div>
            ${isPlayer
              ? `<div class="agent-picker-grid">${roster.map(p=>`<button type="button" data-value="${p}">${p}</button>`).join("")}</div>`
              : `<form class="value-editor-form">
                  <input value="${options.value||""}" placeholder="${options.placeholder||"-"}" autofocus />
                  <button type="submit">적용</button>
                </form>`}
            <div class="picker-clear-row"><button type="button" data-clear-field>칸 비우기</button></div>
          </div>`;
        document.body.appendChild(picker);
        const close = () => picker.remove();
        const apply = v => {
          options.apply(v);
          if(options.syncScore) syncMapScore(state);
          saveSetState(mapName,i,state); renderSetView(card,state); close();
        };
        picker.addEventListener("click", e => {
          if(e.target===picker||e.target.dataset.agentClose!==undefined) close();
          if(e.target.dataset.clearField!==undefined) { apply(""); return; }
          if(e.target.dataset.value!==undefined) apply(e.target.dataset.value);
        });
        picker.querySelector("form")?.addEventListener("submit", e => { e.preventDefault(); apply(e.currentTarget.querySelector("input").value.trim()); });
        picker.querySelector("input")?.focus();
      }

      const reportGrid = document.getElementById("map-report-grid");

      const mapCountKey = `mapCount:${matchKeyPrefix}`;
      function loadActiveMapCount(max) {
        try { const s = localStorage.getItem(mapCountKey); if (s !== null) return Math.max(1, Math.min(max, parseInt(s))); } catch (e) {}
        return max;
      }
      function saveActiveMapCount(n) { try { localStorage.setItem(mapCountKey, String(n)); } catch (e) {} }

      function confirmMapRemove(onConfirm) {
        const backdrop = document.createElement("div");
        backdrop.className = "map-remove-confirm-backdrop";
        backdrop.innerHTML = `
          <div class="map-remove-confirm-panel">
            <p>맵 창을 삭제하겠습니까?<small>입력된 데이터는 유지됩니다.</small></p>
            <div class="map-remove-confirm-actions">
              <button class="map-remove-confirm-cancel" data-cancel>취소</button>
              <button class="map-remove-confirm-ok" data-ok>삭제</button>
            </div>
          </div>`;
        document.body.appendChild(backdrop);
        backdrop.addEventListener("click", e => {
          if (e.target.dataset.cancel !== undefined || e.target === backdrop) backdrop.remove();
          if (e.target.dataset.ok !== undefined) { backdrop.remove(); onConfirm(); }
        });
      }

      function getFirstAttackerFromVeto(mapIndex) {
        const playableIndices = isGF ? [2, 3, 4, 5, 6] : [2, 3, 6];
        const stepIndex = playableIndices[mapIndex];
        if (stepIndex === undefined) return null;
        const chooser = sideChooserForStep(stepIndex, vetoState.firstBan);
        const chosenSide = vetoState.sides[stepIndex] || "defense";
        return chosenSide === "attack" ? (chooser === "A" ? "a" : "b") : (chooser === "A" ? "b" : "a");
      }
      function renderMapReports() {
        const allMaps = playableMaps(vetoState);
        const maxMaps = allMaps.length;
        const isAdmin = !document.body.classList.contains("view-only");
        const activeCount = loadActiveMapCount(maxMaps);

        let ctrl = document.getElementById("map-count-ctrl");
        if (isAdmin) {
          if (!ctrl) {
            ctrl = document.createElement("div");
            ctrl.id = "map-count-ctrl";
            ctrl.className = "map-count-ctrl";
            reportGrid.parentElement.insertBefore(ctrl, reportGrid);
          }
          ctrl.innerHTML = `
            <button type="button" class="map-count-btn" id="mcb-minus" ${activeCount <= 1 ? "disabled" : ""}>−</button>
            <span>${activeCount} / ${maxMaps}</span>
            <button type="button" class="map-count-btn" id="mcb-plus" ${activeCount >= maxMaps ? "disabled" : ""}>+</button>`;
          document.getElementById("mcb-minus").onclick = () => {
            const c = loadActiveMapCount(maxMaps);
            if (c > 1) confirmMapRemove(() => { saveActiveMapCount(c - 1); renderMapReports(); });
          };
          document.getElementById("mcb-plus").onclick = () => {
            const c = loadActiveMapCount(maxMaps);
            if (c < maxMaps) { saveActiveMapCount(c + 1); renderMapReports(); }
          };
        } else if (ctrl) {
          ctrl.remove();
        }

        const maps = allMaps.slice(0, activeCount);
        reportGrid.innerHTML = maps.map((mt,i) => {
          const [mapName] = mt.split(" ");
          return `<article class="map-report-card set-card" data-map-index="${i}">
            <div class="map-report-hero" style="${mapBgStyle(mapName)}">
              <span>Map ${i+1}</span>
              <h3>${mapKo[mapName]||mapName}</h3>
              <strong>-</strong>
            </div>
            <div class="set-detail-view"></div>
          </article>`;
        }).join("");

        document.querySelectorAll(".set-card").forEach((card, i) => {
          const [mapName] = maps[i].split(" ");
          const state = loadSetState(mapName, i);
          state.mapName = mapName;
          state.mapScore = (state.stats.aScore||state.stats.bScore)
            ? `${state.stats.aScore||"-"}-${state.stats.bScore||"-"}`
            : "-";
          state.title = `Map ${i+1} ${mapKo[mapName]||mapName}`;
          state.firstAttacker = getFirstAttackerFromVeto(i);
          renderSetView(card, state);

          card.addEventListener("click", e => {
            const chip = e.target.closest("[data-agent-row]");
            if(chip){openAgentPicker(card,state,mapName,i,Number(chip.dataset.agentRow),chip.dataset.agentSide);return;}
            const roundCell = e.target.closest("[data-round-cell]");
            if(roundCell){if(!document.body.classList.contains("view-only"))openRoundPicker(card,state,mapName,i,Number(roundCell.dataset.roundCell));return;}
            const ed = e.target.closest("[data-edit],[data-stat]");
            if(!ed)return;
            const ri=Number(ed.dataset.row),side=ed.dataset.side,edit=ed.dataset.edit,stat=ed.dataset.stat;
            if(edit==="player"){
              openValueEditor(card,state,mapName,i,{title:"선수 이름",kind:"player",side,value:state.rows[ri][`${side}Player`],placeholder:"선수명",apply:v=>{state.rows[ri][`${side}Player`]=v;}});
            }else if(edit==="kda"||edit==="acs"){
              const fk=`${side}${edit==="kda"?"Kda":"Acs"}`;
              openValueEditor(card,state,mapName,i,{title:edit==="kda"?"K/D/A 입력":"ACS 입력",value:state.rows[ri][fk],placeholder:edit==="kda"?"예: 21/20/3":"예: 230",apply:v=>{state.rows[ri][fk]=v;}});
            }else if(stat){
              openValueEditor(card,state,mapName,i,{title:"지표 입력",value:state.stats[stat],placeholder:"-",syncScore:stat==="aScore"||stat==="bScore",apply:v=>{state.stats[stat]=v;}});
            }
          });
        });
      }

      renderMapReports();
    });
    </script>
    <script src="./auth.js"></script>
  </body>
</html>
