<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Esports World Cup 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&family=Noto+Sans+KR:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root { --acc: #c9a84c; }

      body {
        background: #0d1520;
        color: #e8e4e0;
        font-family: 'Barlow', 'Noto Sans KR', sans-serif;
        min-height: 100vh;
      }

      /* ── HEADER ─────────────────────────────── */
      .site-header {
        display: flex; align-items: center; gap: 20px;
        padding: 0 32px; height: 56px;
        background: rgba(13,21,32,0.9);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        position: sticky; top: 0; z-index: 100;
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      }
      .home-link {
        font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700;
        letter-spacing: 0.12em; text-transform: uppercase;
        color: rgba(255,255,255,0.55); text-decoration: none; transition: color 0.15s;
      }
      .home-link:hover { color: #fff; }
      .home-link::after { content: " /"; margin-left: 4px; color: rgba(255,255,255,.18); font-weight: 400; }
      .back-link {
        font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600;
        letter-spacing: 0.1em; text-transform: uppercase;
        color: rgba(255,255,255,0.4); text-decoration: none; transition: color 0.15s;
      }
      .back-link:hover { color: rgba(255,255,255,0.8); }

      /* ── HERO ───────────────────────────────── */
      .league-hero {
        position: relative; display: flex; align-items: center;
        justify-content: space-between; gap: 32px;
        padding: 72px 0 80px; max-width: 1080px; margin: 0 auto;
        padding-left: 48px; padding-right: 48px; overflow: hidden;
      }
      .league-hero::before {
        content: ''; position: absolute; inset: 0;
        background: radial-gradient(ellipse 60% 80% at 80% 50%, rgba(201,168,76,0.12) 0%, transparent 70%);
        pointer-events: none;
      }
      .hero-text { position: relative; z-index: 1; }
      .eyebrow {
        font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700;
        letter-spacing: 0.22em; text-transform: uppercase; color: var(--acc); margin-bottom: 10px;
      }
      .league-hero h1 {
        font-family: 'Barlow Condensed', sans-serif; font-size: clamp(38px, 6vw, 72px);
        font-weight: 900; letter-spacing: 0.03em; text-transform: uppercase;
        line-height: 0.95; color: #fff; margin-bottom: 20px;
      }
      .league-hero .intro {
        font-size: 14px; line-height: 1.8; color: rgba(255,255,255,0.45);
        max-width: 420px; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; word-break: keep-all;
      }
      .league-mark { flex-shrink: 0; position: relative; z-index: 1; padding: 16px; }
      .league-mark img {
        width: clamp(120px, 18vw, 200px); height: clamp(120px, 18vw, 200px);
        object-fit: contain;
        filter: brightness(0) invert(1) drop-shadow(0 4px 24px rgba(255,255,255,0.15));
      }

      /* ── SHELL ──────────────────────────────── */
      .league-shell { max-width: 1080px; margin: 0 auto; padding: 0 48px 80px; }
      .section-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 0 0 56px; }
      .section-heading { margin-bottom: 24px; border-left: 3px solid var(--acc); padding-left: 16px; }
      .section-heading .eyebrow { margin-bottom: 4px; }
      .section-heading h2 {
        font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 900;
        letter-spacing: 0.04em; text-transform: uppercase; color: #fff;
      }

      /* ── TOURNAMENT GRID ─────────────────────── */
      .tournament-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 64px; }
      @media (max-width: 560px) { .tournament-grid { grid-template-columns: 1fr; } }
      .tournament-card {
        display: flex; flex-direction: column; gap: 6px; padding: 32px 28px;
        background: #111a28; border: 1px solid rgba(255,255,255,0.07); border-radius: 4px;
        text-decoration: none; color: #e8e4e0; position: relative; overflow: hidden;
        transition: border-color 0.2s, transform 0.18s, background 0.2s; cursor: pointer;
      }
      .tournament-card::before {
        content: ''; position: absolute; inset: 0;
        border-bottom: 2px solid var(--acc); transform: scaleX(0);
        transform-origin: left; transition: transform 0.25s ease;
      }
      .tournament-card:hover { border-color: rgba(201,168,76,0.35); background: #152030; transform: translateY(-2px); }
      .tournament-card:hover::before { transform: scaleX(1); }
      .tournament-kicker {
        font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
        letter-spacing: 0.2em; text-transform: uppercase; color: rgba(201,168,76,0.75);
      }
      .tournament-card strong {
        font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 900;
        letter-spacing: 0.04em; text-transform: uppercase; color: #fff; line-height: 1;
      }
      .tournament-card > span:last-child { font-size: 12px; color: rgba(255,255,255,0.35); font-family: 'Barlow', sans-serif; margin-top: 4px; }

      /* ── PARTICIPANTS ───────────────────────── */
      .participants-section { margin-top: 0; }
      .participants-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        margin-bottom: 24px;
      }
      @media (max-width: 640px) { .participants-grid { grid-template-columns: 1fr; } }

      /* 챔피언 행 */
      .champion-row { margin-bottom: 16px; }

      .region-card {
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 12px; overflow: hidden;
        background: rgba(255,255,255,0.03);
      }
      .region-card.champion { border-color: rgba(201,168,76,0.35); background: rgba(201,168,76,0.05); }
      .region-card.pacific  { border-color: rgba(1,210,215,0.3);  background: rgba(1,210,215,0.06); }
      .region-card.americas { border-color: rgba(255,87,12,0.3);  background: rgba(255,87,12,0.06); }
      .region-card.cn       { border-color: rgba(251,38,89,0.3);  background: rgba(251,38,89,0.06); }
      .region-card.emea     { border-color: rgba(212,255,31,0.3); background: rgba(212,255,31,0.06); }

      .region-header {
        display: flex; align-items: center; gap: 10px;
        padding: 14px 16px;
        border-bottom: 1px solid rgba(255,255,255,0.07);
      }
      .region-card.champion .region-header { border-color: rgba(201,168,76,0.18); }
      .region-card.pacific  .region-header { border-color: rgba(1,210,215,0.18); }
      .region-card.americas .region-header { border-color: rgba(255,87,12,0.18); }
      .region-card.cn       .region-header { border-color: rgba(251,38,89,0.18); }
      .region-card.emea     .region-header { border-color: rgba(212,255,31,0.18); }

      .region-header img { width: 36px; height: 36px; object-fit: contain; }
      .region-header h3 { font-size: 15px; font-weight: 900; margin: 0; letter-spacing: 0.02em; }
      .region-accent-dot { width: 8px; height: 8px; border-radius: 50%; margin-left: auto; flex-shrink: 0; }
      .region-card.champion .region-accent-dot { background: #c9a84c; }
      .region-card.pacific  .region-accent-dot { background: #01d2d7; }
      .region-card.americas .region-accent-dot { background: #ff570c; }
      .region-card.cn       .region-accent-dot { background: #fb2659; }
      .region-card.emea     .region-accent-dot { background: #d4ff1f; }

      .seed-slots { display: flex; flex-direction: column; gap: 0; padding: 8px; }

      .seed-slot {
        display: flex; align-items: center; gap: 12px;
        padding: 10px 10px; border-radius: 8px;
        border: 1px solid transparent;
        transition: background 0.15s, border-color 0.15s;
      }
      .seed-slot.has-team { background: rgba(197,177,116,0.08); border-color: rgba(197,177,116,0.3); }
      .seed-slot .slot-logo { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
      .seed-slot .slot-logo img { width: 38px; height: 38px; object-fit: contain; }
      .seed-slot .slot-info { flex: 1; min-width: 0; }
      .seed-slot .slot-seed { font-size: 10px; font-weight: 700; opacity: 0.5; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
      .seed-slot .slot-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .seed-slot.empty .slot-name { opacity: 0.35; font-weight: 500; }

      body:not(.view-only) .seed-slot { cursor: pointer; }
      body:not(.view-only) .seed-slot:hover { background: rgba(197,177,116,0.14); border-color: rgba(197,177,116,0.5); }

      /* ── 팀 선택 모달 ─────────────────────────────────── */
      .ts-modal { position: fixed; inset: 0; z-index: 9800; display: flex; align-items: center; justify-content: center; }
      .ts-modal[hidden] { display: none !important; }
      .ts-backdrop { position: absolute; inset: 0; background: rgba(5,5,5,0.6); backdrop-filter: blur(6px); }
      .ts-panel {
        position: relative; z-index: 1;
        width: min(560px, calc(100vw - 24px));
        max-height: 88vh; overflow-y: auto;
        background: #1a1400;
        border: 1.5px solid rgba(197,177,116,0.35);
        border-radius: 18px; padding: 24px;
      }
      .ts-panel h2 { font-size: 16px; font-weight: 700; margin: 0 0 4px; }
      .ts-panel p  { font-size: 13px; opacity: 0.55; margin: 0 0 18px; }

      .ts-region-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
      .ts-region-tab {
        padding: 5px 14px; border-radius: 999px; font-size: 12px; font-weight: 700; cursor: pointer;
        border: 1.5px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06);
        color: rgba(255,255,255,0.6); transition: all 0.13s; font-family: inherit;
      }
      .ts-region-tab:hover { background: rgba(255,255,255,0.12); color: #fff; }
      .ts-region-tab.active { border-color: #c5b174; background: rgba(197,177,116,0.22); color: #fff; }
      .ts-region-tab[data-r="pacific"].active  { border-color: #01d2d7; background: rgba(1,210,215,0.2); }
      .ts-region-tab[data-r="americas"].active { border-color: #ff570c; background: rgba(255,87,12,0.2); }
      .ts-region-tab[data-r="cn"].active       { border-color: #fb2659; background: rgba(251,38,89,0.2); }
      .ts-region-tab[data-r="emea"].active     { border-color: #d4ff1f; background: rgba(212,255,31,0.2); color: #000; }

      .ts-team-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 18px; }
      @media (max-width: 400px) { .ts-team-grid { grid-template-columns: repeat(2, 1fr); } }
      .ts-team-btn {
        display: flex; flex-direction: column; align-items: center; gap: 5px;
        padding: 10px 6px; border-radius: 10px;
        background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.1);
        color: #fff; font-family: inherit; cursor: pointer;
        transition: all 0.13s; font-size: 10px; font-weight: 700; text-align: center;
      }
      .ts-team-btn img { width: 30px; height: 30px; object-fit: contain; }
      .ts-team-btn .ts-code { font-size: 12px; font-weight: 900; }
      .ts-team-btn:hover { background: rgba(197,177,116,0.18); border-color: rgba(197,177,116,0.6); }
      .ts-team-btn.selected { background: rgba(197,177,116,0.32); border-color: #c5b174; box-shadow: 0 0 0 2px rgba(197,177,116,0.3); }

      .ts-actions { display: flex; gap: 10px; justify-content: flex-end; }
      .ts-btn { padding: 9px 20px; border-radius: 8px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; border: none; }
      .ts-btn-cancel { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); }
      .ts-btn-cancel:hover { background: rgba(255,255,255,0.14); }
      .ts-btn-save { background: #c5b174; color: #1a1000; }
      .ts-btn-save:hover { background: #d4c48a; }
      .ts-btn-save:disabled { opacity: 0.35; cursor: not-allowed; }
      .ts-btn-clear { background: rgba(255,80,80,0.14); color: #ff6060; border: 1px solid rgba(255,80,80,0.25); }
      .ts-btn-clear:hover { background: rgba(255,80,80,0.26); }
    </style>
  </head>
  <body>
    <header class="site-header">
      <a class="home-link" href="./index.html">VCT Archive</a>
      <a class="back-link" href="./index.html">홈으로</a>
    </header>

    <div style="max-width:1080px;margin:0 auto;padding:0 48px;">
      <section class="league-hero" style="padding-left:0;padding-right:0;" aria-labelledby="league-title">
        <div class="hero-text">
          <p class="eyebrow">이벤트 경기</p>
          <h1 id="league-title">Esports<br>World Cup</h1>
          <p class="intro">
            2026 Esports World Cup Valorant의<br>
            그룹 스테이지와 플레이오프 결과를 정리하는 페이지입니다.
          </p>
        </div>
        <div class="league-mark">
          <img src="./assets/EWC.svg" alt="Esports World Cup" />
        </div>
      </section>
    </div>

    <main class="league-shell">
      <div class="section-divider"></div>

      <!-- 대회 선택 -->
      <section aria-labelledby="stage-title">
        <div class="section-heading">
          <p class="eyebrow">Stages</p>
          <h2 id="stage-title">대회 선택</h2>
        </div>
        <div class="tournament-grid">
          <a class="tournament-card" href="./ewc-groups.html">
            <span class="tournament-kicker">EWC 2026</span>
            <strong>그룹 스테이지</strong>
            <span>Group Stage</span>
          </a>
          <a class="tournament-card" href="./ewc-playoff.html">
            <span class="tournament-kicker">EWC 2026</span>
            <strong>플레이오프</strong>
            <span>Playoff</span>
          </a>
        </div>
      </section>

      <!-- 참가팀 -->
      <section class="participants-section" aria-labelledby="participants-title">
        <div class="section-heading">
          <p class="eyebrow">Participants</p>
          <h2 id="participants-title">EWC 2026 참가팀</h2>
        </div>

        <!-- 챔피언 -->
        <div class="champion-row">
          <div class="region-card champion">
            <div class="region-header">
              <img src="./assets/EWC.svg" alt="EWC" style="filter:brightness(0) invert(1) sepia(1) saturate(3) hue-rotate(5deg);" />
              <h3>🏆 EWC 2025 챔피언</h3>
              <span class="region-accent-dot"></span>
            </div>
            <div class="seed-slots" id="champion-slots"></div>
          </div>
        </div>

        <!-- 4개 권역 -->
        <div class="participants-grid">
          <div class="region-card pacific">
            <div class="region-header">
              <img src="./assets/vct-pacific.webp" alt="Pacific" />
              <h3>Pacific</h3>
              <span class="region-accent-dot"></span>
            </div>
            <div class="seed-slots" id="pacific-slots"></div>
          </div>
          <div class="region-card emea">
            <div class="region-header">
              <img src="./assets/vct-emea.webp" alt="EMEA" />
              <h3>EMEA</h3>
              <span class="region-accent-dot"></span>
            </div>
            <div class="seed-slots" id="emea-slots"></div>
          </div>
          <div class="region-card americas">
            <div class="region-header">
              <img src="./assets/vct-americas.png" alt="Americas" />
              <h3>Americas</h3>
              <span class="region-accent-dot"></span>
            </div>
            <div class="seed-slots" id="americas-slots"></div>
          </div>
          <div class="region-card cn">
            <div class="region-header">
              <img src="./assets/vct-cn.webp" alt="CN" />
              <h3>CN</h3>
              <span class="region-accent-dot"></span>
            </div>
            <div class="seed-slots" id="cn-slots"></div>
          </div>
        </div>
      </section>
    </main>

    <!-- 팀 선택 모달 -->
    <div class="ts-modal" id="ts-modal" hidden>
      <div class="ts-backdrop" id="ts-backdrop"></div>
      <div class="ts-panel" role="dialog" aria-modal="true" aria-labelledby="ts-title">
        <h2 id="ts-title">팀 선택</h2>
        <p id="ts-subtitle"></p>
        <div class="ts-region-tabs" id="ts-region-tabs"></div>
        <div class="ts-team-grid" id="ts-team-grid"></div>
        <div class="ts-actions" id="ts-actions"></div>
      </div>
    </div>

        emea: [
          { name: "Gentle Mates",  code: "M8",   logo: "./assets/teams/gm.png", white:true },
          { name: "Team Liquid",   code: "TL",   logo: "https://i.namu.wiki/i/f_CgQqphVfEK8ZpEdvOwbGpar5zO-_FVVRi39YwZGPPXdUwewYA58qHLO9BMsDue-XXXYWNXJANDwuBBkPdncg.webp", white:true },

          { name: "Team Vitality", code: "VIT",  logo: "https://images.secretlab.co/theme/common/vitality_25_spacer_logo.png" },
          { name: "GIANTX",        code: "GX",   logo: "https://i.namu.wiki/i/smbcvKZYz5eUQqXRfGl_7bXNclG0mpQkHJ-vk2WLqNefG_xO_lErENqYn2GQWvDpO9sSZPBYOHo-Td0lXg1vvQ.svg", white:true },
          { name: "Eternal Fire",  code: "EF",   logo: "https://i.namu.wiki/i/mkmrm6lQKQlLsm4GMnZzHvOhujJ1yPSpJE9w5U5p4rQHkef-0XAH4Ga3FUQLt7HSAZO6WwwXBgiaOaJz621qEg.svg" },
          { name: "FUT Esports",   code: "FUT",  logo: "https://img.redbull.com/images/c_limit,w_4000/e_trim:1:transparent/c_limit,w_600/bo_5px_solid_rgb:00000000/q_auto:best,f_auto/redbullcom/2023/11/15/m76gqzk7ebefvxn4idmu/fut-esports" },
        ],
      };

      /* 권역별 슬롯 수 */
      const SEEDS = { champion: 1, pacific: 4, emea: 4, americas: 4, cn: 3 };
      const REGIONS = ["pacific", "americas", "cn", "emea"];
      const REGION_LABELS = { pacific: "Pacific", americas: "Americas", cn: "CN", emea: "EMEA" };

      function load() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) return JSON.parse(raw);
        } catch {}
        return { champion: [""], pacific: ["","","",""], emea: ["","","",""], americas: ["","","",""], cn: ["","",""] };
      }
      function save(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

      function findTeam(name) {
        for (const r of REGIONS) {
          const t = ALL_TEAMS[r].find(t => t.name === name);
          if (t) return t;
        }
        return null;
      }

      const isAdmin = () => typeof window.vctIsAdmin === "function" && window.vctIsAdmin();

      /* ── 슬롯 렌더링 ────────────────────────────────────── */
      function renderSlots() {
        const data = load();

        /* 챔피언 슬롯 */
        const champContainer = document.getElementById("champion-slots");
        if (champContainer) {
          const teamName = (data.champion || [""])[0] || "";
          const team = teamName ? findTeam(teamName) : null;
          const slot = document.createElement("div");
          slot.className = "seed-slot" + (teamName ? " has-team" : " empty");
          slot.innerHTML = `
            <div class="slot-logo">${team ? `<img src="${team.logo}" alt="${team.name}" ${team.white ? 'style="filter:brightness(0) invert(1)"' : ''} />` : ""}</div>
            <div class="slot-info">
              <div class="slot-seed">챔피언</div>
              <div class="slot-name">${teamName || "미정"}</div>
            </div>
          `;
          if (isAdmin()) {
            slot.addEventListener("click", () => openPicker("champion", 0));
          } else if (team && window.openRosterModal) {
            slot.style.cursor = "pointer";
            slot.addEventListener("click", () => {
              const logoHTML = `<img src="${team.logo}" alt="${team.name}" ${team.white ? 'style="filter:brightness(0) invert(1)"' : ''} />`;
              window.openRosterModal(team.name, logoHTML);
            });
          }
          champContainer.innerHTML = "";
          champContainer.appendChild(slot);
        }

        /* 권역별 슬롯 */
        REGIONS.forEach(region => {
          const container = document.getElementById(region + "-slots");
          if (!container) return;
          container.innerHTML = "";
          const count = SEEDS[region];
          for (let i = 0; i < count; i++) {
            const teamName = (data[region] || [])[i] || "";
            const team = teamName ? findTeam(teamName) : null;
            const slot = document.createElement("div");
            slot.className = "seed-slot" + (teamName ? " has-team" : " empty");
            slot.innerHTML = `
              <div class="slot-logo">${team ? `<img src="${team.logo}" alt="${team.name}" ${team.white ? 'style="filter:brightness(0) invert(1)"' : ''} />` : ""}</div>
              <div class="slot-info">
                <div class="slot-seed">${i + 1}시드</div>
                <div class="slot-name">${teamName || "미정"}</div>
              </div>
            `;
            if (isAdmin()) {
              slot.addEventListener("click", () => openPicker(region, i));
            } else if (team && window.openRosterModal) {
              slot.style.cursor = "pointer";
              slot.addEventListener("click", () => {
                const logoHTML = `<img src="${team.logo}" alt="${team.name}" ${team.white ? 'style="filter:brightness(0) invert(1)"' : ''} />`;
                window.openRosterModal(team.name, logoHTML);
              });
            }
            container.appendChild(slot);
          }
        });
      }

      /* ── 팀 선택 모달 ───────────────────────────────────── */
      let _ctx = null, _activeTab = "pacific", _selected = "";

      function openPicker(region, seedIdx) {
        _ctx = { region, seedIdx };
        _activeTab = REGIONS.includes(region) ? region : "pacific";
        const data = load();
        _selected = (data[region] || [])[seedIdx] || "";
        document.getElementById("ts-title").textContent = "팀 선택";
        document.getElementById("ts-subtitle").textContent =
          region === "champion"
            ? "EWC 2025 챔피언 팀을 선택하세요."
            : `${REGION_LABELS[region]} ${seedIdx + 1}시드 팀을 선택하세요.`;
        renderTabs();
        renderTeamGrid();
        renderActions();
        document.getElementById("ts-modal").hidden = false;
      }

      function renderTabs() {
        const container = document.getElementById("ts-region-tabs");
        container.innerHTML = REGIONS.map(r =>
          `<button class="ts-region-tab${r === _activeTab ? " active" : ""}" data-r="${r}">${REGION_LABELS[r]}</button>`
        ).join("");
        container.querySelectorAll(".ts-region-tab").forEach(btn => {
          btn.addEventListener("click", () => {
            _activeTab = btn.dataset.r;
            renderTabs();
            renderTeamGrid();
          });
        });
      }

      function renderTeamGrid() {
        const data = load();
        const usedByOthers = new Set();
        ["champion", ...REGIONS].forEach(r => {
          (data[r] || []).forEach((name, idx) => {
            if (name && !(r === _ctx.region && idx === _ctx.seedIdx)) {
              usedByOthers.add(name);
            }
          });
        });
        const grid = document.getElementById("ts-team-grid");
        grid.innerHTML = ALL_TEAMS[_activeTab].map(t => {
          const isSelected = t.name === _selected;
          const isUsed = usedByOthers.has(t.name);
          return `<button class="ts-team-btn${isSelected ? " selected" : ""}" data-name="${t.name}" ${isUsed ? 'style="opacity:0.3;pointer-events:none;"' : ""}>
            <img src="${t.logo}" alt="${t.name}" ${t.white ? 'style="filter:brightness(0) invert(1)"' : ''} />
            <span class="ts-code">${t.code}</span>
            <span>${t.name}</span>
          </button>`;
        }).join("");
        grid.querySelectorAll(".ts-team-btn").forEach(btn => {
          btn.addEventListener("click", () => {
            _selected = btn.dataset.name === _selected ? "" : btn.dataset.name;
            renderTeamGrid();
            document.getElementById("ts-save-btn").disabled = !_selected;
          });
        });
      }

      function renderActions() {
        document.getElementById("ts-actions").innerHTML = `
          <button class="ts-btn ts-btn-clear" id="ts-clear-btn">비우기</button>
          <button class="ts-btn ts-btn-cancel" id="ts-cancel-btn">취소</button>
          <button class="ts-btn ts-btn-save" id="ts-save-btn" ${_selected ? "" : "disabled"}>저장</button>
        `;
        document.getElementById("ts-cancel-btn").addEventListener("click", closeModal);
        document.getElementById("ts-clear-btn").addEventListener("click", () => {
          const data = load();
          if (!data[_ctx.region]) data[_ctx.region] = [];
          data[_ctx.region][_ctx.seedIdx] = "";
          save(data); closeModal(); renderSlots();
        });
        document.getElementById("ts-save-btn").addEventListener("click", () => {
          if (!_selected) return;
          const data = load();
          if (!data[_ctx.region]) data[_ctx.region] = [];
          data[_ctx.region][_ctx.seedIdx] = _selected;
          save(data); closeModal(); renderSlots();
        });
      }

      function closeModal() {
        document.getElementById("ts-modal").hidden = true;
        _ctx = null; _selected = "";
      }

      document.getElementById("ts-backdrop").addEventListener("click", closeModal);
      document.addEventListener("keydown", e => {
        if (e.key === "Escape" && !document.getElementById("ts-modal").hidden) closeModal();
      });

      renderSlots();
    });
    </script>

    <script src="./roster-modal.js" defer></script>
    <script src="./help.js" defer></script>
