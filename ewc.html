<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Esports World Cup 2025</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&family=Noto+Sans+KR:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root { --acc: #c9a84c; }

      body {
        background: #0d1520;
        color: #e8e4e0;
        font-family: 'Barlow', 'Noto Sans KR', sans-serif;
        min-height: 100vh;
      }

      /* ── HEADER ─────────────────────────────── */
      .site-header {
        display: flex;
        align-items: center;
        gap: 20px;
        padding: 0 32px;
        height: 56px;
        background: rgba(13,21,32,0.9);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        position: sticky;
        top: 0;
        z-index: 100;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .home-link {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.55);
        text-decoration: none;
        transition: color 0.15s;
      }
      .home-link:hover { color: #fff; }
      .home-link::after { content: " /"; margin-left: 4px; color: rgba(255,255,255,.18); font-weight: 400; }
      .back-link {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.4);
        text-decoration: none;
        transition: color 0.15s;
      }
      .back-link:hover { color: rgba(255,255,255,0.8); }

      /* ── HERO ───────────────────────────────── */
      .league-hero {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 32px;
        padding: 72px 0 80px;
        max-width: 1080px;
        margin: 0 auto;
        padding-left: 48px;
        padding-right: 48px;
        overflow: hidden;
      }
      .league-hero::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse 60% 80% at 80% 50%, rgba(201,168,76,0.12) 0%, transparent 70%);
        pointer-events: none;
      }
      .hero-text { position: relative; z-index: 1; }
      .eyebrow {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--acc);
        margin-bottom: 10px;
      }
      .league-hero h1 {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: clamp(38px, 6vw, 72px);
        font-weight: 900;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        line-height: 0.95;
        color: #fff;
        margin-bottom: 20px;
      }
      .league-hero .intro {
        font-size: 14px;
        line-height: 1.8;
        color: rgba(255,255,255,0.45);
        max-width: 420px;
        font-family: 'Noto Sans KR', sans-serif;
        font-weight: 500;
        word-break: keep-all;
      }
      .league-mark {
        flex-shrink: 0;
        position: relative;
        z-index: 1;
        padding: 16px;
      }
      .league-mark img {
        width: clamp(120px, 18vw, 200px);
        height: clamp(120px, 18vw, 200px);
        object-fit: contain;
        filter: brightness(0) invert(1) drop-shadow(0 4px 24px rgba(255,255,255,0.15));
      }

      /* ── SHELL ──────────────────────────────── */
      .league-shell {
        max-width: 1080px;
        margin: 0 auto;
        padding: 0 48px 80px;
      }
      .section-divider {
        height: 1px;
        background: rgba(255,255,255,0.06);
        margin: 0 0 56px;
      }
      .section-heading {
        margin-bottom: 24px;
        border-left: 3px solid var(--acc);
        padding-left: 16px;
      }
      .section-heading .eyebrow { margin-bottom: 4px; }
      .section-heading h2 {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 28px;
        font-weight: 900;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #fff;
      }

      /* ── TOURNAMENT GRID ─────────────────────── */
      .tournament-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }
      @media (max-width: 560px) {
        .tournament-grid { grid-template-columns: 1fr; }
      }
      .tournament-card {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 32px 28px;
        background: #111a28;
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 4px;
        text-decoration: none;
        color: #e8e4e0;
        position: relative;
        overflow: hidden;
        transition: border-color 0.2s, transform 0.18s, background 0.2s;
        cursor: pointer;
      }
      .tournament-card::before {
        content: '';
        position: absolute;
        inset: 0 0 0 0;
        border-bottom: 2px solid var(--acc);
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.25s ease;
      }
      .tournament-card:hover {
        border-color: rgba(201,168,76,0.35);
        background: #152030;
        transform: translateY(-2px);
      }
      .tournament-card:hover::before { transform: scaleX(1); }
      .tournament-kicker {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(201,168,76,0.75);
      }
      .tournament-card strong {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 32px;
        font-weight: 900;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #fff;
        line-height: 1;
      }
      .tournament-card > span:last-child {
        font-size: 12px;
        color: rgba(255,255,255,0.35);
        font-family: 'Barlow', sans-serif;
        margin-top: 4px;
      }
    </style>

    <script src="./auth.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="home-link" href="./index.html">VCT Archive</a>
      <a class="back-link" href="./index.html">홈으로</a>
    </header>

    <div style="max-width:1080px;margin:0 auto;padding:0 48px;">
      <section class="league-hero" style="padding-left:0;padding-right:0;" aria-labelledby="league-title">
        <div class="hero-text">
          <p class="eyebrow">이벤트 경기</p>
          <h1 id="league-title">Esports<br>World Cup</h1>
          <p class="intro">
            2025 Esports World Cup Valorant의<br>
            그룹 스테이지와 플레이오프 결과를 정리하는 페이지입니다.
          </p>
        </div>
        <div class="league-mark">
          <img src="./assets/EWC.svg" alt="Esports World Cup" />
        </div>
      </section>
    </div>

    <main class="league-shell">
      <div class="section-divider"></div>

      <section aria-labelledby="stage-title">
        <div class="section-heading">
          <p class="eyebrow">Stages</p>
          <h2 id="stage-title">대회 선택</h2>
        </div>

        <div class="tournament-grid">
          <a class="tournament-card" href="./ewc-groups.html">
            <span class="tournament-kicker">EWC 2025</span>
            <strong>그룹 스테이지</strong>
            <span>Group Stage</span>
          </a>
          <a class="tournament-card" href="./ewc-playoff.html">
            <span class="tournament-kicker">EWC 2025</span>
            <strong>플레이오프</strong>
            <span>Playoff</span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
