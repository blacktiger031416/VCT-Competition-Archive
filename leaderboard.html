<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VCT 2026 — Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,600;0,700;0,800;0,900;1,900&family=Noto+Sans+KR:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #0a0a0c;
      color: #fff;
      font-family: 'Barlow Condensed', 'Noto Sans KR', sans-serif;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }

    /* ── Header ── */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; 
      padding: 0 24px; height: 52px;
      background: rgba(10,10,12,0.92);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(12px);
    }
    .home-link {
      font-size: 14px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
      color: rgba(255,255,255,0.9);
    }
    .back-link {
      font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.5); letter-spacing: .06em;
    }
      .site-header .home-link::after { content: " /"; margin-left: 4px; color: rgba(255,255,255,.18); font-weight: 400; }
    .back-link:hover { color: #fff; }

    /* ── Page shell ── */
    .lb-shell {
      max-width: 1100px; margin: 0 auto;
      padding: 44px 24px 80px;
    }
    .lb-eyebrow {
      font-size: 11px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase;
      color: rgba(255,255,255,0.35); margin-bottom: 8px;
    }
    .lb-title {
      font-size: clamp(40px, 5vw, 60px); font-weight: 900; letter-spacing: .01em;
      text-transform: uppercase; color: #fff; line-height: 1;
      margin-bottom: 36px;
    }

    /* ── Event Group Tabs ── */
    .group-row {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px;
    }
    .group-tab {
      --gc: #888;
      padding: 8px 18px; border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(255,255,255,0.03);
      font: 800 12px/1 'Barlow Condensed', sans-serif;
      letter-spacing: .1em; text-transform: uppercase;
      color: rgba(255,255,255,0.4); cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; gap: 7px;
    }
    .group-tab:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.75); }
    .group-tab.active {
      background: color-mix(in srgb, var(--gc) 14%, transparent);
      border-color: color-mix(in srgb, var(--gc) 50%, transparent);
      color: var(--gc);
    }
    .group-tab .g-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--gc); opacity: 0.7;
      flex-shrink: 0;
    }
    .group-tab.active .g-dot { opacity: 1; }

    /* ── Stage Tabs ── */
    .stage-row {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px;
    }
    .stage-tab {
      padding: 6px 16px; border-radius: 4px;
      border: 1px solid transparent;
      background: rgba(255,255,255,0.04);
      font: 700 11px/1 'Barlow Condensed', sans-serif;
      letter-spacing: .1em; text-transform: uppercase;
      color: rgba(255,255,255,0.35); cursor: pointer;
      transition: all 0.15s;
    }
    .stage-tab:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); }
    .stage-tab.active {
      border-color: var(--accent, #888);
      color: var(--accent, #888);
      background: color-mix(in srgb, var(--accent, #888) 12%, transparent);
    }

    /* ── Leaderboard columns ── */
    .lb-columns {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
    }
    @media (max-width: 680px) { .lb-columns { grid-template-columns: 1fr; } }

    /* ── Panel ── */
    .lb-panel {
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px; overflow: hidden;
    }
    .lb-panel-header {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 16px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .ph-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent, #888); flex-shrink: 0;
    }
    .ph-title {
      font-size: 13px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
      color: rgba(255,255,255,0.8);
    }
    .ph-meta {
      margin-left: auto;
      font-size: 11px; font-weight: 700; letter-spacing: .06em;
      color: rgba(255,255,255,0.25); text-transform: uppercase;
    }

    /* ── Rows ── */
    .lb-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.1s;
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-row:hover { background: rgba(255,255,255,0.025); }

    .lb-rank {
      min-width: 20px; text-align: center;
      font-size: 13px; font-weight: 800;
      color: rgba(255,255,255,0.25); flex-shrink: 0;
    }
    .lb-rank.r1 { color: #e8b840; font-size: 14px; }
    .lb-rank.r2 { color: #a8a8c0; }
    .lb-rank.r3 { color: #b87333; }

    .lb-logo {
      width: 26px; height: 26px; object-fit: contain; flex-shrink: 0;
    }
    .lb-logo.invert { filter: brightness(0) invert(1); }
    .lb-logo-ph {
      width: 26px; height: 26px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 800; color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.06); border-radius: 4px; letter-spacing: .04em;
    }

    .lb-info { flex: 1; min-width: 0; }
    .lb-player {
      font-size: 15px; font-weight: 800; letter-spacing: .02em;
      color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .lb-team {
      font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
      color: rgba(255,255,255,0.28); margin-top: 1px;
    }

    .lb-maps {
      font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.28);
      text-align: right; white-space: nowrap; flex-shrink: 0;
      line-height: 1.2;
    }
    .lb-maps small { display: block; font-size: 9px; letter-spacing: .07em; text-transform: uppercase; }

    .lb-val {
      min-width: 64px; text-align: center;
      padding: 7px 10px; border-radius: 6px;
      background: var(--accent, #888);
      font-size: 20px; font-weight: 900; letter-spacing: .01em;
      flex-shrink: 0; line-height: 1;
    }
    .lb-val.dark-text { color: #0a0a0c; }
    .lb-val.light-text { color: rgba(255,255,255,0.95); }
    .lb-row:first-child .lb-val { font-size: 22px; }

    /* ── Empty / Placeholder ── */
    .lb-empty {
      padding: 36px 16px; text-align: center;
      color: rgba(255,255,255,0.2);
      font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
    }
    .lb-placeholder {
      grid-column: 1 / -1;
      padding: 60px 24px; text-align: center;
    }
    .lb-placeholder p {
      color: rgba(255,255,255,0.25);
      font-size: 14px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
    }

    /* ── Accent var for stage tabs ── */
    #stage-row { --accent: #888; }

    var s = m.stage || "";
    if (stageFilter === "kickoff") return s === "kickoff";
    if (stageFilter === "stage1")  return s === "stage1"  || s === "stage1playoffs";
    if (stageFilter === "stage2")  return s === "stage2"  || s === "stage2playoffs";
    if (stageFilter === "swiss")   return s === "swiss";
    if (stageFilter === "playoffs") return s === "playoffs";
    return s === stageFilter;
  }

  /* ── vct_roster에서 선수→팀 맵 ── */
  var _STAGE_WORDS = [
    "swiss","playoffs","kickoff","stage1","stage2",
    "stage1playoffs","stage2playoffs","santiago","london","all"
  ];
  function buildPlayerTeamMap() {
    var map = {};

    /* 1. vct_roster: 키 */
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (!k || !k.startsWith("vct_roster:")) continue;
      var team = k.slice(11);
      try {
        var r = JSON.parse(localStorage.getItem(k) || "{}");
        var players = (r.main || []).concat(r.subs || []);
        players.forEach(function (p) { if (p) map[p] = team; });
      } catch (e) {}
    }

    /* 2. vct_p matchKey "날짜|팀A|팀B" 에서 자동 추론 */
    for (var j = 0; j < localStorage.length; j++) {
      var vk = localStorage.key(j);
      if (!vk || !vk.startsWith("vct_p:")) continue;
      var pName = vk.slice(6);
      if (map[pName]) continue;
      var pd;
      try { pd = JSON.parse(localStorage.getItem(vk) || "{}"); } catch (e) { continue; }
      if (!pd.maps) continue;
      for (var mi = 0; mi < pd.maps.length; mi++) {
        var m = pd.maps[mi];
        if (!m.matchKey) continue;
        var parts = m.matchKey.split("|");
        if (parts.length < 3) continue;
        if (_STAGE_WORDS.indexOf(parts[0].toLowerCase()) !== -1) continue;
        if (_STAGE_WORDS.indexOf(parts[1].toLowerCase()) !== -1) continue;
        var playersRaw = localStorage.getItem("players:" + m.matchKey + ":" + (m.mapIdx || 0));
        if (!playersRaw) continue;
        var pData;
        try { pData = JSON.parse(playersRaw); } catch (e) { continue; }
        var pnLower = pName.toLowerCase();
        var side = null;
        for (var si = 0; si < 5 && side === null; si++) {
          var slotA = pData["a" + si], slotB = pData["b" + si];
          if (slotA && (slotA.name || "").toLowerCase() === pnLower) side = "a";
          if (slotB && (slotB.name || "").toLowerCase() === pnLower) side = "b";
        }
        if (side === "a" && parts[1]) { map[pName] = parts[1]; break; }
        if (side === "b" && parts[2]) { map[pName] = parts[2]; break; }
      }
    }

    return map;
  }

  /* ── 리더보드 집계 ── */
  function buildLeaderboard(league, stageFilter, playerTeamMap) {
    var pMap = {};

    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (!k || !k.startsWith("vct_p:")) continue;
      var pName = k.slice(6);
      var pdRaw = localStorage.getItem(k);
      if (!pdRaw) continue;
      var pd;
      try { pd = JSON.parse(pdRaw); } catch (e) { continue; }
      if (!pd.maps) continue;

      pd.maps.forEach(function (m) {
        if (!matchesLeague(m, league)) return;
        if (!matchesStage(m, stageFilter)) return;

        var acs = parseFloat(m.acs) || 0;
        var hasKda = m.kda && m.kda.indexOf("/") !== -1;

        if (!acs && !hasKda) return;

        if (!pMap[pName]) {
          pMap[pName] = {
            name: pName,
            team: playerTeamMap[pName] || "",
            acsMaps: 0, totalAcs: 0,
            totalK: 0, totalD: 0, kdMaps: 0,
          };
        }
        var e = pMap[pName];
        if (acs > 0) { e.acsMaps++; e.totalAcs += acs; }
        if (hasKda) {
          var pts = m.kda.split("/");
          e.totalK += parseFloat(pts[0]) || 0;
          e.totalD += parseFloat(pts[1]) || 0;
          e.kdMaps++;
        }
      });
    }

    var players = Object.values(pMap);

    /* ACS Top 10 */
    var acsList = players
      .filter(function (e) { return e.acsMaps > 0; })
      .map(function (e) {
        return {
          name: e.name, team: e.team,
          maps: e.acsMaps,
          val: Math.round(e.totalAcs / e.acsMaps),
        };
      })
      .sort(function (a, b) { return b.val - a.val; })
      .slice(0, 10);

    /* KD Top 10 */
    var kdList = players
      .filter(function (e) { return e.kdMaps > 0; })
      .map(function (e) {
        var d = e.totalD > 0 ? e.totalD : 0.5;
        return {
          name: e.name, team: e.team,
          maps: e.kdMaps,
          val: parseFloat((e.totalK / d).toFixed(2)),
        };
      })
      .sort(function (a, b) { return b.val - a.val; })
      .slice(0, 10);

    return { acs: acsList, kd: kdList };
  }

  /* ── 유틸 ── */
  function esc(s) {
    return String(s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  function logoHtml(team) {
    var src = TL[team];
    if (!src) {
      var code = TC[team] || (team || "?").slice(0, 3).toUpperCase();
      return '<div class="lb-logo-ph">' + esc(code) + '</div>';
    }
    var inv = LOGO_INVERT[team] ? " invert" : "";
    return '<img class="lb-logo' + inv + '" src="' + esc(src) + '" alt="' + esc(team) + '" onerror="this.style.display=\'none\'" />';
  }

  /* ── 패널 렌더 ── */
  function renderPanel(panelEl, title, entries, accent, lightText) {
    var textCls = lightText ? "light-text" : "dark-text";
    var headerHtml =
      '<div class="lb-panel-header">' +
      '<div class="ph-dot"></div>' +
      '<span class="ph-title">' + esc(title) + '</span>' +
      '<span class="ph-meta">' + entries.length + ' / 10</span>' +
      '</div>';

    var bodyHtml = "";
    if (!entries.length) {
      bodyHtml = '<div class="lb-empty">기록 없음</div>';
    } else {
      bodyHtml = entries.map(function (e, i) {
        var rankCls = i === 0 ? " r1" : i === 1 ? " r2" : i === 2 ? " r3" : "";
        var teamCode = TC[e.team] || (e.team || "").slice(0, 4).toUpperCase() || "";
        return (
          '<div class="lb-row">' +
          '<span class="lb-rank' + rankCls + '">' + (i + 1) + '</span>' +
          logoHtml(e.team) +
          '<div class="lb-info">' +
          '<div class="lb-player">' + esc(e.name) + '</div>' +
          (teamCode ? '<div class="lb-team">' + esc(teamCode) + '</div>' : '') +
          '</div>' +
          '<div class="lb-maps">' + e.maps + '<small>Maps</small></div>' +
          '<div class="lb-val ' + textCls + '">' + e.val + '</div>' +
          '</div>'
        );
      }).join("");
    }

    panelEl.style.setProperty("--accent", accent);
    panelEl.innerHTML = headerHtml + bodyHtml;
  }

  /* ── 메인 렌더 ── */
  function renderLeaderboard() {
    if (!curGroup) return;
    var stage = curGroup.stages[curStageIdx] || curGroup.stages[0];
    var playerTeamMap = buildPlayerTeamMap();
    var data = buildLeaderboard(stage.league, stage.stageFilter, playerTeamMap);
    var accent = curGroup.accent;
    var lightText = curGroup.lightText;
    var colsEl = document.getElementById("lb-columns");
    colsEl.innerHTML =
      '<div class="lb-panel" id="panel-acs"></div>' +
      '<div class="lb-panel" id="panel-kd"></div>';
    renderPanel(document.getElementById("panel-acs"), "ACS Top 10", data.acs, accent, lightText);
    renderPanel(document.getElementById("panel-kd"),  "K/D Top 10", data.kd,  accent, lightText);
  }

  /* ── 스테이지 탭 렌더 ── */
  function renderStageTabs() {
    var row = document.getElementById("stage-row");
    if (!curGroup) { row.style.display = "none"; return; }
    /* 스테이지가 하나("all")뿐이면 탭 숨김 */
    if (curGroup.stages.length === 1 && curGroup.stages[0].id === "all") {
      row.style.display = "none";
      return;
    }
    row.style.display = "flex";
    row.style.setProperty("--accent", curGroup.accent);
    row.innerHTML = curGroup.stages.map(function (s, i) {
      return '<button class="stage-tab' + (i === curStageIdx ? " active" : "") +
        '" data-sidx="' + i + '">' + esc(s.label) + '</button>';
    }).join("");
    row.querySelectorAll(".stage-tab").forEach(function (btn) {
      btn.addEventListener("click", function () {
        curStageIdx = parseInt(this.dataset.sidx) || 0;
        renderStageTabs();
        renderLeaderboard();
      });
    });
  }

  /* ── 그룹 탭 렌더 ── */
  function renderGroupTabs() {
    var row = document.getElementById("group-row");
    row.innerHTML = GROUPS.map(function (g) {
      var isActive = curGroup && curGroup.id === g.id;
      return '<button class="group-tab' + (isActive ? " active" : "") +
        '" data-gid="' + g.id + '" style="--gc:' + g.accent + '">' +
        '<span class="g-dot"></span>' +
        esc(g.label) +
        '</button>';
    }).join("");
    row.querySelectorAll(".group-tab").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var gid = this.dataset.gid;
        var g = GROUPS.find(function (x) { return x.id === gid; });
        if (!g) return;
        if (curGroup && curGroup.id === gid) return; /* 같은 그룹 재클릭 무시 */
        curGroup = g;
        curStageIdx = 0;
        renderGroupTabs();
        renderStageTabs();
        renderLeaderboard();
      });
    });
  }

  /* ── 초기화 ── */
  (window.storageReady || Promise.resolve()).then(function () {
    renderGroupTabs();
  });

})();
</script>
