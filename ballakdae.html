<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2026 발락대</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&family=Noto+Sans+KR:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --acc: #e8432d;      /* 발락대 레드 */
        --acc2: #15b8a6;     /* 발락대 민트 */
        --bg: #ffffff;
        --bg2: #f4f4f4;
        --text: #111111;
        --text-sub: #555555;
        --border: rgba(0,0,0,0.08);
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Barlow', 'Noto Sans KR', sans-serif;
        min-height: 100vh;
      }

      /* ── HEADER ─────────────────────────────── */
      .site-header {
        display: flex;
        align-items: center;
        gap: 20px;
        padding: 0 32px;
        height: 56px;
        background: rgba(255,255,255,0.92);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 100;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .home-link {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(0,0,0,0.45);
        text-decoration: none;
        transition: color 0.15s;
      }
      .home-link:hover { color: #111; }
      .home-link::after { content: " /"; margin-left: 4px; color: rgba(0,0,0,0.18); font-weight: 400; }
      .back-link {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(0,0,0,0.35);
        text-decoration: none;
        transition: color 0.15s;
      }
      .back-link:hover { color: #111; }

      /* ── HERO ───────────────────────────────── */
      .league-hero {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 32px;
        padding: 72px 0 80px;
        max-width: 1080px;
        margin: 0 auto;
        padding-left: 48px;
        padding-right: 48px;
        overflow: hidden;
      }
      .league-hero::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse 55% 70% at 85% 50%, rgba(21,184,166,0.10) 0%, transparent 65%);
        pointer-events: none;
      }
      .hero-text { position: relative; z-index: 1; }
      .eyebrow {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--acc);
        margin-bottom: 10px;
      }
      .league-hero h1 {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: clamp(42px, 7vw, 80px);
        font-weight: 900;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        line-height: 0.95;
        color: var(--text);
        margin-bottom: 20px;
      }
      .league-hero .intro {
        font-size: 14px;
        line-height: 1.8;
        color: var(--text-sub);
        max-width: 420px;
        font-family: 'Noto Sans KR', sans-serif;
        font-weight: 500;
        word-break: keep-all;
      }
      .league-mark {
        flex-shrink: 0;
        position: relative;
        z-index: 1;
        padding: 16px;
      }
      .league-mark img {
        width: clamp(160px, 22vw, 280px);
        height: clamp(160px, 22vw, 280px);
        object-fit: contain;
        filter: drop-shadow(0 4px 24px rgba(0,0,0,0.12));
      }

      /* ── SHELL ──────────────────────────────── */
      .league-shell {
        max-width: 1080px;
        margin: 0 auto;
        padding: 0 48px 80px;
      }
      .section-divider {
        height: 1px;
        background: var(--border);
        margin: 0 0 56px;
      }
      .section-heading {
        margin-bottom: 24px;
        border-left: 3px solid var(--acc2);
        padding-left: 16px;
      }
      .section-heading .eyebrow {
        color: var(--acc2);
        margin-bottom: 4px;
      }
      .section-heading h2 {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 28px;
        font-weight: 900;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--text);
      }

      /* ── auth.js 버튼 라이트 테마 오버라이드 ── */
      .auth-header-btn,
      .auth-refresh-btn,
      .help-trigger-btn,
      .suggest-trigger-btn {
        background: rgba(0,0,0,0.05) !important;
        border-color: rgba(0,0,0,0.15) !important;
        color: rgba(0,0,0,0.55) !important;
      }
      .auth-header-btn::before,
      .auth-refresh-btn::before { background: rgba(0,0,0,0.35) !important; }
      .auth-header-btn:hover,
      .auth-refresh-btn:hover,
      .help-trigger-btn:hover,
      .suggest-trigger-btn:hover {
        background: rgba(0,0,0,0.09) !important;
        border-color: rgba(0,0,0,0.28) !important;
        color: rgba(0,0,0,0.85) !important;
      }
      .auth-header-btn--on {
        background: rgba(30,210,100,0.12) !important;
        border-color: rgba(30,210,100,0.4) !important;
        color: #18a864 !important;
      }
      .auth-header-btn--on::before { background: #18a864 !important; }
      .auth-header-btn--user {
        background: rgba(80,140,255,0.1) !important;
        border-color: rgba(80,140,255,0.3) !important;
        color: #3670d0 !important;
      }
      .auth-header-btn--user::before { background: #3670d0 !important; }

      /* ── 선수 카드 그리드 ───────────────────── */
      .player-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
      }

      .player-card {
        background: #fff;
        border-radius: 18px;
        width: 170px;
        flex-shrink: 0;
        position: relative;
        box-shadow: 0 6px 24px rgba(0,0,0,0.10);
        overflow: hidden;
        transition: transform 0.18s, box-shadow 0.18s;
      }
      .player-card:hover { transform: translateY(-4px); box-shadow: 0 12px 36px rgba(0,0,0,0.15); }

      /* 좌상단 / 우하단 빨간 삼각형 */
      .player-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0;
        border-top: 36px solid var(--acc);
        border-right: 36px solid transparent;
        z-index: 3;
      }
      .player-card::after {
        content: '';
        position: absolute;
        bottom: 0; right: 0;
        border-bottom: 36px solid var(--acc);
        border-left: 36px solid transparent;
        z-index: 3;
      }

      /* Valorant V 아이콘 (좌상단 삼각 위) */
      .card-valo-icon {
        position: absolute;
        top: 5px; left: 6px;
        width: 18px; height: 18px;
        z-index: 4;
        filter: brightness(0) invert(1);
      }

      /* 티어 배지 */
      .card-tier {
        position: absolute;
        top: 12px;
        left: 50%; transform: translateX(-50%);
        background: linear-gradient(135deg, #c9920a, #f0c842, #c9920a);
        color: #3a2000;
        font-family: 'Noto Sans KR', sans-serif;
        font-size: 12px;
        font-weight: 900;
        padding: 4px 18px;
        border-radius: 20px;
        white-space: nowrap;
        z-index: 4;
        box-shadow: 0 2px 8px rgba(200,140,0,0.35);
      }
      .card-tier.tier-main {
        background: linear-gradient(135deg, #0e9e96, #2dd4ca, #0e9e96);
        color: #fff;
      }
      .card-tier.tier-rookie {
        background: linear-gradient(135deg, #6d28d9, #a78bfa, #6d28d9);
        color: #fff;
      }

      /* 사진 영역 */
      .card-photo {
        width: 100%;
        aspect-ratio: 3/4;
        object-fit: cover;
        object-position: top center;
        display: block;
        background: linear-gradient(160deg, #f0f0f0 0%, #e0e0e0 100%);
      }
      .card-photo-empty {
        width: 100%;
        aspect-ratio: 3/4;
        background: linear-gradient(160deg, #f4f4f6 0%, #e8e8ec 100%);
        display: flex; align-items: center; justify-content: center;
      }
      .card-photo-empty svg { opacity: 0.18; }

      /* 이름 */
      .card-name {
        text-align: center;
        font-family: 'Noto Sans KR', sans-serif;
        font-size: 20px;
        font-weight: 900;
        color: #111;
        padding: 10px 8px 4px;
        letter-spacing: -0.01em;
        line-height: 1.1;
      }

      /* Valorant 브이 마크 */
      .card-vmark {
        display: flex; justify-content: center;
        margin: 2px 0 6px;
      }
      .card-vmark svg { width: 20px; height: 20px; }

      /* 요원 슬롯 */
      .card-agents {
        display: flex;
        justify-content: center;
        gap: 7px;
        padding: 0 14px 16px;
      }
      .agent-slot {
        width: 38px; height: 38px;
        border-radius: 50%;
        overflow: hidden;
        border: 2.5px solid transparent;
        flex-shrink: 0;
        background: #f0f0f0;
        display: flex; align-items: center; justify-content: center;
      }
      .agent-slot:nth-child(1) { border-color: var(--acc); }
      .agent-slot:nth-child(2) { border-color: #f0c842; }
      .agent-slot:nth-child(3) { border-color: var(--acc2); }
      .agent-slot img { width: 100%; height: 100%; object-fit: cover; }
      .agent-slot-empty { width: 16px; height: 16px; opacity: 0.2; }

      /* 구분 소제목 */
      .player-subhead {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(0,0,0,0.3);
        margin: 0 0 14px;
      }
      .player-group { margin-bottom: 36px; }

      /* ── TBD 플레이스홀더 ───────────────────── */
      .tbd-block {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 48px 24px;
        background: var(--bg2);
        border: 1px dashed rgba(0,0,0,0.12);
        border-radius: 8px;
        margin-bottom: 56px;
      }
      .tbd-block .tbd-icon {
        font-size: 32px;
        opacity: 0.25;
      }
      .tbd-block p {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(0,0,0,0.25);
      }
    </style>

    <script src="./auth.js" defer></script>
  </head>
