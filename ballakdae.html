<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2026 발락대</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&family=Noto+Sans+KR:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root { --acc: #ff4ea0; }

      body {
        background: #0d1520;
        color: #e8e4e0;
        font-family: 'Barlow', 'Noto Sans KR', sans-serif;
        min-height: 100vh;
      }

      /* ── HEADER ─────────────────────────────── */
      .site-header {
        display: flex;
        align-items: center;
        gap: 20px;
        padding: 0 32px;
        height: 56px;
        background: rgba(13,21,32,0.9);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        position: sticky;
        top: 0;
        z-index: 100;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .home-link {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.55);
        text-decoration: none;
        transition: color 0.15s;
      }
      .home-link:hover { color: #fff; }
      .home-link::after { content: " /"; margin-left: 4px; color: rgba(255,255,255,.18); font-weight: 400; }
      .back-link {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.4);
        text-decoration: none;
        transition: color 0.15s;
      }
      .back-link:hover { color: rgba(255,255,255,0.8); }

      /* ── HERO ───────────────────────────────── */
      .league-hero {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 32px;
        padding: 72px 48px 80px;
        max-width: 1080px;
        margin: 0 auto;
        overflow: hidden;
      }
      .league-hero::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse 60% 80% at 80% 50%, rgba(255,78,160,0.10) 0%, transparent 70%);
        pointer-events: none;
      }
      .hero-text { position: relative; z-index: 1; }
      .eyebrow {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--acc);
        margin-bottom: 10px;
      }
      .league-hero h1 {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: clamp(42px, 7vw, 80px);
        font-weight: 900;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        line-height: 0.95;
        color: #fff;
        margin-bottom: 20px;
      }
      .league-hero .intro {
        font-size: 14px;
        line-height: 1.8;
        color: rgba(255,255,255,0.45);
        max-width: 420px;
        font-family: 'Noto Sans KR', sans-serif;
        font-weight: 500;
        word-break: keep-all;
      }
      .league-mark {
        flex-shrink: 0;
        position: relative;
        z-index: 1;
        padding: 16px;
      }
      .league-mark img {
        width: clamp(160px, 22vw, 260px);
        height: clamp(160px, 22vw, 260px);
        object-fit: contain;
        filter: drop-shadow(0 4px 32px rgba(255,78,160,0.18));
      }

      /* ── SHELL ──────────────────────────────── */
      .league-shell {
        max-width: 1080px;
        margin: 0 auto;
        padding: 0 32px 80px;
      }
      .section-divider {
        height: 1px;
        background: rgba(255,255,255,0.06);
        margin: 0 0 56px;
      }
      .section-heading {
        margin-bottom: 24px;
        border-left: 3px solid var(--acc);
        padding-left: 16px;
      }
      .section-heading .eyebrow { margin-bottom: 4px; }
      .section-heading h2 {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 28px;
        font-weight: 900;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #fff;
      }

      /* ── TBD 플레이스홀더 ───────────────────── */
      .tbd-block {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 48px 24px;
        background: rgba(255,255,255,0.03);
        border: 1px dashed rgba(255,255,255,0.1);
        border-radius: 8px;
        margin-bottom: 56px;
      }
      .tbd-block .tbd-icon {
        font-size: 32px;
        opacity: 0.3;
      }
      .tbd-block p {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.2);
      }
    </style>

    <script src="./auth.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="home-link" href="./index.html">VCT Archive</a>
      <a class="back-link" href="./index.html">홈으로</a>
    </header>

    <div style="max-width:1080px;margin:0 auto;padding:0 32px;">
      <section class="league-hero" aria-labelledby="league-title" style="padding:72px 0 80px;">
        <div class="hero-text">
          <p class="eyebrow">이벤트 경기</p>
          <h1 id="league-title">2026<br>발락대</h1>
          <p class="intro">
            한국 발로란트 유튜버 행돌과 선데이가 주최한<br>
            2026년 발로란트 대회 경기, 발락대 결과 페이지입니다.
          </p>
        </div>
        <div class="league-mark">
          <img src="./assets/발락대.png" alt="발락대" />
        </div>
      </section>
    </div>

    <main class="league-shell">
      <div class="section-divider"></div>

      <section aria-labelledby="teams-title" style="margin-bottom:56px;">
        <div class="section-heading">
          <p class="eyebrow">Teams</p>
          <h2 id="teams-title">2026 발락대 참가팀</h2>
        </div>
        <div class="tbd-block">
          <span class="tbd-icon">🏆</span>
          <p>참가팀 공개 예정</p>
        </div>
      </section>

      <section aria-labelledby="players-title" style="margin-bottom:56px;">
        <div class="section-heading">
          <p class="eyebrow">Players</p>
          <h2 id="players-title">2026 발락대 참가 선수</h2>
        </div>
        <div class="tbd-block">
          <span class="tbd-icon">🎮</span>
          <p>참가 선수 공개 예정</p>
        </div>
      </section>

      <section aria-labelledby="format-title">
        <div class="section-heading">
          <p class="eyebrow">Format</p>
          <h2 id="format-title">대회 진행 방식</h2>
        </div>
        <div class="tbd-block">
          <span class="tbd-icon">📋</span>
          <p>대회 진행 방식 공개 예정</p>
        </div>
      </section>
    </main>
  </body>
</html>
