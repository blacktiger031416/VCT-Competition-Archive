<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VCT Masters 2026 London</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&family=Barlow+Condensed:wght@600;700;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0c0818; color: #f0ecff; font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; }

      /* ── HEADER ── */
      .site-header { display: flex; align-items: center; gap: 20px; padding: 0 32px; height: 56px; background: rgba(12,8,24,0.95); border-bottom: 1px solid rgba(101,30,255,0.15); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
      .home-link { font-size: 15px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.55); text-decoration: none; transition: color 0.15s; }
      .home-link:hover { color: #fff; }
      .back-link { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #651eff; text-decoration: none; border: 1.5px solid rgba(101,30,255,0.4); border-radius: 99px; padding: 4px 14px; margin-left: auto; transition: background 0.15s; }
      .back-link:hover { background: rgba(101,30,255,0.15); }
      .site-header .auth-header-btn { margin-left: 0 !important; }

      /* ── SHELL ── */
      .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: #651eff; margin-bottom: 8px; }
      .league-shell { max-width: 1280px; margin: 0 auto; padding: 0 40px 80px; }
      .stage-shell { max-width: 1280px; margin: 0 auto; padding: 0 40px 80px; }
      @media (max-width: 600px) { .league-shell, .stage-shell { padding: 0 16px 60px; } }

      /* ── STAGE HERO ── */
      .stage-hero { display: grid; grid-template-columns: minmax(0,1fr) minmax(240px,340px); gap: 32px; align-items: center; padding: 52px 0 48px; }
      @media (max-width: 680px) { .stage-hero { grid-template-columns: 1fr; } }
      .stage-hero h1 { font-size: clamp(36px,5vw,68px); font-weight: 900; line-height: 1.06; color: #fff; margin: 0 0 14px; letter-spacing: -0.02em; }
      .intro { font-size: 15px; line-height: 1.7; color: rgba(240,236,255,0.6); max-width: 520px; }
      .stage-summary { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; }
      .stage-summary div { background: rgba(101,30,255,0.1); border: 1.5px solid rgba(101,30,255,0.28); border-radius: 14px; padding: 22px 16px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
      .stage-summary strong { font-size: 42px; font-weight: 900; color: #fff; line-height: 1; }
      .stage-summary span { font-size: 12px; color: rgba(240,236,255,0.5); margin-top: 4px; }

      /* ── SECTION HEADING ── */
      .section-heading { margin-bottom: 20px; }
      .section-heading h2 { font-size: 26px; font-weight: 900; color: #fff; }

      /* ── TOURNAMENT GRID ── */
      .tournament-section { padding: 0 0 48px; }
      .tournament-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 16px; }
      .tournament-card { display: flex; flex-direction: column; gap: 6px; padding: 28px 24px; border-radius: 16px; border: 1.5px solid rgba(101,30,255,0.2); background: rgba(101,30,255,0.07); text-decoration: none; color: inherit; transition: border-color 0.15s, background 0.15s, transform 0.15s; }
      .tournament-card:hover { border-color: rgba(101,30,255,0.55); background: rgba(101,30,255,0.14); transform: translateY(-2px); }
      .tournament-kicker { font-size: 11px; font-weight: 700; color: rgba(240,236,255,0.45); text-transform: uppercase; letter-spacing: 0.1em; }
      .tournament-card strong { font-size: 22px; font-weight: 900; color: #fff; }
      .tournament-card > span:last-child { font-size: 13px; color: rgba(240,236,255,0.45); }

      /* ── 참가팀 배정 섹션 ── */
      .participants-section { padding: 0 0 80px; max-width: 100%; }
      .participants-section .section-heading { margin-bottom: 24px; }
      .participants-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 20px; }
      @media (max-width: 660px) { .participants-grid { grid-template-columns: 1fr; } }

      .region-card { background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; }
      .region-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid rgba(255,255,255,0.08); }
      .region-header img { width: 36px; height: 36px; object-fit: contain; }
      .region-header h3 { font-size: 15px; font-weight: 900; margin: 0; letter-spacing: 0.02em; color: #fff; }
      .region-accent-dot { width: 8px; height: 8px; border-radius: 50%; margin-left: auto; flex-shrink: 0; }

      .region-card.pacific  { border-color: rgba(1,210,215,0.3);  background: rgba(1,210,215,0.05); }
      .region-card.americas { border-color: rgba(255,87,12,0.3);  background: rgba(255,87,12,0.05); }
      .region-card.cn       { border-color: rgba(251,38,89,0.3);  background: rgba(251,38,89,0.05); }
      .region-card.emea     { border-color: rgba(212,255,31,0.3); background: rgba(212,255,31,0.04); }
      .region-card.pacific  .region-header { border-color: rgba(1,210,215,0.15); }
      .region-card.americas .region-header { border-color: rgba(255,87,12,0.15); }
      .region-card.cn       .region-header { border-color: rgba(251,38,89,0.15); }
      .region-card.emea     .region-header { border-color: rgba(212,255,31,0.15); }
      .region-card.pacific  .region-accent-dot { background: #01d2d7; }
      .region-card.americas .region-accent-dot { background: #ff570c; }
      .region-card.cn       .region-accent-dot { background: #fb2659; }
      .region-card.emea     .region-accent-dot { background: #d4ff1f; }

      .seed-slots { display: flex; flex-direction: column; gap: 8px; }
      .seed-slot { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.1); min-height: 54px; transition: background 0.14s, border-color 0.14s; }
      .seed-slot.has-team { background: rgba(101,30,255,0.1); border-color: rgba(101,30,255,0.35); }
      .seed-slot .slot-logo { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
      .seed-slot .slot-logo img { width: 38px; height: 38px; object-fit: contain; }
      .seed-slot .slot-info { flex: 1; min-width: 0; }
      .seed-slot .slot-seed { font-size: 10px; font-weight: 700; opacity: 0.45; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
      .seed-slot .slot-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #f0ecff; }
      .seed-slot.empty .slot-name { opacity: 0.3; font-weight: 500; }
      body:not(.view-only) .seed-slot { cursor: pointer; }
      body:not(.view-only) .seed-slot:hover { background: rgba(101,30,255,0.16); border-color: rgba(101,30,255,0.55); }

      /* ── 팀 선택 모달 ── */
      .ts-modal { position: fixed; inset: 0; z-index: 9800; display: flex; align-items: center; justify-content: center; }
      .ts-modal[hidden] { display: none !important; }
      .ts-backdrop { position: absolute; inset: 0; background: rgba(5,5,5,0.65); backdrop-filter: blur(6px); }
      .ts-panel { position: relative; z-index: 1; width: min(560px,calc(100vw - 24px)); max-height: 88vh; overflow-y: auto; background: #0d0819; border: 1.5px solid rgba(101,30,255,0.35); border-radius: 18px; padding: 24px; }
      .ts-panel h2 { font-size: 16px; font-weight: 700; margin: 0 0 4px; color: #fff; }
      .ts-panel p  { font-size: 13px; opacity: 0.5; margin: 0 0 18px; }
      .ts-region-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
      .ts-region-tab { padding: 5px 14px; border-radius: 999px; font-size: 12px; font-weight: 700; cursor: pointer; border: 1.5px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6); transition: all 0.13s; font-family: inherit; }
      .ts-region-tab:hover { background: rgba(255,255,255,0.12); color: #fff; }
      .ts-region-tab.active { border-color: #651eff; background: rgba(101,30,255,0.22); color: #fff; }
      .ts-region-tab[data-r="pacific"].active  { border-color: #01d2d7; background: rgba(1,210,215,0.2); }
      .ts-region-tab[data-r="americas"].active { border-color: #ff570c; background: rgba(255,87,12,0.2); }
      .ts-region-tab[data-r="cn"].active       { border-color: #fb2659; background: rgba(251,38,89,0.2); }
      .ts-region-tab[data-r="emea"].active     { border-color: #d4ff1f; background: rgba(212,255,31,0.2); color: #000; }
      .ts-team-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 18px; }
      @media (max-width: 400px) { .ts-team-grid { grid-template-columns: repeat(2,1fr); } }
      .ts-team-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 10px 6px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.1); color: #fff; font-family: inherit; cursor: pointer; transition: all 0.13s; font-size: 10px; font-weight: 700; text-align: center; }
      .ts-team-btn img { width: 30px; height: 30px; object-fit: contain; }
      .ts-team-btn .ts-code { font-size: 12px; font-weight: 900; }
      .ts-team-btn:hover { background: rgba(101,30,255,0.18); border-color: rgba(101,30,255,0.6); }
      .ts-team-btn.selected { background: rgba(101,30,255,0.32); border-color: #651eff; box-shadow: 0 0 0 2px rgba(101,30,255,0.3); }
      .ts-actions { display: flex; gap: 10px; justify-content: flex-end; }
      .ts-btn { padding: 9px 20px; border-radius: 8px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; border: none; }
      .ts-btn-cancel { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); }
      .ts-btn-cancel:hover { background: rgba(255,255,255,0.14); }
      .ts-btn-save { background: #651eff; color: #fff; }
      .ts-btn-save:hover { background: #7a3fff; }
      .ts-btn-clear { background: rgba(255,80,80,0.14); color: #ff6060; border: 1px solid rgba(255,80,80,0.25); }
      .ts-btn-clear:hover { background: rgba(255,80,80,0.26); }

      /* ── AUTH ── */
      .admin-badge { position: fixed; top: 12px; right: 24px; z-index: 200; padding: 5px 14px; border-radius: 99px; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; background: rgba(0,220,100,0.12); border: 1.5px solid rgba(0,220,100,0.4); color: #00dc64; }
    </style>
  </head>
  <body class="league-page masters-page">
    <header class="site-header">
      <a class="home-link" href="./index.html">VCT Archive</a>
      <a class="back-link" href="./masters.html">Masters</a>

    <main class="league-shell stage-shell">
      <section class="stage-hero" aria-labelledby="stage-title">
        <div>
          <p class="eyebrow">VCT Masters 2026</p>
          <h1 id="stage-title">Masters London</h1>
          <p class="intro">
            Pacific, Americas, CN, EMEA 4개 지역에서 각 3팀씩 총 12팀이 참가하는 국제 대회입니다.
            아래에서 각 지역 참가팀을 배정하세요.
          </p>
        </div>
        <div class="stage-summary" aria-label="대회 진행 방식">
          <div><strong>4</strong><span>지역</span></div>
          <div><strong>12</strong><span>팀</span></div>
        </div>
      </section>

      <section class="tournament-section" aria-labelledby="london-tournament-title">
        <div class="section-heading">
          <p class="eyebrow">Tournaments</p>
          <h2 id="london-tournament-title">대회 선택</h2>
        </div>
        <div class="tournament-grid">
          <a class="tournament-card" href="./masters-london-swiss.html">
            <span class="tournament-kicker">Masters London</span>
            <strong>Swiss Stage</strong>
            <span>8팀 · 4진출</span>
          </a>
          <a class="tournament-card" href="./masters-london-playoffs.html">
            <span class="tournament-kicker">Masters London</span>
            <strong>PlayOff</strong>
            <span>8팀 · 결승</span>
          </a>
        </div>
      </section>

      <section class="participants-section" aria-labelledby="participants-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Participants</p>
            <h2 id="participants-title">참가팀 배정</h2>
          </div>
        </div>
        <div class="participants-grid">
          <div class="region-card pacific">
            <div class="region-header">
              <img src="./assets/vct-pacific.webp" alt="Pacific" />
              <h3>Pacific</h3>
              <span class="region-accent-dot"></span>
            </div>
            <div class="seed-slots" id="pacific-slots"></div>

          <div class="region-card americas">

            </div>
            <div class="seed-slots" id="americas-slots"></div>

          <div class="region-card cn">

              <span class="region-accent-dot"></span>
            </div>
            <div class="seed-slots" id="cn-slots"></div>

          <div class="region-card emea">
            <div class="region-header">
              <img src="./assets/vct-emea.webp" alt="EMEA" />
              <h3>EMEA</h3>
              <span class="region-accent-dot"></span>
            </div>
            <div class="seed-slots" id="emea-slots"></div>
          </div>
        </div>
      </section>
    </main>

    <!-- 팀 선택 모달 -->

        <div class="ts-team-grid" id="ts-team-grid"></div>
        <div class="ts-actions" id="ts-actions"></div>
      </div>

          { name: "Nova Esports",                    code: "NOVA", logo: "https://i.namu.wiki/i/-6DEz5g9-cso0kotRlGjxhZfBRLtMzq1OExUW-jyDO_FAR3bVmFwXD9z1UxT7_3U7YkiqwBgGY1E11qs9R6eyA.webp" },
          { name: "Wolves Esports",                  code: "WOL",  logo: "https://i.namu.wiki/i/X-eGL_hqaHsoGwmlAnlpWND0IL9ubVJBNJOBIm0tm365e5mMyXSh15rMbGd_zaedawHbF9Rr4rNPjVgb2X650g.webp" },
        ],
        emea: [
          { name: "Gentle Mates",  code: "M8",   logo: "./assets/teams/gm.png",         white: true },
          { name: "Team Liquid",   code: "TL",   logo: "https://i.namu.wiki/i/f_CgQqphVfEK8ZpEdvOwbGpar5zO-_FVVRi39YwZGPPXdUwewYA58qHLO9BMsDue-XXXYWNXJANDwuBBkPdncg.webp", white: true },
          { name: "Team Heretics", code: "TH",   logo: "https://i.namu.wiki/i/xhSOK4GxhF_Jvb_5DBSWbMPPw5WIF0VHjhZmewaTs9MISk8wd33bVJAf1QodqKgX-bAp0musx6K3GQSohdQnIw.svg" },
          { name: "NAVI",          code: "NAVI", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/52/NAVI-Logo.svg/1280px-NAVI-Logo.svg.png" },
          { name: "Karmine Corp",  code: "KC",   logo: "./assets/teams/kc.png" },
          { name: "FUT Esports",   code: "FUT",  logo: "https://specs.gg/assets/img/teams/fut-esports.webp" },
          { name: "BBL Esports",   code: "BBL",  logo: "https://i.namu.wiki/i/N0DXbTuVDoEBvb075pjNqv1Mzvhx-x40_G03TusP-lmj6xWjsFvIfAdL5NHEfEBYA9CS-whWH4cFb33uVnkILg.svg" },
          { name: "Fnatic",        code: "FNC",  logo: "https://i.namu.wiki/i/mDFrJuf51SSI6aOExJ5_KDbICs154lUpHgiuQNFP8L2Fcu2FxnU49spDKvpFhZzZvhwtntf58BWVwGbN20kNBQ.svg" },
          { name: "Team Vitality", code: "VIT",  logo: "https://images.secretlab.co/theme/common/vitality_25_spacer_logo.png" },
          { name: "GIANTX",        code: "GX",   logo: "https://i.namu.wiki/i/smbcvKZYz5eUQqXRfGl_7bXNclG0mpQkHJ-vk2WLqNefG_xO_lErENqYn2GQWvDpO9sSZPBYOHo-Td0lXg1vvQ.svg", white: true },
          { name: "Eternal Fire",  code: "EF",   logo: "https://i.namu.wiki/i/mkmrm6lQKQlLsm4GMnZzHvOhujJ1yPSpJE9w5U5p4rQHkef-0XAH4Ga3FUQLt7HSAZO6WwwXBgiaOaJz621qEg.svg" },
          { name: "PCIFIC Esports",code: "PCFC", logo: "https://i.namu.wiki/i/1Mc2sGqVID3LVIKcGjKpitWA-4ZflKXzVsyD7wfyziCL7TsCYSVOStcvsJ6GT1oi8WLF7tCzN5V0lJznozZ7HQ.svg" },
        ],
      };

      const REGIONS = ["pacific", "americas", "cn", "emea"];
      const REGION_LABELS = { pacific: "Pacific", americas: "Americas", cn: "CN", emea: "EMEA" };

      /* ── 스토리지 ───────────────────────────────────────── */
      function load() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) return JSON.parse(raw);
        } catch {}
        return { pacific: ["","",""], americas: ["","",""], cn: ["","",""], emea: ["","",""] };
      }
      function save(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

      function findTeam(name) {
        for (const region of REGIONS) {
          const t = ALL_TEAMS[region].find((t) => t.name === name);
          if (t) return t;
        }
        return null;
      }

      const isAdmin = () => typeof window.vctIsAdmin === "function" && window.vctIsAdmin();

      /* ── 슬롯 렌더링 ────────────────────────────────────── */
      function renderSlots() {
        const data = load();
        REGIONS.forEach((region) => {
          const container = document.getElementById(region + "-slots");
          if (!container) return;
          container.innerHTML = "";
          for (let i = 0; i < 3; i++) {
            const teamName = data[region][i] || "";
            const team = teamName ? findTeam(teamName) : null;
            const slot = document.createElement("div");
            slot.className = "seed-slot" + (teamName ? " has-team" : " empty");
            slot.innerHTML = `
              <div class="slot-logo">${team ? `<img src="${team.logo}" alt="${team.name}"${team.white ? ' style="filter:brightness(0)invert(1)"' : ''} />` : ""}</div>
              <div class="slot-info">
                <div class="slot-seed">${i + 1}시드</div>
                <div class="slot-name">${teamName || "미정"}</div>
              </div>
            `;
            if (teamName) {
              slot.addEventListener("click", function() {
                var pickerCb = isAdmin() ? function() { openPicker(region, i); } : null;
                if (window.openRosterModal) {
                  var logoHTML = team ? '<img src="' + team.logo + '"' + (team.white ? ' class="logo-white"' : '') + ' />' : '';
                  window.openRosterModal(teamName, logoHTML);
                } else if (isAdmin()) {
                  openPicker(region, i);
                }
              });
            } else if (isAdmin()) {
              slot.addEventListener("click", () => openPicker(region, i));
            }
            container.appendChild(slot);
          }
        });
      }

      /* ── 팀 선택 모달 ───────────────────────────────────── */
      let _ctx = null, _activeTab = "pacific", _selected = "";

      function openPicker(region, seedIdx) {
        _ctx = { region, seedIdx };
        _activeTab = region;
        const data = load();
        _selected = data[region][seedIdx] || "";
        document.getElementById("ts-title").textContent = `팀 선택`;
        document.getElementById("ts-subtitle").textContent = `${REGION_LABELS[region]} ${seedIdx + 1}시드 팀을 선택하세요.`;
        renderTabs();
        renderTeamGrid();
        renderActions();
        document.getElementById("ts-modal").hidden = false;
      }

      function renderTabs() {
        const container = document.getElementById("ts-region-tabs");
        container.innerHTML = REGIONS.map((r) =>
          `<button class="ts-region-tab${r === _activeTab ? " active" : ""}" data-r="${r}">${REGION_LABELS[r]}</button>`
        ).join("");
        container.querySelectorAll(".ts-region-tab").forEach((btn) => {
          btn.addEventListener("click", () => {
            _activeTab = btn.dataset.r;
            renderTabs();
            renderTeamGrid();
          });
        });
      }

      function renderTeamGrid() {
        const data = load();
        const usedByOthers = new Set();
        REGIONS.forEach((r) => {
          data[r].forEach((name, idx) => {
            if (name && !(r === _ctx.region && idx === _ctx.seedIdx)) {
              usedByOthers.add(name);
            }
          });
        });

        const grid = document.getElementById("ts-team-grid");
        grid.innerHTML = ALL_TEAMS[_activeTab].map((t) => {
          const isSelected = t.name === _selected;
          const isUsed = usedByOthers.has(t.name);
          return `<button
            class="ts-team-btn${isSelected ? " selected" : ""}"
            data-name="${t.name}"
            ${isUsed ? 'style="opacity:0.3;pointer-events:none;"' : ""}
          >
            <img src="${t.logo}" alt="${t.name}"${t.white ? ' style="filter:brightness(0)invert(1)"' : ''} />
            <span class="ts-code">${t.code}</span>
            <span>${t.name}</span>
          </button>`;
        }).join("");
        grid.querySelectorAll(".ts-team-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            _selected = btn.dataset.name === _selected ? "" : btn.dataset.name;
            renderTeamGrid();
            document.getElementById("ts-save-btn").disabled = !_selected;
          });
        });
      }

      function renderActions() {
        document.getElementById("ts-actions").innerHTML = `
          <button class="ts-btn ts-btn-clear" id="ts-clear-btn">비우기</button>
          <button class="ts-btn ts-btn-cancel" id="ts-cancel-btn">취소</button>
          <button class="ts-btn ts-btn-save" id="ts-save-btn" ${_selected ? "" : "disabled"}>저장</button>
        `;
        document.getElementById("ts-cancel-btn").addEventListener("click", closeModal);
        document.getElementById("ts-clear-btn").addEventListener("click", () => {
          const data = load();
          data[_ctx.region][_ctx.seedIdx] = "";
          save(data); closeModal(); renderSlots();
        });
        document.getElementById("ts-save-btn").addEventListener("click", () => {
          if (!_selected) return;
          const data = load();
          data[_ctx.region][_ctx.seedIdx] = _selected;
          save(data); closeModal(); renderSlots();
        });
      }

      function closeModal() {
        document.getElementById("ts-modal").hidden = true;
        _ctx = null; _selected = "";
      }

      document.getElementById("ts-backdrop").addEventListener("click", closeModal);
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && !document.getElementById("ts-modal").hidden) closeModal();
      });

      renderSlots();
    });
    </script>
    <script src="./auth.js"></script>
    <script src="./player-modal.js"></script>
    <script src="./roster-modal.js"></script>
  </body>
