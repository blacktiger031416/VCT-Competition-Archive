<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VCT EMEA 2026 Stage 1 Playoffs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0d1c14; color: #e8e4e0; font-family: 'Barlow', 'Noto Sans KR', sans-serif; min-height: 100vh; }

      /* ── HEADER ─────────────────────────────── */
      .site-header { display: flex; align-items: center; gap: 20px; padding: 0 32px; height: 56px; background: rgba(13,28,20,0.9); border-bottom: 1px solid rgba(255,255,255,0.06); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
      .home-link { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.55); text-decoration: none; transition: color 0.15s; }
      .home-link:hover { color: #fff; }
      .back-link { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); text-decoration: none; transition: color 0.15s; margin-left: auto; }
      .back-link:hover { color: rgba(255,255,255,0.8); }
      .site-header .auth-header-btn { margin-left: 0; }

      .eyebrow { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: #1464f6; margin-bottom: 6px; }

      /* ── PLAYOFF SHELL ──────────────────────── */
      .playoff-shell { max-width: 1200px; margin: 0 auto; padding: 0 24px 80px; }
      .playoff-hero { display: flex; align-items: center; gap: 24px; padding: 48px 0 36px; }
      .playoff-logo-lockup img { width: 72px; height: 72px; object-fit: contain; filter: brightness(0) invert(1); opacity: 0.7; }
      .playoff-hero h1 { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(28px, 4vw, 44px); font-weight: 900; letter-spacing: 0.04em; text-transform: uppercase; color: #fff; line-height: 1; margin-bottom: 6px; }
      .playoff-hero p { font-size: 13px; color: rgba(255,255,255,0.4); font-family: 'Noto Sans KR', sans-serif; }

      /* ── BRACKET ────────────────────────────── */
      .playoff-board { overflow: hidden; }
      .bracket-scroll { overflow-x: auto; padding-bottom: 16px; }

      .bracket-col-labels { display: grid; grid-template-columns: repeat(5, minmax(170px,1fr)); min-width: 860px; gap: 0; margin-bottom: 4px; }
      .bracket-col-labels span { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.3); padding: 6px 8px; text-align: center; }

      .bracket-grid { display: grid; grid-template-columns: repeat(5, minmax(170px,1fr)); min-width: 860px; gap: 0; border: 1px solid rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }

      .bracket-col { display: flex; flex-direction: column; justify-content: space-around; padding: 12px 8px; border-right: 1px solid rgba(255,255,255,0.05); gap: 8px; }
      .bracket-col:last-child { border-right: none; }
      .bracket-col.col-upper { min-height: 560px; }
      .bracket-col.col-lower { min-height: 320px; }
      .bracket-col.col-center { justify-content: center; }
      .bracket-col.col-gf { justify-content: center; }

      .bracket-match { background: #111e15; border: 1px solid rgba(255,255,255,0.07); border-radius: 4px; overflow: hidden; cursor: pointer; transition: border-color 0.18s, transform 0.12s; outline: none; }
      .bracket-match:hover { border-color: rgba(20,100,246,0.4); transform: translateY(-1px); }
      .bracket-match:focus-visible { border-color: #1464f6; }
      .bracket-match h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.35); padding: 6px 8px 4px; border-bottom: 1px solid rgba(255,255,255,0.05); }
      .bracket-match h3 span { font-weight: 400; }
      .grand-final { border-color: rgba(20,100,246,0.3); box-shadow: 0 0 20px rgba(20,100,246,0.1); }

      .bracket-team { display: flex; align-items: center; gap: 6px; padding: 6px 8px; border-bottom: 1px solid rgba(255,255,255,0.04); }
      .bracket-team:last-child { border-bottom: none; }
      .bracket-team.tbd { opacity: 0.4; }
      .bt-seed { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.3); min-width: 22px; flex-shrink: 0; }
      .bt-logo { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
      .bt-logo img { width: 100%; height: 100%; object-fit: contain; }
      .bt-logo img.logo-white { filter: brightness(0) invert(1); }
      .bt-name { flex: 1; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.04em; color: rgba(255,255,255,0.85); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .bt-score { font-style: normal; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 900; color: rgba(255,255,255,0.4); flex-shrink: 0; min-width: 14px; text-align: right; }

      /* ── SEED PICKER ────────────────────────── */
      .seed-modal { position: fixed; inset: 0; z-index: 9800; display: flex; align-items: center; justify-content: center; }
      .seed-modal[hidden] { display: none !important; }
      .seed-backdrop { position: absolute; inset: 0; background: rgba(5,5,5,0.65); backdrop-filter: blur(6px); }
      .seed-panel { position: relative; z-index: 1; width: min(540px, calc(100vw - 24px)); max-height: 90vh; overflow-y: auto; background: #121b2a; border: 1.5px solid rgba(20,100,246,0.25); border-radius: 18px; padding: 24px; }
      .seed-panel h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 900; letter-spacing: 0.04em; text-transform: uppercase; color: #fff; margin: 0 0 4px; }
      .seed-panel p { font-size: 13px; color: rgba(255,255,255,0.45); font-family: 'Noto Sans KR', sans-serif; margin: 0 0 16px; }
      .seed-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
      .seed-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 10px 6px; border-radius: 10px; background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.09); color: #fff; font-family: 'Barlow Condensed', sans-serif; cursor: pointer; transition: all 0.14s; font-size: 10px; font-weight: 700; text-align: center; }
      .seed-btn img { width: 26px; height: 26px; object-fit: contain; }
      .seed-btn img.logo-white { filter: brightness(0) invert(1); }
      .seed-btn .seed-code { font-size: 12px; font-weight: 900; letter-spacing: 0.05em; }
      .seed-btn:hover { background: rgba(20,100,246,0.1); border-color: rgba(20,100,246,0.45); }
      .seed-btn.selected { background: rgba(20,100,246,0.2); border-color: #1464f6; }
      .seed-btn:disabled { opacity: 0.3; pointer-events: none; }
      .seed-actions { display: flex; gap: 10px; justify-content: flex-end; }
      .seed-act-btn { padding: 9px 20px; border-radius: 8px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.06em; cursor: pointer; border: none; }
      .seed-cancel { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.65); }
      .seed-cancel:hover { background: rgba(255,255,255,0.14); }
      .seed-clear { background: rgba(255,80,80,0.1); color: #ff6b6b; border: 1px solid rgba(255,80,80,0.25); }
      .seed-clear:hover { background: rgba(255,80,80,0.22); }
    </style>
  </head>
  <body class="league-page stage-page emea-page playoff-page">
    <header class="site-header">
      <a class="home-link" href="./index.html">VCT Archive</a>
      <a class="back-link" href="./emea-stage1.html">Stage 1</a>
    </header>

    <main class="playoff-shell">
      <section class="playoff-hero" aria-labelledby="po-title">
        <div class="playoff-logo-lockup">
          <img src="./assets/vct-emea.webp" alt="VCT EMEA" />
        </div>
        <div>
          <p class="eyebrow">VCT EMEA 2026</p>
          <h1 id="po-title">Stage 1 Playoffs</h1>
          <p>더블 엘리미네이션 · 8팀 · Masters 산티아고 진출</p>
        </div>
      </section>

      <section class="playoff-board" aria-label="Stage 1 Playoffs 대진표">
        <!-- Column labels -->
        <div class="bracket-col-labels" aria-hidden="true">
          <span>UB Round 1</span>
          <span>UB Semis</span>
          <span>UB Final</span>
          <span>LB / Grand Finals</span>
          <span>Grand Finals</span>
        </div>

        <div class="bracket-scroll">
          <div class="bracket-grid" id="bracket-grid">
            <!-- rendered by JS -->
          </div>
        </div>
      </section>
    </main>

    <!-- Seed Picker Modal -->
    <div class="seed-modal" id="seed-modal" hidden>
      <div class="seed-backdrop" id="seed-backdrop"></div>
      <div class="seed-panel" role="dialog" aria-modal="true">
        <h2 id="seed-modal-title">시드 배정</h2>
        <p id="seed-modal-desc">팀을 선택하세요</p>
        <div class="seed-grid" id="seed-grid"></div>
        <div class="seed-actions" id="seed-actions"></div>
      </div>
    </div>

    <script src="./storage.js"></script>
    <script>
    window.storageReady.then(function () {
      const SEEDS_KEY = "emea_s1_playoffs_seeds";
      const FROM_PARAM = "stage1playoffs";
      const MATCH_PAGE = "./emea-match-dark.html";

      const TEAM_INFO = {
        "Fnatic":         { code: "FNC",  src: "https://i.namu.wiki/i/mDFrJuf51SSI6aOExJ5_KDbICs154lUpHgiuQNFP8L2Fcu2FxnU49spDKvpFhZzZvhwtntf58BWVwGbN20kNBQ.svg",  white: true },
        "Eternal Fire":   { code: "EF",   src: "https://i.namu.wiki/i/mkmrm6lQKQlLsm4GMnZzHvOhujJ1yPSpJE9w5U5p4rQHkef-0XAH4Ga3FUQLt7HSAZO6WwwXBgiaOaJz621qEg.svg",  white: true },
        "GIANTX":         { code: "GX",   src: "https://i.namu.wiki/i/smbcvKZYz5eUQqXRfGl_7bXNclG0mpQkHJ-vk2WLqNefG_xO_lErENqYn2GQWvDpO9sSZPBYOHo-Td0lXg1vvQ.svg",  white: true },
        "Team Vitality":  { code: "VIT",  src: "https://upload.wikimedia.org/wikipedia/en/4/49/Team_Vitality_logo.svg",                                                           white: true },
        "FUT Esports":    { code: "FUT",  src: "https://i.namu.wiki/i/9lZ0EJstoQ655GoWZ8P5eenoKyKINvPzQg6Mwn0y2CLE8Q00lsO-HrUsl6uvWARe6A2TwJgXm5DQjue0SJ_XWA.svg",  white: true },
        "Team Liquid":    { code: "TL",   src: "https://i.namu.wiki/i/f_CgQqphVfEK8ZpEdvOwbGpar5zO-_FVVRi39YwZGPPXdUwewYA58qHLO9BMsDue-XXXYWNXJANDwuBBkPdncg.webp", white: false },
        "Team Heretics":  { code: "TH",   src: "https://i.namu.wiki/i/xhSOK4GxhF_Jvb_5DBSWbMPPw5WIF0VHjhZmewaTs9MISk8wd33bVJAf1QodqKgX-bAp0musx6K3GQSohdQnIw.svg",  white: true },
        "Gentle Mates":   { code: "M8",   src: "./assets/teams/gm.png",                                                                                                           white: false },
      };
      const ALL_SEEDS = Object.keys(TEAM_INFO);

      // matchLinks: which seeds fill each slot
      // match: { teamA: seed|null, teamB: seed|null }
      // matchLinks: for match N, where do teamA and teamB come from?
      const matchLinks = {
        3: [null, { match: 1, result: "winner" }],
        4: [null, { match: 2, result: "winner" }],
        5: [{ match: 1, result: "loser" }, null],
        6: [{ match: 2, result: "loser" }, null],
        7: [{ match: 4, result: "loser" }, { match: 5, result: "winner" }],
        8: [{ match: 3, result: "loser" }, { match: 6, result: "winner" }],
        9: [{ match: 3, result: "winner" }, { match: 4, result: "winner" }],
        10: [{ match: 7, result: "winner" }, { match: 8, result: "winner" }],
        11: [{ match: 9, result: "loser" }, { match: 10, result: "winner" }],
        "Grand Finals": [{ match: 9, result: "winner" }, { match: 11, result: "winner" }],
      };

      const isAdmin = () => typeof window.vctIsAdmin === "function" && window.vctIsAdmin();

      function loadSeeds() {
        try { const r = localStorage.getItem(SEEDS_KEY); if (r) return JSON.parse(r); } catch {}
        return {};
      }
      function saveSeeds(s) { localStorage.setItem(SEEDS_KEY, JSON.stringify(s)); }

      function getMatchResult(matchId) {
        const seeds = loadSeeds();
        const m1a = seeds[1] || null;
        const m1b = seeds[2] || null;
        const m2a = seeds[3] || null;
        const m2b = seeds[4] || null;
        // Match 1: seed1 vs seed8, Match 2: seed2 vs seed7, etc.
        const matchSeeds = {
          1: { teamA: seeds[1] || null, teamB: seeds[8] || null },
          2: { teamA: seeds[2] || null, teamB: seeds[7] || null },
          3: { teamA: seeds[3] || null, teamB: seeds[6] || null },
          4: { teamA: seeds[4] || null, teamB: seeds[5] || null },
        };
        return matchSeeds[matchId] || null;
      }

      // Resolve what team is in a slot, following matchLinks
      function resolveSlot(matchId, slot) {
        // slot 0 = teamA (index 0), slot 1 = teamB (index 1)
        const seeds = loadSeeds();

        // Direct seed matches (1-4)
        if (matchId === 1) return slot === 0 ? (seeds[1] || null) : (seeds[8] || null);
        if (matchId === 2) return slot === 0 ? (seeds[2] || null) : (seeds[7] || null);
        if (matchId === 3) return slot === 0 ? (seeds[3] || null) : (seeds[6] || null);
        if (matchId === 4) return slot === 0 ? (seeds[4] || null) : (seeds[5] || null);

        const links = matchLinks[matchId];
        if (!links) return null;
        const link = links[slot];
        if (!link) return null;
        return getMatchWinner(link.match, link.result);
      }

      function getStoredScore(matchId) {
        const teamA = resolveSlot(matchId, 0);
        const teamB = resolveSlot(matchId, 1);
        if (!teamA || !teamB) return null;
        const dateKey = `Match ${matchId}`;
        try {
          const stored = JSON.parse(localStorage.getItem(`result:${dateKey}|${teamA}|${teamB}`) || "{}");
          const sa = String(stored.scoreA ?? "").trim();
          const sb = String(stored.scoreB ?? "").trim();
          if (sa && sb && sa !== "-" && sb !== "-") return { sa, sb };
        } catch {}
        return null;
      }

      function getMatchWinner(matchId, result) {
        const teamA = resolveSlot(matchId, 0);
        const teamB = resolveSlot(matchId, 1);
        if (!teamA || !teamB) return null;
        const score = getStoredScore(matchId);
        if (!score) return null;
        const a = parseInt(score.sa); const b = parseInt(score.sb);
        if (isNaN(a) || isNaN(b)) return null;
        if (result === "winner") return a > b ? teamA : b > a ? teamB : null;
        if (result === "loser") return a > b ? teamB : b > a ? teamA : null;
        return null;
      }

      function logoHtml(teamName, size) {
        if (!teamName) return "";
        const info = TEAM_INFO[teamName];
        if (!info) return "";
        return `<img src="${info.src}" alt="${info.code}" ${info.white ? 'class="logo-white"' : ""} style="width:${size}px;height:${size}px;object-fit:contain;" />`;
      }

      function renderTeamRow(matchId, slot, seedLabel) {
        const teamName = resolveSlot(matchId, slot);
        const score = getStoredScore(matchId);
        const scoreVal = score ? (slot === 0 ? score.sa : score.sb) : "";
        if (!teamName) {
          return `<div class="bracket-team tbd">
            <span class="bt-seed">${seedLabel}</span>
            <span class="bt-logo"></span>
            <span class="bt-name">미정</span>
            <span class="bt-score"></span>
          </div>`;
        }
        const info = TEAM_INFO[teamName] || {};
        return `<div class="bracket-team">
          <span class="bt-seed">${seedLabel}</span>
          <span class="bt-logo">${logoHtml(teamName, 22)}</span>
          <span class="bt-name">${info.code || teamName}</span>
          <span class="bt-score">${scoreVal}</span>
        </div>`;
      }

      function renderMatch(matchId, labelA, labelB) {
        const isBo5 = (matchId === "Grand Finals");
        const teamA = resolveSlot(matchId, 0);
        const teamB = resolveSlot(matchId, 1);
        const score = getStoredScore(matchId);
        const div = document.createElement("article");
        div.className = "bracket-match" + (isBo5 ? " grand-final" : "");
        div.dataset.matchId = String(matchId);
        div.tabIndex = 0;
        div.setAttribute("role", "link");
        div.setAttribute("aria-label", `Match ${matchId} 상세 보기`);
        div.innerHTML = `
          <h3>Match ${matchId}${isBo5 ? " <span>(Bo5)</span>" : ""}</h3>
          ${renderTeamRow(matchId, 0, labelA)}
          ${renderTeamRow(matchId, 1, labelB)}`;

        div.addEventListener("click", () => {
          const tA = resolveSlot(matchId, 0) || "미정";
          const tB = resolveSlot(matchId, 1) || "미정";
          const sc = getStoredScore(matchId);
          const scoreStr = sc ? `${sc.sa} : ${sc.sb}` : "VS";
          const params = new URLSearchParams({ date: `Match ${matchId}`, teamA: tA, teamB: tB, score: scoreStr, from: FROM_PARAM, ...(isBo5 ? { bo5: "1" } : {}) });
          window.location.href = `${MATCH_PAGE}?${params}`;
        });
        div.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); div.click(); } });
        return div;
      }

      function renderBracket() {
        const grid = document.getElementById("bracket-grid");
        grid.innerHTML = "";

        // Col 1: UB R1 — M1, M2, M3, M4
        const col1 = document.createElement("div");
        col1.className = "bracket-col col-upper";
        col1.appendChild(renderMatch(1, "#1", "#8"));
        col1.appendChild(renderMatch(2, "#2", "#7"));
        col1.appendChild(renderMatch(3, "#3", "#6"));
        col1.appendChild(renderMatch(4, "#4", "#5"));
        grid.appendChild(col1);

        // Col 2: UB Semis — M5(LB),M6(LB) upper / actually UB QF winners
        // M5 = M1w vs M2w, M6 = M3w vs M4w... wait, looking at matchLinks:
        // matchLinks says M3=[null, M1w], M4=[null, M2w] — so these ARE UB semis with seeded byes
        // Actually re-reading: M3 teamA = seed 3, teamB = M1 winner... etc.
        // Let me re-read the matchLinks from pacific-stage1-playoffs template:
        // 3: [null, {match:1, winner}] — so M3 teamA is from seeds, teamB is M1 winner
        // This means col1 has M1,M2 (1v8, 2v7), col2 has M3,M4 (3 vs M1w, 4 vs M2w?)
        // Actually the bracket used is:
        // Col1: M1(1v8), M2(2v7) | Col2: M3(3v M1w), M4(4 vs M2w)? No...
        // Looking at matchLinks: M3 = [null, M1w], M4 = [null, M2w]
        // And M5 = [M1L, null], M6 = [M2L, null]
        // M9 = [M3w, M4w] — UB Final
        // This means: UB bracket is M1->M3->M9, M2->M4->M9
        // LB bracket: M1L->M5, M2L->M6, M4L->M7, M3L->M8, M7w+M8w->M10, M10w+M9L->M11, M11w vs M9w = GF

        // Re-doing column layout:
        // Col1: M1, M2 (UB R1)
        // Col2: M3, M4 (UB QF - seeded byes), M5,M6 are LB R1
        // Col3: M9 (UB Final), M7,M8 (LB R2)
        // Col4: M10,M11 (LB QF + LB SF)
        // Col5: Grand Finals

        // This is complex. Let me use a simpler 5-col layout matching pacific-stage1-playoffs:
        // Upper: M1,M2 | M3,M4 | M9 | → | GF
        // Lower:        | M5,M6 | M7,M8 | M10,M11 |

        // Actually let me just lay it out properly using divs matching the Pacific template structure

        const col2 = document.createElement("div");
        col2.className = "bracket-col col-upper";
        col2.appendChild(renderMatch(3, "#3", "M1↑"));
        col2.appendChild(renderMatch(4, "#4", "M2↑"));
        // Lower bracket R1
        col2.appendChild(renderMatch(5, "M1↓", "#?"));
        col2.appendChild(renderMatch(6, "M2↓", "#?"));
        grid.appendChild(col2);

        // Col 3: UB Final + LB R2
        const col3 = document.createElement("div");
        col3.className = "bracket-col col-upper";
        col3.appendChild(renderMatch(9, "M3↑", "M4↑"));
        col3.appendChild(renderMatch(7, "M4↓", "M5↑"));
        col3.appendChild(renderMatch(8, "M3↓", "M6↑"));
        grid.appendChild(col3);

        // Col 4: LB SF + LB Final
        const col4 = document.createElement("div");
        col4.className = "bracket-col col-upper";
        col4.appendChild(renderMatch(10, "M7↑", "M8↑"));
        col4.appendChild(renderMatch(11, "M9↓", "M10↑"));
        grid.appendChild(col4);

        // Col 5: Grand Finals
        const col5 = document.createElement("div");
        col5.className = "bracket-col col-gf";
        col5.appendChild(renderMatch("Grand Finals", "M9↑", "M11↑"));
        grid.appendChild(col5);
      }

      /* ── Seed Picker ─────────────────────── */
      let _seedCtx = null;

      function openSeedPicker(seedNum) {
        if (!isAdmin()) return;
        _seedCtx = seedNum;
        const seeds = loadSeeds();
        const taken = new Set(Object.entries(seeds).filter(([k, v]) => Number(k) !== seedNum && v).map(([, v]) => v));
        document.getElementById("seed-modal-title").textContent = `시드 ${seedNum} 팀 배정`;
        document.getElementById("seed-modal-desc").textContent = "팀을 클릭해서 배정하세요.";
        const grid = document.getElementById("seed-grid");
        grid.innerHTML = ALL_SEEDS.map(t => {
          const info = TEAM_INFO[t];
          const isTaken = taken.has(t);
          const isCur = seeds[seedNum] === t;
          return `<button class="seed-btn${isCur ? " selected" : ""}" data-team="${t}" ${isTaken ? "disabled" : ""}>
            <img src="${info.src}" alt="${info.code}" ${info.white ? 'class="logo-white"' : ""} />
            <span class="seed-code">${info.code}</span>
            <span style="font-size:9px;opacity:.6;">${t}</span>
          </button>`;
        }).join("");
        grid.querySelectorAll(".seed-btn").forEach(btn => {
          btn.addEventListener("click", () => {
            const s = loadSeeds();
            s[_seedCtx] = btn.dataset.team;
            saveSeeds(s);
            closeSeedModal();
            renderBracket();
          });
        });
        const actions = document.getElementById("seed-actions");
        actions.innerHTML = "";
        const clearBtn = document.createElement("button");
        clearBtn.className = "seed-act-btn seed-clear"; clearBtn.textContent = "비우기";
        clearBtn.addEventListener("click", () => {
          const s = loadSeeds(); delete s[_seedCtx]; saveSeeds(s); closeSeedModal(); renderBracket();
        });
        actions.appendChild(clearBtn);
        const cancelBtn = document.createElement("button");
        cancelBtn.className = "seed-act-btn seed-cancel"; cancelBtn.textContent = "취소";
        cancelBtn.addEventListener("click", closeSeedModal);
        actions.appendChild(cancelBtn);
        document.getElementById("seed-modal").hidden = false;
      }

      function closeSeedModal() {
        document.getElementById("seed-modal").hidden = true;
        _seedCtx = null;
      }

      document.getElementById("seed-backdrop").addEventListener("click", closeSeedModal);
      document.addEventListener("keydown", e => { if (e.key === "Escape" && !document.getElementById("seed-modal").hidden) closeSeedModal(); });

      renderBracket();

      // Admin: click on seed number in bracket title to open seed picker
      document.getElementById("bracket-grid").addEventListener("click", e => {
        if (!isAdmin()) return;
        // Seed assignment: double click on the bracket column header area or seed badge
        const seedBadge = e.target.closest(".bt-seed");
        if (!seedBadge) return;
        const matchDiv = seedBadge.closest(".bracket-match");
        if (!matchDiv) return;
        const matchId = matchDiv.dataset.matchId;
        const rows = matchDiv.querySelectorAll(".bracket-team");
        const rowIndex = [...rows].indexOf(seedBadge.closest(".bracket-team"));
        // Only allow editing first-round direct seed matches (1-4)
        const numId = Number(matchId);
        if (numId >= 1 && numId <= 4) {
          const seedNum = rowIndex === 0
            ? (numId === 1 ? 1 : numId === 2 ? 2 : numId === 3 ? 3 : 4)
            : (numId === 1 ? 8 : numId === 2 ? 7 : numId === 3 ? 6 : 5);
          e.stopPropagation();
          openSeedPicker(seedNum);
        }
      });
    });
    </script>
    <script src="./auth.js"></script>
  </body>
</html>
