<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VCT Pacific Challengers 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      a { text-decoration: none; color: inherit; }
      :root {
        --accent: #01d2d7;
        --accent-dim: rgba(1,210,215,.7);
        --accent-bg: rgba(1,210,215,.1);
        --bg-base: #060f14;
        --bg-card: #0b1820;
      }
      body { min-height: 100vh; font-family: "Noto Sans KR", system-ui, sans-serif; color: #f0f0f0;
        background: linear-gradient(115deg, rgba(1,210,215,.12), transparent 38%),
                    linear-gradient(245deg, rgba(0,40,50,.14), transparent 32%), var(--bg-base); }
      body::before {
        position: fixed; inset: 0; z-index: -1; pointer-events: none; content: "";
        background-image: linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: linear-gradient(to bottom, rgba(0,0,0,.7), transparent 80%);
      }
      /* Header */
      .site-header { position: sticky; top: 0; z-index: 200; display: flex; align-items: center; gap: 8px;
        padding: 0 20px; height: 52px; background: rgba(6,15,20,.92);
        backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(255,255,255,.07); }
      .site-header .auth-header-btn { margin-left: auto !important; }
      .nav-brand { font-size: 12px; font-weight: 900; color: var(--accent); letter-spacing: .09em; text-transform: uppercase; flex-shrink: 0; }
      .nav-sep { width: 1px; height: 16px; background: rgba(255,255,255,.1); margin: 0 4px; flex-shrink: 0; }
      .back-link { display: inline-flex; align-items: center; height: 30px; padding: 0 13px;
        border: 1px solid rgba(255,255,255,.08); border-radius: 4px; background: rgba(255,255,255,.04);
        font-size: 12px; font-weight: 700; color: rgba(255,255,255,.5); text-decoration: none;
        transition: background .15s, color .15s; }
      .back-link:hover { background: rgba(255,255,255,.09); color: #fff; }

      /* Page shell */
      .page-shell { width: min(1180px, calc(100% - 40px)); margin: 0 auto; padding: 48px 0 64px; }

      /* Hero copy (상단 텍스트, 전체 너비) */
      .hero-copy { margin-bottom: 40px; }
      .vct-logo { display: block; width: min(140px,36vw); height: auto; margin-bottom: 20px;
        filter: drop-shadow(0 10px 20px rgba(1,210,215,.28)); }
      .eyebrow { margin: 0 0 8px; color: var(--accent); font-size: 13px; font-weight: 900; letter-spacing: .1em; text-transform: uppercase; }
      h1 { font-size: clamp(36px,5vw,60px); line-height: 1.05; font-weight: 900; color: #fff; }
      .intro { max-width: 600px; margin: 14px 0 0; color: rgba(255,255,255,.45); font-size: 15px; line-height: 1.7; word-break: keep-all; }

      /* League grid (카드, 전체 너비) */
      .league-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 16px; }
      .league-card {
        text-decoration: none;
        --accent: #01d2d7;
        position: relative; min-height: 250px; display: grid;
        grid-template-rows: 1fr auto auto; gap: 14px; padding: 22px;
        overflow: hidden; border: 1px solid rgba(255,255,255,.1); border-radius: 8px;
        background: linear-gradient(145deg, rgba(255,255,255,.07), rgba(255,255,255,.02)), var(--bg-card);
        box-shadow: 0 26px 70px rgba(0,0,0,.5); transition: transform 180ms ease, border-color 180ms ease;
      }
      .league-card::after { position: absolute; left: 0; right: 0; bottom: 0; height: 4px; content: ""; background: var(--accent); }
      .league-card:hover { transform: translateY(-4px); border-color: color-mix(in srgb, var(--accent) 55%, white); }
      .league-logo-wrap { min-height: 100px; display: grid; place-items: center; padding: 10px; }
      .league-logo-wrap img { max-width: 100%; max-height: 90px; object-fit: contain; filter: drop-shadow(0 8px 18px rgba(0,0,0,.5)); }
      .league-name { font-size: 26px; line-height: 1.1; font-weight: 900; color: #fff; position: relative; z-index: 1; }
      .league-action { width: fit-content; min-height: 34px; display: inline-flex; align-items: center;
        padding: 0 13px; border: 1px solid rgba(255,255,255,.22); border-radius: 999px;
        color: #fff; background: rgba(0,0,0,.28); font-size: 13px; font-weight: 900; position: relative; z-index: 1; }
      .card-action-row { display: flex; align-items: center; gap: 8px; position: relative; z-index: 1; }

      /* Challengers card styles */
      .challengers-card { cursor: pointer; }
      .challengers-card::before { display: none; }
      .challengers-card { background: linear-gradient(145deg, rgba(1,210,215,.3), rgba(1,210,215,.07)), #081e22; }
      .lock-badge { position: absolute; top: 10px; right: 10px; z-index: 2;
        padding: 3px 9px; border-radius: 4px; background: rgba(0,0,0,.55);
        border: 1px solid rgba(255,255,255,.13); font-size: 10px; font-weight: 800;
        color: rgba(255,255,255,.4); font-family: 'Barlow Condensed', sans-serif;
        letter-spacing: .1em; text-transform: uppercase; }
      .challengers-card.unlocked .lock-badge { display: none; }

      /* Admin unlock button */
      .admin-unlock-btn { display: none; padding: 0 11px; height: 34px; border-radius: 999px;
        background: rgba(0,0,0,.55); border: 1px solid rgba(255,255,255,.18);
        color: rgba(255,255,255,.6); font-size: 12px; font-weight: 800;
        font-family: 'Barlow Condensed', sans-serif; letter-spacing: .08em; text-transform: uppercase;
        cursor: pointer; transition: background .15s, border-color .15s, color .15s; white-space: nowrap; }
      body:not(.view-only) .admin-unlock-btn { display: inline-flex; align-items: center; }
      .admin-unlock-btn:hover { background: rgba(61,220,132,.2); border-color: rgba(61,220,132,.45); color: #3ddc84; }
      .admin-unlock-btn.is-unlocked { background: rgba(61,220,132,.15); border-color: rgba(61,220,132,.35); color: #3ddc84; }
      .admin-unlock-btn.is-unlocked:hover { background: rgba(220,50,50,.15); border-color: rgba(220,50,50,.35); color: #ff6b6b; }

      /* Locked toast */
      .locked-toast { position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%) translateY(14px);
        background: rgba(12,14,22,.97); border: 1px solid rgba(255,255,255,.11); border-radius: 8px;
        padding: 12px 26px; font-size: 14px; font-weight: 700; color: rgba(255,255,255,.82);
        z-index: 99999; opacity: 0; transition: opacity .22s, transform .22s;
        pointer-events: none; white-space: nowrap; box-shadow: 0 12px 40px rgba(0,0,0,.6); }
      .locked-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
  </head>
  <body>
    <header class="site-header">
      <a class="nav-brand" href="./index.html">VCT Archive</a>
      <span class="nav-sep"></span>
      <a class="back-link" href="./index.html">홈</a>
    </header>

    <main class="page-shell">
      <div class="hero-copy" aria-labelledby="site-title">
        <img class="vct-logo" src="https://static.wikia.nocookie.net/logopedia/images/f/f1/VALORANT_Challengers_logo.png/revision/latest?cb=20210816022910" alt="Challengers" />
        <p class="eyebrow">VCT Challengers 2026</p>
        <h1 id="site-title">Pacific</h1>
        <p class="intro">Pacific 권역의 Challengers 리그입니다. Japan, Korea, Southeast Asia, South Asia 4개 서브 리그로 구성됩니다.</p>
      </div>

      <nav class="league-grid" aria-label="Pacific Challengers 선택">
          <a class="league-card challengers-card" style="--accent:#159194" href="javascript:void(0)" aria-label="Japan Challengers" data-slug="japan">
            <span class="lock-badge">업데이트 예정</span>
            <span class="league-logo-wrap"><img src="https://static.wikia.nocookie.net/logopedia/images/f/f1/VALORANT_Challengers_logo.png/revision/latest?cb=20210816022910" alt="" /></span>
            <span class="league-name">Japan</span>
            <div class="card-action-row">
              <span class="league-action">챌린저스 보기</span>
              <button class="admin-unlock-btn" type="button">🔓 공개하기</button>
            </div>
          </a>
          <a class="league-card challengers-card" style="--accent:#159194" href="./challengers-korea.html" aria-label="Korea Challengers" data-slug="korea">
            <span class="lock-badge">업데이트 예정</span>
            <span class="league-logo-wrap"><img src="https://static.wikia.nocookie.net/logopedia/images/f/f1/VALORANT_Challengers_logo.png/revision/latest?cb=20210816022910" alt="" /></span>
            <span class="league-name">Korea</span>
            <div class="card-action-row">
              <span class="league-action">챌린저스 보기</span>
              <button class="admin-unlock-btn" type="button">🔓 공개하기</button>
            </div>
          </a>
          <a class="league-card challengers-card" style="--accent:#159194" href="javascript:void(0)" aria-label="Southeast Asia Challengers" data-slug="southeast-asia">
            <span class="lock-badge">업데이트 예정</span>
            <span class="league-logo-wrap"><img src="https://static.wikia.nocookie.net/logopedia/images/f/f1/VALORANT_Challengers_logo.png/revision/latest?cb=20210816022910" alt="" /></span>
            <span class="league-name">Southeast Asia</span>
            <div class="card-action-row">
              <span class="league-action">챌린저스 보기</span>
              <button class="admin-unlock-btn" type="button">🔓 공개하기</button>
            </div>
          </a>
          <a class="league-card challengers-card" style="--accent:#159194" href="javascript:void(0)" aria-label="South Asia Challengers" data-slug="south-asia">
            <span class="lock-badge">업데이트 예정</span>
            <span class="league-logo-wrap"><img src="https://static.wikia.nocookie.net/logopedia/images/f/f1/VALORANT_Challengers_logo.png/revision/latest?cb=20210816022910" alt="" /></span>
            <span class="league-name">South Asia</span>
            <div class="card-action-row">
              <span class="league-action">챌린저스 보기</span>
              <button class="admin-unlock-btn" type="button">🔓 공개하기</button>
            </div>
          </a>
      </nav>
    </main>

    <script src="./storage.js"></script>
    <script>
      (function () {
        var _toastTimer = null;
        function showLockedToast() {
          var existing = document.querySelector(".locked-toast");
          if (existing) { existing.remove(); clearTimeout(_toastTimer); }
          var toast = document.createElement("div");
          toast.className = "locked-toast";
          toast.textContent = "업데이트 예정입니다.";
          document.body.appendChild(toast);
          requestAnimationFrame(function () { requestAnimationFrame(function () { toast.classList.add("show"); }); });
          _toastTimer = setTimeout(function () {
            toast.classList.remove("show");
            setTimeout(function () { toast.remove(); }, 260);
          }, 2000);
        }

        function applyUnlockStates() {
          document.querySelectorAll(".challengers-card").forEach(function (card) {
            var slug = card.dataset.slug;
            var unlocked = localStorage.getItem("challengers-unlocked:" + slug) === "1";
            card.classList.toggle("unlocked", unlocked);
            var btn = card.querySelector(".admin-unlock-btn");
            if (btn) { btn.textContent = unlocked ? "🔒 비공개로" : "🔓 공개하기"; btn.classList.toggle("is-unlocked", unlocked); }
          });
        }

        if (window.storageReady) { window.storageReady.then(applyUnlockStates); } else { applyUnlockStates(); }

        document.querySelectorAll(".admin-unlock-btn").forEach(function (btn) {
          btn.addEventListener("click", function (e) {
            e.preventDefault(); e.stopPropagation();
            var card = btn.closest(".challengers-card");
            var slug = card.dataset.slug;
            var key = "challengers-unlocked:" + slug;
            if (localStorage.getItem(key) === "1") localStorage.removeItem(key);
            else localStorage.setItem(key, "1");
            applyUnlockStates();
          });
        });

        document.querySelectorAll(".challengers-card").forEach(function (card) {
          card.addEventListener("click", function (e) {
            var isAdmin = window.vctIsAdmin && window.vctIsAdmin();
            if (!isAdmin && !card.classList.contains("unlocked")) { e.preventDefault(); showLockedToast(); }
          });
        });
      })();
    </script>
    <script src="./auth.js"></script>
    <script src="./help.js" defer></script>
  </body>
</html>
